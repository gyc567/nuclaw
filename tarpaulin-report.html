!(invocations[0].chat_jid, \"test_jid\");\n    }\n}\n","traces":[{"line":11,"address":[13834752],"length":1,"stats":{"Line":0}},{"line":15,"address":[13834707,13834672],"length":1,"stats":{"Line":0}},{"line":18,"address":[13746189],"length":1,"stats":{"Line":0}}],"covered":0,"coverable":3},{"path":["/","root","code","nuclaw","src","runtime.rs"],"content":"use async_trait::async_trait;\nuse crate::types::{ContainerInput, ContainerOutput};\nuse crate::error::Result;\n\n#[async_trait]\npub trait Runtime: Send + Sync {\n    async fn run(\u0026self, input: ContainerInput) -\u003e Result\u003cContainerOutput\u003e;\n}\n\npub struct DockerRuntime;\n\n#[async_trait]\nimpl Runtime for DockerRuntime {\n    async fn run(\u0026self, input: ContainerInput) -\u003e Result\u003cContainerOutput\u003e {\n        crate::container_runner::run_container(input).await\n    }\n}\n\n#[cfg(test)]\npub mod mock {\n    use super::*;\n    use std::sync::Mutex;\n    use std::sync::Arc;\n\n    #[derive(Clone)]\n    pub struct MockRuntime {\n        pub invocations: Arc\u003cMutex\u003cVec\u003cContainerInput\u003e\u003e\u003e,\n        pub mock_result: ContainerOutput,\n    }\n\n    impl MockRuntime {\n        pub fn new(mock_result: ContainerOutput) -\u003e Self {\n            Self {\n                invocations: Arc::new(Mutex::new(Vec::new())),\n                mock_result,\n            }\n        }\n    }\n\n    #[async_trait]\n    impl Runtime for MockRuntime {\n        async fn run(\u0026self, input: ContainerInput) -\u003e Result\u003cContainerOutput\u003e {\n            self.invocations.lock().unwrap().push(input);\n            Ok(self.mock_result.clone())\n        }\n    }\n}\n","traces":[{"line":14,"address":[13299775],"length":1,"stats":{"Line":0}},{"line":15,"address":[13669165],"length":1,"stats":{"Line":0}}],"covered":0,"coverable":2},{"path":["/","root","code","nuclaw","src","security.rs"],"content":"use std::collections::HashSet;\nuse std::path::{Path, PathBuf};\nuse std::sync::RwLock;\n\nconst DEFAULT_BLOCKED_PATHS: \u0026[\u0026str] = \u0026[\"/etc\", \"/root\", \"/proc\", \"/sys\", \"/boot\", \"/dev\", \"/var\"];\n\npub struct WorkspaceIsolation {\n    allowed_roots: RwLock\u003cVec\u003cPathBuf\u003e\u003e,\n    blocked_paths: HashSet\u003cPathBuf\u003e,\n    workspace_only: bool,\n}\n\nimpl WorkspaceIsolation {\n    pub fn new(workspace_only: bool) -\u003e Self {\n        Self {\n            allowed_roots: RwLock::new(Vec::new()),\n            blocked_paths: DEFAULT_BLOCKED_PATHS.iter().map(PathBuf::from).collect(),\n            workspace_only,\n        }\n    }\n\n    pub fn add_allowed_root(\u0026self, path: PathBuf) {\n        if let Ok(mut roots) = self.allowed_roots.write() {\n            roots.push(path);\n        }\n    }\n\n    pub fn is_path_allowed(\u0026self, path: \u0026Path) -\u003e bool {\n        let path_str = path.to_string_lossy();\n\n        for blocked in \u0026self.blocked_paths {\n            let blocked_str = blocked.to_string_lossy();\n            if path_str.starts_with(blocked_str.as_ref()) {\n                return false;\n            }\n        }\n\n        if self.workspace_only {\n            if let Ok(roots) = self.allowed_roots.read() {\n                return roots.iter().any(|root| {\n                    let root_str = root.to_string_lossy();\n                    path_str.starts_with(root_str.as_ref())\n                });\n            }\n            return false;\n        }\n\n        true\n    }\n\n    pub fn sanitize_path(\u0026self, input: \u0026str) -\u003e Option\u003cPathBuf\u003e {\n        if input.contains('\\0') {\n            return None;\n        }\n\n        let path = PathBuf::from(input);\n\n        if path\n            .components()\n            .any(|c| c == std::path::Component::ParentDir)\n        {\n            return None;\n        }\n\n        Some(path)\n    }\n\n    pub fn detect_symlink_escape(\u0026self, path: \u0026Path, base: \u0026Path) -\u003e bool {\n        let resolved = match path.canonicalize() {\n            Ok(p) =\u003e p,\n            Err(_) =\u003e return false,\n        };\n\n        let base_resolved = match base.canonicalize() {\n            Ok(p) =\u003e p,\n            Err(_) =\u003e return true,\n        };\n\n        !resolved.starts_with(\u0026base_resolved)\n    }\n}\n\npub struct CommandAllowlist {\n    allowed_commands: RwLock\u003cHashSet\u003cString\u003e\u003e,\n}\n\nimpl CommandAllowlist {\n    pub fn new() -\u003e Self {\n        Self {\n            allowed_commands: RwLock::new(HashSet::new()),\n        }\n    }\n\n    pub fn add_command(\u0026self, cmd: \u0026str) {\n        if let Ok(mut commands) = self.allowed_commands.write() {\n            commands.insert(cmd.to_string());\n        }\n    }\n\n    pub fn is_allowed(\u0026self, command: \u0026str) -\u003e bool {\n        let cmd_name = command.split_whitespace().next().unwrap_or(\"\");\n\n        if let Ok(commands) = self.allowed_commands.read() {\n            return commands.contains(cmd_name);\n        }\n\n        false\n    }\n\n    pub fn validate(\u0026self, command: \u0026str) -\u003e Result\u003c(), String\u003e {\n        let cmd_name = command.split_whitespace().next().ok_or(\"Empty command\")?;\n\n        if let Ok(commands) = self.allowed_commands.read() {\n            if commands.is_empty() {\n                return Ok(());\n            }\n\n            if !commands.contains(cmd_name) {\n                return Err(format!(\n                    \"Command '{}' not in allowlist: {:?}\",\n                    cmd_name,\n                    commands.iter().collect::\u003cVec\u003c_\u003e\u003e()\n                ));\n            }\n        }\n\n        let dangerous = [\"rm -rf\", \"mkfs\", \"dd if=\", \":(){:|:\u0026};:\"];\n        let lower = command.to_lowercase();\n        for pattern in dangerous {\n            if lower.contains(pattern) {\n                return Err(format!(\"Dangerous pattern detected: {}\", pattern));\n            }\n        }\n\n        Ok(())\n    }\n}\n\nimpl Default for CommandAllowlist {\n    fn default() -\u003e Self {\n        Self::new()\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use std::fs;\n\n    #[test]\n    fn test_workspace_isolation_new() {\n        let isolation = WorkspaceIsolation::new(true);\n        assert!(isolation.workspace_only);\n    }\n\n    #[test]\n    fn test_add_allowed_root() {\n        let isolation = WorkspaceIsolation::new(true);\n        isolation.add_allowed_root(PathBuf::from(\"/tmp/test\"));\n\n        let roots = isolation.allowed_roots.read().unwrap();\n        assert!(roots.iter().any(|r| r.to_string_lossy().contains(\"test\")));\n    }\n\n    #[test]\n    fn test_is_path_allowed_with_workspace_only() {\n        let isolation = WorkspaceIsolation::new(true);\n        isolation.add_allowed_root(PathBuf::from(\"/tmp\"));\n\n        assert!(isolation.is_path_allowed(Path::new(\"/tmp/test.txt\")));\n        assert!(!isolation.is_path_allowed(Path::new(\"/etc/passwd\")));\n    }\n\n    #[test]\n    fn test_is_path_allowed_without_workspace_only() {\n        let isolation = WorkspaceIsolation::new(false);\n\n        assert!(isolation.is_path_allowed(Path::new(\"/tmp/test.txt\")));\n    }\n\n    #[test]\n    fn test_sanitize_path_valid() {\n        let isolation = WorkspaceIsolation::new(false);\n        let result = isolation.sanitize_path(\"/tmp/test.txt\");\n        assert!(result.is_some());\n    }\n\n    #[test]\n    fn test_sanitize_path_null_byte() {\n        let isolation = WorkspaceIsolation::new(false);\n        let result = isolation.sanitize_path(\"/tmp/test.txt\\0\");\n        assert!(result.is_none());\n    }\n\n    #[test]\n    fn test_sanitize_path_parent_dir() {\n        let isolation = WorkspaceIsolation::new(false);\n        let result = isolation.sanitize_path(\"/tmp/../etc/passwd\");\n        assert!(result.is_none());\n    }\n\n    #[test]\n    fn test_command_allowlist_new() {\n        let allowlist = CommandAllowlist::new();\n        assert!(!allowlist.is_allowed(\"ls\"));\n    }\n\n    #[test]\n    fn test_command_allowlist_add() {\n        let allowlist = CommandAllowlist::new();\n        allowlist.add_command(\"ls\");\n        allowlist.add_command(\"cat\");\n\n        assert!(allowlist.is_allowed(\"ls\"));\n        assert!(allowlist.is_allowed(\"cat\"));\n        assert!(!allowlist.is_allowed(\"rm\"));\n    }\n\n    #[test]\n    fn test_command_allowlist_validate() {\n        let allowlist = CommandAllowlist::new();\n        allowlist.add_command(\"ls\");\n        allowlist.add_command(\"git\");\n\n        assert!(allowlist.validate(\"ls /tmp\").is_ok());\n        assert!(allowlist.validate(\"git status\").is_ok());\n        assert!(allowlist.validate(\"rm -rf /\").is_err());\n    }\n\n    #[test]\n    fn test_command_allowlist_dangerous_patterns() {\n        let allowlist = CommandAllowlist::new();\n        allowlist.add_command(\"rm\");\n\n        assert!(allowlist.validate(\"rm -rf /\").is_err());\n        assert!(allowlist.validate(\"rm file.txt\").is_ok());\n    }\n\n    #[test]\n    fn test_default_blocked_paths() {\n        let isolation = WorkspaceIsolation::new(false);\n\n        assert!(!isolation.is_path_allowed(Path::new(\"/etc/passwd\")));\n        assert!(!isolation.is_path_allowed(Path::new(\"/root/.ssh\")));\n        assert!(!isolation.is_path_allowed(Path::new(\"/proc/1\")));\n    }\n}\n","traces":[{"line":14,"address":[14373820,14373814,14373552],"length":1,"stats":{"Line":0}},{"line":16,"address":[14373585],"length":1,"stats":{"Line":0}},{"line":17,"address":[14373619,14373699],"length":1,"stats":{"Line":0}},{"line":22,"address":[14372755,14372432,14372697],"length":1,"stats":{"Line":0}},{"line":23,"address":[14372452,14372541,14372510],"length":1,"stats":{"Line":0}},{"line":24,"address":[14372564,14372614],"length":1,"stats":{"Line":0}},{"line":28,"address":[14372416,14372123,14371440],"length":1,"stats":{"Line":0}},{"line":29,"address":[1 Deserialize)]\npub struct SkillMetadata {\n    #[serde(default)]\n    pub author: Option\u003cString\u003e,\n    #[serde(default)]\n    pub version: Option\u003cString\u003e,\n    #[serde(flatten)]\n    pub extra: HashMap\u003cString, String\u003e,\n}\n\n#[derive(Debug, Clone)]\npub struct Skill {\n    pub name: String,\n    pub description: String,\n    pub license: Option\u003cString\u003e,\n    pub compatibility: Option\u003cString\u003e,\n    pub metadata: SkillMetadata,\n    pub allowed_tools: Option\u003cString\u003e,\n    pub content: String,\n    pub path: Option\u003cPathBuf\u003e,\n}\n\nimpl Skill {\n    pub fn new(\n        name: impl Into\u003cString\u003e,\n        description: impl Into\u003cString\u003e,\n        content: impl Into\u003cString\u003e,\n    ) -\u003e Self {\n        Self {\n            name: name.into(),\n            description: description.into(),\n            license: None,\n            compatibility: None,\n            metadata: SkillMetadata::default(),\n            allowed_tools: None,\n            content: content.into(),\n            path: None,\n        }\n    }\n\n    pub fn from_directory(dir: \u0026Path) -\u003e Option\u003cSelf\u003e {\n        let skill_md = dir.join(\"SKILL.md\");\n        if !skill_md.exists() {\n            return None;\n        }\n\n        let content = fs::read_to_string(\u0026skill_md).ok()?;\n        let dir_name = dir.file_name()?.to_str()?.to_string();\n\n        let (frontmatter, body) = parse_frontmatter(\u0026content)?;\n\n        let name = if frontmatter.name.is_empty() {\n            dir_name.clone()\n        } else {\n            frontmatter.name\n        };\n\n        Some(Self {\n            name,\n            description: frontmatter.description,\n            license: frontmatter.license,\n            compatibility: frontmatter.compatibility,\n            metadata: frontmatter.metadata,\n            allowed_tools: frontmatter.allowed_tools,\n            content: body,\n            path: Some(dir.to_path_buf()),\n        })\n    }\n\n    pub fn skill_dir(\u0026self) -\u003e Option\u003c\u0026Path\u003e {\n        self.path.as_deref()\n    }\n\n    pub fn scripts_dir(\u0026self) -\u003e Option\u003cPathBuf\u003e {\n        self.path.as_ref().map(|p| p.join(\"scripts\"))\n    }\n\n    pub fn references_dir(\u0026self) -\u003e Option\u003cPathBuf\u003e {\n        self.path.as_ref().map(|p| p.join(\"references\"))\n    }\n\n    pub fn assets_dir(\u0026self) -\u003e Option\u003cPathBuf\u003e {\n        self.path.as_ref().map(|p| p.join(\"assets\"))\n    }\n\n    pub fn has_scripts(\u0026self) -\u003e bool {\n        self.scripts_dir().map(|p| p.exists()).unwrap_or(false)\n    }\n\n    pub fn has_references(\u0026self) -\u003e bool {\n        self.references_dir().map(|p| p.exists()).unwrap_or(false)\n    }\n\n    pub fn has_assets(\u0026self) -\u003e bool {\n        self.assets_dir().map(|p| p.exists()).unwrap_or(false)\n    }\n\n    pub fn validate(\u0026self) -\u003e Vec\u003cSkillValidationError\u003e {\n        let mut errors = Vec::new();\n\n        if self.name.is_empty() {\n            errors.push(SkillValidationError::NameEmpty);\n        }\n        if self.name.len() \u003e 64 {\n            errors.push(SkillValidationError::NameTooLong);\n        }\n        if !is_valid_name(\u0026self.name) {\n            errors.push(SkillValidationError::NameInvalidFormat);\n        }\n        if self.description.is_empty() {\n            errors.push(SkillValidationError::DescriptionEmpty);\n        }\n        if self.description.len() \u003e 1024 {\n            errors.push(SkillValidationError::DescriptionTooLong);\n        }\n        if let Some(ref compat) = self.compatibility {\n            if compat.len() \u003e 500 {\n                errors.push(SkillValidationError::CompatibilityTooLong);\n            }\n        }\n\n        errors\n    }\n\n    pub fn is_valid(\u0026self) -\u003e bool {\n        self.validate().is_empty()\n    }\n}\n\n#[derive(Debug, Clone, PartialEq)]\npub enum SkillValidationError {\n    NameEmpty,\n    NameTooLong,\n    NameInvalidFormat,\n    DescriptionEmpty,\n    DescriptionTooLong,\n    CompatibilityTooLong,\n}\n\nimpl std::fmt::Display for SkillValidationError {\n    fn fmt(\u0026self, f: \u0026mut std::fmt::Formatter\u003c'_\u003e) -\u003e std::fmt::Result {\n        match self {\n            SkillValidationError::NameEmpty =\u003e write!(f, \"name cannot be empty\"),\n            SkillValidationError::NameTooLong =\u003e write!(f, \"name exceeds 64 characters\"),\n            SkillValidationError::NameInvalidFormat =\u003e {\n                write!(f, \"name contains invalid characters\")\n            }\n            SkillValidationError::DescriptionEmpty =\u003e write!(f, \"description cannot be empty\"),\n            SkillValidationError::DescriptionTooLong =\u003e {\n                write!(f, \"description exceeds 1024 characters\")\n            }\n            SkillValidationError::CompatibilityTooLong =\u003e {\n                write!(f, \"compatibility exceeds 500 characters\")\n            }\n        }\n    }\n}\n\n#[derive(Debug, Default, Deserialize)]\nstruct Frontmatter {\n    #[serde(default)]\n    name: String,\n    #[serde(default)]\n    description: String,\n    #[serde(default)]\n    license: Option\u003cString\u003e,\n    #[serde(default)]\n    compatibility: Option\u003cString\u003e,\n    #[serde(default)]\n    metadata: SkillMetadata,\n    #[serde(rename = \"allowed-tools\", default)]\n    allowed_tools: Option\u003cString\u003e,\n}\n\nfn parse_frontmatter(content: \u0026str) -\u003e Option\u003c(Frontmatter, String)\u003e {\n    if !content.starts_with(\"---\") {\n        let lines: Vec\u003c\u0026str\u003e = content.lines().collect();\n        let description = lines.first().unwrap_or(\u0026\"\").to_string();\n        return Some((\n            Frontmatter {\n                description,\n                ..Default::default()\n            },\n            content.to_string(),\n        ));\n    }\n\n    let end_idx = content[3..].find(\"---\")?;\n    let frontmatter_str = \u0026content[3..3 + end_idx];\n    let body = content[3 + end_idx + 3..].trim_start().to_string();\n\n    let frontmatter: Frontmatter = serde_yaml::from_str(frontmatter_str).ok()?;\n\n    Some((frontmatter, body))\n}\n\nfn is_valid_name(name: \u0026str) -\u003e bool {\n    if name.is_empty() || name.len() \u003e 64 {\n        return false;\n    }\n    if name.starts_with('-') || name.ends_with('-') {\n        return false;\n    }\n    if name.contains(\"--\") {\n        return false;\n    }\n    name.chars()\n        .all(|c| c.is_ascii_lowercase() || c.is_ascii_digit() || c == '-')\n}\n\npub trait SkillRegistry: Send + Sync {\n    fn get(\u0026self, name: \u0026str) -\u003e Option\u003cArc\u003cSkill\u003e\u003e;\n    fn list(\u0026self) -\u003e Vec\u003cArc\u003cSkill\u003e\u003e;\n    fn names(\u0026self) -\u003e Vec\u003cString\u003e;\n}\n\n#[derive(Default)]\npub struct BuiltinSkillRegistry {\n    skills: HashMap\u003cString, Arc\u003cSkill\u003e\u003e,\n}\n\nimpl BuiltinSkillRegistry {\n    pub fn new() -\u003e Self {\n        let mut registry = Self::default();\n        registry.register_builtin_skills();\n        registry.load_external_skills();\n        registry\n    }\n\n    fn register_builtin_skills(\u0026mut self) {\n        self.register(Skill::new(\n            \"github\",\n            \"Manage GitHub repositories, issues, and pull requests. Use when working with GitHub.\",\n            r#\"# GitHub Skill\n\nYou are a GitHub assistant. Use the `gh` CLI to help users with:\n- Creating and managing repositories\n- Working with issues and pull requests\n- Searching code\n- Managing branches\n- Getting repository information\n\nWhen asked to perform GitHub actions, use appropriate GitHub CLI commands.\"#,\n        ));\n\n        self.register(Skill::new(\n            \"web-search\",\n            \"Search the web for information. Use when user asks to search, find, or look up something online.\",\n            r#\"# Web Search Skill\n\nYou are a web search assistant. Use search tools to:\n- Find information on the web\n- Research topics\n- Get current news\n- Fact check information\n\nUse web search when you need current or external information.\"#,\n        ));\n\n        self.register(Skill::new(\n            \"weather\",\n            \"Get weather information for locations. Use when user asks about weather, temperature, or forecasts.\",\n            r#\"# Weather Skill\n\nYou are a weather assistant. Help users with:\n- Current weather conditions\n- Weather forecasts\n- Temperature, humidity, and wind information\n\nUse available weather data to provide accurate information.\"#,\n        ));\n\n        self.register(Skill::new(\n            \"memory\",\n            \"Persistent memory and context management. Use to remember important information across sessions.\",\n            r#\"# Memory Skill\n\nYou are a memory assistant. Help users with:\n- Remembering important information\n- Retrieving past conversations\n- Managing context\n- Storing preferences\n\nUse the memory system to persist and retrieve information.\"#,\n        ));\n    }\n\n    fn load_external_skills(\u0026mut self) {\n        let skills_path = skills_dir();\n        if !skills_path.exists() {\n            return;\n        }\n\n        if let Ok(entries) = fs::read_dir(\u0026skills_path) {\n            for entry in entries.flatten() {\n                let path = entry.path();\n                if path.is_dir() {\n                    if let Some(skill) = Skill::from_directory(\u0026path) {\n                        if !self.skills.contains_key(\u0026skill.name) {\n                            self.skills.insert(skill.name.clone(), Arc::new(skill));\n                        }\n                    }\n                }\n            }\n        }\n    }\n\n    pub fn register(\u0026mut self, skill: Skill) {\n        self.skills.insert(skill.name.clone(), Arc::new(skill));\n    }\n\n    pub fn get_skill(\u0026self, name: \u0026str) -\u003e Option\u003cArc\u003cSkill\u003e\u003e {\n        self.skills.get(name).cloned()\n    }\n\n    pub fn validate_all(\u0026self) -\u003e HashMap\u003cString, Vec\u003cSkillValidationError\u003e\u003e {\n        let mut errors = HashMap::new();\n        for (name, skill) in \u0026self.skills {\n            let errs = skill.validate();\n            if !errs.is_empty() {\n                errors.insert(name.clone(), errs);\n            }\n        }\n        errors\n    }\n}\n\nimpl SkillRegistry for BuiltinSkillRegistry {\n    fn get(\u0026self, name: \u0026str) -\u003e Option\u003cArc\u003cSkill\u003e\u003e {\n        self.skills.get(name).cloned()\n    }\n\n    fn list(\u0026self) -\u003e Vec\u003cArc\u003cSkill\u003e\u003e {\n        self.skills.values().cloned().collect()\n    }\n\n    fn names(\u0026self) -\u003e Vec\u003cString\u003e {\n        self.skills.keys().cloned().collect()\n    }\n}\n\npub fn builtin_skills() -\u003e BuiltinSkillRegistry {\n    BuiltinSkillRegistry::new()\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_is_valid_name() {\n        assert!(is_valid_name(\"pdf-processing\"));\n        assert!(is_valid_name(\"data-analysis\"));\n        assert!(is_valid_name(\"code-review\"));\n        assert!(is_valid_name(\"test123\"));\n\n        assert!(!is_valid_name(\"PDF-Processing\"));\n        assert!(!is_valid_name(\"-pdf\"));\n        assert!(!is_valid_name(\"pdf-\"));\n        assert!(!is_valid_name(\"pdf--processing\"));\n        assert!(!is_valid_name(\"\"));\n    }\n\n    #[test]\n    fn test_builtin_skill_registry_has_skills() {\n        let registry = BuiltinSkillRegistry::new();\n        assert!(!registry.names().is_empty());\n    }\n\n    #[test]\n    fn test_get_skill_github() {\n        let registry = BuiltinSkillRegistry::new();\n        let skill = registry.get(\"github\");\n        assert!(skill.is_some());\n        let skill = skill.unwrap();\n        assert_eq!(skill.name, \"github\");\n        assert!(skill.description.contains(\"GitHub\"));\n    }\n\n    #[test]\n    fn test_get_skill_weather() {\n        let registry = BuiltinSkillRegistry::new();\n        let skill = registry.get(\"weather\");\n        assert!(skill.is_some());\n    }\n\n    #[test]\n    fn test_get_skill_nonexistent() {\n        let registry = BuiltinSkillRegistry::new();\n        let skill = registry.get(\"nonexistent\");\n        assert!(skill.is_none());\n    }\n\n    #[test]\n    fn test_list_skills() {\n        let registry = BuiltinSkillRegistry::new();\n        let skills = registry.list();\n        assert!(skills.len() \u003e= 4);\n    }\n\n    #[test]\n    fn test_names() {\n        let registry = BuiltinSkillRegistry::new();\n        let names = registry.names();\n        assert!(names.contains(\u0026\"github\".to_string()));\n        assert!(names.contains(\u0026\"web-search\".to_string()));\n        assert!(names.contains(\u0026\"weather\".to_string()));\n        assert!(names.contains(\u0026\"memory\".to_string()));\n    }\n\n    #[test]\n    fn test_register_custom_skill() {\n        let mut registry = BuiltinSkillRegistry::new();\n        let custom = Skill::new(\"custom\", \"A custom skill\", \"Custom content\");\n        registry.register(custom);\n\n        let skill = registry.get(\"custom\");\n        assert!(skill.is_some());\n        assert_eq!(skill.unwrap().name, \"custom\");\n    }\n\n    #[test]\n    fn test_skill_content() {\n        let registry = BuiltinSkillRegistry::new();\n        let skill = registry.get(\"github\").unwrap();\n        assert!(skill.content.contains(\"GitHub\"));\n    }\n\n    #[test]\n    fn test_builtin_skills_function() {\n        let registry = builtin_skills();\n        assert!(!registry.names().is_empty());\n    }\n\n    #[test]\n    fn test_skill_is_arc() {\n        let registry = BuiltinSkillRegistry::new();\n        let skill1 = registry.get(\"github\").unwrap();\n        let skill2 = registry.get(\"github\").unwrap();\n        assert!(Arc::ptr_eq(\u0026skill1, \u0026skill2));\n    }\n\n    #[test]\n    fn test_parse_frontmatter_full() {\n        let content = r#\"---\nname: test-skill\ndescription: A test skill\nlicense: Apache-2.0\ncompatibility: Requires Python 3.8+\nmetadata:\n  author: test\n  version: \"1.0\"\nallowed-tools: Bash Read\n---\n\n# Test Skill\n\nThis is the body content.\"#;\n        let (fm, body) = parse_frontmatter(content).unwrap();\n        assert_eq!(fm.name, \"test-skill\");\n        assert_eq!(fm.description, \"A test skill\");\n        assert_eq!(fm.license, Some(\"Apache-2.0\".to_string()));\n        assert_eq!(fm.compatibility, Some(\"Requires Python 3.8+\".to_string()));\n        assert!(body.contains(\"Test Skill\"));\n    }\n\n    #[test]\n    fn test_parse_frontmatter_minimal() {\n        let content = r#\"---\nname: minimal-skill\ndescription: A minimal skill\n---\n\n# Body\"#;\n        let (fm, body) = parse_frontmatter(content).unwrap();\n        assert_eq!(fm.name, \"minimal-skill\");\n        assert_eq!(fm.description, \"A minimal skill\");\n        assert!(body.contains(\"Body\"));\n    }\n\n    #[test]\n    fn test_parse_frontmatter_no_frontmatter() {\n        let content = \"# Just a heading\\n\\nSome content\";\n        let (fm, body) = parse_frontmatter(content).unwrap();\n        assert!(fm.description.contains(\"Just a heading\"));\n        assert!(body.contains(\"Some content\"));\n    }\n\n    #[test]\n    fn test_skill_validate_valid() {\n        let skill = Skill::new(\"valid-skill\", \"A valid skill description\", \"Content\");\n        assert!(skill.is_valid());\n        assert!(skill.validate().is_empty());\n    }\n\n    #[test]\n    fn test_skill_validate_empty_name() {\n        let mut skill = Skill::new(\"\", \"A valid description\", \"Content\");\n        skill.path = Some(PathBuf::from(\"test\"));\n        assert!(!skill.is_valid());\n        let errors = skill.validate();\n        assert!(errors.contains(\u0026SkillValidationError::NameEmpty));\n    }\n\n    #[test]\n    fn test_skill_validate_name_too_long() {\n        let long_name = \"a\".repeat(65);\n        let mut skill = Skill::new(long_name, \"Description\", \"Content\");\n        skill.path = Some(PathBuf::from(\"test\"));\n        assert!(!skill.is_valid());\n        let errors = skill.validate();\n        assert!(errors.contains(\u0026SkillValidationError::NameTooLong));\n    }\n\n    #[test]\n    fn test_skill_validate_description_too_long() {\n        let long_desc = \"a\".repeat(1025);\n        let skill = Skill::new(\"valid\", long_desc, \"Content\");\n        assert!(!skill.is_valid());\n        let errors = skill.validate();\n        assert!(errors.contains(\u0026SkillValidationError::DescriptionTooLong));\n    }\n\n    #[test]\n    fn test_skill_validate_invalid_name_format() {\n        let mut skill = Skill::new(\"Invalid-Name\", \"Valid description\", \"Content\");\n        skill.path = Some(PathBuf::from(\"Invalid-Name\"));\n        assert!(!skill.is_valid());\n        let errors = skill.validate();\n        assert!(errors.contains(\u0026SkillValidationError::NameInvalidFormat));\n    }\n\n    #[test]\n    fn test_validate_all() {\n        let registry = BuiltinSkillRegistry::new();\n        let errors = registry.validate_all();\n        assert!(errors.is_empty(), \"All built-in skills should be valid\");\n    }\n\n    #[test]\n    fn test_skill_with_path() {\n        let mut skill = Skill::new(\"test\", \"Test skill\", \"Content\");\n        skill.path = Some(PathBuf::from(\"/tmp/test-skill\"));\n\n        assert_eq!(skill.skill_dir(), Some(Path::new(\"/tmp/test-skill\")));\n        assert_eq!(\n            skill.scripts_dir(),\n            Some(PathBuf::from(\"/tmp/test-skill/scripts\"))\n        );\n        assert_eq!(\n            skill.references_dir(),\n            Some(PathBuf::from(\"/tmp/test-skill/references\"))\n        );\n tput, ScheduledTask};\nuse chrono::{DateTime, Utc};\nuse cron::Schedule;\nuse std::str::FromStr;\nuse tokio::sync::mpsc;\nuse tokio::time::{interval, Duration, MissedTickBehavior};\n\n/// Default poll interval: 60 seconds\nconst DEFAULT_POLL_INTERVAL_SECS: u64 = 60;\n/// Max concurrent tasks\nconst MAX_CONCURRENT_TASKS: usize = 4;\n/// Default task timeout: 10 minutes\nconst DEFAULT_TASK_TIMEOUT_SECS: u64 = 600;\n\n/// Get poll interval from environment or default\npub fn poll_interval() -\u003e Duration {\n    let interval_secs = std::env::var(\"SCHEDULER_POLL_INTERVAL\")\n        .ok()\n        .and_then(|v| v.parse().ok())\n        .unwrap_or(DEFAULT_POLL_INTERVAL_SECS);\n    Duration::from_secs(interval_secs)\n}\n\n/// Get task timeout from environment or default\npub fn task_timeout() -\u003e Duration {\n    let timeout_secs = std::env::var(\"TASK_TIMEOUT\")\n        .ok()\n        .and_then(|v| v.parse().ok())\n        .unwrap_or(DEFAULT_TASK_TIMEOUT_SECS);\n    Duration::from_secs(timeout_secs)\n}\n\n/// Task scheduler state\n#[derive(Clone)]\npub struct TaskScheduler {\n    db: Database,\n    poll_interval: Duration,\n    task_timeout: Duration,\n}\n\nimpl TaskScheduler {\n    /// Create a new task scheduler\n    pub fn new(db: Database) -\u003e Self {\n        Self {\n            db,\n            poll_interval: poll_interval(),\n            task_timeout: task_timeout(),\n        }\n    }\n\n    /// Run the scheduler loop\n    pub async fn run(\u0026mut self) -\u003e Result\u003c()\u003e {\n        let (shutdown_tx, mut shutdown_rx) = mpsc::channel::\u003c()\u003e(1);\n\n        let mut interval = interval(self.poll_interval);\n        interval.set_missed_tick_behavior(MissedTickBehavior::Skip);\n\n        tracing::info!(\n            \"Task scheduler started with poll interval: {:?}\",\n            self.poll_interval\n        );\n\n        loop {\n            tokio::select! {\n                _ = interval.tick() =\u003e {\n                    if let Err(e) = self.poll_and_execute_tasks().await {\n                        tracing::error!(\"Error executing tasks: {}\", e);\n                    }\n                }\n                _ = shutdown_rx.recv() =\u003e {\n                    tracing::info!(\"Task scheduler shutting down\");\n                    break;\n                }\n                _ = shutdown_tx.closed() =\u003e {\n                    break;\n                }\n            }\n        }\n\n        Ok(())\n    }\n\n    /// Poll for due tasks and execute them\n    async fn poll_and_execute_tasks(\u0026mut self) -\u003e Result\u003c()\u003e {\n        let now = Utc::now().to_rfc3339();\n\n        // Load active tasks that are due\n        let tasks = self.load_due_tasks(\u0026now).await?;\n\n        if tasks.is_empty() {\n            tracing::debug!(\"No tasks due for execution\");\n            return Ok(());\n        }\n\n        tracing::info!(\"Found {} tasks due for execution\", tasks.len());\n\n        // Execute tasks concurrently with limit\n        let mut handles = Vec::new();\n        for task in tasks {\n            // Check if we've reached max concurrent tasks\n            while handles.len() \u003e= MAX_CONCURRENT_TASKS {\n                // Wait for at least one to complete\n                let _ = tokio::join!(handles.remove(0));\n            }\n\n            let mut scheduler = TaskScheduler::new(self.db.clone());\n            let handle = tokio::spawn(async move {\n                let result = scheduler.execute_single_task(\u0026task).await;\n                (task.id.clone(), result)\n            });\n            handles.push(handle);\n        }\n\n        // Wait for remaining tasks\n        for handle in handles {\n            let (task_id, result) = handle.await.map_err(|e| NuClawError::Scheduler {\n                message: format!(\"Task execution panic: {}\", e),\n            })?;\n\n            if let Err(e) = \u0026result {\n                tracing::error!(\"Task {} failed: {}\", task_id, e);\n            }\n        }\n\n        Ok(())\n    }\n\n    /// Execute a single task\n    async fn execute_single_task(\u0026mut self, task: \u0026ScheduledTask) -\u003e Result\u003c()\u003e {\n        tracing::info!(\"Executing task: {} (group: {})\", task.id, task.group_folder);\n\n        let start_time = chrono::Utc::now();\n\n        // Verify task is still active (may have been paused/cancelled)\n        let current_task =\n            self.load_task(\u0026task.id)\n                .await?\n                .ok_or_else(|| NuClawError::Scheduler {\n                    message: format!(\"Task {} not found\", task.id),\n                })?;\n\n        if current_task.status != \"active\" {\n            tracing::info!(\"Task {} is no longer active, skipping\", task.id);\n            return Ok(());\n        }\n\n        // Create container input\n        let session_id = format!(\"scheduled_{}\", task.id);\n        let input = ContainerInput {\n            prompt: task.prompt.clone(),\n            session_id: Some(session_id.clone()),\n            group_folder: task.group_folder.clone(),\n            chat_jid: task.chat_jid.clone(),\n            is_main: false,\n            is_scheduled_task: true,\n        };\n\n        // Execute container with timeout\n        let result = tokio::time::timeout(self.task_timeout, run_container(input)).await;\n\n        let end_time = chrono::Utc::now();\n        let duration_ms = (end_time - start_time).num_milliseconds();\n\n        // Process result and log\n        match result {\n            Ok(Ok(output)) =\u003e {\n                // Log successful execution\n                self.log_task_run(task, \u0026output, duration_ms, \"success\")\n                    .await?;\n\n                // Log to file\n                let _ = log_container_output(\u0026task.group_folder, \u0026session_id, \u0026output);\n\n                // Calculate next run time\n                if task.schedule_type == \"once\" {\n                    // Single execution task - mark as completed\n                    self.mark_task_completed(\u0026task.id).await?;\n                } else {\n                    // Recurring task - calculate next run\n                    if let Some(next_run) = self.calculate_next_run(task) {\n                        self.update_next_run(\u0026task.id, \u0026next_run).await?;\n                    }\n                }\n            }\n            Ok(Err(e)) =\u003e {\n                // Container execution failed\n                let output = ContainerOutput {\n                    status: \"error\".to_string(),\n                    result: None,\n                    new_session_id: None,\n                    error: Some(e.to_string()),\n                };\n                self.log_task_run(task, \u0026output, duration_ms, \"error\")\n                    .await?;\n                self.mark_task_failed(\u0026task.id).await?;\n            }\n            Err(_) =\u003e {\n                // Timeout\n                let output = ContainerOutput {\n                    status: \"timeout\".to_string(),\n                    result: None,\n                    new_session_id: None,\n                    error: Some(\"Task execution timed out\".to_string()),\n                };\n                self.log_task_run(task, \u0026output, duration_ms, \"timeout\")\n                    .await?;\n                self.mark_task_failed(\u0026task.id).await?;\n            }\n        }\n\n        Ok(())\n    }\n\n    /// Calculate next run time for a task\n    pub fn calculate_next_run(\u0026self, task: \u0026ScheduledTask) -\u003e Option\u003cString\u003e {\n        match task.schedule_type.as_str() {\n            \"cron\" =\u003e self.calculate_next_cron_run(task.schedule_value.clone()),\n            \"interval\" =\u003e self.calculate_next_interval_run(task.schedule_value.clone()),\n            \"once\" =\u003e None,\n            _ =\u003e None,\n        }\n    }\n\n    /// Calculate next run time from cron expression\n    fn calculate_next_cron_run(\u0026self, cron_expr: String) -\u003e Option\u003cString\u003e {\n        let _tz = timezone();\n        match Schedule::from_str(\u0026cron_expr) {\n            Ok(schedule) =\u003e {\n                // Get next run in the specified timezone\n                let next = schedule.after(\u0026chrono::Utc::now()).next()?;\n                Some(next.to_rfc3339())\n            }\n            Err(e) =\u003e {\n                tracing::error!(\"Invalid cron expression '{}': {}\", cron_expr, e);\n                None\n            }\n        }\n    }\n\n    /// Calculate next run time from interval\n    fn calculate_next_interval_run(\u0026self, interval_str: String) -\u003e Option\u003cString\u003e {\n        let millis: i64 = interval_str.parse().ok()?;\n        let next_run = chrono::Utc::now() + chrono::Duration::milliseconds(millis);\n        Some(next_run.to_rfc3339())\n    }\n\n    /// Load tasks that are due for execution\n    async fn load_due_tasks(\u0026self, now: \u0026str) -\u003e Result\u003cVec\u003cScheduledTask\u003e\u003e {\n        let conn = self\n            .db\n            .get_connection()\n            .map_err(|e| NuClawError::Database {\n                message: e.to_string(),\n            })?;\n\n        let mut stmt = conn\n            .prepare(\n                \"SELECT id, group_folder, chat_jid, prompt, schedule_type, schedule_value,\n                    next_run, last_run, last_result, status, created_at, context_mode\n             FROM scheduled_tasks\n             WHERE status = 'active'\n               AND (next_run IS NULL OR next_run \u003c= ?)\n             ORDER BY next_run ASC\",\n            )\n            .map_err(|e| NuClawError::Database {\n                message: format!(\"Failed to prepare statement: {}\", e),\n            })?;\n\n        let tasks: rusqlite::Result\u003cVec\u003cScheduledTask\u003e\u003e = stmt\n            .query_map([now], |row| {\n                Ok(ScheduledTask {\n                    id: row.get(0)?,\n                    group_folder: row.get(1)?,\n                    chat_jid: row.get(2)?,\n                    prompt: row.get(3)?,\n                    schedule_type: row.get(4)?,\n                    schedule_value: row.get(5)?,\n                    next_run: row.get(6)?,\n                    last_run: row.get(7)?,\n                    last_result: row.get(8)?,\n                    status: row.get(9)?,\n                    created_at: row.get(10)?,\n                    context_mode: row.get(11)?,\n                })\n            })?\n            .collect();\n\n        tasks.map_err(|e| NuClawError::Database {\n            message: format!(\"Failed to load tasks: {}\", e),\n        })\n    }\n\n    /// Load a single task by ID\n    async fn load_task(\u0026self, task_id: \u0026str) -\u003e Result\u003cOption\u003cScheduledTask\u003e\u003e {\n        let conn = self\n            .db\n            .get_connection()\n            .map_err(|e| NuClawError::Database {\n                message: e.to_string(),\n            })?;\n\n        let mut stmt = conn\n            .prepare(\n                \"SELECT id, group_folder, chat_jid, prompt, schedule_type, schedule_value,\n                    next_run, last_run, last_result, status, created_at, context_mode\n             FROM scheduled_tasks WHERE id = ?\",\n            )\n            .map_err(|e| NuClawError::Database {\n                message: format!(\"Failed to prepare statement: {}\", e),\n            })?;\n\n        stmt.query_row([task_id], |row| {\n            Ok(ScheduledTask {\n                id: row.get(0)?,\n                group_folder: row.get(1)?,\n                chat_jid: row.get(2)?,\n                prompt: row.get(3)?,\n                schedule_type: row.get(4)?,\n                schedule_value: row.get(5)?,\n                next_run: row.get(6)?,\n                last_run: row.get(7)?,\n                last_result: row.get(8)?,\n                status: row.get(9)?,\n                created_at: row.get(10)?,\n                context_mode: row.get(11)?,\n            })\n        })\n        .map(Some)\n        .or_else(|e| {\n            if e == rusqlite::Error::QueryReturnedNoRows {\n                Ok(None)\n            } else {\n                Err(NuClawError::Database {\n                    message: format!(\"Failed to load task: {}\", e),\n                })\n            }\n        })\n    }\n\n    /// Log a task run\n    async fn log_task_run(\n        \u0026self,\n        task: \u0026ScheduledTask,\n        output: \u0026ContainerOutput,\n        duration_ms: i64,\n        run_status: \u0026str,\n    ) -\u003e Result\u003c()\u003e {\n        let conn = self\n            .db\n            .get_connection()\n            .map_err(|e| NuClawError::Database {\n                message: e.to_string(),\n            })?;\n\n        let now = chrono::Utc::now().to_rfc3339();\n\n        conn.execute(\n            \"INSERT INTO task_run_logs (task_id, run_at, duration_ms, status, result, error)\n             VALUES (?, ?, ?, ?, ?, ?)\",\n            rusqlite::params![\n                task.id,\n                now,\n                duration_ms,\n                run_status,\n                output.result.clone().unwrap_or_default(),\n                output.error.clone().unwrap_or_default(),\n            ],\n        )\n        .map_err(|e| NuClawError::Database {\n            message: format!(\"Failed to log task run: {}\", e),\n        })?;\n\n        // Update last_run and last_result\n        let last_result = if output.status == \"success\" {\n            output.result.clone()\n        } else {\n            output.error.clone()\n        };\n\n        conn.execute(\n            \"UPDATE scheduled_tasks SET last_run = ?, last_result = ? WHERE id = ?\",\n            rusqlite::params![now, last_result, task.id],\n        )\n        .map_err(|e| NuClawError::Database {\n            message: format!(\"Failed to update task: {}\", e),\n        })?;\n\n        Ok(())\n    }\n\n    /// Update next run time for a task\n    async fn update_next_run(\u0026self, task_id: \u0026str, next_run: \u0026str) -\u003e Result\u003c()\u003e {\n        let conn = self\n            .db\n            .get_connection()\n            .map_err(|e| NuClawError::Database {\n                message: e.to_string(),\n            })?;\n\n        conn.execute(\n            \"UPDATE scheduled_tasks SET next_run = ? WHERE id = ?\",\n            [next_run, task_id],\n        )\n        .map_err(|e| NuClawError::Database {\n            message: format!(\"Failed to update next run: {}\", e),\n        })?;\n\n        Ok(())\n    }\n\n    /// Mark a task as completed (for once-type tasks)\n    async fn mark_task_completed(\u0026self, task_id: \u0026str) -\u003e Result\u003c()\u003e {\n        let conn = self\n            .db\n            .get_connection()\n            .map_err(|e| NuClawError::Database {\n                message: e.to_string(),\n            })?;\n\n        conn.execute(\n            \"UPDATE scheduled_tasks SET status = 'completed', next_run = NULL WHERE id = ?\",\n            [task_id],\n        )\n        .map_err(|e| NuClawError::Database {\n            message: format!(\"Failed to mark task completed: {}\", e),\n        })?;\n\n        Ok(())\n    }\n\n    /// Mark a task as failed\n    async fn mark_task_failed(\u0026self, task_id: \u0026str) -\u003e Result\u003c()\u003e {\n        let conn = self\n            .db\n            .get_connection()\n            .map_err(|e| NuClawError::Database {\n                message: e.to_string(),\n            })?;\n\n        conn.execute(\n            \"UPDATE scheduled_tasks SET status = 'failed' WHERE id = ?\",\n            [task_id],\n        )\n        .map_err(|e| NuClawError::Database {\n            message: format!(\"Failed to mark task failed: {}\", e),\n        })?;\n\n        Ok(())\n    }\n}\n\n/// Parse cron expression and get next run time\npub fn parse_cron_expression(expr: \u0026str) -\u003e Result\u003cSchedule\u003e {\n    Schedule::from_str(expr).map_err(|e| NuClawError::Scheduler {\n        message: format!(\"Invalid cron expression '{}': {}\", expr, e),\n    })\n}\n\n/// Get next run time from schedule\npub fn get_next_run_time(schedule: \u0026Schedule) -\u003e DateTime\u003cUtc\u003e {\n    schedule\n        .after(\u0026chrono::Utc::now())\n        .next()\n        .unwrap_or_else(chrono::Utc::now)\n}\n\n/// Check if a task is due for execution\npub fn is_task_due(task: \u0026ScheduledTask, now: \u0026str) -\u003e bool {\n    if task.status != \"active\" {\n        return false;\n    }\n    match \u0026task.next_run {\n        Some(next_run) =\u003e next_run.as_str() \u003c= now,\n        None =\u003e true,\n    }\n}\n\n/// Determine task status based on execution result\npub fn determine_task_status(success: bool, is_once: bool) -\u003e \u0026'static str {\n    if !success {\n        \"failed\"\n    } else if is_once {\n        \"completed\"\n    } else {\n        \"active\"\n    }\n}\n\n/// Validate schedule type\npub fn is_valid_schedule_type(schedule_type: \u0026str) -\u003e bool {\n    matches!(schedule_type, \"cron\" | \"interval\" | \"once\")\n}\n\n/// Format duration for logging\npub fn format_duration(duration_ms: i64) -\u003e String {\n    if duration_ms \u003c 1000 {\n        format!(\"{}ms\", duration_ms)\n    } else if duration_ms \u003c 60000 {\n        format!(\"{}s\", duration_ms / 1000)\n    } else {\n        format!(\"{}m\", duration_ms / 60000)\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    fn setup_test_dirs() {\n        use crate::config::store_dir;\n        use std::fs;\n        let store = store_dir();\n        if !store.exists() {\n            let _ = fs::create_dir_all(\u0026store);\n        }\n    }\n\n    #[test]\n    fn test_parse_cron_expression() {\n        // Use 6-field format with seconds (cron crate standard)\n        let result = parse_cron_expression(\"0 0 9 * * *\");\n        assert!(result.is_ok(), \"Expected valid cron expression\");\n    }\n\n    #[test]\n    fn test_parse_cron_expression_with_seconds() {\n        let result = parse_cron_expression(\"0 0 0 9 * * *\");\n        assert!(result.is_ok());\n    }\n\n    #[test]\n    fn test_parse_invalid_cron() {\n        let result = parse_cron_expression(\"invalid cron\");\n        assert!(result.is_err());\n    }\n\n    #[test]\n    fn test_parse_empty_cron() {\n        let result = parse_cron_expression(\"\");\n        assert!(result.is_err());\n    }\n\n    #[test]\n    fn test_get_next_run_time() {\n        let schedule = parse_cron_expression(\"0 0 9 * * *\").unwrap();\n        let next = get_next_run_time(\u0026schedule);\n        let now = chrono::Utc::now();\n        // Next run should be in the future\n        assert!(next \u003e= now);\n    }\n\n    #[test]\n    fn test_calculate_interval_next_run() {\n        setup_test_dirs();\n        let scheduler = TaskScheduler::new(Database::new().unwrap());\n        let next = scheduler.calculate_next_interval_run(\"3600000\".to_string());\n        assert!(next.is_some());\n        // Should be approximately 1 hour from now\n        let next_time: DateTime\u003cUtc\u003e = DateTime::from_str(\u0026next.unwrap()).unwrap();\n        let now = chrono::Utc::now();\n        let diff = next_time.signed_duration_since(now).num_seconds();\n        // Allow some tolerance\n        assert!(diff \u003e= 3590 \u0026\u0026 diff \u003c= 3610);\n    }\n\n    #[test]\n    fn test_calculate_interval_next_run_invalid() {\n        setup_test_dirs();\n        let scheduler = TaskScheduler::new(Database::new().unwrap());\n        let next = scheduler.calculate_next_interval_run(\"not_a_number\".to_string());\n        assert!(next.is_none());\n    }\n\n    #[test]\n    fn test_calculate_interval_next_run_zero() {\n        setup_test_dirs();\n        let scheduler = TaskScheduler::new(Database::new().unwrap());\n        let next = scheduler.calculate_next_interval_run(\"0\".to_string());\n        assert!(next.is_some());\n        // Should be essentially now\n        let next_time: DateTime\u003cUtc\u003e = DateTime::from_str(\u0026next.unwrap()).unwrap();\n        let now = chrono::Utc::now();\n        let diff = next_time.signed_duration_since(now).num_seconds();\n        assert!(diff \u003c= 1);\n    }\n\n    #[test]\n    fn test_calculate_next_cron_run() {\n        setup_test_dirs();\n        let scheduler = TaskScheduler::new(Database::new().unwrap());\n        let task = ScheduledTask {\n            id: \"test\".to_string(),\n            group_folder: \"test\".to_string(),\n            chat_jid: \"test\".to_string(),\n            prompt: \"test\".to_string(),\n            schedule_type: \"cron\".to_string(),\n            schedule_value: \"0 0 9 * * *\".to_string(),\n            next_run: None,\n            last_run: None,\n            last_result: None,\n            status: \"active\".to_string(),\n            created_at: chrono::Utc::now().to_rfc3339(),\n            context_mode: \"isolated\".to_string(),\n        };\n        let next = scheduler.calculate_next_run(\u0026task);\n        assert!(next.is_some());\n    }\n\n    #[test]\n    fn test_calculate_next_run_once() {\n        setup_test_dirs();\n        let scheduler = TaskScheduler::new(Database::new().unwrap());\n        let task = ScheduledTask {\n            id: \"test\".to_string(),\n            group_folder: \"test\".to_string(),\n            chat_jid: \"test\".to_string(),\n            prompt: \"test\".to_string(),\n            schedule_type: \"once\".to_string(),\n            schedule_value: \"2025-01-01T00:00:00Z\".to_string(),\n            next_run: None,\n            last_run: None,\n            last_result: None,\n            status: \"active\".to_string(),\n            created_at: chrono::Utc::now().to_rfc3339(),\n            context_mode: \"isolated\".to_string(),\n        };\n        let next = scheduler.calculate_next_run(\u0026task);\n        assert!(next.is_none());\n    }\n\n    #[test]\n    fn test_calculate_next_run_invalid_type() {\n        setup_test_dirs();\n        let scheduler = TaskScheduler::new(Database::new().unwrap());\n        let task = ScheduledTask {\n            id: \"test\".to_string(),\n            group_folder: \"test\".to_string(),\n            chat_jid: \"test\".to_string(),\n            prompt: \"test\".to_string(),\n            schedule_type: \"unknown\".to_string(),\n            schedule_value: \"value\".to_string(),\n            next_run: None,\n            last_run: None,\n            last_result: None,\n            status: \"active\".to_string(),\n            created_at: chrono::Utc::now().to_rfc3339(),\n            context_mode: \"isolated\".to_string(),\n        };\n        let next = scheduler.calculate_next_run(\u0026task);\n        assert!(next.is_none());\n    }\n\n    #[test]\n    fn test_poll_interval_default() {\n        let interval = poll_interval();\n        assert_eq!(interval, Duration::from_secs(DEFAULT_POLL_INTERVAL_SECS));\n    }\n\n    #[test]\n    fn test_poll_interval_from_env() {\n        // Save original\n        let original = std::env::var(\"SCHEDULER_POLL_INTERVAL\").ok();\n\n        std::env::set_var(\"SCHEDULER_POLL_INTERVAL\", \"120\");\n        let interval = poll_interval();\n        assert_eq!(interval, Duration::from_secs(120));\n\n        // Restore\n        match original {\n            Some(val) =\u003e std::env::set_var(\"SCHEDULER_POLL_INTERVAL\", val),\n            None =\u003e std::env::remove_var(\"SCHEDULER_POLL_INTERVAL\"),\n        }\n    }\n\n    #[test]\n    fn test_poll_interval_invalid_env() {\n        // Save original\n        let original = std::env::var(\"SCHEDULER_POLL_INTERVAL\").ok();\n\n        std::env::set_var(\"SCHEDULER_POLL_INTERVAL\", \"invalid\");\n        let interval = poll_interval();\n        // Should fall back to default\n        assert_eq!(interval, Duration::from_secs(DEFAULT_POL  test_is_task_due_inactive() {\n        let now = chrono::Utc::now().to_rfc3339();\n        let task = ScheduledTask {\n            id: \"test\".to_string(),\n            group_folder: \"test\".to_string(),\n            chat_jid: \"test\".to_string(),\n            prompt: \"test\".to_string(),\n            schedule_type: \"interval\".to_string(),\n            schedule_value: \"3600000\".to_string(),\n            next_run: None,\n            last_run: None,\n            last_result: None,\n            status: \"paused\".to_string(),\n            created_at: chrono::Utc::now().to_rfc3339(),\n            context_mode: \"isolated\".to_string(),\n        };\n        assert!(!is_task_due(\u0026task, \u0026now));\n    }\n\n    #[test]\n    fn test_determine_task_status_success_once() {\n        assert_eq!(determine_task_status(true, true), \"completed\");\n    }\n\n    #[test]\n    fn test_determine_task_status_success_recurring() {\n        assert_eq!(determine_task_status(true, false), \"active\");\n    }\n\n    #[test]\n    fn test_determine_task_status_failed() {\n        assert_eq!(determine_task_status(false, true), \"failed\");\n        assert_eq!(determine_task_status(false, false), \"failed\");\n    }\n\n    #[test]\n    fn test_is_valid_schedule_type() {\n        assert!(is_valid_schedule_type(\"cron\"));\n        assert!(is_valid_schedule_type(\"interval\"));\n        assert!(is_valid_schedule_type(\"once\"));\n        assert!(!is_valid_schedule_type(\"invalid\"));\n        assert!(!is_valid_schedule_type(\"\"));\n    }\n\n    #[test]\n    fn test_format_duration() {\n        assert_eq!(format_duration(500), \"500ms\");\n        assert_eq!(format_duration(1000), \"1s\");\n        assert_eq!(format_duration(30000), \"30s\");\n        assert_eq!(format_duration(60000), \"1m\");\n        assert_eq!(format_duration(120000), \"2m\");\n    }\n}\n","traces":[{"line":33,"address":[16070848],"length":1,"stats":{"Line":0}},{"line":34,"address":[16070852],"length":1,"stats },{"line":502,"address":[16071690],"length":1,"stats":{"Line":0}},{"line":507,"address":[16071824],"length":1,"stats":{"Line":0}},{"line":508,"address":[16071847],"length":1,"stats":{"Line":0}},{"line":512,"address":[16070960],"length":1,"stats":{"Line":0}},{"line":513,"address":[16070981],"length":1,"stats":{"Line":0}},{"line":514,"address":[16071009],"length":1,"stats":{"Line":0}},{"line":515,"address":[16070992],"length":1,"stats":{"Line":0}},{"line":516,"address":[16071139,16071348],"length":1,"stats":{"Line":0}},{"line":518,"address":[16071172,16071109],"length":1,"stats":{"Line":0}}],"covered":0,"coverable":222},{"path":["/","root","code","nuclaw","src","telegram","client.rs"],"content":"//! Telegram client implementation\n\nuse crate::config::{assistant_name, data_dir};\nuse crate::container_runner::{container_timeout, run_container};\nuse crate::db::Database;\nuse crate::error::{NuClawError, Result};\nuse crate::telegram::pairing::PairingManager;\nuse crate::telegram::policy::{DMPolicy, GroupPolicy};\nuse crate::telegram::types::TelegramMessage;\nuse crate::telegram::utils::{extract_chat_id_pure, DEFAULT_TEXT_CHUNK_LIMIT};\nuse crate::types::{ContainerInput, NewMessage, RegisteredGroup, RouterState};\nuse crate::utils::json::{load_json, save_json};\n\nconst PAIRING_CODE_LENGTH: usize = 6;\n\nuse axum::extract::State;\nuse axum::routing::{get, post};\nuse axum::Json;\nuse axum::Router;\nuse std::collections::HashMap;\nuse std::net::SocketAddr;\nuse std::sync::Arc;\nuse tokio::sync::Mutex;\nuse tokio::time::{timeout, Duration};\nuse tracing::{debug, error, info};\n\n/// Telegram client state\npub struct TelegramClient {\n    api_url: String,\n    webhook_path: String,\n    dm_policy: DMPolicy,\n    group_policy: GroupPolicy,\n    text_chunk_limit: usize,\n    allowed_groups: Vec\u003cString\u003e,\n    registered_groups: HashMap\u003cString, RegisteredGroup\u003e,\n    router_state: RouterState,\n    db: Database,\n    assistant_name: String,\n}\n\nasync fn telegram_send_single_message(api_url: \u0026str, chat_id: i64, text: \u0026str) -\u003e Result\u003c()\u003e {\n    let payload = serde_json::json!({\n        \"chat_id\": chat_id,\n        \"text\": text,\n        \"parse_mode\": \"HTML\"\n    });\n\n    let response = reqwest::Client::new()\n        .post(format!(\"{}/sendMessage\", api_url))\n        .json(\u0026payload)\n        .timeout(Duration::from_secs(30))\n        .send()\n        .await\n        .map_err(|e| NuClawError::Telegram {\n            message: format!(\"Failed to send message: {}\", e),\n        })?;\n\n    if !response.status().is_success() {\n        let error = response.text().await.unwrap_or_default();\n        return Err(NuClawError::Telegram {\n            message: format!(\"Failed to send message: {}\", error),\n        });\n    }\n\n    Ok(())\n}\n\nimpl TelegramClient {\n    pub fn new(db: Database) -\u003e Result\u003cSelf\u003e {\n        let bot_token = std::env::var(\"TELEGRAM_BOT_TOKEN\").map_err(|_| NuClawError::Config {\n            message: \"TELEGRAM_BOT_TOKEN not set\".to_string(),\n        })?;\n\n        let api_url = format!(\"https://api.telegram.org/bot{}\", bot_token);\n\n        Ok(Self {\n            api_url,\n            webhook_path: std::env::var(\"TELEGRAM_WEBHOOK_PATH\")\n                .unwrap_or_else(|_| \"telegram-webhook\".to_string()),\n            dm_policy: DMPolicy::parse(\n                \u0026std::env::var(\"TELEGRAM_DM_POLICY\").unwrap_or_else(|_| \"pairing\".to_string()),\n            ),\n            group_policy: GroupPolicy::parse(\n                \u0026std::env::var(\"TELEGRAM_GROUP_POLICY\").unwrap_or_else(|_| \"allowlist\".to_string()),\n            ),\n            text_chunk_limit: std::env::var(\"TELEGRAM_TEXT_CHUNK_LIMIT\")\n                .ok()\n                .and_then(|v| v.parse().ok())\n                .unwrap_or(DEFAULT_TEXT_CHUNK_LIMIT),\n            allowed_groups: std::env::var(\"TELEGRAM_WHITELIST_GROUPS\")\n                .ok()\n                .map(|s| s.split(',').map(|v| v.trim().to_string()).collect())\n                .unwrap_or_default(),\n            registered_groups: load_registered_groups(),\n            router_state: load_router_state(),\n            db,\n            assistant_name: assistant_name(),\n        })\n    }\n\n    pub async fn connect(\u0026mut self) -\u003e Result\u003c()\u003e {\n        info!(\"Connecting to Telegram...\");\n\n        let webhook_url = std::env::var(\"TELEGRAM_WEBHOOK_URL\").ok();\n\n        if let Some(url) = webhook_url {\n            self.set_webhook(\u0026url).await?;\n            info!(\"Webhook set to: {}\", url);\n        } else {\n            info!(\"No webhook URL configured, using polling mode\");\n        }\n\n        Ok(())\n    }\n\n    async fn set_webhook(\u0026self, url: \u0026str) -\u003e Result\u003c()\u003e {\n        let full_url = format!(\"{}/webhook/{}\", url, self.webhook_path);\n        let response = reqwest::Client::new()\n            .post(format!(\"{}/setWebhook\", self.api_url))\n            .json(\u0026serde_json::json!({ \"url\": full_url }))\n            .send()\n            .await\n            .map_err(|e| NuClawError::Telegram {\n                message: format!(\"Failed to set webhook: {}\", e),\n            })?;\n\n        if response.status() != 200 {\n            return Err(NuClawError::Telegram {\n                message: format!(\n                    \"Webhook setup failed: {}\",\n                    response.text().await.unwrap_or_default()\n                ),\n            });\n        }\n\n        Ok(())\n    }\n\n    pub async fn start_webhook_server(self) -\u003e Result\u003c()\u003e {\n        let addr: SocketAddr = std::env::var(\"TELEGRAM_WEBHOOK_BIND\")\n            .unwrap_or_else(|_| \"0.0.0.0:8787\".to_string())\n            .parse()\n            .map_err(|_| NuClawError::Config {\n                message: \"Invalid TELEGRAM_WEBHOOK_BIND\".to_string(),\n            })?;\n\n        let client = Arc::new(Mutex::new(self));\n        let webhook_path = client.lock().await.webhook_path.clone();\n\n        let app = Router::new()\n            .route(\u0026format!(\"/{}\", webhook_path), post(handle_telegram_webhook))\n            .route(\"/health\", get(health_check))\n            .with_state(client);\n\n        info!(\"Starting Telegram webhook server on {}\", addr);\n\n        let listener =\n            tokio::net::TcpListener::bind(\u0026addr)\n                .await\n                .map_err(|e| NuClawError::Telegram {\n                    message: format!(\"Failed to bind to {}: {}\", addr, e),\n                })?;\n\n        axum::serve(listener, app)\n            .await\n            .map_err(|e| NuClawError::Telegram {\n                message: format!(\"Webhook server error: {}\", e),\n            })?;\n\n        Ok(())\n    }\n\n    pub async fn handle_update(\n        \u0026mut self,\n        update: \u0026crate::telegram::types::TelegramUpdate,\n    ) -\u003e Result\u003cOption\u003cString\u003e\u003e {\n        let message = match \u0026update.message {\n            Some(msg) =\u003e msg,\n            None =\u003e {\n                debug!(\"Received update without message, skipping\");\n                return Ok(None);\n            }\n        };\n\n        let new_message = self.parse_telegram_message(message).await?;\n        self.handle_message(\u0026new_message).await\n    }\n\n    async fn parse_telegram_message(\u0026self, msg: \u0026TelegramMessage) -\u003e Result\u003cNewMessage\u003e {\n        let sender = msg\n            .from\n            .as_ref()\n            .map(|u| u.id.to_string())\n            .unwrap_or_default();\n\n        let sender_name = msg\n            .from\n            .as_ref()\n            .map(|u| {\n                if let Some(username) = \u0026u.username {\n                    username.clone()\n                } else {\n                    u.first_name.clone()\n                }\n            })\n            .unwrap_or_else(|| \"Unknown\".to_string());\n\n        let chat_jid = format!(\"telegram:group:{}\", msg.chat.id);\n\n        let content = msg.text.clone().unwrap_or_default();\n\n        Ok(NewMessage {\n            id: msg.message_id.to_string(),\n            chat_jid,\n            sender,\n            sender_name,\n            content,\n            timestamp: msg.date.to_string(),\n        })\n    }\n\n    pub async fn handle_message(\u0026mut self, msg: \u0026NewMessage) -\u003e Result\u003cOption\u003cString\u003e\u003e {\n        if self.is_duplicate_message(msg).await {\n            debug!(\"Skipping duplicate message: {}\", msg.id);\n            return Ok(None);\n        }\n\n        self.update_router_state(msg).await;\n\n        let db = Arc::new(self.db.clone());\n        let msg_clone = msg.clone();\n        tokio::spawn(async move {\n            if let Err(e) = Self::store_message_background(\u0026db, \u0026msg_clone).await {\n                error!(\"Failed to store message: {}\", e);\n            }\n        });\n\n        if (msg.chat_jid.starts_with(\"telegram:group:-\") || !msg.chat_jid.contains(\":group:\"))\n            \u0026\u0026 !self.check_dm_policy(\u0026msg.sender).await?\n        {\n            debug!(\"Message from unauthorized user: {}\", msg.sender);\n            return Ok(None);\n        }\n\n        if !self.is_allowed_group(\u0026msg.chat_jid).await? {\n            debug!(\"Message from unregistered group: {}\", msg.chat_jid);\n            return Ok(None);\n        }\n\n        let content_trimmed = msg.content.trim().to_uppercase();\n        if content_trimmed.len() == PAIRING_CODE_LENGTH\n            \u0026\u0026 content_trimmed.chars().all(|c| c.is_ascii_alphanumeric())\n        {\n            if let Some(response) = self.handle_pairing_code(\u0026content_trimmed, msg).await? {\n                return Ok(Some(response));\n            }\n        }\n\n        let (_, content) = match self.extract_trigger(\u0026msg.content).await {\n            Some((_, c)) =\u003e (String::new(), c),\n            None =\u003e return Ok(None),\n        };\n\n        info!(\n            \"Received message from {}: {}\",\n            msg.sender_name,\n            crate::telegram::utils::truncate(\u0026content, 50)\n        );\n\n        let group_folder =\n            self.get_group_folder(\u0026msg.chat_jid)\n                .await\n                .ok_or_else(|| NuClawError::Telegram {\n                    message: format!(\"Group not found: {}\", msg.chat_jid),\n                })?;\n\n        let session_id = format!(\"telegram_{}\", msg.id);\n        let input = ContainerInput {\n            prompt: content,\n            session_id: Some(session_id.clone()),\n            group_folder,\n            chat_jid: msg.chat_jid.clone(),\n            is_main: true,\n            is_scheduled_task: false,\n        };\n\n        let result = timeout(container_timeout(), run_container(input)).await;\n\n        match result {\n            Ok(Ok(output)) =\u003e {\n                if let Some(response) = output.result {\n                    let chat_id = self.extract_chat_id(\u0026msg.chat_jid)?;\n                    self.send_message(\u0026chat_id.to_string(), \u0026response).await?;\n                    return Ok(Some(response));\n                }\n            }\n            Ok(Err(e)) =\u003e {\n                error!(\"Container error: {}\", e);\n                let chat_id = self.extract_chat_id(\u0026msg.chat_jid)?;\n                self.send_message(\u0026chat_id.to_string(), \u0026format!(\"Error: {}\", e))\n                    .await?;\n            }\n            Err(_) =\u003e {\n                error!(\"Container timeout\");\n                let chat_id = self.extract_chat_id(\u0026msg.chat_jid)?;\n                self.send_message(\u0026chat_id.to_string(), \"Sorry, the request timed out.\")\n                    .await?;\n            }\n        }\n\n        Ok(None)\n    }\n\n    pub async fn send_message(\u0026self, chat_id: \u0026str, text: \u0026str) -\u003e Result\u003c()\u003e {\n        let cid: i64 = chat_id.parse().map_err(|_| NuClawError::Telegram {\n            message: format!(\"Invalid chat_id: {}\", chat_id),\n        })?;\n\n        let chunks = self.chunk_text(text);\n        let api_url = self.api_url.clone();\n\n        let mut handles = Vec::new();\n        for chunk in chunks {\n            let api_url = api_url.clone();\n            let handle =\n                tokio::spawn(\n                    async move { telegram_send_single_message(\u0026api_url, cid, \u0026chunk).await },\n                );\n            handles.push(handle);\n        }\n\n        for handle in handles {\n            handle.await.map_err(|e| NuClawError::Telegram {\n                message: format!(\"Join error: {}\", e),\n            })??;\n        }\n\n        Ok(())\n    }\n\n    fn chunk_text(\u0026self, text: \u0026str) -\u003e Vec\u003cString\u003e {\n        crate::telegram::utils::chunk_text_pure(text, self.text_chunk_limit)\n    }\n\n    async fn check_dm_policy(\u0026self, user_id: \u0026str) -\u003e Result\u003cbool\u003e {\n        match self.dm_policy {\n            DMPolicy::Disabled =\u003e Ok(false),\n            DMPolicy::Open =\u003e Ok(true),\n            DMPolicy::Allowlist =\u003e Ok(true),\n            DMPolicy::Pairing =\u003e {\n                let manager = PairingManager::new()?;\n                Ok(manager.is_authorized(user_id))\n            }\n        }\n    }\n\n    async fn handle_pairing_code(\u0026self, code: \u0026str, msg: \u0026NewMessage) -\u003e Result\u003cOption\u003cString\u003e\u003e {\n        let chat_id = extract_chat_id_pure(\u0026msg.chat_jid).ok_or_else(|| NuClawError::Telegram {\n            message: \"Invalid chat jid\".to_string(),\n        })?;\n\n        let mut manager = match PairingManager::new() {\n            Ok(m) =\u003e m,\n            Err(e) =\u003e {\n                error!(\"Failed to load pairing manager: {}\", e);\n                return Ok(Some(\n                    \"Pairing system unavailable. Please try again later.\".to_string(),\n                ));\n            }\n        };\n\n        if let Some(pending) = manager.verify_code(code)? {\n            if pending.user_id == \"pending\" || pending.user_id == msg.sender {\n                if let Err(e) = manager.authorize_user(pending.clone()) {\n                    error!(\"Failed to authorize user: {}\", e);\n                    return Ok(Some(\"Authorization failed. Please try again.\".to_string()));\n                }\n\n                let response = format!(\n                    \"✅ Authorization successful!\\n\\nYou can now use {} in this chat.\",\n                    self.assistant_name\n                );\n                self.send_message(\u0026chat_id.to_string(), \u0026response)\n                    .await\n                    .ok();\n                return Ok(Some(\"✅ You have been authorized!\".to_string()));\n            } else {\n                return Ok(Some(\n                    \"This code is not for you. Please request your own pairing code.\".to_string(),\n                ));\n            }\n        }\n\n        if manager.is_authorized(\u0026msg.sender) {\n            return Ok(None);\n        }\n\n        Ok(Some(\n            \"Invalid or expired pairing code. Please request a new one.\".to_string(),\n        ))\n    }\n\n    async fn is_allowed_group(\u0026self, chat_jid: \u0026str) -\u003e Result\u003cbool\u003e {\n        Ok(crate::telegram::utils::is_allowed_group_pure(\n            chat_jid,\n            self.group_policy,\n            \u0026self.allowed_groups,\n        ))\n    }\n\n    async fn get_group_folder(\u0026self, jid: \u0026str) -\u003e Option\u003cString\u003e {\n        self.registered_groups.get(jid).map(|g| g.folder.clone())\n    }\n\n    fn extract_chat_id(\u0026self, jid: \u0026str) -\u003e Result\u003cString\u003e {\n        extract_chat_id_pure(jid).ok_or_else(|| NuClawError::Telegram {\n            message: format!(\"Invalid telegram jid format: {}\", jid),\n        })\n    }\n\n    async fn is_duplicate_message(\u0026self, msg: \u0026NewMessage) -\u003e bool {\n        let last_timestamp = \u0026self.router_state.last_timestamp;\n        let last_agent = self.router_state.last_agent_timestamp.get(\u0026msg.chat_jid);\n\n        if last_timestamp == \u0026msg.timestamp {\n            return true;\n        }\n\n        if let Some(agent_ts) = last_agent {\n            if agent_ts == \u0026msg.timestamp {\n                return true;\n            }\n        }\n\n        false\n    }\n\n    async fn update_router_state(\u0026mut self, msg: \u0026NewMessage) {\n        self.router_state.last_timestamp = msg.timestamp.clone();\n        self.router_state\n            .last_agent_timestamp\n            .insert(msg.chat_jid.clone(), msg.timestamp.clone());\n\n        let router_state = self.router_state.clone();\n        tokio::spawn(async move {\n            let state_path = data_dir().join(\"router_state.json\");\n            let _ = save_json(\u0026state_path, \u0026router_state);\n        });\n    }\n\n    async fn store_message_background(db: \u0026Database, msg: \u0026NewMessage) -\u003e Result\u003c()\u003e {\n        let conn = db.get_connection().map_err(|e| NuClawError::Database {\n            message: e.to_string(),\n        })?;\n\n        conn.execute(\n            \"INSERT OR REPLACE INTO messages (id, chat_jid, sender, sender_name, content, timestamp, is_from_me)\n             VALUES (?, ?, ?, ?, ?, ?, ?)\",\n            rusqlite::params![\n                msg.id,\n                msg.chat_jid,\n                msg.sender,\n                msg.sender_name,\n                msg.content,\n                msg.timestamp,\n                if msg.id.starts_with(\"self\") { 1 } else { 0 },\n            ],\n        ).map_err(|e| NuClawError::Database {\n            message: format!(\"Failed to store message: {}\", e),\n        })?;\n\n        Ok(())\n    }\n\n    async fn extract_trigger(\u0026self, content: \u0026str) -\u003e Option\u003c(String, String)\u003e {\n        let trigger_pattern = format!(\"@{}\", self.assistant_name);\n\n        if let Some(idx) = content.find(\u0026trigger_pattern) {\n            let after = \u0026content[idx + trigger_pattern.len()..];\n            let c = after.trim().to_string();\n            return Some((trigger_pattern, c));\n        }\n\n        None\n    }\n}\n\n// Webhook handlers\nasync fn handle_telegram_webhook(\n    State(client): State\u003cArc\u003cMutex\u003cTelegramClient\u003e\u003e\u003e,\n    Json(update): Json\u003ccrate::telegram::types::TelegramUpdate\u003e,\n) -\u003e \u0026'static str {\n    // Note: For production, consider using a custom extractor for headers\n    // or passing the secret through the state\n\n    let mut client = client.lock().await;\n    if let Err(e) = client.handle_update(\u0026update).await {\n        error!(\"Failed to handle telegram update: {}\", e);\n    }\n    \"OK\"\n}\n\nasync fn health_check() -\u003e \u0026'static str {\n    \"OK\"\n}\n\n// Helper functions\npub fn load_router_state() -\u003e RouterState {\n    let state_path = data_dir().join(\"router_state.json\");\n    load_json(\n        \u0026state_path,\n        RouterState {\n            last_timestamp: String::new(),\n            last_agent_timestamp: HashMap::new(),\n        },\n    )\n}\n\npub fn load_registered_groups() -\u003e HashMap\u003cString, RegisteredGroup\u003e {\n    let path = data_dir().join(\"registered_groups.json\");\n    load_json(\u0026path, HashMap::new())\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_load_router_state() {\n        let state = load_router_state();\n        assert_eq!(state.last_timestamp, \"\");\n        assert!(state.last_agent_timestamp.is_empty());\n    }\n\n    #[test]\n    fn test_load_registered_groups() {\n        let groups = load_registered_groups();\n        assert!(groups.is_empty() || !groups.contains_key(\"nonexistent\"));\n    }\n\n    #[tokio::test]\n    async fn test_telegram_client_new_requires_token() {\n        std::env::remove_var(\"TELEGRAM_BOT_TOKEN\");\n        let result = TelegramClient::new(Database::new().unwrap());\n        assert!(result.is_err());\n    }\n\n    #[tokio::test]\n    async fn test_webhook_requires_secret_when_configured() {\n        std::env::set_var(\"TELEGRAM_WEBHOOK_SECRET\", \"test_secret_123\");\n\n        // Test without secret - should fail\n        let result = std::env::var(\"TELEGRAM_WEBHOOK_SECRET\");\n        assert!(result.is_ok());\n\n        std::env::remove_var(\"TELEGRAM_WEBHOOK_SECRET\");\n    }\n}\n","traces":[{"line":41,"address":[16147136,16147164],"length":1,"stats":{"Line":0}},{"line":42,"address":[15003353,15001812,15001882,15002418,15002173,15001774,15002353,15001656,15002106],"length":1,"stats":{"Line":0}},{"line":48,"address":[15002720,15003634,15003730,15003093,15002630,15003797,15003258,15003692],"length":1,"stats":{"Line":0}},{"line":49,"address":[15002738,15002804],"length":1,"stats":{"Line":0}},{"line":50,"address":[15002975,15003017],"length":1,"stats":{"Line":0}},{"line":51,"address":[15002661,15003030,15003101,15003046,15003299,15002982,15002769],"length":1,"stats":{"Line":0}},{"line":53,"address":[15003280,15003223,15003463,15003644,15001693],"length":1,"stats":{"Line":0}},{"line":54,"address":[15005261,15003707,15005024,15005203,15005267],"length":1,"stats":{"Line":0}},{"line":55,"address":[15005112,15005051],"length":1,"stats":{"Line":0}},{"line":58,"address":[15004016],"length":1,"stats":{"Line":0}},{"line":59,"address":[13655010],"length":1,"stats":{"Line":0}},{"line":60,"address":[15004891],"length":1,"stats":{"Line":0}},{"line":61,"address":[15004718,15004789],"length":1,"stats":{"Line":0}},{"line":65,"address":[15004149],"length":1,"stats":{"Line":0}},{"line":69,"address":[16144144,16146200,16146088],"length":1,"stats":{"Line":0}},{"line":70,"address":[1499107
