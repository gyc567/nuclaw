iled to read env file\");\n\n        assert!(content.contains(\"TELEGRAM_BOT_TOKEN=1234567890:ABCdefGHIjklMNOpqrsTUVwxyz\"));\n        assert!(!content.contains(\"API_KEY\"));\n\n        // Load and verify\n        let loaded = load_config().expect(\"Failed to load config\");\n        assert_eq!(\n            loaded.telegram_token,\n            Some(\"1234567890:ABCdefGHIjklMNOpqrsTUVwxyz\".to_string())\n        );\n        assert!(loaded.provider.is_none());\n        assert!(loaded.api_key.is_none());\n\n        // Cleanup\n        let _ = fs::remove_dir_all(\"/tmp/nuclaw_telegram_only_test\");\n    }\n\n    #[test]\n    fn test_onboard_full_llm_plus_telegram() {\n        use nuclaw::onboard::{env_file_path, load_config, save_config, OnboardConfig};\n\n        // Setup test environment\n        std::env::remove_var(\"NUCLAW_HOME\");\n        std::env::set_var(\"NUCLAW_HOME\", \"/tmp/nuclaw_full_test\");\n        let _ = fs::remove_dir_all(\"/tmp/nuclaw_full_test\");\n        let _ = fs::create_dir_all(\"/tmp/nuclaw_full_test\");\n\n        // Configure both LLM and Telegram\n        let config = OnboardConfig {\n            provider: Some(\"anthropic\".to_string()),\n            api_key: Some(\"sk-ant-full-config-test-key\".to_string()),\n            base_url: Some(\"https://api.anthropic.com\".to_string()),\n            telegram_token: Some(\"9999999999:AAA-BBB-CCC-DDD-EEE\".to_string()),\n        };\n\n        save_config(\u0026config).expect(\"Failed to save config\");\n\n        // Verify complete .env file\n        let env_path = env_file_path();\n        let content = fs::read_to_string(\u0026env_path).expect(\"Failed to read env file\");\n\n        // Should contain all configurations\n        assert!(content.contains(\"ANTHROPIC_API_KEY=sk-ant-full-config-test-key\"));\n        assert!(content.contains(\"ANTHROPIC_BASE_URL=https://api.anthropic.com\"));\n        assert!(content.contains(\"TELEGRAM_BOT_TOKEN=9999999999:AAA-BBB-CCC-DDD-EEE\"));\n\n        // Should have proper header\n        assert!(content.contains(\"# NuClaw Configuration\"));\n        assert!(content.contains(\"# Generated by onboard wizard\"));\n\n        // Load and verify\n        let loaded = load_config().expect(\"Failed to load config\");\n        assert_eq!(loaded.provider, Some(\"anthropic\".to_string()));\n        assert_eq!(\n            loaded.api_key,\n            Some(\"sk-ant-full-config-test-key\".to_string())\n        );\n        assert_eq!(\n            loaded.base_url,\n            Some(\"https://api.anthropic.com\".to_string())\n        );\n        assert_eq!(\n            loaded.telegram_token,\n            Some(\"9999999999:AAA-BBB-CCC-DDD-EEE\".to_string())\n        );\n\n        // Cleanup\n        let _ = fs::remove_dir_all(\"/tmp/nuclaw_full_test\");\n    }\n\n    #[test]\n    fn test_onboard_env_file_sourceable() {\n        use nuclaw::onboard::{env_file_path, save_config, OnboardConfig};\n\n        // Setup test environment\n        std::env::remove_var(\"NUCLAW_HOME\");\n        std::env::set_var(\"NUCLAW_HOME\", \"/tmp/nuclaw_sourceable_test\");\n        let _ = fs::remove_dir_all(\"/tmp/nuclaw_sourceable_test\");\n        let _ = fs::create_dir_all(\"/tmp/nuclaw_sourceable_test\");\n\n        // Create config\n        let config = OnboardConfig {\n            provider: Some(\"anthropic\".to_string()),\n            api_key: Some(\"sk-ant-sourceable-key\".to_string()),\n            base_url: None,\n            telegram_token: Some(\"1111111111:TEST-TOKEN\".to_string()),\n        };\n\n        save_config(\u0026config).expect(\"Failed to save config\");\n\n        // Verify file is sourceable (bash compatible format)\n        let env_path = env_file_path();\n        let content = fs::read_to_string(\u0026env_path).expect(\"Failed to read env file\");\n\n        // Should have KEY=VALUE format (no spaces around =)\n        assert!(content.contains(\"ANTHROPIC_API_KEY=sk-ant-sourceable-key\"));\n        assert!(content.contains(\"TELEGRAM_BOT_TOKEN=1111111111:TEST-TOKEN\"));\n\n        // Should NOT have spaces around =\n        assert!(!content.contains(\"KEY = VALUE\"));\n\n        // Cleanup\n        let _ = fs::remove_dir_all(\"/tmp/nuclaw_sourceable_test\");\n    }\n\n    #[test]\n    fn test_onboard_env_file_multiline_structure() {\n        use nuclaw::onboard::{env_file_path, save_config, OnboardConfig};\n\n        // Setup test environment\n        std::env::remove_var(\"NUCLAW_HOME\");\n        std::env::set_var(\"NUCLAW_HOME\", \"/tmp/nuclaw_multiline_test\");\n        let _ = fs::remove_dir_all(\"/tmp/nuclaw_multiline_test\");\n        let _ = fs::create_dir_all(\"/tmp/nuclaw_multiline_test\");\n\n        // Create config\n        let config = OnboardConfig {\n            provider: Some(\"openai\".to_string()),\n            api_key: Some(\"sk-multiline-test\".to_string()),\n            base_url: Some(\"https://custom.endpoint.com/v1\".to_string()),\n            telegram_token: Some(\"2222222222:MULTILINE\".to_string()),\n        };\n\n        save_config(\u0026config).expect(\"Failed to save config\");\n\n        // Verify file structure\n        let env_path = env_file_path();\n        let content = fs::read_to_string(\u0026env_path).expect(\"Failed to read env file\");\n\n        let lines: Vec\u003c\u0026str\u003e = content.lines().collect();\n\n        // Should have header\n        assert!(lines[0].contains(\"NuClaw Configuration\"));\n\n        // Find API_KEY line\n        let api_key_line = lines.iter().find(|l| l.contains(\"OPENAI_API_KEY\")).unwrap();\n        assert!(api_key_line.contains(\"sk-multiline-test\"));\n\n        // Find BASE_URL line\n        let base_url_line = lines\n            .iter()\n            .find(|l| l.contains(\"OPENAI_BASE_URL\"))\n            .unwrap();\n        assert!(base_url_line.contains(\"https://custom.endpoint.com/v1\"));\n\n        // Find TELEGRAM line\n        let tele_line = lines\n            .iter()\n            .find(|l| l.contains(\"TELEGRAM_BOT_TOKEN\"))\n            .unwrap();\n        assert!(tele_line.contains(\"2222222222:MULTILINE\"));\n\n        // Cleanup\n        let _ = fs::remove_dir_all(\"/tmp/nuclaw_multiline_test\");\n    }\n\n    #[test]\n    fn test_onboard_provider_model_config() {\n        use nuclaw::onboard::{env_file_path, save_config, OnboardConfig};\n\n        // Setup test environment\n        std::env::remove_var(\"NUCLAW_HOME\");\n        std::env::set_var(\"NUCLAW_HOME\", \"/tmp/nuclaw_model_test\");\n        let _ = fs::remove_dir_all(\"/tmp/nuclaw_model_test\");\n        let _ = fs::create_dir_all(\"/tmp/nuclaw_model_test\");\n\n        // Create config - should include default model\n        let config = OnboardConfig {\n            provider: Some(\"anthropic\".to_string()),\n            api_key: Some(\"sk-model-test\".to_string()),\n            base_url: Some(\"https://api.anthropic.com\".to_string()),\n            telegram_token: None,\n        };\n\n        save_config(\u0026config).expect(\"Failed to save config\");\n\n        // Verify .env contains model configuration\n        let env_path = env_file_path();\n        let content = fs::read_to_string(\u0026env_path).expect(\"Failed to read env file\");\n\n        // Should have default model for anthropic\n        assert!(content.contains(\"ANTHROPIC_MODEL=\"));\n\n        // Cleanup\n        let _ = fs::remove_dir_all(\"/tmp/nuclaw_model_test\");\n    }\n\n    #[test]\n    fn test_onboard_env_file_no_duplicate_keys() {\n        use nuclaw::onboard::{env_file_path, load_config, save_config, OnboardConfig};\n\n        // Setup test environment\n        std::env::remove_var(\"NUCLAW_HOME\");\n        std::env::set_var(\"NUCLAW_HOME\", \"/tmp/nuclaw_no_dup_test\");\n        let _ = fs::remove_dir_all(\"/tmp/nuclaw_no_dup_test\");\n        let _ = fs::create_dir_all(\"/tmp/nuclaw_no_dup_test\");\n\n        // First save\n        let config1 = OnboardConfig {\n            provider: Some(\"anthropic\".to_string()),\n            api_key: Some(\"key1\".to_string()),\n            base_url: None,\n            telegram_token: Some(\"token1\".to_string()),\n        };\n        save_config(\u0026config1).expect(\"Failed to save first config\");\n\n        // Second save (overwrite)\n        let config2 = OnboardConfig {\n            provider: Some(\"openai\".to_string()),\n            api_key: Some(\"key2\".to_string()),\n            base_url: Some(\"https://api.openai.com/v1\".to_string()),\n            telegram_token: Some(\"token2\".to_string()),\n        };\n        save_config(\u0026config2).expect(\"Failed to save second config\");\n\n        // Load and verify only second config exists\n        let loaded = load_config().expect(\"Failed to load config\");\n\n        // Should NOT have first config\n        assert_ne!(loaded.api_key, Some(\"key1\".to_string()));\n        assert_ne!(loaded.telegram_token, Some(\"token1\".to_string()));\n\n        // Should have second config\n        assert_eq!(loaded.api_key, Some(\"key2\".to_string()));\n        assert_eq!(loaded.telegram_token, Some(\"token2\".to_string()));\n\n        // Verify .env file has no duplicates\n        let env_path = env_file_path();\n        let content = fs::read_to_string(\u0026env_path).expect(\"Failed to read env file\");\n\n        let api_key_count = content.matches(\"OPENAI_API_KEY=\").count();\n        assert_eq!(api_key_count, 1, \"Should have exactly one API_KEY\");\n\n        let tele_count = content.matches(\"TELEGRAM_BOT_TOKEN=\").count();\n        assert_eq!(tele_count, 1, \"Should have exactly one TELEGRAM_BOT_TOKEN\");\n\n        // Cleanup\n        let _ = fs::remove_dir_all(\"/tmp/nuclaw_no_dup_test\");\n    }\n\n    // =========================================================================\n    // Skills Agent Skills Specification E2E Tests\n    // =========================================================================\n\n    #[test]\n    fn test_skill_from_directory_minimal() {\n        use nuclaw::skills::Skill;\n        use std::path::PathBuf;\n\n        let test_dir = \"/tmp/nuclaw_test_skill_minimal\";\n        let _ = fs::remove_dir_all(test_dir);\n        fs::create_dir_all(test_dir).expect(\"Failed to create test dir\");\n\n        let skill_md = r#\"---\nname: minimal-test\ndescription: A minimal skill for testing\n---\n\n# Minimal Skill\n\nThis is a test skill content.\"#;\n\n        fs::write(format!(\"{}/SKILL.md\", test_dir), skill_md).expect(\"Failed to write SKILL.md\");\n\n        let skill = Skill::from_directory(\u0026PathBuf::from(test_dir));\n        assert!(skill.is_some());\n        let skill = skill.unwrap();\n        assert_eq!(skill.name, \"minimal-test\");\n        assert_eq!(skill.description, \"A minimal skill for testing\");\n        assert!(skill.content.contains(\"test skill content\"));\n\n        let _ = fs::remove_dir_all(test_dir);\n    }\n\n    #[test]\n    fn test_skill_from_directory_full_frontmatter() {\n        use nuclaw::skills::Skill;\n        use std::path::PathBuf;\n\n        let test_dir = \"/tmp/nuclaw_test_skill_full\";\n        let _ = fs::remove_dir_all(test_dir);\n        fs::create_dir_all(test_dir).expect(\"Failed to create test dir\");\n\n        let skill_md = r#\"---\nname: full-test\ndescription: A full skill with all fields\nlicense: Apache-2.0\ncompatibility: Requires Python 3.8 and Docker\nmetadata:\n  author: test-author\n  version: \"2.0\"\nallowed-tools: Bash Read Write\n---\n\n# Full Test Skill\n\nThis skill has all frontmatter fields.\"#;\n\n        fs::write(format!(\"{}/SKILL.md\", test_dir), skill_md).expect(\"Failed to write SKILL.md\");\n\n        let skill = Skill::from_directory(\u0026PathBuf::from(test_dir));\n        assert!(skill.is_some());\n        let skill = skill.unwrap();\n\n        assert_eq!(skill.name, \"full-test\");\n        assert_eq!(skill.description, \"A full skill with all fields\");\n        assert_eq!(skill.license, Some(\"Apache-2.0\".to_string()));\n        assert_eq!(\n            skill.compatibility,\n            Some(\"Requires Python 3.8 and Docker\".to_string())\n        );\n        assert_eq!(skill.metadata.author, Some(\"test-author\".to_string()));\n        assert_eq!(skill.metadata.version, Some(\"2.0\".to_string()));\n        assert_eq!(skill.allowed_tools, Some(\"Bash Read Write\".to_string()));\n\n        let _ = fs::remove_dir_all(test_dir);\n    }\n\n    #[test]\n    fn test_skill_from_directory_with_subdirs() {\n        use nuclaw::skills::Skill;\n        use std::path::PathBuf;\n\n        let test_dir = \"/tmp/nuclaw_test_skill_subdirs\";\n        let _ = fs::remove_dir_all(test_dir);\n\n        fs::create_dir_all(format!(\"{}/scripts\", test_dir)).expect(\"Failed to create scripts\");\n        fs::create_dir_all(format!(\"{}/references\", test_dir))\n            .expect(\"Failed to create references\");\n        fs::create_dir_all(format!(\"{}/assets\", test_dir)).expect(\"Failed to create assets\");\n\n        let skill_md = r#\"---\nname: subdirs-test\ndescription: A skill with subdirectories\n---\n\n# Subdirs Test Skill\"#;\n\n        fs::write(format!(\"{}/SKILL.md\", test_dir), skill_md).expect(\"Failed to write SKILL.md\");\n        fs::write(format!(\"{}/scripts/test.py\", test_dir), \"print('test')\")\n            .expect(\"Failed to write script\");\n        fs::write(format!(\"{}/references/README.md\", test_dir), \"# Reference\")\n            .expect(\"Failed to write ref\");\n        fs::write(format!(\"{}/assets/template.txt\", test_dir), \"template\")\n            .expect(\"Failed to write asset\");\n\n        let skill = Skill::from_directory(\u0026PathBuf::from(test_dir));\n        assert!(skill.is_some());\n        let skill = skill.unwrap();\n\n        assert!(skill.has_scripts());\n        assert!(skill.has_references());\n        assert!(skill.has_assets());\n\n        assert_eq!(\n            skill.scripts_dir().unwrap().to_string_lossy(),\n            format!(\"{}/scripts\", test_dir)\n        );\n        assert_eq!(\n            skill.references_dir().unwrap().to_string_lossy(),\n            format!(\"{}/references\", test_dir)\n        );\n        assert_eq!(\n            skill.assets_dir().unwrap().to_string_lossy(),\n            format!(\"{}/assets\", test_dir)\n        );\n\n        let _ = fs::remove_dir_all(test_dir);\n    }\n\n    #[test]\n    fn test_skill_from_directory_missing_skill_md() {\n        use nuclaw::skills::Skill;\n        use std::path::PathBuf;\n\n        let test_dir = \"/tmp/test_skill_no_md\";\n        let _ = fs::remove_dir_all(test_dir);\n        fs::create_dir_all(test_dir).expect(\"Failed to create test dir\");\n\n        let skill = Skill::from_directory(\u0026PathBuf::from(test_dir));\n        assert!(skill.is_none());\n\n        let _ = fs::remove_dir_all(test_dir);\n    }\n\n    #[test]\n    fn test_skill_registry_with_external_skills() {\n        use nuclaw::config::skills_dir;\n        use nuclaw::skills::builtin_skills;\n\n        let test_nuclaw_home = \"/tmp/nuclaw_external_skills_test\";\n        let _ = fs::remove_dir_all(test_nuclaw_home);\n        fs::create_dir_all(format!(\"{}/skills/external-test\", test_nuclaw_home))\n            .expect(\"Failed to create external skills dir\");\n\n        let skill_md = r#\"---\nname: external-test\ndescription: An externally loaded skill\n---\n\n# External Skill\n\nLoaded from external directory.\"#;\n\n        fs::write(\n            format!(\"{}/skills/external-test/SKILL.md\", test_nuclaw_home),\n            skill_md,\n        )\n        .expect(\"Failed to write SKILL.md\");\n\n        std::env::set_var(\"NUCLAW_HOME\", test_nuclaw_home);\n\n        let registry = builtin_skills();\n\n        assert!(registry.get(\"external-test\").is_some());\n\n        std::env::remove_var(\"NUCLAW_HOME\");\n        let _ = fs::remove_dir_all(test_nuclaw_home);\n    }\n\n    #[test]\n    fn test_skill_validation_errors() {\n        use nuclaw::skills::Skill;\n        use nuclaw::skills::SkillValidationError;\n        use std::path::PathBuf;\n\n        let mut skill = Skill::new(\"\", \"Valid description\", \"Content\");\n        skill.path = Some(PathBuf::from(\"test\"));\n        let errors = skill.validate();\n        assert!(errors.contains(\u0026SkillValidationError::NameEmpty));\n\n        let long_name = \"a\".repeat(65);\n        let mut skill2 = Skill::new(long_name, \"Valid description\", \"Content\");\n        skill2.path = Some(PathBuf::from(\"test\"));\n        let errors2 = skill2.validate();\n        assert!(errors2.contains(\u0026SkillValidationError::NameTooLong));\n\n        let long_desc = \"a\".repeat(1025);\n        let skill3 = Skill::new(\"valid\", long_desc, \"Content\");\n        let errors3 = skill3.validate();\n        assert!(errors3.contains(\u0026SkillValidationError::DescriptionTooLong));\n    }\n\n    #[test]\n    fn test_skill_name_validation() {\n        use nuclaw::skills::Skill;\n        use nuclaw::skills::SkillValidationError;\n        use std::path::PathBuf;\n\n        let invalid_names = vec![\"-start\", \"end-\", \"double--hyphen\", \"UPPERCASE\", \"has space\"];\n\n        for name in invalid_names {\n            let mut skill = Skill::new(name, \"Valid description\", \"Content\");\n            skill.path = Some(PathBuf::from(name));\n            let errors = skill.validate();\n            assert!(\n                errors.contains(\u0026SkillValidationError::NameInvalidFormat),\n                \"Name '{}' should be invalid\",\n                name\n            );\n        }\n\n        let valid_names = vec![\"valid\", \"valid-name\", \"name-123\", \"a\"];\n\n        for name in valid_names {\n            let skill = Skill::new(name, \"Valid description\", \"Content\");\n            let errors = skill.validate();\n            assert!(\n                !errors.contains(\u0026SkillValidationError::NameInvalidFormat),\n                \"Name '{}' should be valid\",\n                name\n            );\n        }\n    }\n\n    #[test]\n    fn test_skill_compatibility_validation() {\n        use nuclaw::skills::Skill;\n        use nuclaw::skills::SkillValidationError;\n\n        let long_compat = \"a\".repeat(501);\n        let skill = Skill::new(\"test\", \"Description\", \"Content\");\n        let _skill_with_compat = Skill {\n            compatibility: Some(long_compat),\n            ..skill\n        };\n    }\n\n    #[test]\n    fn test_builtin_skills_valid() {\n        use nuclaw::skills::builtin_skills;\n\n        let registry = builtin_skills();\n\n        for name in registry.names() {\n            let skill = registry.get(\u0026name).unwrap();\n            assert!(\n                skill.is_valid(),\n                \"Built-in skill '{}' should be valid\",\n                name\n            );\n        }\n    }\n\n    #[test]\n    fn test_skill_registry_traits() {\n        use nuclaw::skills::{builtin_skills, SkillRegistry};\n\n        let registry = builtin_skills();\n\n        let names = registry.names();\n        assert!(!names.is_empty());\n\n        let all_skills = registry.list();\n        assert_eq!(all_skills.len(), names.len());\n\n        for skill in \u0026all_skills {\n            assert!(registry.get(\u0026skill.name).is_some());\n        }\n    }\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","root","code","nuclaw","tests","integration_tests.rs"],"content":"//! Integration tests for NuClaw\n//!\n//! These tests verify the interaction between components.\n\nuse nuclaw::config;\nuse nuclaw::error::Result;\nuse std::fs;\n\n/// Test that required directories are created\n#[test]\nfn test_directory_creation() {\n    // Ensure directories exist\n    config::ensure_directories().expect(\"Failed to create directories\");\n\n    // Verify directories were created\n    assert!(config::store_dir().exists(), \"Store directory should exist\");\n    assert!(config::data_dir().exists(), \"Data directory should exist\");\n    assert!(\n        config::groups_dir().exists(),\n        \"Groups directory should exist\"\n    );\n}\n\n/// Test database initialization\n#[test]\nfn test_database_initialization() {\n    use nuclaw::db::Database;\n\n    // Ensure directories exist first\n    config::ensure_directories().expect(\"Failed to create directories\");\n\n    // Initialize database\n    let db = Database::new().expect(\"Failed to create database\");\n\n    // Verify we can get a connection\n    let conn = db.get_connection().expect(\"Failed to get connection\");\n\n    // Verify tables exist by running a simple query\n    let tables: rusqlite::Result\u003cVec\u003cString\u003e\u003e = conn\n        .prepare(\"SELECT name FROM sqlite_master WHERE type='table'\")\n        .expect(\"Failed to prepare statement\")\n        .query_map([], |row| row.get::\u003c_, String\u003e(0))\n        .expect(\"Failed to query tables\")\n        .collect();\n\n    let tables = tables.expect(\"Failed to collect results\");\n\n    assert!(\n        tables.contains(\u0026\"chats\".to_string()),\n        \"chats table should exist\"\n    );\n    assert!(\n        tables.contains(\u0026\"messages\".to_string()),\n        \"messages table should exist\"\n    );\n    assert!(\n        tables.contains(\u0026\"scheduled_tasks\".to_string()),\n        \"scheduled_tasks table should exist\"\n    );\n    assert!(\n        tables.contains(\u0026\"task_run_logs\".to_string()),\n        \"task_run_logs table should exist\"\n    );\n}\n\n/// Test container timeout configuration\n#[test]\nfn test_container_timeout_configuration() {\n    use std::time::Duration;\n\n    // Save original\n    let original = std::env::var(\"CONTAINER_TIMEOUT\").ok();\n\n    // Test default\n    std::env::remove_var(\"CONTAINER_TIMEOUT\");\n    let timeout = nuclaw::container_runner::container_timeout();\n    assert_eq!(timeout, Duration::from_millis(300_000));\n\n    // Test custom value\n    std::env::set_var(\"CONTAINER_TIMEOUT\", \"60000\");\n    let timeout = nuclaw::container_runner::container_timeout();\n    assert_eq!(timeout, Duration::from_millis(60_000));\n\n    // Restore\n    match original {\n        Some(val) =\u003e std::env::set_var(\"CONTAINER_TIMEOUT\", val),\n        None =\u003e std::env::remove_var(\"CONTAINER_TIMEOUT\"),\n    }\n}\n\n/// Test scheduler configuration\n#[test]\nfn test_scheduler_configuration() {\n    use nuclaw::task_scheduler::{poll_interval, task_timeout};\n    use std::time::Duration;\n\n    // Save originals\n    let original_poll = std::env::var(\"SCHEDULER_POLL_INTERVAL\").ok();\n    let original_timeout = std::env::var(\"TASK_TIMEOUT\").ok();\n\n    // Test defaults\n    std::env::remove_var(\"SCHEDULER_POLL_INTERVAL\");\n    std::env::remove_var(\"TASK_TIMEOUT\");\n    assert_eq!(poll_interval(), Duration::from_secs(60));\n    assert_eq!(task_timeout(), Duration::from_secs(600));\n\n    // Test custom values\n    std::env::set_var(\"SCHEDULER_POLL_INTERVAL\", \"30\");\n    std::env::set_var(\"TASK_TIMEOUT\", \"300\");\n    assert_eq!(poll_interval(), Duration::from_secs(30));\n    assert_eq!(task_timeout(), Duration::from_secs(300));\n\n    // Restore\n    match original_poll {\n        Some(val) =\u003e std::env::set_var(\"SCHEDULER_POLL_INTERVAL\", val),\n        None =\u003e std::env::remove_var(\"SCHEDULER_POLL_INTERVAL\"),\n    }\n    match original_timeout {\n        Some(val) =\u003e std::env::set_var(\"TASK_TIMEOUT\", val),\n        None =\u003e std::env::remove_var(\"TASK_TIMEOUT\"),\n    }\n}\n\n/// Test database operations\n#[test]\nfn test_database_operations() {\n    use nuclaw::db::Database;\n    use rusqlite::params;\n\n    config::ensure_directories().expect(\"Failed to create directories\");\n    let db = Database::new().expect(\"Failed to create database\");\n    let conn = db.get_connection().expect(\"Failed to get connection\");\n\n    // Insert a test message\n    conn.execute(\n        \"INSERT OR REPLACE INTO messages (id, chat_jid,     <script>const e = React.createElement;

function pathToString(path) {
  if (path[0] === '/') {
    return '/' + path.slice(1).join('/');
  } else {
    return path.join('/');
  }
}

function findCommonPath(files) {
  if (!files || !files.length) {
    return [];
  }

  function isPrefix(arr, prefix) {
    if (arr.length < prefix.length) {
      return false;
    }
    for (let i = prefix.length - 1; i >= 0; --i) {
      if (arr[i] !== prefix[i]) {
        return false;
      }
    }
    return true;
  }

  let commonPath = files[0].path.slice(0, -1);
  while (commonPath.length) {
    if (files.every(file => isPrefix(file.path, commonPath))) {
      break;
    }
    commonPath.pop();
  }
  return commonPath;
}

function findFolders(files) {
  if (!files || !files.length) {
    return [];
  }

  let folders = files.filter(file => file.path.length > 1).map(file => file.path[0]);
  folders = [...new Set(folders)]; // unique
  folders.sort();

  folders = folders.map(folder => {
    let filesInFolder = files
      .filter(file => file.path[0] === folder)
      .map(file => ({
        ...file,
        path: file.path.slice(1),
        parent: [...file.parent, file.path[0]],
      }));

    const children = findFolders(filesInFolder); // recursion

    return {
      is_folder: true,
      path: [folder],
      parent: files[0].parent,
      children,
      covered: children.reduce((sum, file) => sum + file.covered, 0),
      coverable: children.reduce((sum, file) => sum + file.coverable, 0),
      prevRun: {
        covered: children.reduce((sum, file) => sum + file.prevRun.covered, 0),
        coverable: children.reduce((sum, file) => sum + file.prevRun.coverable, 0),
      }
    };
  });

  return [
    ...folders,
    ...files.filter(file => file.path.length === 1),
  ];
}

class App extends React.Component {
  constructor(...args) {
    super(...args);

    this.state = {
      current: [],
    };
  }

  componentDidMount() {
    this.updateStateFromLocation();
    window.addEventListener("hashchange", () => this.updateStateFromLocation(), false);
  }

  updateStateFromLocation() {
    if (window.location.hash.length > 1) {
      const current = window.location.hash.substr(1).split('/');
      this.setState({current});
    } else {
      this.setState({current: []});
    }
  }

  getCurrentPath() {
    let file = this.props.root;
    let path = [file];
    for (let p of this.state.current) {
      file = file.children.find(file => file.path[0] === p);
      if (!file) {
        return path;
      }
      path.push(file);
    }
    return path;
  }

  render() {
    const path = this.getCurrentPath();
    const file = path[path.length - 1];

    let w = null;
    if (file.is_folder) {
      w = e(FilesList, {
        folder: file,
        onSelectFile: this.selectFile.bind(this),
        onBack: path.length > 1 ? this.back.bind(this) : null,
      });
    } else {
      w = e(DisplayFile, {
        file,
        onBack: this.back.bind(this),
      });
    }

    return e('div', {className: 'app'}, w);
  }

  selectFile(file) {
    this.setState(({current}) => {
      return {current: [...current, file.path[0]]};
    }, () => this.updateHash());
  }

  back(file) {
    this.setState(({current}) => {
      return {current: current.slice(0, current.length - 1)};
    }, () => this.updateHash());
  }

  updateHash() {
    if (!this.state.current || !this.state.current.length) {
      window.location = '#';
    } else {
      window.location = '#' + this.state.current.join('/');
    }
  }
}

function FilesList({folder, onSelectFile, onBack}) {
  let files = folder.children;
  return e('div', {className: 'display-folder'},
    e(FileHeader, {file: folder, onBack}),
    e('table', {className: 'files-list'},
      e('thead', {className: 'files-list__head'},
        e('tr', null,
          e('th', null, "Path"),
          e('th', null, "Coverage")
        )
      ),
      e('tbody', {className: 'files-list__body'},
        files.map(file => e(File, {file, onClick: onSelectFile}))
      )
    )
  );
}

function File({file, onClick}) {
  const coverage = file.coverable ? file.covered / file.coverable * 100 : -1;
  const coverageDelta = file.prevRun &&
    (file.covered / file.coverable * 100 - file.prevRun.covered / file.prevRun.coverable * 100);

  return e('tr', {
      className: 'files-list__file'
        + (coverage >= 0 && coverage < 50 ? ' files-list__file_low': '')
        + (coverage >= 50 && coverage < 80 ? ' files-list__file_medium': '')
        + (coverage >= 80 ? ' files-list__file_high': '')
        + (file.is_folder ? ' files-list__file_folder': ''),
      onClick: () => onClick(file),
    },
    e('td', null, e('a', null, pathToString(file.path))),
    e('td', null,
      file.covered + ' / ' + file.coverable +
      (coverage >= 0 ? ' (' + coverage.toFixed(2) + '%)' : ''),
      e('span', {title: 'Change from the previous run'},
        (coverageDelta ? ` (${coverageDelta > 0 ? '+' : ''}${coverageDelta.toFixed(2)}%)` : ''))
    )
  );
}

function DisplayFile({file, onBack}) {
  return e('div', {className: 'display-file'},
    e(FileHeader, {file, onBack}),
    e(FileContent, {file})
  );
}

function FileHeader({file, onBack}) {
  const coverage = file.covered / file.coverable * 100;
  const coverageDelta = file.prevRun && (coverage - file.prevRun.covered / file.prevRun.coverable * 100);

  return e('div', {className: 'file-header'},
    onBack ? e('a', {className: 'file-header__back', onClick: onBack}, 'Back') : null,
    e('div', {className: 'file-header__name'}, pathToString([...file.parent, ...file.path])),
    e('div', {className: 'file-header__stat'},
      'Covered: ' + file.covered + ' of ' + file.coverable +
      (file.coverable ? ' (' + coverage.toFixed(2) + '%)' : ''),
      e('span', {title: 'Change from the previous run'},
        (coverageDelta ? ` (${coverageDelta > 0 ? '+' : ''}${coverageDelta.toFixed(2)}%)` : ''))
    )
  );
}

function FileContent({file}) {
  return e('pre', {className: 'file-content'},
    file.content.split(/\r?\n/).map((line, index) => {
      const trace = file.traces.find(trace => trace.line === index + 1);
      const covered = trace && trace.stats.Line;
      const uncovered = trace && !trace.stats.Line;
      return e('code', {
          className: 'code-line'
            + (covered ? ' code-line_covered' : '')
            + (uncovered ? ' code-line_uncovered' : ''),
          title: trace ? JSON.stringify(trace.stats, null, 2) : null,
        }, line);
    })
  );
}

(function(){
  const commonPath = findCommonPath(data.files);
  const prevFilesMap = new Map();

  previousData && previousData.files.forEach((file) => {
    const path = file.path.slice(commonPath.length).join('/');
    prevFilesMap.set(path, file);
  });

  const files = data.files.map((file) => {
    const path = file.path.slice(commonPath.length);
    const { covered = 0, coverable = 0 } = prevFilesMap.get(path.join('/')) || {};
    return {
      ...file,
      path,
      parent: commonPath,
      prevRun: { covered, coverable },
    };
  });

  const children = findFolders(files);

  const root = {
    is_folder: true,
    children,
    path: commonPath,
    parent: [],
    covered: children.reduce((sum, file) => sum + file.covered, 0),
    coverable: children.reduce((sum, file) => sum + file.coverable, 0),
    prevRun: {
      covered: children.reduce((sum, file) => sum + file.prevRun.covered, 0),
      coverable: children.reduce((sum, file) => sum + file.prevRun.coverable, 0),
    }
  };

  ReactDOM.render(e(App, {root, prevFilesMap}), document.getElementById('root'));
}());
</script>
