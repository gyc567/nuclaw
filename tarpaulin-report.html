 /// Whether to use JSON formatting\n    pub json_format: bool,\n    /// Whether to include timestamps\n    pub include_timestamp: bool,\n}\n\n/// Log level enumeration\n#[derive(Debug, Clone, Copy, PartialEq, Eq)]\npub enum Level {\n    /// Trace level (most verbose)\n    Trace,\n    /// Debug level\n    Debug,\n    /// Info level (default)\n    Info,\n    /// Warning level\n    Warn,\n    /// Error level\n    Error,\n    /// Disable logging\n    Off,\n}\n\nimpl Default for LoggingConfig {\n    fn default() -\u003e Self {\n        Self {\n            level: Level::from_env().unwrap_or(Level::Info),\n            json_format: std::env::var(\"NUCLAW_LOG_JSON\")\n                .ok()\n                .and_then(|v| v.parse().ok())\n                .unwrap_or(false),\n            include_timestamp: true,\n        }\n    }\n}\n\nimpl Level {\n    /// Get log level from RUST_LOG environment variable\n    pub fn from_env() -\u003e Option\u003cSelf\u003e {\n        let rust_log = std::env::var(\"RUST_LOG\").ok()?;\n        Self::from_env_str(\u0026rust_log)\n    }\n\n    /// Parse level from string (for env vars)\n    pub fn from_env_str(s: \u0026str) -\u003e Option\u003cSelf\u003e {\n        match s.to_lowercase().as_str() {\n            \"trace\" =\u003e Some(Level::Trace),\n            \"debug\" =\u003e Some(Level::Debug),\n            \"info\" =\u003e Some(Level::Info),\n            \"warn\" | \"warning\" =\u003e Some(Level::Warn),\n            \"error\" =\u003e Some(Level::Error),\n            \"off\" =\u003e Some(Level::Off),\n            _ =\u003e None,\n        }\n    }\n\n    /// Convert to LevelFilter\n    fn to_filter(self) -\u003e LevelFilter {\n        match self {\n            Level::Trace =\u003e LevelFilter::Trace,\n            Level::Debug =\u003e LevelFilter::Debug,\n            Level::Info =\u003e LevelFilter::Info,\n            Level::Warn =\u003e LevelFilter::Warn,\n            Level::Error =\u003e LevelFilter::Error,\n            Level::Off =\u003e LevelFilter::Off,\n        }\n    }\n}\n\n/// Initialize logging with default configuration\npub fn init() {\n    init_with_config(LoggingConfig::default());\n}\n\n/// Initialize logging with custom configuration\npub fn init_with_config(config: LoggingConfig) {\n    // Ensure logging is only initialized once\n    let _ = LOG_INIT.get_or_init(|| {\n        setup_logging(\u0026config);\n    });\n}\n\n/// Setup logging based on configuration\nfn setup_logging(config: \u0026LoggingConfig) {\n    // Set RUST_LOG for env_logger\n    std::env::set_var(\"RUST_LOG\", format!(\"{}\", config.level).to_lowercase());\n\n    // Clone config for the closure\n    let config = config.clone();\n\n    // Initialize env_logger with custom format\n    env_logger::Builder::from_default_env()\n        .format_timestamp(None)\n        .format(move |buf, record| {\n            use std::io::Write;\n\n            let timestamp = if config.include_timestamp {\n                let now = chrono::Utc::now();\n                Some(format!(\"[{}]\", now.to_rfc3339()))\n            } else {\n                None\n            };\n\n            let level = match record.level() {\n                log::Level::Error =\u003e \"ERROR\",\n                log::Level::Warn =\u003e \"WARN\",\n                log::Level::Info =\u003e \"INFO\",\n                log::Level::Debug =\u003e \"DEBUG\",\n                log::Level::Trace =\u003e \"TRACE\",\n            };\n\n            if config.json_format {\n                // JSON format for structured logging\n                let output = serde_json::json!({\n                    \"timestamp\": chrono::Utc::now().to_rfc3339(),\n                    \"level\": level,\n                    \"message\": record.args(),\n                    \"module\": record.module_path().unwrap_or(\"unknown\"),\n                    \"file\": record.file().unwrap_or(\"unknown\"),\n                    \"line\": record.line(),\n                });\n                writeln!(buf, \"{}\", output)\n            } else {\n                // Human-readable format\n                let mut output = String::new();\n                if let Some(ts) = timestamp {\n                    output.push_str(\u0026ts);\n                    output.push(' ');\n                }\n                output.push_str(level);\n                output.push_str(\": \");\n                output.push_str(\u0026format!(\"{}\", record.args()));\n                writeln!(buf, \"{}\", output)\n            }\n        })\n        .filter(None, config.level.to_filter())\n        .init();\n}\n\n/// Check if logging has been initialized\npub fn is_initialized() -\u003e bool {\n    LOG_INIT.get().is_some()\n}\n\n/// Get current log level from environment\npub fn get_log_level() -\u003e Level {\n    Level::from_env().unwrap_or(Level::Info)\n}\n\nimpl std::fmt::Display for Level {\n    fn fmt(\u0026self, f: \u0026mut std::fmt::Formatter\u003c'_\u003e) -\u003e std::fmt::Result {\n        match self {\n            Level::Trace =\u003e write!(f, \"trace\"),\n            Level::Debug =\u003e write!(f, \"debug\"),\n            Level::Info =\u003e write!(f, \"info\"),\n            Level::Warn =\u003e write!(f, \"warn\"),\n            Level::Error =\u003e write!(f, \"error\"),\n            Level::Off =\u003e write!(f, \"off\"),\n        }\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_level_from_str() {\n        assert_eq!(Level::from_env_str(\"trace\"), Some(Level::Trace));\n        assert_eq!(Level::from_env_str(\"debug\"), Some(Level::Debug));\n        assert_eq!(Level::from_env_str(\"info\"), Some(Level::Info));\n        assert_eq!(Level::from_env_str(\"warn\"), Some(Level::Warn));\n        assert_eq!(Level::from_env_str(\"warning\"), Some(Level::Warn));\n        assert_eq!(Level::from_env_str(\"error\"), Some(Level::Error));\n        assert_eq!(Level::from_env_str(\"off\"), Some(Level::Off));\n        assert_eq!(Level::from_env_str(\"invalid\"), None);\n    }\n\n    #[test]\n    fn test_level_display() {\n        assert_eq!(format!(\"{}\", Level::Trace), \"trace\");\n        assert_eq!(format!(\"{}\", Level::Debug), \"debug\");\n        assert_eq!(format!(\"{}\", Level::Info), \"info\");\n        assert_eq!(format!(\"{}\", Level::Warn), \"warn\");\n        assert_eq!(format!(\"{}\", Level::Error), \"error\");\n        assert_eq!(format!(\"{}\", Level::Off), \"off\");\n    }\n\n    #[test]\n    fn test_logging_config_defaults() {\n        std::env::remove_var(\"NUCLAW_LOG_JSON\");\n        let config = LoggingConfig::default();\n        assert!(!config.json_format);\n        assert!(config.include_timestamp);\n        std::env::remove_var(\"NUCLAW_LOG_JSON\");\n    }\n\n    #[test]\n    fn test_logging_config_from_env() {\n        std::env::remove_var(\"NUCLAW_LOG_JSON\");\n\n        let original_json = std::env::var(\"NUCLAW_LOG_JSON\").ok();\n        assert!(original_json.is_none());\n\n        std::env::set_var(\"NUCLAW_LOG_JSON\", \"true\");\n        let config = LoggingConfig::default();\n        assert!(config.json_format);\n\n        std::env::remove_var(\"NUCLAW_LOG_JSON\");\n    }\n\n    #[test]\n    fn test_is_initialized() {\n        // is_initialized() is safe to call even if not initialized\n        let _ = is_initialized();\n    }\n\n    #[test]\n    fn test_get_log_level() {\n        // Save original\n        let original = std::env::var(\"RUST_LOG\").ok();\n\n        std::env::remove_var(\"RUST_LOG\");\n        let level = get_log_level();\n        assert_eq!(level, Level::Info);\n\n        std::env::set_var(\"RUST_LOG\", \"debug\");\n        let level = get_log_level();\n        assert_eq!(level, Level::Debug);\n\n        // Restore\n        match original {\n            Some(v) =\u003e std::env::set_var(\"RUST_LOG\", v),\n            None =\u003e std::env::remove_var(\"RUST_LOG\"),\n        }\n    }\n\n    #[test]\n    fn test_init_with_config() {\n        let config = LoggingConfig {\n            level: Level::Debug,\n            json_format: false,\n            include_timestamp: false,\n        };\n\n        // Should not panic\n        init_with_config(config);\n        assert!(is_initialized());\n    }\n}\n","traces":[{"line":41,"address":[16464016],"length":1,"stats":{"Line":0}},{"line":43,"address":[16464020],"length":1,"stats":{"Line":0}},{"line":44,"address":[16464042],"length":1,"stats":{"Line":0}},{"line":55,"address":[16463874,16463880,16463600],"length":1,"stats":{"Line":0}},{"line":56,"address":[16463607],"length":1,"stats":{"Line":0}},{"line":57,"address":[16463767,16463832],"length":1,"stats":{"Line":0}},{"line":61,"address":[16463583,16463088,16463577],"length":1,"stats":{"Line":0}},{"line":62,"address":[16463194,16463108],"length":1,"stats":{"Line":0}},{"line":63,"address":[16463210,16463276],"length":1,"stats":{"Line":0}},{"line":64,"address":[16463290,16463253,16463329],"length":1,"stats":{"Line":0}},{"line":65,"address":[16463382,16463343,16463306],"length":1,"stats":{"Line":0}},{"line":66,"address":[16463359,16463396],"length":1,"stats":{"Line":0}},{"line":67,"address":[16463462,16463528],"length":1,"stats":{"Line":0}},{"line":68,"address":[16463505,16463539,16463552],"length":1,"stats":{"Line":0}},{"line":69,"address":[16463545],"length":1,"stats":{"Line":0}},{"line":74,"address":[16463904],"length":1,"stats":{"Line":0}},{"line":75,"address":[16463911],"length":1,"stats":{"Line":0}},{"line":76,"address":[16463942],"length":1,"stats":{"Line":0}},{"line":77,"address":[16463953],"length":1,"stats":{"Line":0}},{"line":78,"address":[16463964],"length":1,"stats":{"Line":0}},{"line":79,"address":[16463975],"length":1,"stats":{"Line":0}},{"line":80,"address":[16463986],"length":1,"stats":{"Line":0}},{"line":81,"address":[16463997],"length":1,"stats":{"Line":0}},{"line":87,"address":[16462992],"length":1,"stats":{"Line":0}},{"line":88,"address":[16462996],"length":1,"stats":{"Line":0}},{"line":92,"address":[16462928],"length":1,"stats":{"Line":0}},{"line Args {\n    #[structopt(long)]\n    auth: bool,\n\n    #[structopt(long)]\n    scheduler: bool,\n\n    #[structopt(long)]\n    whatsapp: bool,\n\n    #[structopt(long)]\n    telegram: bool,\n\n    #[structopt(long)]\n    onboard: bool,\n\n    #[structopt(long)]\n    start: bool,\n\n    #[structopt(long)]\n    stop: bool,\n\n    #[structopt(long)]\n    restart: bool,\n\n    #[structopt(long)]\n    status: bool,\n\n    #[structopt(long)]\n    telegram_pair: bool,\n\n    #[structopt(long)]\n    telegram_pair_list: bool,\n\n    #[structopt(long)]\n    telegram_pair_revoke: Option\u003cString\u003e,\n}\n\n#[tokio::main]\nasync fn main() -\u003e Result\u003c()\u003e {\n    let args = Args::from_args();\n\n    // Load .env file if exists (auto-loaded for convenience)\n    config::load_env_file();\n\n    // Initialize logging\n    logging::init();\n\n    info!(\"Starting NuClaw v1.0.0\");\n    info!(\"This is a Rust port of NanoClaw\");\n\n    // Ensure directories exist\n    config::ensure_directories().map_err(|e| NuClawError::FileSystem {\n        message: e.to_string(),\n    })?;\n\n    // Initialize database\n    let db = db::Database::new().map_err(|e| NuClawError::Database {\n        message: e.to_string(),\n    })?;\n    info!(\"Database initialized successfully\");\n\n    // Handle different modes\n    if args.start {\n        run_start_command()?;\n    } else if args.stop {\n        run_stop_command()?;\n    } else if args.restart {\n        run_restart_command()?;\n    } else if args.status {\n        run_status_command()?;\n    } else if args.telegram_pair {\n        run_telegram_pair_command()?;\n    } else if args.telegram_pair_list {\n        run_telegram_pair_list_command()?;\n    } else if args.telegram_pair_revoke.is_some() {\n        run_telegram_pair_revoke_command(args.telegram_pair_revoke.unwrap())?;\n    } else if args.scheduler {\n        // Run task scheduler\n        run_scheduler(db).await?;\n    } else if args.whatsapp {\n        // Run WhatsApp bot\n        run_whatsapp_bot(db).await?;\n    } else if args.telegram {\n        // Run Telegram bot\n        run_telegram_bot(db).await?;\n    } else if args.auth {\n        // Show authentication QR code\n        run_auth_flow().await?;\n    } else if args.onboard {\n        // Run onboard wizard\n        onboard::run_onboard()?;\n    } else {\n        // Default: run main application with all features\n        run_main_application(db).await?;\n    }\n\n    Ok(())\n}\n\n/// Run the main application with all features\nasync fn run_main_application(db: db::Database) -\u003e Result\u003c()\u003e {\n    info!(\"Running main application...\");\n\n    // Ensure container system is running and log any errors\n    if let Err(e) = ensure_container_system_running() {\n        warn!(\n            \"Container system not available: {}. Continuing anyway...\",\n            e\n        );\n    }\n\n    // Setup signal handlers for graceful shutdown\n    let (shutdown_tx, mut shutdown_rx) = tokio::sync::mpsc::channel::\u003c()\u003e(1);\n\n    // Clone db for the scheduler\n    let scheduler_db = db.clone();\n\n    // Run scheduler in background\n    let scheduler_handle = tokio::spawn(async move {\n        let mut scheduler = TaskScheduler::new(scheduler_db);\n        let _ = scheduler.run().await;\n    });\n\n    // Run WhatsApp bot in background\n    let _whatsapp_handle = tokio::spawn(async move {\n        loop {\n            tokio::time::sleep(tokio::time::Duration::from_secs(60)).await;\n        }\n    });\n\n    info!(\"NuClaw is running. Press Ctrl+C to stop.\");\n\n    // Wait for shutdown signal\n    tokio::select! {\n        _ = signal::ctrl_c() =\u003e {\n            info!(\"Received shutdown signal...\");\n        }\n        _ = shutdown_rx.recv() =\u003e {\n            info!(\"Received shutdown signal...\");\n        }\n    }\n\n    // Graceful shutdown\n    let _ = shutdown_tx.send(()).await;\n    scheduler_handle.abort();\n\n    info!(\"NuClaw shutdown complete.\");\n    Ok(())\n}\n\n/// Run the task scheduler\nasync fn run_scheduler(db: db::Database) -\u003e Result\u003c()\u003e {\n    info!(\"Starting task scheduler...\");\n\n    let mut scheduler = TaskScheduler::new(db);\n    scheduler.run().await?;\n\n    Ok(())\n}\n\n/// Run the WhatsApp bot\nasync fn run_whatsapp_bot(db: db::Database) -\u003e Result\u003c()\u003e {\n    info!(\"Starting WhatsApp bot...\");\n\n    // Check if WhatsApp MCP is configured\n    if std::env::var(\"WHATSAPP_MCP_URL\").is_err() {\n        info!(\"WHATSAPP_MCP_URL not set. Run with --auth to set up authentication.\");\n        info!(\"Then start the WhatsApp MCP server and run with --whatsapp.\");\n        return Ok(());\n    }\n\n    // Create WhatsApp client\n    let mut client = whatsapp::WhatsAppClient::new(db);\n\n    // Connect to WhatsApp\n    client.connect().await?;\n    info!(\"Connected to WhatsApp\");\n\n    // Start message listener\n    client.start_message_listener().await;\n\n    Ok(())\n}\n\n/// Run the authentication flow\nasync fn run_auth_flow() -\u003e Result\u003c()\u003e {\n    info!(\"Starting authentication flow...\");\n\n    whatsapp::start_auth_flow().await;\n    info!(\"Use WHATSAPP_MCP_URL to configure WhatsApp connection\");\n\n    Ok(())\n}\n\n/// Run the Telegram bot\nasync fn run_telegram_bot(db: db::Database) -\u003e Result\u003c()\u003e {\n    info!(\"Starting Telegram bot...\");\n\n    // Check if Telegram bot token is configured\n    if std::env::var(\"TELEGRAM_BOT_TOKEN\").is_err() {\n        info!(\"TELEGRAM_BOT_TOKEN not set. Configure it to use Telegram bot.\");\n        info!(\"Usage:\");\n        info!(\"  export TELEGRAM_BOT_TOKEN=your_bot_token\");\n        info!(\"  export TELEGRAM_WEBHOOK_URL=https://your-domain.com\");\n        info!(\"  ./nuclaw --telegram\");\n        return Ok(());\n    }\n\n    // Create Telegram client\n    let mut client = telegram::TelegramClient::new(db)?;\n\n    // Connect to Telegram\n    client.connect().await?;\n    info!(\"Connected to Telegram\");\n\n    // Start webhook server\n    client.start_webhook_server().await?;\n\n    Ok(())\n}\n\nfn pid_file_path() -\u003e std::path::PathBuf {\n    config::nuclaw_home().join(\"nuclaw.pid\")\n}\n\nfn read_pid() -\u003e Option\u003cu32\u003e {\n    std::fs::read_to_string(pid_file_path())\n        .ok()?\n        .trim()\n        .parse()\n        .ok()\n}\n\nfn write_pid(pid: u32) -\u003e std::io::Result\u003c()\u003e {\n    std::fs::write(pid_file_path(), pid.to_string())\n}\n\nfn remove_pid_file() -\u003e std::io::Result\u003c()\u003e {\n    std::fs::remove_file(pid_file_path())\n}\n\nfn is_process_running(pid: u32) -\u003e bool {\n    std::process::Command::new(\"kill\")\n        .arg(\"-0\")\n        .arg(pid.to_string())\n        .output()\n        .map(|o| o.status.success())\n        .unwrap_or(false)\n}\n\nfn run_start_command() -\u003e Result\u003c()\u003e {\n    config::load_env_file();\n\n    if let Some(pid) = read_pid() {\n        if is_process_running(pid) {\n            println!(\"NuClaw is already running (PID: {})\", pid);\n            println!(\"Use 'nuclaw --restart' to restart\");\n            return Ok(());\n        } else {\n            let _ = remove_pid_file();\n        }\n    }\n\n    let exe_path = std::env::current_exe().map_err(|e| NuClawError::FileSystem {\n        message: e.to_string(),\n    })?;\n\n    let child =\n        std::process::Command::new(\u0026exe_path)\n            .spawn()\n            .map_err(|e| NuClawError::FileSystem {\n                message: e.to_string(),\n            })?;\n\n    let pid = child.id();\n    write_pid(pid).map_err(|e| NuClawError::FileSystem {\n        message: e.to_string(),\n    })?;\n\n    println!(\"✓ NuClaw started (PID: {})\", pid);\n    println!(\"  Use 'nuclaw --status' to check status\");\n    println!(\"  Use 'nuclaw --stop' to stop\");\n    println!(\"  Use 'nuclaw --restart' to restart\");\n\n    Ok(())\n}\n\nfn run_stop_command() -\u003e Result\u003c()\u003e {\n    if let Some(pid) = read_pid() {\n        if is_process_running(pid) {\n            println!(\"Stopping NuClaw (PID: {})...\", pid);\n            std::process::Command::new(\"kill\")\n                .arg(pid.to_string())\n                .output()\n                .map_err(|e| NuClawError::FileSystem {\n                    message: e.to_string(),\n                })?;\n\n            for _ in 0..10 {\n                if !is_process_running(pid) {\n                    break;\n                }\n                std::thread::sleep(std::time::Duration::from_millis(500));\n            }\n\n            if is_process_running(pid) {\n                if let Err(e) = std::process::Command::new(\"kill\")\n                    .arg(\"-9\")\n                    .arg(pid.to_string())\n                    .output()\n                {\n                    warn!(\"Failed to kill process {}: {}\", pid, e);\n                }\n            }\n\n            remove_pid_file().ok();\n            println!(\"✓ NuClaw stopped\");\n        } else {\n            println!(\"NuClaw is not running (stale PID file)\");\n            remove_pid_file().ok();\n        }\n    } else {\n        println!(\"NuClaw is not running\");\n    }\n\n    Ok(())\n}\n\nfn run_restart_command() -\u003e Result\u003c()\u003e {\n    run_stop_command()?;\n    std::thread::sleep(std::time::Duration::from_millis(500));\n    run_start_command()\n}\n\nfn run_status_command() -\u003e Result\u003c()\u003e {\n    if let Some(pid) = read_pid() {\n        if is_process_running(pid) {\n            println!(\"╔══════════════════════════════════════════════════════════════╗\");\n            println!(\"║                        NuClaw Status                        ║\");\n            println!(\"╠══════════════════════════════════════════════════════════════╣\");\n            println!(\"║  Status:    Running                                         ║\");\n            println!(\n                \"║  PID:       {}                                             ║\",\n                pid\n            );\n            println!(\"╚══════════════════════════════════════════════════════════════╝\");\n        } else {\n            println!(\"NuClaw is not running (stale PID file: {})\", pid);\n            remove_pid_file().ok();\n        }\n    } else {\n        println!(\"NuClaw is not running\");\n        println!(\"Run 'nuclaw --start' to start the service\");\n    }\n\n    Ok(())\n}\n\nfn run_telegram_pair_command() -\u003e Result\u003c()\u003e {\n    use nuclaw::telegram::PairingManager;\n\n    let _bot_token = std::env::var(\"TELEGRAM_BOT_TOKEN\").map_err(|_| NuClawError::Config {\n        message: \"TELEGRAM_BOT_TOKEN not set\".to_string(),\n    })?;\n\n    let mut manager = PairingManager::new()?;\n    let code = manager.generate_code(\"pending\", 0)?;\n\n    println!();\n    println!(\"╔══════════════════════════════════════════════════════════════╗\");\n    println!(\"║                     Pairing Information                   ║\");\n    println!(\"╠════════════════════════════════════════════════════════════╣\");\n    println!(\n        \"║  Pairing Code: {}                                       ║\",\n        code\n    );\n    println!(\"║  Expires in: 10 minutes                                 ║\");\n    println!(\"║                                                              ║\");\n    println!(\"║  Instructions:                                           ║\");\n    println!(\"║  1. Open Telegram and find your Bot                      ║\");\n    println!(\n        \"║  2. Send the pairing code: {}                         ║\",\n        code\n    );\n    println!(\"║  3. Wait for authorization confirmation                 ║\");\n    println!(\"╚══════════════════════════════════════════════════════════════╝\");\n    println!();\n    println!(\"Note: When a user sends the pairing code to the bot,\");\n    println!(\"      they will be automatically authorized.\");\n    println!();\n    println!(\"The bot must be running to complete pairing.\");\n    println!(\"Run 'nuclaw --telegram' to start the bot, or\");\n    println!(\"run 'nuclaw --start' if you want the full service.\");\n\n    Ok(())\n}\n\nfn run_telegram_pair_list_command() -\u003e Result\u003c()\u003e {\n    use nuclaw::telegram::PairingManager;\n\n    let manager = PairingManager::new()?;\n    let authorized = manager.list_authorized();\n\n    if authorized.is_empty() {\n        println!(\"No authorized users.\");\n        println!(\"Run 'nuclaw --telegram-pair' to generate a pairing code.\");\n    } else {\n        println!();\n        println!(\"╔══════════════════════════════════════════════════════════════╗\");\n        println!(\"║                   Authorized Users                        ║\");\n        println!(\"╠════════════════════════════════════════════════════════════╣\");\n        for user in authorized {\n            println!(\n                \"║  User ID: {}                                          ║\",\n                user.user_id\n            );\n            println!(\n                \"║  Chat ID: {}                                          ║\",\n                user.chat_id\n            );\n            println!(\n                \"║  Authorized: {}                                        ║\",\n                user.authorized_at\n            );\n            println!(\"╟──────────────────────────────────────────────────────────────╢\");\n        }\n        println!(\"╚══════════════════════════════════════════════════════════════╝\");\n    }\n\n    Ok(())\n}\n\nfn run_telegram_pair_revoke_command(user_id: String) -\u003e Result\u003c()\u003e {\n    use nuclaw::telegram::PairingManager;\n\n    let mut manager = PairingManager::new()?;\n    if manager.deauthorize_user(\u0026user_id)? {\n        println!(\"✓ User {} revoked successfully.\", user_id);\n    } else {\n        println!(\"User {} not found.\", user_id);\n    }\n\n    Ok(())\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","root","code","nuclaw","src","maintenance.rs"],"content":"use chrono::{DateTime, Duration, Utc};\nuse serde::{Deserialize, Serialize};\nuse std::fs;\nuse std::path::{Path, PathBuf};\n\nuse crate::error::{NuClawError, Result};\n\nconst DEFAULT_LINE_THRESHOLD: usize = 200;\nconst DEFAULT_MAX_AGE_DAYS: i64 = 90;\n\n#[derive(Debug, Clone)]\npub struct ContentArchiver {\n    threshold_lines: usize,\n    archive_dir: PathBuf,\n}\n\nimpl ContentArchiver {\n    pub fn new(archive_dir: PathBuf) -\u003e Self {\n        Self {\n            threshold_lines: DEFAULT_LINE_THRESHOLD,\n            archive_dir,\n        }\n    }\n\n    pub fn with_threshold(mut self, threshold: usize) -\u003e Self {\n        self.threshold_lines = threshold;\n        self\n    }\n\n    pub fn should_archive(\u0026self, path: \u0026Path) -\u003e bool {\n        if path.file_name().is_none_or(|n| n != \"MEMORY.md\") {\n            return false;\n        }\n\n        if let Ok(content) = fs::read_to_string(path) {\n            let lines = content.lines().count();\n            return lines \u003e self.threshold_lines;\n        }\n\n        false\n    }\n\n    pub fn archive(\u0026self, path: \u0026Path) -\u003e Result\u003cArchiveRecord\u003e {\n        if !path.exists() {\n            return Err(NuClawError::FileSystem {\n                message: format!(\"File not found: {:?}\", path),\n            });\n        }\n\n        let content = fs::read_to_string(path)?;\n        let line_count = content.lines().count();\n\n        let timestamp = Utc::now().format(\"%Y%m%d_%H%M%S\").to_string();\n        let archive_name = format!(\"MEMORY_{}.md\", timestamp);\n\n        let archive_path = self.archive_dir.join(archive_name);\n\n        fs::create_dir_all(\u0026self.archive_dir)?;\n        fs::write(\u0026archive_path, \u0026content)?;\n\n        Ok(ArchiveRecord {\n            original_path: path.to_string_lossy().to_string(),\n            archive_path: archive_path.to_string_lossy().to_string(),\n            line_count,\n        })\n    }\n\n    pub fn count_lines(\u0026self, path: \u0026Path) -\u003e Result\u003cusize\u003e {\n        let content = fs::read_to_string(path)?;\n        Ok(content.lines().count())\n    }\n}\n\n#[derive(Debug, Clone)]\npub struct LogCleaner {\n    max_age_days: i64,\n    log_dir: PathBuf,\n}\n\nimpl LogCleaner {\n    pub fn new(log_dir: PathBuf) -\u003e Self {\n        Self {\n            max_age_days: DEFAULT_MAX_AGE_DAYS,\n            log_dir,\n        }\n    }\n\n    pub fn with_max_age(mut self, days: i64) -\u003e Self {\n        self.max_age_days = days;\n        self\n    }\n\n    pub fn should_delete(\u0026self, path: \u0026Path) -\u003e bool {\n        if !path.is_file() {\n            return false;\n        }\n\n        if let Ok(metadata) = path.metadata() {\n            if let Ok(modified) = metadata.modified() {\n                let modified_dt: DateTime\u003cUtc\u003e = modified.into();\n                let age = Utc::now().signed_duration_since(modified_dt);\n                return age \u003e Duration::days(self.max_age_days);\n            }\n        }\n\n        false\n    }\n\n    pub fn clean(\u0026self) -\u003e Result\u003cusize\u003e {\n        if !self.log_dir.exists() {\n            return Ok(0);\n        }\n\n        let mut deleted_count = 0;\n\n        if let Ok(entries) = fs::read_dir(\u0026self.log_dir) {\n            for entry in entries.flatten() {\n                let path = entry.path();\n                if self.should_delete(\u0026path) \u0026\u0026 fs::remove_file(\u0026path).is_ok() {\n                    deleted_count += 1;\n                }\n            }\n        }\n\n        Ok(deleted_count)\n    }\n\n    pub fn get_old_logs(\u0026self) -\u003e Result\u003cVec\u003cPathBuf\u003e\u003e {\n        if !self.log_dir.exists() {\n            return Ok(Vec::new());\n        }\n\n        let mut old_logs = Vec::new();\n\n        if let Ok(entries) = fs::read_dir(\u0026self.log_dir) {\n            for entry in entries.flatten() {\n                let path = entry.path();\n                if self.should_delete(\u0026path) {\n                    old_logs.push(path);\n                }\n            }\n        }\n\n        Ok(old_logs)\n    }\n}\n\npub struct MaintenanceScheduler {\n    archiver: ContentArchiver,\n    cleaner: LogCleaner,\n}\n\nimpl MaintenanceScheduler {\n    pub fn new(archiver: ContentArchiver, cleaner: LogCleaner) -\u003e Self {\n        Self { archiver, cleaner }\n    }\n\n    pub fn run_maintenance(\u0026self, group_folder: \u0026str) -\u003e Result\u003cMaintenanceReport\u003e {\n        let mut archives = Vec::new();\n        let mut cleaned = 0;\n        let mut errors = Vec::new();\n\n        let memory_path = PathBuf::from(group_folder).join(\"MEMORY.md\");\n        if self.archiver.should_archive(\u0026memory_path) {\n            match self.archiver.archive(\u0026memory_path) {\n                Ok(record) =\u003e archives.push(record),\n                Err(e) =\u003e errors.push(format!(\"Archive error: {}\", e)),\n            }\n        }\n\n        match self.cleaner.clean() {\n            Ok(count) =\u003e cleaned = count,\n            Err(e) =\u003e errors.push(format!(\"Clean error: {}\", e)),\n        }\n\n        Ok(MaintenanceReport {\n            archives,\n            cleaned,\n            errors,\n            executed_at: Utc::now().to_rfc3339(),\n        })\n    }\n\n    pub fn archive_memory(\u0026self, path: \u0026Path) -\u003e Result\u003cOption\u003cArchiveRecord\u003e\u003e {\n        if self.archiver.should_archive(path) {\n            Ok(Some(self.archiver.archive(path)?))\n        } else {\n            Ok(None)\n        }\n    }\n\n    pub fn clean_logs(\u0026self) -\u003e Result\u003cusize\u003e {\n        self.cleaner.clean()\n    }\n}\n\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct ArchiveRecord {\n    pub original_path: String,\n    pub archive_path: String,\n    pub line_count: usize,\n}\n\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct MaintenanceReport {\n    pub archives: Vec\u003cArchiveRecord\u003e,\n    pub cleaned: usize,\n    pub errors: Vec\u003cString\u003e,\n    pub executed_at: String,\n}\n\n#[cfg(test)]\nmod archiver_tests {\n    use super::*;\n    use std::io::Write;\n\n    fn temp_dir() -\u003e std::path::PathBuf {\n        let dir = std::env::temp_dir().join(format!(\"nuclaw_maint_{}\", uuid::Uuid::new_v4()));\n        let _ = fs::create_dir_all(\u0026dir);\n        dir\n    }\n\n    fn cleanup(path: \u0026std::path::Path) {\n        let _ = fs::remove_dir_all(path);\n    }\n\n    #[test]\n    fn test_content_archiver_new() {\n        let archiver = ContentArchiver::new(PathBuf::from(\"/tmp/archive\"));\n        assert_eq!(archiver.threshold_lines, DEFAULT_LINE_THRESHOLD);\n    }\n\n    #[test]\n    fn test_content_archiver_with_threshold() {\n        let archiver = ContentArchiver::new(PathBuf::from(\"/tmp\")).with_threshold(100);\n        assert_eq!(archiver.threshold_lines, 100);\n    }\n\n    #[test]\n    fn test_should_archive_non_memory_file() {\n        let dir = temp_dir();\n        let test_file = dir.join(\"test.txt\");\n        fs::write(\u0026test_file, \"content\").unwrap();\n\n        let archiver = ContentArchiver::new(dir.clone());\n        assert!(!archiver.should_archive(\u0026test_file));\n\n        cleanup(\u0026dir);\n    }\n\n    #[test]\n    fn test_should_archive_small_memory() {\n        let dir = temp_dir();\n        let memory_file = dir.join(\"MEMORY.md\");\n        let mut file = fs::File::create(\u0026memory_file).unwrap();\n        for i in 0..100 {\n            writeln!(file, \"Line {}\", i).unwrap();\n        }\n\n        let archiver = ContentArchiver::new(dir.clone());\n        assert!(!archiver.should_archive(\u0026memory_file));\n\n        cleanup(\u0026dir);\n    }\n\n    #[test]\n    fn test_should_archive_large_memory() {\n        let dir = temp_dir();\n        let memory_file = dir.join(\"MEMORY.md\");\n        let mut file = fs::File::create(\u0026memory_file).unwrap();\n        for i in 0..250 {\n            writeln!(file, \"Line {}\", i).unwrap();\n        }\n\n        let archiver = ContentArchiver::new(dir.clone());\n        assert!(archiver.should_archive(\u0026memory_file));\n\n        cleanup(\u0026dir);\n    }\n\n    #[test]\n    fn test_archive_memory() {\n        let dir = temp_dir();\n        let memory_file = dir.join(\"MEMORY.md\");\n        let mut file = fs::File::create(\u0026memory_file).unwrap();\n        for i in 0..250 {\n            writeln!(file, \"Line {}\", i).unwrap();\n        }\n\n        let archive_dir = dir.join(\".history\");\n        let archiver = ContentArchiver::new(archive_dir);\n\n        let result = archiver.archive(\u0026memory_file);\n        assert!(result.is_ok());\n\n        let record = result.unwrap();\n        assert!(record.archive_path.contains(\"MEMORY_\"));\n        assert_eq!(record.line_count, 250);\n\n        cleanup(\u0026dir);\n    }\n\n    #[test]\n    fn test_count_lines() {\n        let dir = temp_dir();\n        let test_file = dir.join(\"test.txt\");\n        let mut file = fs::File::create(\u0026test_file).unwrap();\n        for i in 0..50 {\n            writeln!(file, \"Line {}\", i).unwrap();\n        }\n\n        let archiver = ContentArchiver::new(dir.clone());\n        let count = archiver.count_lines(\u0026test_file).unwrap();\n        assert_eq!(count, 50);\n\n        cleanup(\u0026dir);\n    }\n}\n\n#[cfg(test)]\nmod cleaner_tests {\n    use super::*;\n    use std::io::Write;\n    use std::thread;\n    use std::time::Duration as StdDuration;\n\n    fn temp_dir() -\u003e std::path::PathBuf {\n        let dir = std::env::temp_dir().join(format!(\"nuclaw_cleaner_{}\", uuid::Uuid::new_v4()));\n        let _ = fs::create_dir_all(\u0026dir);\n        dir\n    }\n\n    fn cleanup(path: \u0026std::path::Path) {\n        let _ = fs::remove_dir_all(path);\n    }\n\n    #[test]\n    fn test_log_cleaner_new() {\n        let cleaner = LogCleaner::new(PathBuf::from(\"/tmp/logs\"));\n        assert_eq!(cleaner.max_age_days, DEFAULT_MAX_AGE_DAYS);\n    }\n\n    #[test]\n    fn test_log_cleaner_with_max_age() {\n        let cleaner = LogCleaner::new(PathBuf::from(\"/tmp\")).with_max_age(30);\n        assert_eq!(cleaner.max_age_days, 30);\n    }\n\n    #[test]\n    fn test_should_delete_recent_file() {\n        let dir = temp_dir();\n        let log_file = dir.join(\"recent.log\");\n        fs::write(\u0026log_file, \"recent log\").unwrap();\n\n        let cleaner = LogCleaner::new(dir.clone());\n        assert!(!cleaner.should_delete(\u0026log_file));\n\n        cleanup(\u0026dir);\n    }\n\n    #[test]\n    fn test_should_delete_logic() {\n        // Test the should_delete logic by checking max_age = 0\n        // This will cause recent files to be treated as old\n        let dir = temp_dir();\n        let log_file = dir.join(\"test.log\");\n        fs::write(\u0026log_file, \"test\").unwrap();\n\n        let cleaner = LogCleaner::new(dir.clone()).with_max_age(0);\n\n        // With max_age = 0, any file should be considered old\n        let result = cleaner.should_delete(\u0026log_file);\n\n        cleanup(\u0026dir);\n    }\n\n    #[test]\n    fn test_clean_logs() {\n        let dir = temp_dir();\n\n        // Create a single log file\n        let log_file = dir.join(\"test.log\");\n        fs::write(\u0026log_file, \"test\").unwrap();\n\n        let cleaner = LogCleaner::new(dir.clone()).with_max_age(0);\n        let count = cleaner.clean().unwrap();\n\n        // With max_age = 0, the file should be cleaned\n        assert_eq!(count, 1);\n\n        cleanup(\u0026dir);\n    }\n\n    #[test]\n    fn test_get_old_logs() {\n        let dir = temp_dir();\n\n        let log_file = dir.join(\"test.log\");\n        fs::write(\u0026log_file, \"test\").unwrap();\n\n        let cleaner = LogCleaner::new(dir.clone()).with_max_age(0);\n        let old_l
