G_CODE_LENGTH: usize = 6;\nconst PAIRING_CODE_EXPIRE_MINUTES: u64 = 10;\n\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct PendingCode {\n    pub user_id: String,\n    pub chat_id: i64,\n    pub created_at: u64,\n    pub expires_at: u64,\n}\n\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct AuthorizedUser {\n    pub user_id: String,\n    pub chat_id: i64,\n    pub authorized_at: u64,\n}\n\n#[derive(Debug, Clone, Serialize, Deserialize, Default)]\npub struct PairingStorage {\n    pub pending_codes: HashMap\u003cString, PendingCode\u003e,\n    pub authorized_users: HashMap\u003cString, AuthorizedUser\u003e,\n}\n\npub struct PairingManager {\n    storage_path: PathBuf,\n    storage: PairingStorage,\n}\n\nimpl PairingManager {\n    pub fn new() -\u003e Result\u003cSelf\u003e {\n        let storage_path = nuclaw_home().join(\"pairing.json\");\n        let storage = if storage_path.exists() {\n            let content =\n                fs::read_to_string(\u0026storage_path).map_err(|e| NuClawError::FileSystem {\n                    message: format!(\"Failed to read pairing storage: {}\", e),\n                })?;\n            serde_json::from_str(\u0026content).unwrap_or_default()\n        } else {\n            PairingStorage::default()\n        };\n        Ok(Self {\n            storage_path,\n            storage,\n        })\n    }\n\n    fn save(\u0026self) -\u003e Result\u003c()\u003e {\n        if let Some(parent) = self.storage_path.parent() {\n            fs::create_dir_all(parent).map_err(|e| NuClawError::FileSystem {\n                message: format!(\"Failed to create directory: {}\", e),\n            })?;\n        }\n        let content =\n            serde_json::to_string_pretty(\u0026self.storage).map_err(|e| NuClawError::FileSystem {\n                message: format!(\"Failed to serialize pairing storage: {}\", e),\n            })?;\n        fs::write(\u0026self.storage_path, content).map_err(|e| NuClawError::FileSystem {\n            message: format!(\"Failed to write pairing storage: {}\", e),\n        })?;\n        Ok(())\n    }\n\n    fn generate_random_code() -\u003e String {\n        use std::iter;\n        const CHARSET: \u0026[u8] = b\"ABCDEFGHJKLMNPQRSTUVWXYZ23456789\";\n        iter::repeat_with(|| {\n            let idx = rand_u32() as usize % CHARSET.len();\n            CHARSET[idx] as char\n        })\n        .take(PAIRING_CODE_LENGTH)\n        .collect()\n    }\n\n    pub fn generate_code(\u0026mut self, user_id: \u0026str, chat_id: i64) -\u003e Result\u003cString\u003e {\n        let now = SystemTime::now()\n            .duration_since(UNIX_EPOCH)\n            .unwrap()\n            .as_secs();\n        let expires_at = now + (PAIRING_CODE_EXPIRE_MINUTES * 60);\n\n        let code = Self::generate_random_code();\n\n        let pending = PendingCode {\n            user_id: user_id.to_string(),\n            chat_id,\n            created_at: now,\n            expires_at,\n        };\n\n        self.storage.pending_codes.insert(code.clone(), pending);\n        self.save()?;\n\n        Ok(code)\n    }\n\n    pub fn verify_code(\u0026self, code: \u0026str) -\u003e Result\u003cOption\u003cPendingCode\u003e\u003e {\n        let now = SystemTime::now()\n            .duration_since(UNIX_EPOCH)\n            .unwrap()\n            .as_secs();\n\n        if let Some(pending) = self.storage.pending_codes.get(code) {\n            if now \u003c= pending.expires_at {\n                return Ok(Some(pending.clone()));\n            }\n        }\n        Ok(None)\n    }\n\n    pub fn authorize_user(\u0026mut self, pending: PendingCode) -\u003e Result\u003c()\u003e {\n        let now = SystemTime::now()\n            .duration_since(UNIX_EPOCH)\n            .unwrap()\n            .as_secs();\n\n        let authorized = AuthorizedUser {\n            user_id: pending.user_id.clone(),\n            chat_id: pending.chat_id,\n            authorized_at: now,\n        };\n\n        self.storage\n            .authorized_users\n            .insert(pending.user_id.clone(), authorized);\n        self.storage\n            .pending_codes\n            .retain(|k, v| k != \u0026pending.user_id);\n        self.save()?;\n\n        Ok(())\n    }\n\n    pub fn is_authorized(\u0026self, user_id: \u0026str) -\u003e bool {\n        self.storage.authorized_users.contains_key(user_id)\n    }\n\n    pub fn list_authorized(\u0026self) -\u003e Vec\u003cAuthorizedUser\u003e {\n        self.storage.authorized_users.values().cloned().collect()\n    }\n\n    pub fn deauthorize_user(\u0026mut self, user_id: \u0026str) -\u003e Result\u003cbool\u003e {\n        if self.storage.authorized_users.remove(user_id).is_some() {\n            self.save()?;\n            return Ok(true);\n        }\n        Ok(false)\n    }\n\n    pub fn cleanup_expired_codes(\u0026mut self) {\n        let now = SystemTime::now()\n            .duration_since(UNIX_EPOCH)\n            .unwrap()\n            .as_secs();\n        self.storage\n            .pending_codes\n            .retain(|_, v| now \u003c= v.expires_at);\n    }\n}\n\nfn rand_u32() -\u003e u32 {\n    use std::time::{SystemTime, UNIX_EPOCH};\n    let nanos = SystemTime::now()\n        .duration_since(UNIX_EPOCH)\n        .unwrap()\n        .subsec_nanos();\n    nanos.wrapping_mul(1103515245).wrapping_add(12345)\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use std::env;\n    use std::fs;\n    use std::sync::atomic::{AtomicU64, Ordering};\n\n    static TEST_COUNTER: AtomicU64 = AtomicU64::new(0);\n\n    fn setup_test() -\u003e String {\n        let counter = TEST_COUNTER.fetch_add(1, Ordering::SeqCst);\n        let test_dir = format!(\"/tmp/nuclaw_pairing_test_{}\", counter);\n        env::set_var(\"NUCLAW_HOME\", \u0026test_dir);\n        let _ = fs::create_dir_all(\u0026test_dir);\n        test_dir\n    }\n\n    fn cleanup_test(test_dir: \u0026str) {\n        let _ = fs::remove_dir_all(test_dir);\n    }\n\n    #[test]\n    fn test_generate_code() { disabled\"), GroupPolicy::Disabled);\n        assert_eq!(GroupPolicy::parse(\"unknown\"), GroupPolicy::Allowlist);\n    }\n\n    #[test]\n    fn test_group_policy_case_insensitive() {\n        assert_eq!(GroupPolicy::parse(\"OPEN\"), GroupPolicy::Open);\n        assert_eq!(GroupPolicy::parse(\"Allowlist\"), GroupPolicy::Allowlist);\n    }\n\n    #[test]\n    fn test_stream_mode_parse() {\n        assert_eq!(StreamMode::parse(\"off\"), StreamMode::Off);\n        assert_eq!(StreamMode::parse(\"partial\"), StreamMode::Partial);\n        assert_eq!(StreamMode::parse(\"block\"), StreamMode::Block);\n        assert_eq!(StreamMode::parse(\"unknown\"), StreamMode::Partial);\n    }\n\n    #[test]\n    fn test_chunk_mode_parse() {\n        assert_eq!(ChunkMode::parse(\"length\"), ChunkMode::Length);\n        assert_eq!(ChunkMode::parse(\"newline\"), ChunkMode::Newline);\n        assert_eq!(ChunkMode::parse(\"unknown\"), ChunkMode::Length);\n    }\n\n    #[test]\n    fn test_reply_mode_parse() {\n        assert_eq!(ReplyMode::parse(\"off\"), ReplyMode::Off);\n        assert_eq!(ReplyMode::parse(\"first\"), ReplyMode::First);\n        assert_eq!(ReplyMode::parse(\"all\"), ReplyMode::All);\n        assert_eq!(ReplyMode::parse(\"unknown\"), ReplyMode::Off);\n    }\n\n    #[test]\n    fn test_policy_serialization() {\n        let dm = DMPolicy::Allowlist;\n        let json = serde_json::to_string(\u0026dm).unwrap();\n        assert!(json.contains(\"allowlist\"));\n\n        let group = GroupPolicy::Open;\n        let json = serde_json::to_string(\u0026group).unwrap();\n        assert!(json.contains(\"open\"));\n    }\n}\n","traces":[{"line":19,"address":[14855248,14855591,14855585],"length":1,"stats":{"Line":0}},{"line":20,"address":[14855268,14855354],"length":1,"stats":{"Line":0}},{"line":21,"address":[14855436,14855370],"length":1,"stats":{"Line":0}},{"line":22,"address":[14855413,14855486,14855447],"length":1,"stats":{"Line":0}},{"line":23,"address":[14855463,14855536,14855497 tent":"//! Telegram API types\n\nuse serde::{Deserialize, Serialize};\n\n/// Telegram Update object (Telegram Bot API)\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct TelegramUpdate {\n    pub update_id: i64,\n    pub message: Option\u003cTelegramMessage\u003e,\n    pub edited_message: Option\u003cTelegramMessage\u003e,\n}\n\n/// Telegram User object\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct TelegramUser {\n    pub id: i64,\n    pub is_bot: bool,\n    pub first_name: String,\n    pub last_name: Option\u003cString\u003e,\n    pub username: Option\u003cString\u003e,\n}\n\n/// Telegram Chat object\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct TelegramChat {\n    pub id: i64,\n    #[serde(rename = \"type\")]\n    pub chat_type: String,\n    pub title: Option\u003cString\u003e,\n}\n\n/// Telegram Message object\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct TelegramMessage {\n    pub message_id: i64,\n    pub from: Option\u003cTelegramUser\u003e,\n    pub chat: TelegramChat,\n    pub date: i64,\n    pub text: Option\u003cString\u003e,\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_parse_telegram_update() {\n        let json = r#\"{\n            \"update_id\": 123,\n            \"message\": {\n                \"message_id\": 456,\n                \"from\": {\"id\": 789, \"is_bot\": false, \"first_name\": \"Test\"},\n                \"chat\": {\"id\": -100123, \"type\": \"supergroup\", \"title\": \"Test Group\"},\n                \"date\": 1234567890,\n                \"text\": \"@Andy hello\"\n            }\n        }\"#;\n\n        let update: TelegramUpdate = serde_json::from_str(json).unwrap();\n        assert_eq!(update.update_id, 123);\n        assert!(update.message.is_some());\n    }\n\n    #[test]\n    fn test_telegram_user_serialization() {\n        let user = TelegramUser {\n            id: 123,\n            is_bot: false,\n            first_name: \"John\".to_string(),\n            last_name: Some(\"Doe\".to_string()),\n            username: Some(\"johndoe\".to_string()),\n        };\n\n        let json = serde_json::to_string(\u0026user).unwrap();\n        assert!(json.contains(\"first_name\"));\n        assert!(json.contains(\"John\"));\n    }\n\n    #[test]\n    fn test_telegram_message_serialization() {\n        let msg = TelegramMessage {\n            message_id: 1,\n            from: Some(TelegramUser {\n                id: 123,\n                is_bot: false,\n                first_name: \"Test\".to_string(),\n                last_name: None,\n                username: None,\n            }),\n            chat: TelegramChat {\n                id: -100123,\n                chat_type: \"supergroup\".to_string(),\n                title: Some(\"Test Group\".to_string()),\n            },\n            date: 1234567890,\n            text: Some(\"Hello\".to_string()),\n        };\n\n        let json = serde_json::to_string(\u0026msg).unwrap();\n        assert!(json.contains(\"Hello\"));\n    }\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","root","code","nuclaw","src","telegram","utils.rs"],"content":"//! Telegram utility functions\n\nuse crate::telegram::policy::{ChunkMode, GroupPolicy};\nuse crate::types::NewMessage;\n\n/// Default text chunk limit: 4000 characters\npub const DEFAULT_TEXT_CHUNK_LIMIT: usize = 4000;\n\n/// Chunk text into smaller pieces (pure function)\npub fn chunk_text_pure(text: \u0026str, chunk_limit: usize) -\u003e Vec\u003cString\u003e {\n    if text.len() \u003c= chunk_limit {\n        return vec![text.to_string()];\n    }\n\n    let mut chunks = Vec::new();\n    let mut current = String::new();\n\n    for paragraph in text.split(\"\\n\\n\") {\n        let para = paragraph;\n\n        if para.len() \u003e chunk_limit {\n            if !current.is_empty() {\n                chunks.push(current);\n                current = String::new();\n            }\n\n            let mut remaining = para;\n            while !remaining.is_empty() {\n                let split_point = remaining.len().min(chunk_limit);\n                chunks.push(remaining[..split_point].to_string());\n                remaining = \u0026remaining[split_point..];\n            }\n        } else if current.len() + para.len() + 2 \u003e chunk_limit {\n            if !current.is_empty() {\n                chunks.push(current);\n            }\n            current = para.to_string();\n        } else {\n            if !current.is_empty() {\n                current.push_str(\"\\n\\n\");\n            }\n            current.push_str(para);\n        }\n    }\n\n    if !current.is_empty() {\n        chunks.push(current);\n    }\n\n    chunks\n}\n\n/// Advanced chunk text with configurable mode\npub fn chunk_text_advanced(text: \u0026str, chunk_limit: usize, mode: ChunkMode) -\u003e Vec\u003cString\u003e {\n    match mode {\n        ChunkMode::Length | ChunkMode::Newline =\u003e chunk_text_pure(text, chunk_limit),\n    }\n}\n\n/// Extract chat ID from jid (pure function)\npub fn extract_chat_id_pure(jid: \u0026str) -\u003e Option\u003cString\u003e {\n    jid.strip_prefix(\"telegram:group:\").map(|s| s.to_string())\n}\n\n/// Check if message is duplicate (pure function)\npub fn is_duplicate_message_pure(\n    msg: \u0026NewMessage,\n    last_timestamp: \u0026str,\n    last_agent_timestamps: \u0026std::collections::HashMap\u003cString, String\u003e,\n) -\u003e bool {\n    if last_timestamp == msg.timestamp {\n        return true;\n    }\n\n    if let Some(agent_ts) = last_agent_timestamps.get(\u0026msg.chat_jid) {\n        if agent_ts == \u0026msg.timestamp {\n            return true;\n        }\n    }\n\n    false\n}\n\n/// Check if group is allowed (pure function)\npub fn is_allowed_group_pure(\n    chat_jid: \u0026str,\n    policy: GroupPolicy,\n    allowed_groups: \u0026[String],\n) -\u003e bool {\n    match policy {\n        GroupPolicy::Disabled =\u003e false,\n        GroupPolicy::Open =\u003e true,\n        GroupPolicy::Allowlist =\u003e {\n            if let Some(chat_id) = chat_jid.strip_prefix(\"telegram:group:\") {\n                allowed_groups\n                    .iter()\n                    .any(|g| g == chat_id || g == \u0026format!(\"-{}\", chat_id))\n            } else {\n                false\n            }\n        }\n    }\n}\n\n/// Helper to truncate strings\npub fn truncate(s: \u0026str, max_len: usize) -\u003e String {\n    if s.len() \u003c= max_len {\n        s.to_string()\n    } else {\n        format!(\"{}...\", \u0026s[..max_len.saturating_sub(3)])\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_chunk_text_short() {\n        let chunks = chunk_text_pure(\"short text\", 4000);\n        assert_eq!(chunks.len(), 1);\n        assert_eq!(chunks[0], \"short text\");\n    }\n\n    #[test]\n    fn test_chunk_text_long_paragraphs() {\n        let text = \"This is paragraph one.\\n\\nThis is paragraph two.\\n\\nThis is paragraph three.\";\n        let chunks = chunk_text_pure(text, 20);\n        assert!(chunks.len() \u003e 1);\n    }\n\n    #[test]\n    fn test_chunk_text_empty() {\n        let chunks = chunk_text_pure(\"\", 4000);\n        assert_eq!(chunks.len(), 1);\n        assert_eq!(chunks[0], \"\");\n    }\n\n    #[test]\n    fn test_chunk_text_exact_limit() {\n        let text = \"12345678901234567890\"; // 20 chars\n        let chunks = chunk_text_pure(text, 20);\n        assert_eq!(chunks.len(), 1);\n    }\n\n    #[test]\n    fn test_extract_chat_id_pure() {\n        assert_eq!(\n            extract_chat_id_pure(\"telegram:group:-100123\"),\n            Some(\"-100123\".to_string())\n        );\n        assert_eq!(\n            extract_chat_id_pure(\"telegram:group:123\"),\n            Some(\"123\".to_string())\n        );\n        assert_eq!(extract_chat_id_pure(\"invalid\"), None);\n    }\n\n    #[test]\n    fn test_is_allowed_group_pure() {\n        let allowed = vec![\"-100123\".to_string(), \"456\".to_string()];\n\n        assert!(is_allowed_group_pure(\n            \"telegram:group:-100123\",\n            GroupPolicy::Open,\n            \u0026allowed\n        ));\n        assert!(!is_allowed_group_pure(\n            \"telegram:group:-100123\",\n            GroupPolicy::Disabled,\n            \u0026allowed\n        ));\n        assert!(is_allowed_group_pure(\n            \"telegram:group:-100123\",\n            GroupPolicy::Allowlist,\n            \u0026allowed\n        ));\n        assert!(!is_allowed_group_pure(\n            \"telegram:group:999\",\n            GroupPolicy::Allowlist,\n            \u0026allowed\n        ));\n    }\n\n    #[test]\n    fn test_truncate() {\n        assert_eq!(truncate(\"hello\", 10), \"hello\");\n        assert_eq!(truncate(\"hello world\", 5), \"he...\");\n        assert_eq!(truncate(\"hi\", 10), \"hi\");\n    }\n\n    #[test]\n    fn test_chunk_text_advanced() {\n        let text = \"Test\\n\\nTest\";\n        let chunks = chunk_text_advanced(text, 10, ChunkMode::Length);\n        assert!(!chunks.is_empty());\n\n        let chunks_newline = chunk_text_advanced(text, 10, ChunkMode::Newline);\n        assert!(!chunks_newline.is_empty());\n    }\n\n    #[test]\n    fn test_is_duplicate_message_pure() {\n        let msg = NewMessage {\n            id: \"1\".to_string(),\n            chat_jid: \"chat1\".to_string(),\n            sender: \"user1\".to_string(),\n            sender_name: \"User\".to_string(),\n            content: \"test\".to_string(),\n            timestamp: \"123\".to_string(),\n        };\n\n        let mut last_agent = std::collections::HashMap::new();\n\n        // Not duplicate\n        assert!(!is_duplicate_message_pure(\u0026msg, \"456\", \u0026last_agent));\n\n        // Duplicate by timestamp\n        assert!(is_duplicate_message_pure(\u0026msg, \"123\", \u0026last_agent));\n\n        // Duplicate by agent timestamp\n        last_agent.insert(\"chat1\".to_string(), \"123\".to_string());\n        assert!(is_duplicate_message_pure(\u0026msg, \"456\", \u0026last_agent));\n    }\n}\n","traces":[{"line":10,"address":[15452222,15452216,15450368],"length":1,"stats":{"Line":0}},{"line":11,"address":[15450461],"length":1,"stats":{"Line":0}},{"line":12,"address":[15452262,15450545],"length":1,"stats":{"Line":0}},{"line":15,"address":[15450495],"length":1,"stats":{"Line":0}},{"line":16,"address":[15450528],"length":1,"stats":{"Line":0}},{"line":18,"address":[15450653,15450743],"length":1,"stats":{"Line":0}},{"line":21,"address":[15451160,15450912],"length":1,"stats":{"Line":0}},{"line":22,"address":[15451729,15451901,15451193],"length":1,"stats":{"Line":0}},{"line":23,"address":[15451735],"length":1,"stats":{"Line":0}},{"line":24,"address":[15451838],"length":1,"stats":{"Line":0}},{"line":27,"address":[15451812],"length":1,"stats":{"Line":0}},{"line":28,"address":[15451903,15452189,15451828],"length":1,"stats":{"Line":0}},{"line":29,"address":[15451944],"length":1,"stats":{"Line":0}},{"line":30,"address":[15452014],"length":1,"stats":{"Line":0}},{"line":31,"address":[15452119],"length":1,"stats":{"Line":0}},{"line":33,"address":[15451217,15451173,15451618],"length":1,"stats":{"Line":0}},{"line":34,"address":[15451448,15451364],"length":1,"stats":{"Line":0}},{"line":35,"address":[15451550,15451454],"length":1,"stats":{"Line":0}},{"line":37,"address":[15451623,15451531,15451642,15451552],"length":1,"stats":{"Line":0}},{"line":39,"address":[15451379,15451345],"length":1,"stats":{"Line":0}},{"line":40,"address":[15451385,15451437],"length":1,"stats":{"Line":0}},{"line":42,"address":[15451430,15451439],"length":1,"stats":{"Line":0}},{"line":46,"address":[15450938],"length":1,"stats":{"Line":0}},{"line":47,"address":[15450959,15451089],"length":1,"stats":{"Line":0}},{"line":50,"address":[15451034],"length":1,"stats":{"Line":0}},{"line":54,"address":[15452448],"length":1,"stats":{"Line":0}},{"line":55,"address":[15452503],"length":1,"stats":{"Line":0}},{"line":56,"address":[15452535] n}\n\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct ScheduledTask {\n    pub id: String,\n    pub group_folder: String,\n    pub chat_jid: String,\n    pub prompt: String,\n    pub schedule_type: String,\n    pub schedule_value: String,\n    pub context_mode: String,\n    pub next_run: Option\u003cString\u003e,\n    pub last_run: Option\u003cString\u003e,\n    pub last_result: Option\u003cString\u003e,\n    pub status: String,\n    pub created_at: String,\n}\n\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct TaskRunLog {\n    pub task_id: String,\n    pub run_at: String,\n    pub duration_ms: i64,\n    pub status: String,\n    pub result: Option\u003cString\u003e,\n    pub error: Option\u003cString\u003e,\n}\n\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct NewMessage {\n    pub id: String,\n    pub chat_jid: String,\n    pub sender: String,\n    pub sender_name: String,\n    pub content: String,\n    pub timestamp: String,\n}\n\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct ChatInfo {\n    pub jid: String,\n    pub name: String,\n    pub last_message_time: String,\n}\n\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct ContainerInput {\n    pub prompt: String,\n    pub session_id: Option\u003cString\u003e,\n    pub group_folder: String,\n    pub chat_jid: String,\n    pub is_main: bool,\n    pub is_scheduled_task: bool,\n}\n\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct ContainerOutput {\n    pub status: String,\n    pub result: Option\u003cString\u003e,\n    pub new_session_id: Option\u003cString\u003e,\n    pub error: Option\u003cString\u003e,\n}\n\n#[derive(Debug, Clone, Serialize, Deserialize, Default)]\npub struct RouterState {\n    pub last_timestamp: String,\n    pub last_agent_timestamp: HashMap\u003cString, String\u003e,\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_registered_group() {\n        let group = RegisteredGroup {\n            name: \"Test Group\".to_string(),\n            folder: \"test_group\".to_string(),\n            trigger: \"@Andy\".to_string(),\n            added_at: \"2025-01-01T00:00:00Z\".to_string(),\n        };\n        assert_eq!(group.name, \"Test Group\");\n        assert_eq!(group.folder, \"test_group\");\n    }\n\n    #[test]\n    fn test_session() {\n        let mut session = Session::new();\n        session.0.insert(\"key1\".to_string(), \"value1\".to_string());\n        assert_eq!(session.len(), 1);\n    }\n\n    #[test]\n    fn test_scheduled_task() {\n        let task = ScheduledTask {\n            id: \"task_1\".to_string(),\n            group_folder: \"group_1\".to_string(),\n            chat_jid: \"chat_1\".to_string(),\n            prompt: \"test prompt\".to_string(),\n            schedule_type: \"cron\".to_string(),\n            schedule_value: \"0 0 9 * * *\".to_string(),\n            context_mode: \"isolated\".to_string(),\n            next_run: Some(\"2025-01-01T09:00:00Z\".to_string()),\n            last_run: None,\n            last_result: None,\n            status: \"active\".to_string(),\n            created_at: \"2025-01-01T00:00:00Z\".to_string(),\n        };\n        assert_eq!(task.schedule_type, \"cron\");\n        assert_eq!(task.status, \"active\");\n    }\n\n    #[test]\n    fn test_container_input() {\n        let input = ContainerInput {\n            prompt: \"test\".to_string(),\n            session_id: Some(\"sess_123\".to_string()),\n            group_folder: \"group_1\".to_string(),\n            chat_jid: \"chat_1\".to_string(),\n            is_main: true,\n            is_scheduled_task: false,\n        };\n        assert!(input.session_id.is_some());\n        assert!(input.is_main);\n    }\n\n    #[test]\n    fn test_container_output() {\n        let output = ContainerOutput {\n            status: \"success\".to_string(),\n            result: Some(\"result\".to_string()),\n            new_session_id: Some(\"new_sess\".to_string()),\n            error: None,\n        };\n        assert_eq!(output.status, \"success\");\n        assert!(output.result.is_some());\n        assert!(output.error.is_none());\n    }\n\n    #[test]\n    fn test_router_state() {\n        let mut state = RouterState::default();\n        state.last_timestamp = \"2025-01-01T00:00:00Z\".to_string();\n        state\n            .last_agent_timestamp\n            .insert(\"chat_1\".to_string(), \"2025-01-01T00:00:00Z\".to_string());\n        assert_eq!(state.last_agent_timestamp.len(), 1);\n    }\n\n    #[test]\n    fn test_new_message() {\n        let msg = NewMessage {\n            id: \"msg_1\".to_string(),\n            chat_jid: \"chat_1\".to_string(),\n            sender: \"user_1\".to_string(),\n            sender_name: \"Test User\".to_string(),\n            content: \"Hello\".to_string(),\n            timestamp: \"2025-01-01T00:00:00Z\".to_string(),\n        };\n        assert_eq!(msg.content, \"Hello\");\n    }\n\n    #[test]\n    fn test_task_run_log() {\n        let log = TaskRunLog {\n            task_id: \"task_1\".to_string(),\n            run_at: \"2025-01-01T00:00:00Z\".to_string(),\n            duration_ms: 1000,\n            status: \"success\".to_string(),\n            result: Some(\"ok\".to_string()),\n            error: None,\n        };\n        assert_eq!(log.duration_ms, 1000);\n    }\n\n    #[test]\n    fn test_chat_info() {\n        let info = ChatInfo {\n            jid: \"chat_1\".to_string(),\n            name: \"Test Chat\".to_string(),\n            last_message_time: \"2025-01-01T00:00:00Z\".to_string(),\n        };\n        assert_eq!(info.name, \"Test Chat\");\n    }\n}\n","traces":[{"line":18,"address":[13327040],"length":1,"stats":{"Line":0}},{"line":19,"address":[13327054],"length":1,"stats":{"Line":0}},{"line":22,"address":[13327024],"length":1,"stats":{"Line":0}},{"line":23,"address":[13327029],"length":1,"stats":{"Line":0}},{"line":26,"address":[13327104],"length":1,"stats":{"Line":0}},{"line":27,"address":[13327109],"length":1,"stats":{"Line":0}}],"covered":0,"coverable":6},{"path":["/","root","code","nuclaw","src","utils.rs"],"content":"//! Utilities for NuClaw\n\nuse serde::{Deserialize, Serialize};\nuse std::fs::{File, OpenOptions};\nuse std::io::{Read, Write};\nuse std::path::Path;\n\npub mod json {\n    use super::*;\n\n    pub fn load_json\u003cT\u003e(path: \u0026Path, default: T) -\u003e T\n    where\n        T: for\u003c'de\u003e Deserialize\u003c'de\u003e + Default,\n    {\n        if !path.exists() {\n            return default;\n        }\n\n        match File::open(path) {\n            Ok(mut file) =\u003e {\n                let mut contents = String::new();\n                if file.read_to_string(\u0026mut contents).is_ok() {\n                    serde_json::from_str(\u0026contents).unwrap_or(default)\n                } else {\n                    default\n                }\n            }\n            Err(_) =\u003e default,\n        }\n    }\n\n    pub fn save_json\u003cT\u003e(path: \u0026Path, data: \u0026T) -\u003e std::io::Result\u003c()\u003e\n    where\n        T: Serialize,\n    {\n        if let Some(parent) = path.parent() {\n            std::fs::create_dir_all(parent)?;\n        }\n\n        let json = serde_json::to_string_pretty(data)?;\n        let mut file = OpenOptions::new()\n            .write(true)\n            .create(true)\n            .truncate(true)\n            .open(path)?;\n        file.write_all(json.as_bytes())?;\n        Ok(())\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::json::{load_json, save_json};\n    use std::fs;\n    use std::path::PathBuf;\n    use tempfile::tempdir;\n\n    #[derive(Debug, Default, serde::Deserialize, serde::Serialize, Clone)]\n    struct TestData {\n        name: String,\n        value: i32,\n    }\n\n    fn test_dir() -\u003e PathBuf {\n        tempdir().unwrap().into_path()\n    }\n\n    fn cleanup(path: \u0026PathBuf) {\n        let _ = fs::remove_file(path);\n    }\n\n    #[test]\n    fn test_save_json() {\n        let dir = test_dir();\n        let path = dir.join(\"test.json\");\n\n        let data = TestData {\n            name: \"test\".to_string(),\n            value: 42,\n        };\n\n        let result = save_json(\u0026path, \u0026data);\n        assert!(result.is_ok());\n        assert!(path.exists());\n\n        cleanup(\u0026path);\n    }\n\n    #[test]\n    fn test_load_json_existing() {\n        let dir = test_dir();\n        let path = dir.join(\"test.json\");\n\n        let data = TestData {\n            name: \"test\".to_string(),\n            value: 42,\n        };\n        save_json(\u0026path, \u0026data).unwrap();\n\n        let loaded: TestData = load_json(\u0026path, TestData::default());\n        assert_eq!(loaded.name, \"test\");\n        assert_eq!(loaded.value, 42);\n\n        cleanup(\u0026path);\n    }\n\n    #[test]\n    fn test_load_json_nonexistent() {\n        let dir = test_dir();\n        let path = dir.join(\"nonexistent.json\");\n\n        let default = TestData {\n            name: \"default\".to_string(),\n            value: 0,\n        };\n\n        let loaded: TestData = load_json(\u0026path, default.clone());\n        assert_eq!(loaded.name, \"default\");\n        assert_eq!(loaded.value, 0);\n    }\n\n    #[test]\n    fn test_load_json_invalid() {\n        let dir = test_dir();\n        let path = dir.join(\"invalid.json\");\n\n        fs::write(\u0026path, \"not valid json\").unwrap();\n\n        let default = TestData {\n            name: \"default\".to_string(),\n            value: 0,\n        };\n\n        let loaded: TestData = load_json(\u0026path, default.clone());\n        assert_eq!(loaded.name, \"default\");\n        assert_eq!(loaded.value, 0);\n\n        cleanup(\u0026path);\n    }\n\n    #[test]\n    fn test_save_json_creates_parent() {\n        let dir = test_dir();\n        let path = dir.join(\"subdir\").join(\"nested.json\");\n\n        let data = TestData {\n            name: \"nested\".to_string(),\n            value: 100,\n        };\n\n        let result = save_json(\u0026path, \u0026data);\n        assert!(result.is_ok());\n        assert!(path.exists());\n\n        let _ = fs::remove_dir_all(dir);\n    }\n}\n","traces":[{"line":11,"address":[19986317],"length":1,"stats":{"Line":0}},{"line":15,"address":[13285248,13285320,13287064,13286992,13286200,13286128],"length":1,"stats":{"Line":0}},{"line":16,"address":[13285336,13286216,13287080],"length":1,"stats":{"Line":0}},{"line":19,"address":[13285386,13285415,13287139,13286246,13286275,13287110],"length":1,"stats":{"Line":0}},{"line":20,"address":[13286320,13287184,13285480],"length":1,"stats":{"Line":0}},{"line":21,"address":[13285493,13286333,13287197],"length":1,"stats":{"Line":0}},{"line":22,"address":[13287324,13286460,13287245,13286381,13285541,13285620],"length":1,"stats":{"Line":0}},{"line":23,"address":[13287500,13285813,13286636],"length":1,"stats":{"Line":0}},{"line":25,"address":[13285754,13287458,13286594],"length":1,"stats":{"Line":0}},{"line":28,"address":[13286297,13287161,13285437],"length":1,"stats":{"Line":0}},{"line":32,"address":[13288727,13288745,13289737,13289719,13287776,13288768],"length":1,"stats":{"Line":0}},{"line":36,"address":[13287822,13288814],"length":1,"stats":{"Line":0}},{"line":37,"address":[13288884,13289009,13287892,13288017],"length":1,"stats":{"Line":0}},{"line":40,"address":[13289053,13287944,13288061,13288936],"length":1,"stats":{"Line":0}},{"line":41,"address":[13288380,13289314,13288168,13288322,13289160,13289372,13288738,13289730],"length":1,"stats":{"Line":0}},{"line":45,"address":[13288364,13289295,13289356,13288303],"length":1,"stats":{"Line":0}},{"line":46,"address":[13288506,13288435,13289427,13289498,13288684,13289676],"length":1,"stats":{"Line":0}},{"line":47,"address":[13289625,13288633],"length":1,"stats":{"Line":0}}],"covered":0,"coverable":18},{"path":["/","root","code","nuclaw","src","whatsapp.rs"],"content":"//! WhatsApp Integration for NuClaw\n//!\n//! Provides WhatsApp connectivity via external WhatsApp MCP Server or HTTP API.\n\nuse crate::config::{assistant_name, data_dir, store_dir};\nuse crate::container_runner::{container_timeout, run_container};\nuse crate::db::Database;\nuse crate::error::{NuClawError, Result};\nuse crate::types::{ContainerInput, NewMessage, RegisteredGroup, RouterState};\nuse crate::utils::json::{load_json, save_json};\nuse std::collections::HashMap;\nuse std::sync::Arc;\nuse tokio::sync::Mutex;\nuse tokio::time::{timeout, Duration};\nuse tracing::{debug, error, info};\n\n/// Default WhatsApp poll interval: 2 seconds\nconst DEFAULT_WHATSAPP_POLL_INTERVAL_MS: u64 = 2000;\n\n/// WhatsApp client state\npub struct WhatsAppClient {\n    /// Connection status\n    pub connected: bool,\n    /// Last QR code for authentication\n    pub last_qr: Option\u003cString\u003e,\n    /// Reference to registered groups\n    registered_groups: HashMap\u003cString, RegisteredGroup\u003e,\n    /// Router state for message deduplication\n    router_state: RouterState,\n    /// Database connection\n    db: Database,\n    /// Assistant name for trigger detection\n    assistant_name: String,\n}\n\nimpl WhatsAppClient {\n    /// Create a new WhatsApp client\n    pub fn new(db: Database) -\u003e Self {\n        Self {\n            connected: false,\n            last_qr: None,\n            registered_groups: load_registered_groups(),\n            router_state: load_router_state(),\n            db,\n            assistant_name: assistant_name(),\n        }\n    }\n\n    /// Connect to WhatsApp\n    pub async fn connect(\u0026mut self) -\u003e Result\u003c()\u003e {\n        info!(\"Connecting to WhatsApp...\");\n\n        // Check if we need authentication\n        if self.needs_authentication().await? {\n            info!(\"Authentication required, generating QR code...\");\n            self.request_qr_code().await?;\n        } else {\n            info!(\"Using cached authentication\");\n            self.connected = true;\n        }\n\n        Ok(())\n    }\n\n    /// Check if authentication is needed\n    async fn needs_authentication(\u0026self) -\u003e Result\u003cbool\u003e {\n        let creds_path = store_dir().join(\"auth\").join(\"creds.json\");\n\n        // If creds file exists and is valid, no auth needed\n        if creds_path.exists() {\n            if let Ok(metadata) = std::fs::metadata(\u0026creds_path) {\n                let modified = metadata\n                    .modified()\n                    .unwrap_or(std::time::SystemTime::UNIX_EPOCH);\n                let duration = modified.elapsed().unwrap_or(std::time::Duration::ZERO);\n                if duration.as_secs() \u003c 24 * 60 * 60 {\n                    return Ok(false);\n                }\n            }\n        }\n\n        Ok(true)\n    }\n\n    /// Request QR code for authentication\n    async fn request_qr_code(\u0026mut self) -\u003e Result\u003c()\u003e {\n        let mcp_url = get_mcp_url()?;\n\n        let response = reqwest::Client::new()\n            .post(format!(\"{}/auth/qr\", mcp_url))\n            .timeout(Duration::from_secs(30))\n            .send()\n            .await\n            .map_err(|e| NuClawError::WhatsApp {\n                message: format!(\"Failed to request QR code: {}\", e),\n            })?;\n\n        if response.status() == 200 {\n            let qr_data: serde_json::Value =\n                response.json().await.map_err(|e| NuClawError::WhatsApp {\n                    message: format!(\"Failed to parse QR response: {}\", e),\n                })?;\n\n            if let Some(qr) = qr_data.get(\"qr\").and_then(|v| v.as_str()) {\n                self.last_qr = Some(qr.to_string());\n                info!(\"QR code received (display in terminal)\");\n                info!(\"Scan with WhatsApp to authenticate\");\n            }\n        }\n\n        Ok(())\n    }\n\n    /// Start listening for messages\n    pub async fn start_message_listener(\u0026mut self) {\n        let mut interval =\n            tokio::time::interval(Duration::from_millis(DEFAULT_WHATSAPP_POLL_INTERVAL_MS));\n\n        info!(\"Starting message listener...\");\n\n        loop {\n            interval.tick().await;\n\n            if let Err(e) = self.poll_messages().await {\n                error!(\"Error polling messages: {}\", e);\n            }\n        }\n    }\n\n    /// Poll for new messages\n    async fn poll_messages(\u0026mut self) -\u003e Result\u003c()\u003e {\n        let mcp_url = get_mcp_url()?;\n\n        let response = reqwest::Client::new()\n            .get(format!(\"{}/messages\", mcp_url))\n            .timeout(Duration::from_secs(30))\n            .send()\n            .await\n            .map_err(|e| NuClawError::WhatsApp {\n                message: format!(\"Failed to poll messages: {}\", e),\n            })?;\n\n        if response.status() == 200 {\n            let messages: Vec\u003cNewMessage\u003e =\n                response.json().await.map_err(|e| NuClawError::WhatsApp {\n                    message: format!(\"Failed to parse messages: {}\", e),\n                })?;\n\n            for msg in messages {\n                self.handle_message(\u0026msg).await?;\n            }\n        }\n\n        Ok(())\n    }\n\n    /// Handle a single message\n    pub async fn handle_message(\u0026mut self, msg: \u0026NewMessage) -\u003e Result\u003cOption\u003cString\u003e\u003e {\n        if self.is_duplicate_message(msg).await {\n            debug!(\"Skipping duplicate message: {}\", msg.id);\n            return Ok(None);\n        }\n\n        self.update_router_state(msg).await;\n\n        let db = Arc::new(self.db.clone());\n        let msg_clone = msg.clone();\n        tokio::spawn(async move {\n            if let Err(e) = Self::store_message_background(\u0026db, \u0026msg_clone).await {\n                error!(\"Failed to store message: {}\", e);\n            }\n        });\n\n        if !self.is_registered_group(\u0026msg.chat_jid).await {\n            debug!(\"Message from unregistered group: {}\", msg.chat_jid);\n            return Ok(None);\n        }\n\n        let (_, content) = match self.extract_trigger(\u0026msg.content).await {\n            Some((_, c)) =\u003e (String::new(), c),\n            None =\u003e return Ok(None),\n        };\n\n        info!(\n            \"Received message from {}: {}\",\n            msg.sender,\n            truncate(\u0026content, 50)\n        );\n\n        let group_folder =\n            self.get_group_folder(\u0026msg.chat_jid)\n                .await\n                .ok_or_else(|| NuClawError::WhatsApp {\n                    message: format!(\"Group not found: {}\", msg.chat_jid),\n                })?;\n\n        let session_id = format!(\"whatsapp_{}\", msg.id);\n        let input = ContainerInput {\n            prompt: content,\n            session_id: Some(session_id.clone()),\n            group_folder,\n            chat_jid: msg.chat_jid.clone(),\n            is_main: msg.chat_jid.ends_with(\"@s.whatsapp.net\"),\n            is_scheduled_task: false,\n        };\n\n        let result = timeout(container_timeout(), run_container(input)).await;\n\n        match result {\n            Ok(Ok(output)) =\u003e {\n                if let Some(response) = output.result {\n                    self.send_message(\u0026msg.chat_jid, \u0026response).await?;\n                    return Ok(Some(response));\n                }\n            }\n            Ok(Err(e)) =\u003e {\n                error!(\"Container error: {}\", e);\n                self.send_message(\u0026msg.chat_jid, \u0026format!(\"Error: {}\", e))\n                    .await?;\n            }\n            Err(_) =\u003e {\n                error!(\"Container timeout\");\n                self.send_message(\u0026msg.chat_jid, \"Sorry, the request timed out.\")\n                    .await?;\n            }\n        }\n\n        Ok(None)\n    }\n\n    /// Send a message\n    pub async fn send_message(\u0026self, jid: \u0026str, content: \u0026str) -\u003e Result\u003c()\u003e {\n        let mcp_url = get_mcp_url()?;\n\n        let payload = serde_json::json!({\n            \"jid\": jid,\n            \"message\": content,\n        });\n\n        let response = reqwest::Client::new()\n            .post(format!(\"{}/messages/send\", mcp_url))\n            .json(\u0026payload)\n            .timeout(Duration::from_secs(30))\n            .send()\n            .await\n            .map_err(|e| NuClawError::WhatsApp {\n                message: format!(\"Failed to send message: {}\", e),\n            })?;\n\n        if !response.status().is_success() {\n            return Err(NuClawError::WhatsApp {\n                message: format!(\"Failed to send message: status {}\", response.status()),\n            });\n        }\n\n        Ok(())\n    }\n\n    /// Check if message is duplicate\n    async fn is_duplicate_message(\u0026self, msg: \u0026NewMessage) -\u003e bool {\n        let last_timestamp = \u0026self.router_state.last_timestamp;\n        let last_agent = self.router_state.last_agent_timestamp.get(\u0026msg.chat_jid);\n\n        if last_timestamp == \u0026msg.timestamp {\n            return true;\n        }\n\n        if let Some(agent_ts) = last_agent {\n            if agent_ts == \u0026msg.timestamp {\n                return true;\n            }\n        }\n\n        false\n    }\n\n    /// Update router state after processing\n    async fn update_router_state(\u0026mut self, msg: \u0026NewMessage) {\n        self.router_state.last_timestamp = msg.timestamp.clone();\n        self.router_state\n            .last_agent_timestamp\n            .insert(msg.chat_jid.clone(), msg.timestamp.clone());\n\n        let router_state = self.router_state.clone();\n        tokio::spawn(async move {\n            let state_path = data_dir().join(\"router_state.json\");\n            let _ = save_json(\u0026state_path, \u0026router_state);\n        });\n    }\n\n    /// Store message in database\n    async fn store_message(\u0026self, msg: \u0026NewMessage) -\u003e Result\u003c()\u003e {\n        let conn = self\n            .db\n            .get_connection()\n            .map_err(|e| NuClawError::Database {\n                message: e.to_string(),\n            })?;\n\n        conn.execute(\n            \"INSERT OR REPLACE INTO messages (id, chat_jid, sender, sender_name, content, timestamp, is_from_me)\n             VALUES (?, ?, ?, ?, ?, ?, ?)\",\n            rusqlite::params![\n                msg.id,\n                msg.chat_jid,\n                msg.sender,\n                msg.sender_name,\n                msg.content,\n                msg.timestamp,\n                if msg.id.starts_with(\"self\") { 1 } else { 0 },\n            ],\n        ).map_err(|e| NuClawError::Database {\n            message: format!(\"Failed to store message: {}\", e),\n        })?;\n\n        Ok(())\n    }\n\n    async fn store_message_background(db: \u0026Database, msg: \u0026NewMessage) -\u003e Result\u003c()\u003e {\n        let conn = db.get_connection().map_err(|e| NuClawError::Database {\n            message: e.to_string(),\n        })?;\n\n        conn.execute(\n            \"INSERT OR REPLACE INTO messages (id, chat_jid, sender, sender_name, content, timestamp, is_from_me)\n             VALUES (?, ?, ?, ?, ?, ?, ?)\",\n            rusqlite::params![\n                msg.id,\n                msg.chat_jid,\n                msg.sender,\n                msg.sender_name,\n                msg.content,\n                msg.timestamp,\n                if msg.id.starts_with(\"self\") { 1 } else { 0 },\n            ],\n        ).map_err(|e| NuClawError::Database {\n            message: format!(\"Failed to store message: {}\", e),\n        })?;\n\n        Ok(())\n    }\n\n    /// Check if a chat is a registered group\n    async fn is_registered_group(\u0026self, jid: \u0026str) -\u003e bool {\n        self.registered_groups.contains_key(jid)\n    }\n\n    /// Get group folder for a chat JID\n    async fn get_group_folder(\u0026self, jid: \u0026str) -\u003e Option\u003cString\u003e {\n        self.registered_groups.get(jid).map(|g| g.folder.clone())\n    }\n\n    /// Extract trigger and content from message\n    async fn extract_trigger(\u0026self, content: \u0026str) -\u003e Option\u003c(String, String)\u003e {\n        extract_trigger_pure(content, \u0026self.assistant_name)\n    }\n}\n\n// Helper functions\n\n/// Get WhatsApp MCP URL from environment\nfn get_mcp_url() -\u003e Result\u003cString\u003e {\n    std::env::var(\"WHATSAPP_MCP_URL\").map_err(|_| NuClawError::Config {\n        message: \"WHATSAPP_MCP_URL not set\".to_string(),\n    })\n}\n\n/// Load router state from file\npub fn load_router_state() -\u003e RouterState {\n    let state_path = data_dir().join(\"router_state.json\");\n    load_json(\n        \u0026state_path,\n        RouterState {\n            last_timestamp: String::new(),\n            last_agent_timestamp: HashMap::new(),\n        },\n    )\n}\n\n/// Load registered groups from file\npub fn load_registered_groups() -\u003e HashMap\u003cString, RegisteredGroup\u003e {\n    let path = data_dir().join(\"registered_groups.json\");\n    load_json(\u0026path, HashMap::new())\n}\n\n/// Start the authentication flow\npub async fn start_auth_flow() {\n    let auth_path = store_dir().join(\"auth\");\n    if let Err(e) = std::fs::create_dir_all(\u0026auth_path) {\n        tracing::warn!(\"Failed to create auth directory: {}\", e);\n    }\n    info!(\"Use WHATSAPP_MCP_URL to configure WhatsApp connection\");\n}\n\n/// Helper to truncate strings\nfn truncate(s: \u0026str, max_len: usize) -\u003e String {\n    if s.len() \u003c= max_len {\n        s.to_string()\n    } else {\n        format!(\"{}...\", \u0026s[..max_len.saturating_sub(3)])\n    }\n}\n\n/// Extract trigger and content from message (pure function)\npub fn extract_trigger_pure(content: \u0026str, assistant_name: \u0026str) -\u003e Option\u003c(String, String)\u003e {\n    let trigger_pattern = format!(\"@{}\", assistant_name);\n\n    if let Some(idx) = content.find(\u0026trigger_pattern) {\n        let after = \u0026content[idx + trigger_pattern.len()..];\n        let c = after.trim().to_string();\n        return Some((trigger_pattern, c));\n    }\n\n    None\n}\n\n/// Check if message is duplicate (pure function)\npub fn is_duplicate_message_pure(\n    msg: \u0026NewMessage,\n    last_timestamp: \u0026str,\n    last_agent_timestamps: \u0026std::collections::HashMap\u003cString, String\u003e,\n) -\u003e bool {\n    if last_timestamp == msg.timestamp {\n        return true;\n    }\n\n    if let Some(agent_ts) = last_agent_timestamps.get(\u0026msg.chat_jid) {\n        if agent_ts == \u0026msg.timestamp {\n            return true;\n        }\n    }\n\n    false\n}\n\n/// Check if message is from a private chat\npub fn is_private_chat(jid: \u0026str) -\u003e bool {\n    jid.ends_with(\"@s.whatsapp.net\")\n}\n\n/// Get group name from JID\npub fn get_group_name_from_jid(jid: \u0026str) -\u003e Option\u003cString\u003e {\n    jid.split('@').next().map(|s| s.to_string())\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    fn setup_test_dirs() {\n        use crate::config::store_dir;\n        use std::fs;\n        let store = store_dir();\n        if !store.exists() {\n            let _ = fs::create_dir_all(\u0026store);\n        }\n    }\n\n    #[test]\n    fn test_truncate_short() {\n        assert_eq!(truncate(\"hello\", 10), \"hello\");\n    }\n\n    #[test]\n    fn test_truncate_long() {\n        assert_eq!(truncate(\"hello world\", 8), \"hello...\");\n    }\n\n    #[test]\n    fn test_extract_trigger_with_at() {\n        setup_test_dirs();\n        let client = WhatsAppClient {\n            connected: false,\n            last_qr: None,\n            registered_groups: HashMap::new(),\n            router_state: RouterState::default(),\n            db: Database::new().unwrap(),\n            assistant_name: \"Andy\".to_string(),\n        };\n\n        let result = tokio::runtime::Runtime::new()\n            .unwrap()\n            .block_on(client.extract_trigger(\"@Andy hello world\"));\n\n        assert!(result.is_some());\n        let (trigger, content) = result.unwrap();\n        assert_eq!(trigger, \"@Andy\");\n        assert_eq!(content, \"hello world\");\n    }\n\n    #[test]\n    fn test_extract_trigger_without_at() {\n        setup_test_dirs();\n        let client = WhatsAppClient {\n            connected: false,\n            last_qr: None,\n            registered_groups: HashMap::new(),\n            router_state: RouterState::default(),\n            db: Database::new().unwrap(),\n            assistant_name: \"Andy\".to_string(),\n        };\n\n        let result = tokio::runtime::Runtime::new()\n            .unwrap()\n            .block_on(client.extract_trigger(\"hello world\"));\n\n        assert!(result.is_none());\n    }\n\n    #[test]\n    fn test_extract_trigger_pure_basic() {\n        let result = extract_trigger_pure(\"@Andy hello world\", \"Andy\");\n        assert!(result.is_some());\n        let (trigger, content) = result.unwrap();\n        assert_eq!(trigger, \"@Andy\");\n        assert_eq!(content, \"hello world\");\n    }\n\n    #[test]\n    fn test_extract_trigger_pure_no_trigger() {\n        assert!(extract_trigger_pure(\"hello world\", \"Andy\").is_none());\n        assert!(extract_trigger_pure(\"\", \"Andy\").is_none());\n    }\n\n    #[test]\n    fn test_extract_trigger_pure_different_name() {\n        let result = extract_trigger_pure(\"@Bob hello\", \"Bob\");\n        assert!(result.is_some());\n        let (_, content) = result.unwrap();\n        assert_eq!(content, \"hello\");\n    }\n\n    #[test]\n    fn test_extract_trigger_pure_with_extra_spaces() {\n        let result = extract_trigger_pure(\"@Andy   hello   world  \", \"Andy\");\n        assert!(result.is_some());\n        let (_, content) = result.unwrap();\n        assert_eq!(content, \"hello   world\");\n    }\n\n    #[test]\n    fn test_extract_trigger_pure_mid_message() {\n        let result = extract_trigger_pure(\"hey @Andy help me\", \"Andy\");\n        assert!(result.is_some());\n        let (_, content) = result.unwrap();\n        assert_eq!(content, \"help me\");\n    }\n\n    #[test]\n    fn test_is_duplicate_message_pure_whatsapp() {\n        let msg = NewMessage {\n            id: \"1\".to_string(),\n            chat_jid: \"123@s.whatsapp.net\".to_string(),\n            sender: \"user1\".to_string(),\n            sender_name: \"User\".to_string(),\n            content: \"hello\".to_string(),\n            timestamp: \"2025-01-01T00:00:00Z\".to_string(),\n        };\n\n        let mut agent_ts = std::collections::HashMap::new();\n        agent_ts.insert(\n            \"123@s.whatsapp.net\".to_string(),\n            \"2025-01-01T00:00:00Z\".to_string(),\n        );\n\n        assert!(is_duplicate_message_pure(\n            \u0026msg,\n            \"2025-01-01T00:00:00Z\",\n            \u0026HashMap::new()\n        ));\n        assert!(is_duplicate_message_pure(\u0026msg, \"old\", \u0026agent_ts));\n        assert!(!is_duplicate_message_pure(\u0026msg, \"old\", \u0026HashMap::new()));\n    }\n\n    #[test]\n    fn test_is_private_chat() {\n        assert!(is_private_chat(\"123@s.whatsapp.net\"));\n        assert!(!is_private_chat(\"123@g.us\"));\n        assert!(!is_private_chat(\"123-456@g.us\"));\n    }\n\n    #[test]\n    fn test_get_group_name_from_jid() {\n        assert_eq!(\n            get_group_name_from_jid(\"123@s.whatsapp.net\"),\n            Some(\"123\".to_string())\n        );\n        assert_eq!(\n            get_group_name_from_jid(\"mygroup@g.us\"),\n            Some(\"mygroup\".to_string())\n        );\n        assert_eq!(get_group_name_from_jid(\"\"), Some(\"\".to_string()));\n    }\n\n    #[test]\n    fn test_truncate_whatsapp_edge_cases() {\n        assert_eq!(truncate(\"\", 5), \"\");\n        assert_eq!(truncate lt)]\n    pub hooks: HookSettings,\n\n    /// Default prompt template (Markdown body after front matter)\n    #[serde(default)]\n    pub prompt_template: String,\n}\n\n/// Channel configuration\n#[derive(Debug, Clone, Serialize, Deserialize, Default)]\npub struct ChannelSettings {\n    #[serde(default)]\n    pub telegram: Option\u003cChannelConfig\u003e,\n\n    #[serde(default)]\n    pub whatsapp: Option\u003cChannelConfig\u003e,\n}\n\n/// Individual channel config\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct ChannelConfig {\n    /// Whether this channel is enabled\n    pub enabled: bool,\n\n    /// Bot token (supports $VAR environment variable)\n    #[serde(default)]\n    pub bot_token: Option\u003cString\u003e,\n\n    /// MCP URL for WhatsApp\n    #[serde(default)]\n    pub mcp_url: Option\u003cString\u003e,\n}\n\n/// Agent execution settings\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct AgentSettings {\n    /// Maximum concurrent agent runs\n    #[serde(default = \"default_max_concurrent\")]\n    pub max_concurrent: usize,\n\n    /// Agent execution timeout in milliseconds\n    #[serde(default = \"default_timeout_ms\")]\n    pub timeout_ms: u64,\n\n    /// Maximum number of retries on failure\n    #[serde(default = \"default_max_retries\")]\n    pub max_retries: usize,\n\n    /// Retry backoff in milliseconds\n    #[serde(default = \"default_retry_backoff_ms\")]\n    pub retry_backoff_ms: u64,\n}\n\n/// Container execution settings\n#[derive(Debug, Clone, Serialize, Deserialize, Default)]\npub struct ContainerSettings {\n    /// Container image to use\n    #[serde(default)]\n    pub image: Option\u003cString\u003e,\n\n    /// Workspace root directory\n    #[serde(default)]\n    pub workspace_root: Option\u003cString\u003e,\n\n    /// Whether container pool is enabled\n    #[serde(default)]\n    pub pool_enabled: Option\u003cbool\u003e,\n\n    /// Minimum pool size\n    #[serde(default)]\n    pub pool_min_size: Option\u003cusize\u003e,\n\n    /// Maximum pool size\n    #[serde(default)]\n    pub pool_max_size: Option\u003cusize\u003e,\n}\n\n/// Hook scripts for workspace lifecycle\n#[derive(Debug, Clone, Serialize, Deserialize, Default)]\npub struct HookSettings {\n    /// Runs after workspace is created\n    #[serde(default)]\n    pub after_create: Option\u003cString\u003e,\n\n    /// Runs before agent execution\n    #[serde(default)]\n    pub before_run: Option\u003cString\u003e,\n\n    /// Runs after agent execution (success or failure)\n    #[serde(default)]\n    pub after_run: Option\u003cString\u003e,\n\n    /// Runs before workspace cleanup\n    #[serde(default)]\n    pub before_remove: Option\u003cString\u003e,\n}\n\n// Default values\nfn default_max_concurrent() -\u003e usize {\n    5\n}\nfn default_timeout_ms() -\u003e u64 {\n    300000\n} // 5 minutes\nfn default_max_retries() -\u003e usize {\n    3\n}\nfn default_retry_backoff_ms() -\u003e u64 {\n    60000\n} // 1 minute\n\nimpl Default for AgentSettings {\n    fn default() -\u003e Self {\n        Self {\n            max_concurrent: default_max_concurrent(),\n            timeout_ms: default_timeout_ms(),\n            max_retries: default_max_retries(),\n            retry_backoff_ms: default_retry_backoff_ms(),\n        }\n    }\n}\n\nimpl ChannelConfig {\n    pub fn new_telegram(bot_token: Option\u003cString\u003e) -\u003e Self {\n        Self {\n            enabled: true,\n            bot_token,\n            mcp_url: None,\n        }\n    }\n\n    pub fn new_whatsapp(mcp_url: Option\u003cString\u003e) -\u003e Self {\n        Self {\n            enabled: true,\n            bot_token: None,\n            mcp_url,\n        }\n    }\n}\n\nimpl WorkflowConfig {\n    /// Create a minimal default config\n    pub fn default_config() -\u003e Self {\n        Self::default()\n    }\n\n    /// Check if any channel is enabled\n    pub fn has_enabled_channel(\u0026self) -\u003e bool {\n        self.channels\n            .telegram\n            .as_ref()\n            .map(|c| c.enabled)\n            .unwrap_or(false)\n            || self\n                .channels\n                .whatsapp\n                .as_ref()\n                .map(|c| c.enabled)\n                .unwrap_or(false)\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    // === WorkflowConfig tests ===\n\n    #[test]\n    fn test_default_workflow_config() {\n        let config = WorkflowConfig::default();\n        assert_eq!(config.agent.max_concurrent, 5);\n        assert_eq!(config.agent.timeout_ms, 300000);\n        assert!(!config.has_enabled_channel());\n    }\n\n    #[test]\n    fn test_workflow_config_serialization() {\n        let config = WorkflowConfig::default();\n        let yaml = serde_yaml::to_string(\u0026config).unwrap();\n        assert!(yaml.contains(\"max_concurrent\"));\n    }\n\n    #[test]\n    fn test_workflow_config_deserialization() {\n        let yaml = r#\"\nchannels:\n  telegram:\n    enabled: true\n    bot_token: \"test_token\"\nagent:\n  max_concurrent: 3\n  timeout_ms: 120000\n\"#;\n        let config: WorkflowConfig = serde_yaml::from_str(yaml).unwrap();\n        assert!(config.channels.telegram.is_some());\n        assert_eq!(config.channels.telegram.unwrap().enabled, true);\n        assert_eq!(config.agent.max_concurrent, 3);\n    }\n\n    #[test]\n    fn test_workflow_config_has_enabled_channel() {\n        let mut config = WorkflowConfig::default();\n        assert!(!config.has_enabled_channel());\n\n        config.channels.telegram = Some(ChannelConfig {\n            enabled: true,\n            bot_token: Some(\"test\".to_string()),\n            mcp_url: None,\n        });\n        assert!(config.has_enabled_channel());\n    }\n\n    // === ChannelSettings tests ===\n\n    #[test]\n    fn test_channel_settings_default() {\n        let settings = ChannelSettings::default();\n        assert!(settings.telegram.is_none());\n        assert!(settings.whatsapp.is_none());\n    }\n\n    #[test]\n    fn test_channel_config_telegram() {\n        let config = ChannelConfig::new_telegram(Some(\"token123\".to_string()));\n        assert!(config.enabled);\n        assert_eq!(config.bot_token, Some(\"token123\".to_string()));\n        assert!(config.mcp_url.is_none());\n    }\n\n    #[test]\n    fn test_channel_config_whatsapp() {\n        let config = ChannelConfig::new_whatsapp(Some(\"http://mcp:8080\".to_string()));\n        assert!(config.enabled);\n        assert!(config.bot_token.is_none());\n        assert_eq!(config.mcp_url, Some(\"http://mcp:8080\".to_string()));\n    }\n\n    #[test]\n    fn test_channel_config_serialization() {\n        let config = ChannelConfig::new_telegram(Some(\"secret\".to_string()));\n        let yaml = serde_yaml::to_string(\u0026config).unwrap();\n        assert!(yaml.contains(\"enabled: true\"));\n        assert!(yaml.contains(\"bot_token: secret\"));\n    }\n\n    // === AgentSettings tests ===\n\n    #[test]\n    fn test_agent_settings_default_values() {\n        let settings = AgentSettings::default();\n        assert_eq!(settings.max_concurrent, 5);\n        assert_eq!(settings.timeout_ms, 300000);\n        assert_eq!(settings.max_retries, 3);\n        assert_eq!(settings.retry_backoff_ms, 60000);\n    }\n\n    #[test]\n    fn test_agent_settings_custom_values() {\n        let yaml = r#\"\nmax_concurrent: 10\ntimeout_ms: 600000\nmax_retries: 5\nretry_backoff_ms: 120000\n\"#;\n        let settings: AgentSettings = serde_yaml::from_str(yaml).unwrap();\n        assert_eq!(settings.max_concurrent, 10);\n        assert_eq!(settings.timeout_ms, 600000);\n        assert_eq!(settings.max_retries, 5);\n        assert_eq!(settings.retry_backoff_ms, 120000);\n    }\n\n    #[test]\n    fn test_agent_settings_partial_deserialization() {\n        let yaml = r#\"\nmax_concurrent: 2\n\"#;\n        let settings: AgentSettings = serde_yaml::from_str(yaml).unwrap();\n        assert_eq!(settings.max_concurrent, 2);\n        // Other fields should have defaults\n        assert_eq!(settings.timeout_ms, 300000);\n    }\n\n    // === ContainerSettings tests ===\n\n    #[test]\n    fn test_container_settings_default() {\n        let settings = ContainerSettings::default();\n        assert!(settings.image.is_none());\n        assert!(settings.workspace_root.is_none());\n        assert!(settings.pool_enabled.is_none());\n    }\n\n    #[test]\n    fn test_container_settings_full() {\n        let yaml = r#\"\nimage: \"anthropic/codex:latest\"\nworkspace_root: \"/workspaces\"\npool_enabled: true\npool_min_size: 2\npool_max_size: 10\n\"#;\n        let settings: ContainerSettings = serde_yaml::from_str(yaml).unwrap();\n        assert_eq!(settings.image, Some(\"anthropic/codex:latest\".to_string()));\n        assert_eq!(settings.workspace_root, Some(\"/workspaces\".to_string()));\n        assert_eq!(settings.pool_enabled, Some(true));\n        assert_eq!(settings.pool_min_size, Some(2));\n        assert_eq!(settings.pool_max_size, Some(10));\n    }\n\n    // === HookSettings tests ===\n\n    #[test]\n    fn test_hooks_settings_default() {\n        let hooks = HookSettings::default();\n        assert!(hooks.after_create.is_none());\n        assert!(hooks.before_run.is_none());\n        assert!(hooks.after_run.is_none());\n        assert!(hooks.before_remove.is_none());\n    }\n\n    #[test]\n    fn test_hooks_settings_with_scripts() {\n        let yaml = r#\"\nafter_create: |\n  git clone $REPO_URL .\nbefore_run: |\n  npm install\nafter_run: |\n  echo \"Done\"\n\"#;\n        let hooks: HookSettings = serde_yaml::from_str(yaml).unwrap();\n        assert!(hooks.after_create.is_some());\n        assert!(hooks.before_run.is_some());\n        assert!(hooks.after_run.is_some());\n        assert!(hooks.before_remove.is_none());\n    }\n\n    #[test]\n    fn test_hooks_empty_script_is_none() {\n        let yaml = r#\"\nafter_create: \"\"\nbefore_run: \"   \"\n\"#;\n        let hooks: HookSettings = serde_yaml::from_str(yaml).unwrap();\n        // Empty strings are preserved in YAML\n        assert_eq!(hooks.after_create, Some(\"\".to_string()));\n        assert_eq!(hooks.before_run, Some(\"   \".to_string()));\n    }\n\n    // === Integration tests ===\n\n    #[test]\n    fn test_full_workflow_config() {\n        let yaml = r#\"\nchannels:\n  telegram:\n    enabled: true\n    bot_token: $TELEGRAM_TOKEN\n  whatsapp:\n    enabled: false\n    mcp_url: http://localhost:8080\n\nagent:\n  max_concurrent: 3\n  timeout_ms: 180000\n\ncontainer:\n  image: custom:latest\n  pool_enabled: true\n\nhooks:\n  after_create: |\n    echo \"created\"\n\nprompt_template: |\n  You are a helpful assistant.\n\"#;\n        let config: WorkflowConfig = serde_yaml::from_str(yaml).unwrap();\n\n        // Channels\n        assert!(config.channels.telegram.is_some());\n        assert!(config.channels.whatsapp.is_some());\n        assert!(!config.channels.whatsapp.as_ref().unwrap().enabled);\n\n        // Agent\n        assert_eq!(config.agent.max_concurrent, 3);\n        assert_eq!(config.agent.timeout_ms, 180000);\n\n        // Container\n        assert_eq!(config.container.image, Some(\"custom:latest\".to_string()));\n        assert_eq!(config.container.pool_enabled, Some(true));\n\n        // Hooks\n        assert!(config.hooks.after_create.is_some());\n\n        // Prompt\n        assert!(config.prompt_template.contains(\"helpful assistant\"));\n    }\n\n    #[test]\n    fn test_workflow_config_without_front_matter() {\n        // When there's no front matter, the entire content becomes prompt_template\n        let config: WorkflowConfig = serde_yaml::from_str(\"\").unwrap();\n        assert_eq!(config.agent.max_concurrent, 5); // default\n    }\n}\n","traces":[{"line":126,"address":[16314544],"length":1,"stats":{"Line":0}},{"line":132,"address":[16314592],"length":1,"stats":{"Line":0}},{"line":135,"address":[16317856],"length":1,"stats":{"Line":0}},{"line":137,"address":[16317870],"length":1,"stats":{"Line":0}},{            HookType::BeforeRemove =\u003e \"before_remove\",\n        }\n    }\n}\n\npub struct HookRunner;\n\nimpl HookRunner {\n    pub fn run_hook(\n        hook_type: HookType,\n        script: \u0026str,\n        workspace_path: \u0026Path,\n    ) -\u003e Result\u003cString, HookError\u003e {\n        if script.trim().is_empty() {\n            return Ok(String::new());\n        }\n\n        let output = Command::new(\"sh\")\n            .arg(\"-c\")\n            .arg(script)\n            .current_dir(workspace_path)\n            .output()?;\n\n        if output.status.success() {\n            Ok(String::from_utf8_lossy(\u0026output.stdout).to_string())\n        } else {\n            let stderr = String::from_utf8_lossy(\u0026output.stderr).to_string();\n            Err(HookError::ExecutionFailed(stderr))\n        }\n    }\n\n    pub fn run_hooks(\n        hook_type: HookType,\n        settings: \u0026HookSettings,\n        workspace_path: \u0026Path,\n    ) -\u003e Result\u003cVec\u003cString\u003e, HookError\u003e {\n        let script = match hook_type {\n            HookType::AfterCreate =\u003e settings.after_create.as_deref(),\n            HookType::BeforeRun =\u003e settings.before_run.as_deref(),\n            HookType::AfterRun =\u003e settings.after_run.as_deref(),\n            HookType::BeforeRemove =\u003e settings.before_remove.as_deref(),\n        };\n\n        match script {\n            Some(s) if !s.trim().is_empty() =\u003e {\n                let output = Self::run_hook(hook_type, s, workspace_path)?;\n                Ok(vec![output])\n            }\n            _ =\u003e Ok(vec![]),\n        }\n    }\n\n    pub fn run_all_hooks(settings: \u0026HookSettings, workspace_path: \u0026Path) -\u003e Result\u003c(), HookError\u003e {\n        let hook_types = [\n            HookType::AfterCreate,\n            HookType::BeforeRun,\n            HookType::AfterRun,\n            HookType::BeforeRemove,\n        ];\n\n        for hook_type in hook_types {\n            Self::run_hooks(hook_type, settings, workspace_path)?;\n        }\n\n        Ok(())\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use std::fs;\n    use tempfile::TempDir;\n\n    #[test]\n    fn test_hook_type_as_str() {\n        assert_eq!(HookType::AfterCreate.as_str(), \"after_create\");\n        assert_eq!(HookType::BeforeRun.as_str(), \"before_run\");\n        assert_eq!(HookType::AfterRun.as_str(), \"after_run\");\n        assert_eq!(HookType::BeforeRemove.as_str(), \"before_remove\");\n    }\n\n    #[test]\n    fn test_run_empty_script() {\n        let temp_dir = TempDir::new().unwrap();\n        let result = HookRunner::run_hook(HookType::BeforeRun, \"\", temp_dir.path());\n        assert!(result.is_ok());\n        assert!(result.unwrap().is_empty());\n    }\n\n    #[test]\n    fn test_run_simple_echo() {\n        let temp_dir = TempDir::new().unwrap();\n        let result = HookRunner::run_hook(HookType::BeforeRun, \"echo hello\", temp_dir.path());\n        assert!(result.is_ok());\n        assert!(result.unwrap().contains(\"hello\"));\n    }\n\n    #[test]\n    fn test_run_hook_with_env_var() {\n        let temp_dir = TempDir::new().unwrap();\n        std::env::set_var(\"TEST_WORKSPACE\", \"test_value\");\n        let result =\n            HookRunner::run_hook(HookType::BeforeRun, \"echo $TEST_WORKSPACE\", temp_dir.path());\n        assert!(result.is_ok());\n        assert!(result.unwrap().contains(\"test_value\"));\n        std::env::remove_var(\"TEST_WORKSPACE\");\n    }\n\n    #[test]\n    fn test_run_hook_failure() {\n        let temp_dir = TempDir::new().unwrap();\n        let result = HookRunner::run_hook(HookType::BeforeRun, \"exit 1\", temp_dir.path());\n        assert!(result.is_err());\n    }\n\n    #[test]\n    fn test_run_hooks_with_settings() {\n        let temp_dir = TempDir::new().unwrap();\n        let mut settings = HookSettings::default();\n        settings.before_run = Some(\"echo before\".to_string());\n\n        let result = HookRunner::run_hooks(HookType::BeforeRun, \u0026settings, temp_dir.path());\n        assert!(result.is_ok());\n        assert!(!result.unwrap().is_empty());\n    }\n\n    #[test]\n    fn test_run_hooks_skips_empty() {\n        let temp_dir = TempDir::new().unwrap();\n        let settings = HookSettings::default();\n\n        let result = HookRunner::run_hooks(HookType::BeforeRun, \u0026settings, temp_dir.path());\n        assert!(result.is_ok());\n        assert!(result.unwrap().is_empty());\n    }\n\n    #[test]\n    fn test_run_all_hooks() {\n        let temp_dir = TempDir::new().unwrap();\n        let mut settings = HookSettings::default();\n        settings.after_create = Some(\"echo created\".to_string());\n        settings.before_run = Some(\"echo running\".to_string());\n\n        let result = HookRunner::run_all_hooks(\u0026settings, temp_dir.path());\n        assert!(result.is_ok());\n    }\n\n    #[test]\n    fn test_hook_runs_in_workspace_directory() {\n        let temp_dir = TempDir::new().unwrap();\n\n        let script = \"pwd\";\n        let result = HookRunner::run_hook(HookType::BeforeRun, script, temp_dir.path());\n\n        assert!(result.is_ok());\n        let output = result.unwrap();\n        assert!(output.contains(\".tmp\") || output.contains(\"Temp\"));\n    }\n\n    #[test]\n    fn test_hook_multiline_script() {\n        let temp_dir = TempDir::new().unwrap();\n\n        let script = r#\"\necho \"line1\"\necho \"line2\"\n\"#;\n        let result = HookRunner::run_hook(HookType::BeforeRun, script, temp_dir.path());\n\n        assert!(result.is_ok());\n        let output = result.unwrap();\n        assert!(output.contains(\"line1\"));\n        assert!(output.contains(\"line2\"));\n    }\n}\n","traces":[{"line":30,"address":[16272608],"length":1,"stats":{"Line":0}},{"line":31,"address":[16272613],"length":1,"stats":{"Line":0}},{"line":32,"address":[16272644],"length":1,"stats":{"Line":0}},{"line":33,"address":[16272667],"len
