","code","nuclaw","src","workflow","loader.rs"],"content":"//! Workflow loader - parses WORKFLOW.md with YAML front matter\n\nuse regex::Regex;\nuse std::env;\nuse std::fs;\nuse std::path::Path;\n\nuse crate::workflow::config::{ChannelConfig, WorkflowConfig};\nuse thiserror::Error;\n\n#[derive(Error, Debug)]\npub enum WorkflowLoaderError {\n    #[error(\"IO error: {0}\")]\n    Io(#[from] std::io::Error),\n\n    #[error(\"YAML parse error: {0}\")]\n    YamlParse(#[from] serde_yaml::Error),\n\n    #[error(\"File not found: {0}\")]\n    FileNotFound(String),\n\n    #[error(\"Config validation error: {0}\")]\n    ValidationError(String),\n\n    #[error(\"Environment variable error: {0}\")]\n    EnvVarError(String),\n}\n\npub struct WorkflowLoader;\n\nimpl WorkflowLoader {\n    pub fn parse_workflow_content(\n        content: \u0026str,\n    ) -\u003e Result\u003c(WorkflowConfig, String), WorkflowLoaderError\u003e {\n        let content = content.trim();\n\n        if content.is_empty() {\n            return Ok((WorkflowConfig::default(), String::new()));\n        }\n\n        if !content.starts_with(\"---\") {\n            return Ok((WorkflowConfig::default(), content.to_string()));\n        }\n\n        let mut parts = content.splitn(3, \"---\");\n        parts.next();\n\n        let yaml_content = match parts.next() {\n            Some(s) =\u003e s.trim(),\n            None =\u003e return Ok((WorkflowConfig::default(), String::new())),\n        };\n\n        if yaml_content.is_empty() {\n            return Ok((WorkflowConfig::default(), String::new()));\n        }\n\n        let config: WorkflowConfig = serde_yaml::from_str(yaml_content)?;\n\n        let remaining = parts.next().unwrap_or(\"\").trim().to_string();\n\n        Ok((config, remaining))\n    }\n\n    pub fn resolve_env_vars(input: \u0026str) -\u003e Result\u003cString, WorkflowLoaderError\u003e {\n        let re = Regex::new(r\"\\$\\{(\\w+)\\}|\\$(\\w+)\")\n            .map_err(|e| WorkflowLoaderError::EnvVarError(e.to_string()))?;\n\n        let result = re.replace_all(input, |caps: \u0026regex::Captures| {\n            let var_name = caps\n                .get(1)\n                .or(caps.get(2))\n                .map(|m| m.as_str())\n                .unwrap_or(\"\");\n            env::var(var_name).unwrap_or_else(|_| caps[0].to_string())\n        });\n\n        Ok(result.to_string())\n    }\n\n    pub fn resolve_env_vars_in_config(yaml: \u0026str) -\u003e Result\u003cString, WorkflowLoaderError\u003e {\n        Self::resolve_env_vars(yaml)\n    }\n\n    pub fn validate_config(config: \u0026WorkflowConfig) -\u003e Result\u003c(), WorkflowLoaderError\u003e {\n        if let Some(telegram) = \u0026config.channels.telegram {\n            if telegram.enabled \u0026\u0026 telegram.bot_token.is_none() \u0026\u0026 telegram.mcp_url.is_none() {\n                return Err(WorkflowLoaderError::ValidationError(\n                    \"Telegram channel is enabled but has no bot_token or mcp_url\".to_string(),\n                ));\n            }\n        }\n\n        if config.agent.timeout_ms == 0 {\n            return Err(WorkflowLoaderError::ValidationError(\n                \"timeout_ms must be greater than 0\".to_string(),\n            ));\n        }\n\n        if config.agent.max_retries \u003e 10 {\n            return Err(WorkflowLoaderError::ValidationError(\n                \"max_retries must be between 0 and 10\".to_string(),\n            ));\n        }\n\n        Ok(())\n    }\n\n    pub fn load_workflow(path: \u0026Path) -\u003e Result\u003c(WorkflowConfig, String), WorkflowLoaderError\u003e {\n        if !path.exists() {\n            return Err(WorkflowLoaderError::FileNotFound(\n                path.display().to_string(),\n            ));\n        }\n\n        let content = fs::read_to_string(path)?;\n\n        let (mut config, template) = Self::parse_workflow_content(\u0026content)?;\n\n        let yaml_for_resolution =\n            serde_yaml::to_string(\u0026config).map_err(WorkflowLoaderError::YamlParse)?;\n        let resolved_yaml = Self::resolve_env_vars_in_config(\u0026yaml_for_resolution)?;\n\n        config = serde_yaml::from_str(\u0026resolved_yaml)?;\n\n        Ok((config, template))\n    }\n\n    pub fn load_and_validate(path: \u0026Path) -\u003e Result\u003c(WorkflowConfig, String), WorkflowLoaderError\u003e {\n        let (config, template) = Self::load_workflow(path)?;\n        Self::validate_config(\u0026config)?;\n        Ok((config, template))\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use std::env;\n    use std::fs;\n    use std::path::Path;\n    use tempfile::TempDir;\n\n    #[test]\n    fn test_parse_workflow_with_front_matter() {\n        let content = r#\"---\nchannels:\n  telegram:\n    enabled: true\n    bot_token: test_token\nagent:\n  max_concurrent: 3\n---\n\nThis is the prompt template.\n\"#;\n        let result = WorkflowLoader::parse_workflow_content(content);\n        assert!(result.is_ok());\n        let (config, template) = result.unwrap();\n        assert_eq!(config.agent.max_concurrent, 3);\n        assert!(config.channels.telegram.is_some());\n        assert_eq!(template.trim(), \"This is the prompt template.\");\n    }\n\n    #[test]\n    fn test_parse_workflow_without_front_matter() {\n        let content = \"Just a prompt without config.\";\n        let result = WorkflowLoader::parse_workflow_content(content);\n        assert!(result.is_ok());\n        let (config, template) = result.unwrap();\n        assert_eq!(config.agent.max_concurrent, 5);\n        assert_eq!(template.trim(), \"Just a prompt without config.\");\n    }\n\n    #[test]\n    fn test_parse_workflow_empty() {\n        let result = WorkflowLoader::parse_workflow_content(\"\");\n        assert!(result.is_ok());\n        let (config, template) = result.unwrap();\n        assert_eq!(config.agent.max_concurrent, 5);\n        assert!(template.is_empty());\n    }\n\n    #[test]\n    fn test_parse_workflow_only_front_matter() {\n        let content = r#\"---\nagent:\n  timeout_ms: 600000\n---\n\"#;\n        let result = WorkflowLoader::parse_workflow_content(content);\n        assert!(result.is_ok());\n        let (config, template) = result.unwrap();\n        assert_eq!(config.agent.timeout_ms, 600000);\n        assert!(template.is_empty());\n    }\n\n    #[test]\n    fn test_parse_workflow_invalid_yaml() {\n        let content = r#\"---\ninvalid: yaml: content::\n---\nPrompt\"#;\n        let result = WorkflowLoader::parse_workflow_content(content);\n        assert!(result.is_err());\n    }\n\n    #[test]\n    fn test_resolve_env_vars_simple() {\n        env::set_var(\"TEST_VAR\", \"test_value\");\n        let input = \"prefix $TEST_VAR suffix\";\n        let result = WorkflowLoader::resolve_env_vars(input);\n        assert!(result.is_ok());\n        assert_eq!(result.unwrap(), \"prefix test_value suffix\");\n        env::remove_var(\"TEST_VAR\");\n    }\n\n    #[test]\n    fn test_resolve_env_vars_multiple() {\n        env::set_var(\"VAR1\", \"a\");\n        env::set_var(\"VAR2\", \"b\");\n        let input = \"$VAR1 and $VAR2\";\n        let result = WorkflowLoader::resolve_env_vars(input);\n        assert!(result.is_ok());\n        assert_eq!(result.unwrap(), \"a and b\");\n        env::remove_var(\"VAR1\");\n        env::remove_var(\"VAR2\");\n    }\n\n    #[test]\n    fn test_resolve_env_vars_undefined() {\n        env::remove_var(\"UNDEFINED_VAR\");\n        let input = \"value: $UNDEFINED_VAR\";\n        let result = WorkflowLoader::resolve_env_vars(input);\n        assert!(result.is_ok());\n        assert!(result.unwrap().contains(\"UNDEFINED_VAR\"));\n    }\n\n    #[test]\n    fn test_resolve_env_vars_in_config() {\n        env::set_var(\"TELEGRAM_TOKEN\", \"secret123\");\n        let yaml = r#\"\nchannels:\n  telegram:\n    enabled: true\n    bot_token: $TELEGRAM_TOKEN\n\"#;\n        let result = WorkflowLoader::resolve_env_vars_in_config(yaml);\n        assert!(result.is_ok());\n        assert!(result.unwrap().contains(\"secret123\"));\n        env::remove_var(\"TELEGRAM_TOKEN\");\n    }\n\n    #[test]\n    fn test_resolve_env_vars_braces() {\n        env::set_var(\"MY_VAR\", \"bracketed\");\n        let input = \"value: ${MY_VAR}\";\n        let result = WorkflowLoader::resolve_env_vars(input);\n        assert!(result.is_ok());\n        assert_eq!(result.unwrap(), \"value: bracketed\");\n        env::remove_var(\"MY_VAR\");\n    }\n\n    #[test]\n    fn test_validate_config_valid() {\n        let config = WorkflowConfig::default();\n        let result = WorkflowLoader::validate_config(\u0026config);\n        assert!(result.is_ok());\n    }\n\n    #[test]\n    fn test_validate_config_enabled_channel_no_token() {\n        let mut config = WorkflowConfig::default();\n        config.channels.telegram = Some(ChannelConfig {\n            enabled: true,\n            bot_token: None,\n            mcp_url: None,\n        });\n        let result = WorkflowLoader::validate_config(\u0026config);\n        assert!(result.is_err());\n    }\n\n    #[test]\n    fn test_validate_config_invalid_timeout() {\n        let mut config = WorkflowConfig::default();\n        config.agent.timeout_ms = 0;\n        let result = WorkflowLoader::validate_config(\u0026config);\n        assert!(result.is_err());\n    }\n\n    #[test]\n    fn test_validate_config_invalid_max_retries() {\n        let mut config = WorkflowConfig::default();\n        config.agent.max_retries = 100;\n        let result = WorkflowLoader::validate_config(\u0026config);\n        assert!(result.is_err());\n    }\n\n    #[test]\n    fn test_load_workflow_from_file() {\n        let temp_dir = TempDir::new().unwrap();\n        let workflow_path = temp_dir.path().join(\"WORKFLOW.md\");\n\n        let content = r#\"---\nagent:\n  max_concurrent: 7\n---\nPrompt content here.\n\"#;\n        fs::write(\u0026workflow_path, content).unwrap();\n\n        let result = WorkflowLoader::load_workflow(\u0026workflow_path);\n        assert!(result.is_ok());\n        let (config, template) = result.unwrap();\n        assert_eq!(config.agent.max_concurrent, 7);\n        assert!(template.contains(\"Prompt content\"));\n    }\n\n    #[test]\n    fn test_load_workflow_file_not_found() {\n        let result = WorkflowLoader::load_workflow(Path::new(\"/nonexistent/path/WORKFLOW.md\"));\n        assert!(result.is_err());\n    }\n\n    #[test]\n    fn test_load_workflow_with_env_resolution() {\n        env::set_var(\"MY_IMAGE\", \"custom:latest\");\n\n        let temp_dir = TempDir::new().unwrap();\n        let workflow_path = temp_dir.path().join(\"WORKFLOW.md\");\n\n        let content = r#\"---\ncontainer:\n  image: $MY_IMAGE\nagent:\n  max_concurrent: 2\n---\nRun the agent.\n\"#;\n        fs::write(\u0026workflow_path, content).unwrap();\n\n        let result = WorkflowLoader::load_workflow(\u0026workflow_path);\n        assert!(result.is_ok());\n        let (config, _) = result.unwrap();\n        assert_eq!(config.container.image, Some(\"custom:latest\".to_string()));\n        assert_eq!(config.agent.max_concurrent, 2);\n\n        env::remove_var(\"MY_IMAGE\");\n    }\n\n    #[test]\n    fn test_load_and_validate_workflow() {\n        let temp_dir = TempDir::new().unwrap();\n        let workflow_path = temp_dir.path().join(\"WORKFLOW.md\");\n\n        let content = r#\"---\nchannels:\n  telegram:\n    enabled: true\n    bot_token: valid_token\nagent:\n  timeout_ms: 60000\n---\nPrompt here.\n\"#;\n        fs::write(\u0026workflow_path, content).unwrap();\n\n        let result = WorkflowLoader::load_and_validate(\u0026workflow_path);\n        assert!(result.is_ok());\n        let (config, _) = result.unwrap();\n        assert!(config.has_enabled_channel());\n    }\n}\n","traces":[{"line":32,"address":[14437377,14437383,14436864],"length":1,"stats":{"Line":0}},{"line":35,"address":[14436938],"length":1,"stats":{"Line":0}},{"line":37,"address":[14436978],"len ield(\"debounce\", \u0026self.debounce)\n            .finish()\n    }\n}\n\nimpl WorkflowWatcher {\n    pub fn new(path: impl Into\u003cPathBuf\u003e) -\u003e Self {\n        WorkflowWatcher {\n            path: path.into(),\n            watcher: Arc::new(Mutex::new(None)),\n            receiver: Arc::new(Mutex::new(None)),\n            running: false,\n            debounce: Duration::from_millis(300),\n        }\n    }\n\n    pub fn start(\u0026mut self) -\u003e Result\u003c(), NuClawError\u003e {\n        if self.running {\n            return Ok(());\n        }\n\n        let path = self.path.clone();\n        let (tx, rx) = channel();\n\n        let mut watcher = RecommendedWatcher::new(\n            move |res: std::result::Result\u003cEvent, NotifyError\u003e| {\n                let _ = tx.send(res);\n            },\n            Config::default().with_poll_interval(self.debounce),\n        )\n        .map_err(|e| NuClawError::FileSystem {\n            message: format!(\"Failed to create watcher: {}\", e),\n        })?;\n\n        watcher\n            .watch(\u0026path, RecursiveMode::NonRecursive)\n            .map_err(|e| NuClawError::FileSystem {\n                message: format!(\"Failed to watch path: {}\", e),\n            })?;\n\n        let mut watcher_guard = self.watcher.lock().map_err(|e| NuClawError::FileSystem {\n            message: format!(\"Failed to lock watcher: {}\", e),\n        })?;\n        *watcher_guard = Some(watcher);\n\n        let mut receiver_guard = self.receiver.lock().map_err(|e| NuClawError::FileSystem {\n            message: format!(\"Failed to lock receiver: {}\", e),\n        })?;\n        *receiver_guard = Some(rx);\n        self.running = true;\n        Ok(())\n    }\n\n    pub fn stop(\u0026mut self) -\u003e Result\u003c(), NuClawError\u003e {\n        if let Ok(mut guard) = self.watcher.lock() {\n            if let Some(ref mut w) = *guard {\n                let _ = w.unwatch(\u0026self.path);\n            }\n            *guard = None;\n        }\n        if let Ok(mut guard) = self.receiver.lock() {\n            *guard = None;\n        }\n        self.running = false;\n        Ok(())\n    }\n\n    pub fn is_running(\u0026self) -\u003e bool {\n        self.running\n    }\n\n    pub fn watch_path(\u0026self) -\u003e \u0026Path {\n        \u0026self.path\n    }\n\n    pub fn poll_events(\u0026self) -\u003e Vec\u003cWatchEvent\u003e {\n        let mut events = Vec::new();\n\n        if let Ok(guard) = self.receiver.lock() {\n            if let Some(ref rx) = *guard {\n                while let Ok(Ok(event)) = rx.try_recv() {\n                    for path in event.paths {\n                        let watch_event = match event.kind {\n                            notify::EventKind::Create(_) =\u003e Some(WatchEvent::Created(path)),\n                            notify::EventKind::Modify(_) =\u003e Some(WatchEvent::Modified(path)),\n                            notify::EventKind::Remove(_) =\u003e Some(WatchEvent::Removed(path)),\n                            notify::EventKind::Any =\u003e {\n                                if path.exists() {\n                                    Some(WatchEvent::Modified(path))\n                                } else {\n                                    Some(WatchEvent::Removed(path))\n                                }\n                            }\n                            _ =\u003e None,\n                        };\n\n                        if let Some(we) = watch_event {\n                            events.push(we);\n                        }\n                    }\n                }\n            }\n        }\n\n        events\n    }\n\n    pub fn set_debounce_duration(\u0026mut self, duration: Duration) {\n        self.debounce = duration;\n    }\n}\n\nimpl Default for WorkflowWatcher {\n    fn default() -\u003e Self {\n        Self::new(\"WORKFLOW.md\")\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use std::path::PathBuf;\n\n    #[test]\n    fn test_watcher_new_creates_instance() {\n        let watcher = WorkflowWatcher::new(\"test.md\");\n        assert!(!watcher.is_running());\n    }\n\n    #[test]\n    fn test_watcher_with_path() {\n        let watcher = WorkflowWatcher::new(\"/path/to/workflow.md\");\n        assert_eq!(watcher.watch_path(), Path::new(\"/path/to/workflow.md\"));\n    }\n\n    #[test]\n    fn test_watcher_default_path() {\n        let watcher = WorkflowWatcher::default();\n        assert_eq!(watcher.watch_path(), Path::new(\"WORKFLOW.md\"));\n    }\n\n    #[test]\n    fn test_watcher_stop_clears_running() {\n        let mut watcher = WorkflowWatcher::new(\"test.md\");\n        let _ = watcher.stop();\n        assert!(!watcher.running);\n    }\n\n    #[test]\n    fn test_watcher_poll_events_returns_empty_initially() {\n        let watcher = WorkflowWatcher::new(\"test.md\");\n        let events = watcher.poll_events();\n        assert!(events.is_empty());\n    }\n\n    #[test]\n    fn test_watcher_set_debounce_duration() {\n        let mut watcher = WorkflowWatcher::new(\"test.md\");\n        watcher.set_debounce_duration(Duration::from_millis(500));\n    }\n\n    #[test]\n    fn test_watch_event_modified() {\n        let event = WatchEvent::Modified(PathBuf::from(\"test.md\"));\n        match event {\n            WatchEvent::Modified(p) =\u003e assert_eq!(p, PathBuf::from(\"test.md\")),\n            _ =\u003e panic!(\"Expected Modified event\"),\n        }\n    }\n\n    #[test]\n    fn test_watch_event_created() {\n        let event = WatchEvent::Created(PathBuf::from(\"new.md\"));\n        match event {\n            WatchEvent::Created(p) =\u003e assert_eq!(p, PathBuf::from(\"new.md\")),\n            _ =\u003e panic!(\"Expected Created event\"),\n        }\n    }\n\n    #[test]\n    fn test_watch_event_removed() {\n        let event = WatchEvent::Removed(PathBuf::from(\"deleted.md\"));\n        match event {\n            WatchEvent::Removed(p) =\u003e assert_eq!(p, PathBuf::from(\"deleted.md\")),\n            _ =\u003e panic!(\"Expected Removed event\"),\n        }\n    }\n\n    #[test]\n    fn test_watcher_clone_is_independent() {\n        let watcher1 = WorkflowWatcher::new(\"test.md\");\n        let watcher2 = watcher1.clone();\n        assert!(!watcher2.running);\n    }\n\n    #[test]\n    fn test_watcher_debug_format() {\n        let watcher = WorkflowWatcher::new(\"test.md\");\n        let debug_str = format!(\"{:?}\", watcher);\n        assert!(debug_str.contains(\"WorkflowWatcher\"));\n    }\n\n    #[test]\n    fn test_watcher_path_conversion() {\n        let watcher = WorkflowWatcher::new(\"workflow.md\");\n        let path = watcher.watch_path();\n        assert_eq!(path.to_string_lossy(), \"workflow.md\");\n    }\n\n    #[test]\n    fn test_watcher_default_debounce() {\n        let watcher = WorkflowWatcher::new(\"test.md\");\n        assert_eq!(watcher.debounce, Duration::from_millis(300));\n    }\n\n    #[test]\n    fn test_watcher_clone_preserves_path() {\n        let watcher1 = WorkflowWatcher::new(\"test.md\");\n        let watcher2 = watcher1.clone();\n        assert_eq!(watcher1.watch_path(), watcher2.watch_path());\n    }\n\n    #[test]\n    fn test_watcher_start_stop_idempotent() {\n        let mut watcher = WorkflowWatcher::new(\"test.md\");\n        let _ = watcher.stop();\n        assert!(!watcher.is_running());\n        let _ = watcher.stop();\n        assert!(!watcher.is_running());\n    }\n}\n","traces":[{"line":35,"address":[14725120,14725359,14725365],"length":1,"stats":{"Line":0}},{"line":37,"address":[14725149],"length":1,"stats":{"Line":0}},{"line":38,"address":[14725159,14725220],"length":1,"stats":{"Line":0}},{"line":39,"address":[14725225],"length":1,"stats":{"Line":0}},{"line":40,"address":[14725289],"length":1,"stats":{"Line":0}},{"line":41,"address":[14725293],"length":1,"stats":{"Line":0}},{"line":47,"address":[14724944],"length":1,"stats":{"Line":0}},{"line":48,"address":[14724962],"length":1,"s oin(\"workspaces\")\n            });\n\n        let path = base_dir.join(\u0026id);\n\n        if let Err(e) = std::fs::create_dir_all(\u0026path) {\n            return Err(NuClawError::FileSystem {\n                message: format!(\"Failed to create workspace directory: {}\", e),\n            });\n        }\n\n        Ok(Workspace {\n            id,\n            name: name.to_string(),\n            path,\n            created_at: Utc::now(),\n            session_id: None,\n            active: true,\n        })\n    }\n\n    pub fn create_with_session(name: \u0026str, session_id: \u0026str) -\u003e Result\u003cSelf\u003e {\n        let mut ws = Self::create(name)?;\n        ws.session_id = Some(session_id.to_string());\n        Ok(ws)\n    }\n\n    pub fn path(\u0026self) -\u003e \u0026Path {\n        \u0026self.path\n    }\n\n    pub fn exists(\u0026self) -\u003e bool {\n        self.path.exists() \u0026\u0026 self.path.is_dir()\n    }\n\n    pub fn cleanup(\u0026mut self) -\u003e Result\u003c()\u003e {\n        if self.path.exists() {\n            std::fs::remove_dir_all(\u0026self.path).map_err(|e| NuClawError::FileSystem {\n                message: format!(\"Failed to cleanup workspace: {}\", e),\n            })?;\n        }\n        self.active = false;\n        Ok(())\n    }\n\n    pub fn deactivate(\u0026mut self) {\n        self.active = false;\n    }\n\n    pub fn activate(\u0026mut self) {\n        self.active = true;\n    }\n\n    pub fn metadata(\u0026self) -\u003e WorkspaceMetadata {\n        let file_count = if self.path.exists() {\n            match std::fs::read_dir(\u0026self.path) {\n                Ok(entries) =\u003e entries.count(),\n                Err(e) =\u003e {\n                    warn!(\"Failed to read directory {}: {}\", self.path.display(), e);\n                    0\n                }\n            }\n        } else {\n            0\n        };\n\n        WorkspaceMetadata {\n            workspace_id: self.id.clone(),\n            session_id: self.session_id.clone(),\n            created_at: self.created_at,\n            last_accessed: self.created_at,\n            file_count,\n        }\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use std::fs;\n    use tempfile::TempDir;\n\n    #[test]\n    fn test_workspace_create_generates_uuid() {\n        let ws = Workspace::create(\"test-workspace\").unwrap();\n        assert!(!ws.id.is_empty());\n        assert!(Uuid::parse_str(\u0026ws.id).is_ok());\n    }\n\n    #[test]\n    fn test_workspace_create_uses_name() {\n        let ws = Workspace::create(\"my-workspace\").unwrap();\n        assert_eq!(ws.name, \"my-workspace\");\n    }\n\n    #[test]\n    fn test_workspace_create_sets_created_at() {\n        let before = Utc::now();\n        let ws = Workspace::create(\"test\").unwrap();\n        let after = Utc::now();\n        assert!(ws.created_at \u003e= before \u0026\u0026 ws.created_at \u003c= after);\n    }\n\n    #[test]\n    fn test_workspace_create_defaults_to_active() {\n        let ws = Workspace::create(\"test\").unwrap();\n        assert!(ws.active);\n    }\n\n    #[test]\n    fn test_workspace_create_defaults_session_id_to_none() {\n        let ws = Workspace::create(\"test\").unwrap();\n        assert!(ws.session_id.is_none());\n    }\n\n    #[test]\n    fn test_workspace_create_with_session() {\n        let ws = Workspace::create_with_session(\"test\", \"session-123\").unwrap();\n        assert_eq!(ws.session_id, Some(\"session-123\".to_string()));\n    }\n\n    #[test]\n    fn test_workspace_create_with_session_preserves_name() {\n        let ws = Workspace::create_with_session(\"named\", \"s1\").unwrap();\n        assert_eq!(ws.name, \"named\");\n    }\n\n    #[test]\n    fn test_workspace_create_with_session_generates_unique_id() {\n        let ws1 = Workspace::create_with_session(\"test\", \"s1\").unwrap();\n        let ws2 = Workspace::create_with_session(\"test\", \"s1\").unwrap();\n        assert_ne!(ws1.id, ws2.id);\n    }\n\n    #[test]\n    fn test_workspace_create_with_empty_session_id() {\n        let ws = Workspace::create_with_session(\"test\", \"\").unwrap();\n        assert_eq!(ws.session_id, Some(\"\".to_string()));\n    }\n\n    #[test]\n    fn test_workspace_create_with_special_chars_in_name() {\n        let ws = Workspace::create(\"test-workspace_123\").unwrap();\n        assert_eq!(ws.name, \"test-workspace_123\");\n    }\n\n    #[test]\n    fn test_workspace_path_returns_pathbuf() {\n        let ws = Workspace::create(\"test\").unwrap();\n        let path = ws.path();\n        assert!(path.is_relative() || path.is_absolute());\n    }\n\n    #[test]\n    fn test_workspace_path_contains_workspace_id() {\n        let ws = Workspace::create(\"test\").unwrap();\n        let path_str = ws.path().to_string_lossy();\n        assert!(path_str.contains(\u0026ws.id));\n    }\n\n    #[test]\n    fn test_workspace_exists_returns_false_for_new_workspace() {\n        let ws = Workspace::create(\"nonexistent-test\").unwrap();\n        assert!(ws.exists());\n    }\n\n    #[test]\n    fn test_workspace_exists_returns_true_after_create() {\n        let temp_dir = TempDir::new().unwrap();\n        let name = \"existing-workspace\";\n        let ws = Workspace::create(name).unwrap();\n\n        let ws_path = temp_dir.path().join(name);\n        fs::create_dir_all(\u0026ws_path).unwrap();\n\n        assert!(ws_path.exists());\n    }\n\n    #[test]\n    fn test_workspace_path_is_valid_utf8() {\n        let ws = Workspace::create(\"test\").unwrap();\n        let path_str = ws.path().to_string_lossy();\n        assert!(path_str.chars().all(|c| c.is_ascii()\n            || c.is_alphanumeric()\n            || c == '-'\n            || c == '_'\n            || c == '/'));\n    }\n\n    #[test]\n    fn test_workspace_deactivate_sets_active_false() {\n        let mut ws = Workspace::create(\"test\").unwrap();\n        assert!(ws.active);\n        ws.deactivate();\n        assert!(!ws.active);\n    }\n\n    #[test]\n    fn test_workspace_activate_sets_active_true() {\n        let mut ws = Workspace::create(\"test\").unwrap();\n        ws.deactivate();\n        assert!(!ws.active);\n        ws.activate();\n        assert!(ws.active);\n    }\n\n    #[test]\n    fn test_workspace_cleanup_on_new_workspace_returns_ok() {\n        let mut ws = Workspace::create(\"cleanup-test\").unwrap();\n        let result = ws.cleanup();\n        assert!(result.is_ok());\n    }\n\n    #[test]\n    fn test_workspace_cleanup_removes_existing_directory() {\n        let mut ws = Workspace::create(\"cleanup-existing\").unwrap();\n        assert!(ws.exists());\n        let _ = ws.cleanup();\n        assert!(!ws.exists());\n    }\n\n    #[test]\n    fn test_workspace_deactivate_activate_toggle() {\n        let mut ws = Workspace::create(\"toggle-test\").unwrap();\n        assert!(ws.active);\n        ws.deactivate();\n        assert!(!ws.active);\n        ws.deactivate();\n        assert!(!ws.active);\n        ws.activate();\n        assert!(ws.active);\n        ws.activate();\n        assert!(ws.active);\n    }\n\n    #[test]\n    fn test_workspace_metadata_contains_id() {\n        let ws = Workspace::create(\"test\").unwrap();\n        let meta = ws.metadata();\n        assert_eq!(meta.workspace_id, ws.id);\n    }\n\n    #[test]\n    fn test_workspace_metadata_contains_session_id() {\n        let ws = Workspace::create_with_session(\"test\", \"session-456\").unwrap();\n        let meta = ws.metadata();\n        assert_eq!(meta.session_id, Some(\"session-456\".to_string()));\n    }\n\n    #[test]\n    fn test_workspace_metadata_contains_created_at() {\n        let ws = Workspace::create(\"test\").unwrap();\n        let meta = ws.metadata();\n        assert!(meta.created_at \u003c= Utc::now());\n    }\n\n    #[test]\n    fn test_workspace_metadata_last_accessed_initially_same_as_created() {\n        let ws = Workspace::create(\"test\").unwrap();\n        let meta = ws.metadata();\n        assert_eq!(meta.created_at, meta.last_accessed);\n    }\n\n    #[test]\n    fn test_workspace_metadata_default_file_count_zero() {\n        let ws = Workspace::create(\"test\").unwrap();\n        let meta = ws.metadata();\n        assert_eq!(meta.file_count, 0);\n    }\n\n    #[test]\n    fn test_workspace_create_with_empty_name() {\n        let result = Workspace::create(\"\");\n        if result.is_ok() {\n            assert_eq!(result.unwrap().name, \"\");\n        }\n    }\n\n    #[test]\n    fn test_workspace_create_unicode_name() {\n        let ws = Workspace::create(\"工作区\").unwrap();\n        assert_eq!(ws.name, \"工作区\");\n    }\n\n    #[test]\n    fn test_workspace_multiple_instances_independent() {\n        let ws1 = Workspace::create(\"ws1\").unwrap();\n        let ws2 = Workspace::create(\"ws2\").unwrap();\n        assert_ne!(ws1.id, ws2.id);\n        assert_ne!(ws1.name, ws2.name);\n    }\n\n    #[test]\n    fn test_workspace_clone_is_independent() {\n        let mut ws1 = Workspace::create(\"original\").unwrap();\n        let ws2 = ws1.clone();\n        ws1.deactivate();\n        assert!(!ws1.active);\n        assert!(ws2.active);\n    }\n\n    #[test]\n    fn test_workspace_serialize_deserialize() {\n        let ws1 = Workspace::create(\"serialize-test\").unwrap();\n        let json = serde_json::to_string(\u0026ws1).unwrap();\n        let ws2: Workspace = serde_json::from_str(\u0026json).unwrap();\n        assert_eq!(ws1.id, ws2.id);\n        assert_eq!(ws1.name, ws2.name);\n        assert_eq!(ws1.active, ws2.active);\n    }\n}\n","traces":[{"line":34,"address":[15813623,15814132,15812736],"length":1,"stats":{"Line":0}},{"line":35,"address":[15812779],"length":1,"stats":{"Line":0}},{"line":36,"address":[15812841],"length":1,"stats":{"Line":0}},{"line":37,"address":[15812929],"length":1,"stats":{"Line":0}},{"line":38,"address":[14871168,14871523],"length":1,"stats":{"Line":0}},{"line":39,"address":[14871190,14871375,14871276],"length":1,"stats":{ E Tests\n    // =========================================================================\n\n    #[test]\n    fn test_full_configuration_loading() {\n        // Setup\n        config::ensure_directories().expect(\"Failed to create directories\");\n\n        // Test all config functions work together\n        let home = config::nuclaw_home();\n        assert!(home.exists());\n\n        let store = config::store_dir();\n        assert!(store.exists());\n\n        let data = config::data_dir();\n        assert!(data.exists());\n\n        let groups = config::groups_dir();\n        assert!(groups.exists());\n\n        let logs = config::logs_dir();\n        assert!(logs.exists());\n    }\n\n    #[test]\n    fn test_configuration_persistence() {\n        // Create a test config file\n        let config_path = config::data_dir().join(\"test_config.json\");\n        let test_config = serde_json::json!({\n            \"test_key\": \"test_value\",\n            \"nested\": {\"inner\": 42}\n        });\n\n        save_json(\u0026config_path, \u0026test_config).expect(\"Failed to save config\");\n        assert!(config_path.exists());\n\n        // Load and verify\n        let loaded: serde_json::Value = load_json(\u0026config_path, serde_json::json!({}));\n        assert_eq!(loaded[\"test_key\"], \"test_value\");\n        assert_eq!(loaded[\"nested\"][\"inner\"], 42);\n\n        // Cleanup\n        let _ = fs::remove_file(\u0026config_path);\n    }\n\n    // =========================================================================\n    // Provider Registry E2E Tests\n    // =========================================================================\n\n    #[test]\n    fn test_provider_registry_workflow() {\n        // Setup\n        std::env::remove_var(\"ANTHROPIC_API_KEY\");\n        std::env::remove_var(\"OPENAI_API_KEY\");\n\n        let registry = provider_registry();\n\n        // Test provider detection\n        let detected = registry.detect_provider();\n        assert!(\n            detected.is_none(),\n            \"No provider should be detected without API keys\"\n        );\n\n        // Register a test provider (using existing anthropic)\n        std::env::set_var(\"ANTHROPIC_API_KEY\", \"test-key-12345\");\n        let detected = registry.detect_provider();\n        assert_eq!(detected, Some(\"anthropic\".to_string()));\n\n        // Verify config loading\n        let config = registry.load_config(\"anthropic\");\n        assert!(config.is_some());\n        assert!(config.unwrap().is_configured());\n\n        // Cleanup\n        std::env::remove_var(\"ANTHROPIC_API_KEY\");\n    }\n\n    #[test]\n    fn test_provider_config_loading() {\n        // Setup environment\n        std::env::remove_var(\"ANTHROPIC_API_KEY\");\n        std::env::remove_var(\"CLAUDE_MODEL\");\n\n        // Test without API key\n        let registry = provider_registry();\n        let config = registry.load_config(\"anthropic\");\n        assert!(config.is_some());\n        assert!(!config.unwrap().is_configured());\n\n        // Test with API key\n        std::env::set_var(\"ANTHROPIC_API_KEY\", \"test-key\");\n        let registry = provider_registry();\n        let config = registry.load_config(\"anthropic\");\n        assert!(config.unwrap().is_configured());\n\n        // Test model override\n        std::env::set_var(\"CLAUDE_MODEL\", \"claude-3-opus-20240229\");\n        let registry = provider_registry();\n        let config = registry.load_config(\"anthropic\");\n        assert_eq!(\n            config.unwrap().model,\n            Some(\"claude-3-opus-20240229\".to_string())\n        );\n\n        // Cleanup\n        std::env::remove_var(\"ANTHROPIC_API_KEY\");\n        std::env::remove_var(\"CLAUDE_MODEL\");\n    }\n\n    // =========================================================================\n    // Skills Registry E2E Tests\n    // =========================================================================\n\n    #[test]\n    fn test_skills_workflow() {\n        let skills: \u0026dyn SkillRegistry = \u0026builtin_skills();\n\n        // Verify all built-in skills exist\n        let github = skills.get(\"github\");\n        assert!(github.is_some());\n        assert_eq!(github.unwrap().name, \"github\");\n\n        let weather = skills.get(\"weather\");\n        assert!(weather.is_some());\n\n        let web_search = skills.get(\"web-search\");\n        assert!(web_search.is_some());\n\n        let memory = skills.get(\"memory\");\n        assert!(memory.is_some());\n\n        // Test skill listing\n        let names = skills.names();\n        assert!(names.len() \u003e= 4);\n        assert!(names.contains(\u0026\"github\".to_string()));\n\n        // Test skill content\n        let github = skills.get(\"github\").unwrap();\n        assert!(github.content.contains(\"GitHub\"));\n        assert!(github.description.contains(\"GitHub\"));\n    }\n\n    #[test]\n    fn test_skill_registration_workflow() {\n        use nuclaw::skills::{BuiltinSkillRegistry, Skill};\n\n        let mut registry = BuiltinSkillRegistry::new();\n\n        // Register custom skill\n        let custom = Skill::new(\n            \"custom_test\",\n            \"A custom test skill\",\n            \"You are a test assistant.\",\n        );\n        registry.register(custom);\n\n        // Verify registration - use the trait object\n        let registry: \u0026dyn SkillRegistry = \u0026registry;\n        let retrieved = registry.get(\"custom_test\");\n        assert!(retrieved.is_some());\n        assert_eq!(retrieved.unwrap().name, \"custom_test\");\n    }\n\n    // =========================================================================\n    // Channel Registry E2E Tests\n    // =========================================================================\n\n    #[test]\n    fn test_channel_registry_workflow() {\n        let registry = ChannelRegistry::new();\n\n        // Initially empty\n        assert!(registry.list().is_empty());\n\n        // Create a mock channel\n        struct TestChannel;\n\n        #[async_trait]\n        impl Channel for TestChannel {\n            fn name(\u0026self) -\u003e \u0026str {\n                \"test\"\n            }\n            async fn send(\u0026self, _jid: \u0026str, _msg: \u0026str) -\u003e Result\u003c()\u003e {\n                Ok(())\n            }\n            async fn start(\u0026self) -\u003e Result\u003c()\u003e {\n                Ok(())\n            }\n            fn is_enabled(\u0026self) -\u003e bool {\n                true\n            }\n        }\n\n        // Register channel\n        registry.register(TestChannel);\n\n        // Verify registration\n        assert!(registry.is_registered(\"test\"));\n        assert!(registry.is_enabled(\"test\"));\n\n        let channels = registry.list();\n        assert_eq!(channels.len(), 1);\n        assert!(channels.contains(\u0026\"test\".to_string()));\n    }\n\n    // =========================================================================\n    // Database E2E Tests\n    // =========================================================================\n\n    #[test]\n    fn test_database_full_workflow() {\n        config::ensure_directories().expect(\"Failed to create directories\");\n        let db = Database::new().expect(\"Failed to create database\");\n\n        // Test connection\n        let conn = db.get_connection().expect(\"Failed to get connection\");\n\n        // Test transaction\n        let mut conn = conn; // Make mutable for transaction\n        let tx = conn.transaction().expect(\"Failed to begin transaction\");\n\n        // Insert test data\n        tx.execute(\n            \"INSERT INTO messages (id, chat_jid, sender, sender_name, content, timestamp, is_from_me)\n             VALUES (?, ?, ?, ?, ?, ?, ?)\",\n            rusqlite::params![\n                \"e2e_test_1\",\n                \"test@chat\",\n                \"user1\",\n                \"Test User\",\n                \"Test message\",\n                \"2025-01-01T00:00:00Z\",\n                0\n            ],\n        ).expect(\"Failed to insert message\");\n\n        // Query and verify\n        let content: String = tx\n            .query_row(\n                \"SELECT content FROM messages WHERE id = ?\",\n                [\"e2e_test_1\"],\n                |row| row.get(0),\n            )\n            .expect(\"Failed to query message\");\n\n        assert_eq!(content, \"Test message\");\n\n        // Rollback (test transaction)\n        tx.rollback().expect(\"Failed to rollback\");\n\n        // Verify rollback\n        let count: i64 = conn\n            .query_row(\n                \"SELECT COUNT(*) FROM messages WHERE id = ?\",\n                [\"e2e_test_1\"],\n                |row| row.get(0),\n            )\n            .expect(\"Failed to count\");\n\n        assert_eq!(count, 0);\n    }\n\n    #[test]\n    fn test_database_concurrent_operations() {\n        config::ensure_directories().expect(\"Failed to create directories\");\n        let db = Database::new().expect(\"Failed to create database\");\n\n        // Clean up any existing test data\n        let conn = db.get_connection().expect(\"Failed to get connection\");\n        let _ = conn.execute(\"DELETE FROM messages WHERE id LIKE 'concurrent_e2e_%'\", []);\n\n        // Insert multiple messages\n        for i in 0..5 {\n            let conn = db.get_connection().expect(\"Failed to get connection\");\n            conn.execute(\n                \"INSERT INTO messages (id, chat_jid, sender, sender_name, content, timestamp, is_from_me)\n                 VALUES (?, ?, ?, ?, ?, ?, ?)\",\n                rusqlite::params![\n                    format!(\"concurrent_e2e_{}\", i),\n                    \"test@chat\",\n                    \"user\",\n                    \"Test\",\n                    format!(\"Message {}\", i),\n                    \"2025-01-01T00:00:00Z\",\n                    0\n                ],\n            ).expect(\"Failed to insert message\");\n        }\n\n        // Verify all inserts succeeded\n        let conn = db.get_connection().expect(\"Failed to get connection\");\n        let count: i64 = conn\n            .query_row(\n                \"SELECT COUNT(*) FROM messages WHERE id LIKE 'concurrent_e2e_%'\",\n                [],\n                |row| row.get(0),\n            )\n            .expect(\"Failed to count\");\n\n        assert_eq!(count, 5);\n    }\n\n    // =========================================================================\n    // Task Scheduler E2E Tests\n    // =========================================================================\n\n    #[test]\n    fn test_task_scheduler_workflow() {\n        config::ensure_directories().expect(\"Failed to create directories\");\n\n        // Test poll interval\n        let interval = poll_interval();\n        assert_eq!(interval, Duration::from_secs(60));\n\n        // Test task timeout\n        let timeout = task_timeout();\n        assert_eq!(timeout, Duration::from_secs(600));\n\n        // Test cron parsing (using the full format with seconds)\n        assert!(parse_cron_expression(\"0 0 9 * * *\").is_ok()); // 6-field format\n        assert!(parse_cron_expression(\"0 0 0 1 * *\").is_ok()); // First day of month\n    }\n\n    #[test]\n    fn test_scheduled_task_creation() {\n        let task = ScheduledTask {\n            id: \"test_task_1\".to_string(),\n            group_folder: \"test_group\".to_string(),\n            chat_jid: \"test@chat\".to_string(),\n            prompt: \"Test prompt\".to_string(),\n            schedule_type: \"cron\".to_string(),\n            schedule_value: \"0 9 * * *\".to_string(),\n            context_mode: \"main\".to_string(),\n            next_run: None,\n            last_run: None,\n            last_result: None,\n            status: \"active\".to_string(),\n            created_at: \"2025-01-01T00:00:00Z\".to_string(),\n        };\n\n        assert_eq!(task.id, \"test_task_1\");\n        assert_eq!(task.schedule_value, \"0 9 * * *\");\n        assert_eq!(task.status, \"active\");\n    }\n\n    // =========================================================================\n    // Container Runner E2E Tests\n    // =========================================================================\n\n    #[test]\n    fn test_container_config_workflow() {\n        config::ensure_directories().expect(\"Failed to create directories\");\n\n        // Test group IPC directory creation\n        let ipc_dir =\n            create_group_ipc_directory(\"test_group_e2e\").expect(\"Failed to create IPC directory\");\n\n        assert!(ipc_dir.exists());\n        assert!(ipc_dir.to_string_lossy().contains(\"test_group_e2e\"));\n\n        // Test file creation in IPC directory\n        let test_file = ipc_dir.join(\"test.json\");\n        save_json(\u0026test_file, \u0026serde_json::json!({\"test\": true}))\n            .expect(\"Failed to save test file\");\n\n        assert!(test_file.exists());\n\n        // Load and verify\n        let loaded: serde_json::Value = load_json(\u0026test_file, serde_json::json!({}));\n        assert_eq!(loaded[\"test\"], true);\n\n        // Cleanup\n        let _ = fs::remove_dir_all(\u0026ipc_dir);\n    }\n\n    #[test]\n    fn test_max_output_size_config() {\n        // Test default\n        let size = max_output_size();\n        assert_eq!(size, 10 * 1024 * 1024); // 10MB\n\n        // Environment variable is handled at module init, so we test the default\n        // In real scenario, this would be set before initialization\n    }\n\n    // =========================================================================\n    // Message Processing E2E Tests\n    // =========================================================================\n\n    #[test]\n    fn test_message_processing_workflow() {\n        // Create a test message\n        let message = NewMessage {\n            id: \"test_msg_e2e\".to_string(),\n            chat_jid: \"telegram:group:123456\".to_string(),\n            sender: \"user123\".to_string(),\n            sender_name: \"Test User\".to_string(),\n            content: \"Hello, this is a test message\".to_string(),\n            timestamp: \"2025-01-01T12:00:00Z\".to_string(),\n        };\n\n        // Verify message structure\n        assert_eq!(message.id, \"test_msg_e2e\");\n        assert!(message.chat_jid.starts_with(\"telegram:group:\"));\n        assert!(!message.content.is_empty());\n    }\n\n    #[test]\n    fn test_container_input_workflow() {\n        let input = ContainerInput {\n            prompt: \"Test prompt\".to_string(),\n            session_id: Some(\"session_123\".to_string()),\n            group_folder: \"test_group\".to_string(),\n            chat_jid: \"test@chat\".to_string(),\n            is_main: true,\n            is_scheduled_task: false,\n        };\n\n        assert_eq!(input.prompt, \"Test prompt\");\n        assert!(input.session_id.is_some());\n        assert!(input.is_main);\n    }\n\n    // =========================================================================\n    // Telegram E2E Tests\n    // =========================================================================\n\n    #[test]\n    fn test_telegram_message_chunking() {\n        // Test short message (no chunking)\n        let short = \"Short message\";\n        let chunks = chunk_text_pure(short, 4000);\n        assert_eq!(chunks.len(), 1);\n\n        // Test long message (chunking)\n        let long = \"a\".repeat(8000);\n        let chunks = chunk_text_pure(\u0026long, 4000);\n        assert!(chunks.len() \u003e 1);\n\n        // Test with newlines\n        let with_newlines = \"Para1\\n\\nPara2\\n\\nPara3\";\n        let chunks = chunk_text_pure(with_newlines, 100);\n        assert!(chunks.len() \u003e= 1);\n\n        // Test advanced chunking with newline mode\n        let chunks = chunk_text_advanced(with_newlines, 50, ChunkMode::Newline);\n        for chunk in \u0026chunks {\n            assert!(chunk.len() \u003c= 50);\n        }\n    }\n\n    #[test]\n    fn test_telegram_policy_parsing() {\n        // DM Policy\n        assert_eq!(DMPolicy::parse(\"pairing\"), DMPolicy::Pairing);\n        assert_eq!(DMPolicy::parse(\"allowlist\"), DMPolicy::Allowlist);\n        assert_eq!(DMPolicy::parse(\"open\"), DMPolicy::Open);\n        assert_eq!(DMPolicy::parse(\"disabled\"), DMPolicy::Disabled);\n\n        // Group Policy\n        assert_eq!(GroupPolicy::parse(\"open\"), GroupPolicy::Open);\n        assert_eq!(GroupPolicy::parse(\"allowlist\"), GroupPolicy::Allowlist);\n        assert_eq!(GroupPolicy::parse(\"disabled\"), GroupPolicy::Disabled);\n    }\n\n    // =========================================================================\n    // Error Handling E2E Tests\n    // =========================================================================\n\n    #[test]\n    fn test_error_propagation_workflow() {\n        use nuclaw::error::NuClawError;\n\n        // Test error creation\n        let config_err = NuClawError::Config {\n            message: \"Test config error\".to_string(),\n        };\n        assert!(format!(\"{}\", config_err).contains(\"Config\"));\n\n        let db_err = NuClawError::Database {\n            message: \"Test DB error\".to_string(),\n        };\n        assert!(format!(\"{}\", db_err).contains(\"Database\"));\n\n        let api_err = NuClawError::Api {\n            message: \"Test API error\".to_string(),\n        };\n        assert!(format!(\"{}\", api_err).contains(\"API\"));\n    }\n\n    // =========================================================================\n    // Session Management E2E Tests\n    // =========================================================================\n\n    #[test]\n    fn test_session_workflow() {\n        let session = Session::new();\n\n        assert!(session.is_empty());\n        assert_eq!(session.len(), 0);\n    }\n\n    // =========================================================================\n    // Agent Runner E2E Tests\n    // =========================================================================\n\n    #[test]\n    fn test_agent_runner_mode_switching() {\n        // Test default mode (container)\n        std::env::remove_var(\"AGENT_RUNNER_MODE\");\n        let runner = create_runner();\n        // Runner creation may fail if config is missing, but mode should work\n        // This tests the configuration aspect\n\n        // Test API mode (should require API key)\n        std::env::set_var(\"AGENT_RUNNER_MODE\", \"api\");\n        // Without API key, creation will fail\n\n        // Cleanup\n        std::env::remove_var(\"AGENT_RUNNER_MODE\");\n    }\n\n    // =========================================================================\n    // Type Serialization E2E Tests\n    // =========================================================================\n\n    #[test]\n    fn test_type_serialization_roundtrip() {\n        use nuclaw::types::{ContainerInput, ContainerOutput, NewMessage};\n\n        // Test NewMessage serialization\n        let msg = NewMessage {\n            id: \"serialize_test\".to_string(),\n            chat_jid: \"test@chat\".to_string(),\n            sender: \"user\".to_string(),\n            sender_name: \"Test User\".to_string(),\n            content: \"Test content\".to_string(),\n            timestamp: \"2025-01-01T00:00:00Z\".to_string(),\n        };\n\n        let json = serde_json::to_string(\u0026msg).expect(\"Failed to serialize\");\n        let loaded: NewMessage = serde_json::from_str(\u0026json).expect(\"Failed to deserialize\");\n\n        assert_eq!(msg.id, loaded.id);\n        assert_eq!(msg.content, loaded.content);\n\n        // Test ContainerInput serialization\n        let input = ContainerInput {\n            prompt: \"Test prompt\".to_string(),\n            session_id: Some(\"sess_123\".to_string()),\n            group_folder: \"test_group\".to_string(),\n            chat_jid: \"test@chat\".to_string(),\n            is_main: true,\n            is_scheduled_task: false,\n        };\n\n        let json = serde_json::to_string(\u0026input).expect(\"Failed to serialize\");\n        let loaded: ContainerInput = serde_json::from_str(\u0026json).expect(\"Failed to deserialize\");\n\n        assert_eq!(input.prompt, loaded.prompt);\n        assert_eq!(input.group_folder, loaded.group_folder);\n    }\n}\n\n// =========================================================================\n// Performance Tests\n// =========================================================================\n\n#[cfg(test)]\nmod performance_tests {\n    use super::*;\n    use std::time::Instant;\n\n    #[test]\n    fn test_json_serialization_performance() {\n        let data = serde_json::json!({\n            \"messages\": (0..100).map(|i| {\n                serde_json::json!({\n                    \"id\": format!(\"msg_{}\", i),\n                    \"content\": format!(\"Test message {}\", i),\n                    \"sender\": \"user\"\n                })\n            }).collect::\u003cVec\u003c_\u003e\u003e()\n        });\n\n        let iterations = 100;\n        let start = Instant::now();\n\n        for _ in 0..iterations {\n            let json = serde_json::to_string(\u0026data).unwrap();\n            let _: serde_json::Value = serde_json::from_str(\u0026json).unwrap();\n        }\n\n        let elapsed = start.elapsed();\n        let avg_ms = elapsed.as_millis() as f64 / iterations as f64;\n\n        // Should complete in reasonable time (less than 10ms average)\n        assert!(\n            avg_ms \u003c 10.0,\n            \"JSON serialization took {}ms average\",\n            avg_ms\n        );\n    }\n\n    #[test]\n    fn test_path_operations_performance() {\n        let iterations = 1000;\n        let start = Instant::now();\n\n        for i in 0..iterations {\n            let path = config::data_dir().join(format!(\"test_{}.json\", i));\n            let _ = path.to_string_lossy().to_string();\n        }\n\n        let elapsed = start.elapsed();\n        let avg_ns = elapsed.as_nanos() as f64 / iterations as f64;\n\n        // Should be reasonably fast (less than 5000ns average on most systems)\n        assert!(avg_ns \u003c 5000.0, \"Path operations took {}ns average\", avg_ns);\n    }\n\n    // =========================================================================\n    // Onboard E2E Tests\n    // =========================================================================\n\n    #[test]\n    fn test_onboard_env_file_format() {\n        use nuclaw::onboard::{env_file_path, load_config, save_config, OnboardConfig};\n\n        // Setup test environment\n        std::env::remove_var(\"NUCLAW_HOME\");\n        std::env::set_var(\"NUCLAW_HOME\", \"/tmp/nuclaw_onboard_test\");\n        let _ = fs::remove_dir_all(\"/tmp/nuclaw_onboard_test\");\n\n        // Save a complete config\n        let config = OnboardConfig {\n            provider: Some(\"anthropic\".to_string()),\n            api_key: Some(\"sk-ant-test-key-123\".to_string()),\n            base_url: Some(\"https://api.anthropic.com\".to_string()),\n            telegram_token: Some(\"123456:ABC-DEF-test-token\".to_string()),\n        };\n\n        save_config(\u0026config).expect(\"Failed to save config\");\n\n        // Verify file exists and has correct format\n        let env_path = env_file_path();\n        assert!(env_path.exists(), \"Env file should exist\");\n\n        let content = fs::read_to_string(\u0026env_path).expect(\"Failed to read env file\");\n\n        // Verify content contains expected keys\n        assert!(content.contains(\"ANTHROPIC_API_KEY=sk-ant-test-key-123\"));\n        assert!(content.contains(\"ANTHROPIC_BASE_URL=https://api.anthropic.com\"));\n        assert!(content.contains(\"TELEGRAM_BOT_TOKEN=123456:ABC-DEF-test-token\"));\n\n        // Verify header\n        assert!(content.contains(\"# NuClaw Configuration\"));\n        assert!(content.contains(\"# Generated by onboard wizard\"));\n\n        // Cleanup\n        let _ = fs::remove_dir_all(\"/tmp/nuclaw_onboard_test\");\n    }\n\n    #[test]\n    fn test_onboard_partial_config() {\n        use nuclaw::onboard::{env_file_path, load_config, save_config, OnboardConfig};\n\n        // Setup test environment\n        std::env::remove_var(\"NUCLAW_HOME\");\n        std::env::set_var(\"NUCLAW_HOME\", \"/tmp/nuclaw_onboard_test2\");\n        let _ = fs::remove_dir_all(\"/tmp/nuclaw_onboard_test2\");\n\n        // Save only API key (no base URL, no telegram)\n        let config = OnboardConfig {\n            provider: Some(\"openai\".to_string()),\n            api_key: Some(\"sk-openai-only-key\".to_string()),\n            base_url: None,\n            telegram_token: None,\n        };\n\n        save_config(\u0026config).expect(\"Failed to save config\");\n\n        // Verify file exists\n        let env_path = env_file_path();\n        assert!(env_path.exists());\n\n        let content = fs::read_to_string(\u0026env_path).expect(\"Failed to read env file\");\n\n        // Should contain API key\n        assert!(content.contains(\"OPENAI_API_KEY=sk-openai-only-key\"));\n\n        // Should NOT contain Telegram (not configured)\n        assert!(!content.contains(\"TELEGRAM_BOT_TOKEN\"));\n\n        // Load and verify\n        let loaded = load_config().expect(\"Failed to load config\");\n        assert_eq!(loaded.provider, Some(\"openai\".to_string()));\n        assert_eq!(loaded.api_key, Some(\"sk-openai-only-key\".to_string()));\n        assert!(loaded.base_url.is_none());\n        assert!(loaded.telegram_token.is_none());\n\n        // Cleanup\n        let _ = fs::remove_dir_all(\"/tmp/nuclaw_onboard_test2\");\n    }\n\n    #[test]\n    fn test_onboard_telegram_only() {\n        use nuclaw::onboard::{env_file_path, load_config, save_config, OnboardConfig};\n\n        // Setup test environment\n        std::env::remove_var(\"NUCLAW_HOME\");\n ve_var(\"NUCLAW_HOME\");\n        std::env::set_var(\"NUCLAW_HOME\", \"/tmp/nuclaw_does_not_exist_test\");\n        let _ = fs::remove_dir_all(\"/tmp/nuclaw_does_not_exist_test\");\n\n        // Loading from non-existent path should return empty config\n        let config = load_config();\n        assert!(config.is_ok());\n        assert!(!config.unwrap().has_any_config());\n    }\n\n    #[test]\n    fn test_onboard_config_persistence() {\n        use nuclaw::onboard::{env_file_path, load_config, save_config, OnboardConfig};\n\n        // Setup test environment\n        std::env::remove_var(\"NUCLAW_HOME\");\n        std::env::set_var(\"NUCLAW_HOME\", \"/tmp/nuclaw_onboard_test8\");\n        let _ = fs::remove_dir_all(\"/tmp/nuclaw_onboard_test8\");\n\n        // Save first config\n        let config1 = OnboardConfig {\n            provider: Some(\"anthropic\".to_string()),\n            api_key: Some(\"key1\".to_string()),\n            base_url: None,\n            telegram_token: None,\n        };\n        save_config(\u0026config1).expect(\"Failed to save config1\");\n\n        // Modify and save second config\n        let config2 = OnboardConfig {\n            provider: Some(\"openai\".to_string()),\n            api_key: Some(\"key2\".to_string()),\n            base_url: Some(\"https://api.openai.com/v1\".to_string()),\n            telegram_token: Some(\"tele2\".to_string()),\n        };\n        save_config(\u0026config2).expect(\"Failed to save config2\");\n\n        // Load and verify second config overwrote first\n        let loaded = load_config().expect(\"Failed to load config\");\n        assert_eq!(loaded.provider, Some(\"openai\".to_string()));\n        assert_eq!(loaded.api_key, Some(\"key2\".to_string()));\n        assert_eq!(loaded.telegram_token, Some(\"tele2\".to_string()));\n\n        // Cleanup\n        let _ = fs::remove_dir_all(\"/tmp/nuclaw_onboard_test8\");\n    }\n\n    #[test]\n    fn test_onboard_with_comments_in_env() {\n        use nuclaw: ig {\n                provider: Some(spec.name.to_string()),\n                api_key: Some(format!(\"test-key-for-{}\", spec.name)),\n                base_url: None,\n                telegram_token: None,\n            };\n            save_config(\u0026config).expect(\u0026format!(\"Failed to save config for {}\", spec.name));\n\n            // Verify provider registry can load it\n            let registry = provider_registry();\n            let provider_config = registry.load_config(spec.name);\n\n            assert!(\n                provider_config.is_some(),\n                \"Failed to load config for {}\",\n                spec.name\n            );\n            let pc = provider_config.unwrap();\n            assert!(\n                pc.is_configured(),\n                \"Provider {} should be configured\",\n                spec.name\n            );\n\n            // Clean up env var\n            std::env::remove_var(\u0026api_key_var);\n        }\n\n        // Cleanup\n        let _ = fs::remove_dir_all(\"/tmp/nuclaw_onboard_test10\");\n    }\n\n    #[test]\n    fn test_onboard_directory_creation() {\n        use nuclaw::onboard::{env_file_path, save_config, OnboardConfig};\n\n        // Setup test environment with deeply nested path\n        std::env::remove_var(\"NUCLAW_HOME\");\n        std::env::set_var(\"NUCLAW_HOME\", \"/tmp/deep/nested/nuclaw/path\");\n        let _ = fs::remove_dir_all(\"/tmp/deep/nested/nuclaw/path\");\n\n        // Save config - should create all parent directories\n        let config = OnboardConfig {\n            provider: Some(\"anthropic\".to_string()),\n            api_key: Some(\"sk-dir-test\".to_string()),\n            base_url: None,\n            telegram_token: None,\n        };\n\n        save_config(\u0026config).expect(\"Failed to save config\");\n\n        // Verify directory structure was created\n        let env_path = env_file_path();\n        assert!(env_path.exists());\n        assert!(env_path.parent().unwrap().exists());\n\n        // Cleanup\n        let _ = fs::remove_dir_all(\"/tmp/deep\");\n    }\n\n    #[test]\n    fn test_onboard_special_characters_in_token() {\n        use nuclaw::onboard::{env_file_path, load_config, save_config, OnboardConfig};\n\n        // Setup test environment\n        std::env::remove_var(\"NUCLAW_HOME\");\n        std::env::set_var(\"NUCLAW_HOME\", \"/tmp/nuclaw_onboard_test11\");\n        let _ = fs::remove_dir_all(\"/tmp/nuclaw_onboard_test11\");\n        let _ = fs::create_dir_all(\"/tmp/nuclaw_onboard_test11\");\n\n        // Save config with special characters that might appear in tokens\n        let config = OnboardConfig {\n            provider: Some(\"anthropic\".to_string()),\n            api_key: Some(\"sk-ant-test+special=chars\".to_string()),\n            base_url: Some(\"https://api.anthropic.com\".to_string()),\n            telegram_token: Some(\"123456:ABC-DEF_special+chars\".to_string()),\n        };\n\n        save_config(\u0026config).expect(\"Failed to save config\");\n\n        // Load and verify special characters are preserved\n        let loaded = load_config().expect(\"Failed to load config\");\n\n        assert_eq!(\n            loaded.api_key,\n            Some(\"sk-ant-test+special=chars\".to_string())\n        );\n        assert_eq!(\n            loaded.telegram_token,\n            Some(\"123456:ABC-DEF_special+chars\".to_string())\n        );\n\n        // Cleanup\n        let _ = fs::remove_dir_all(\"/tmp/nuclaw_onboard_test11\");\n    }\n\n    // =========================================================================\n    // Onboard Full Integration Tests (LLM + Telegram)\n    // =========================================================================\n\n    #[test]\n    fn test_onboard_llm_only_anthropic() {\n        use nuclaw::onboard::{env_file_path, load_config, save_config, OnboardConfig};\n\n        // Setup test environment\n        std::env::remove_var(\"NUCLAW_HOME\");\n        std::env::set_var(\"N
