et end_idx = content[3..]\n            .find(\"---\")\n            .ok_or(ProgramError::InvalidFormat)?;\n        let frontmatter = \u0026content[3..3 + end_idx];\n        let body = content[3 + end_idx + 3..].trim().to_string();\n\n        let mut name = \"autoresearch\".to_string();\n        let mut description = String::new();\n        let mut compatibility = None;\n        let mut platform = Platform::Auto;\n\n        for line in frontmatter.lines() {\n            let line = line.trim();\n            if let Some(s) = line.strip_prefix(\"name:\") {\n                name = s.trim().to_string();\n            } else if let Some(s) = line.strip_prefix(\"description:\") {\n                description = s.trim().to_string();\n            } else if let Some(s) = line.strip_prefix(\"compatibility:\") {\n                compatibility = Some(s.trim().to_string());\n            } else if let Some(s) = line.strip_prefix(\"platform:\") {\n                platform = match s.trim().to_lowercase().as_str() {\n                    \"cpu\" =\u003e Platform::Cpu,\n                    \"nvidia\" | \"gpu\" =\u003e Platform::Nvidia,\n                    \"mps\" | \"apple\" | \"macos\" =\u003e Platform::AmdMps,\n                    _ =\u003e Platform::Auto,\n                };\n            }\n        }\n\n        Ok(Self {\n            name,\n            description: if description.is_empty() {\n                \"Auto research program\".to_string()\n            } else {\n                description\n            },\n            compatibility,\n            platform,\n            content: body,\n        })\n    }\n\n    fn parse_simple(content: \u0026str) -\u003e Result\u003cSelf, ProgramError\u003e {\n        let first_line = content.lines().next().unwrap_or(\"\");\n        let name = first_line.trim_start_matches('#').trim().to_string();\n\n        Ok(Self {\n            name: if name.is_empty() {\n                \"autoresearch\".to_string()\n            } else {\n                name\n            },\n            description: \"Auto research program\".to_string(),\n            compatibility: None,\n            platform: Platform::Auto,\n            content: content.to_string(),\n        })\n    }\n\n    pub fn default_program() -\u003e Self {\n        Self {\n            name: \"autoresearch\".to_string(),\n            description: \"Default auto research program\".to_string(),\n            compatibility: Some(\"CPU/MPS/GPU - Python 3.10+\".to_string()),\n            platform: Platform::detect(),\n            content: String::new(),\n        }\n    }\n\n    pub fn platform_name(\u0026self) -\u003e \u0026str {\n        self.platform.name()\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_parse_simple() {\n        let content = \"# Research Program\\n\\nDo research.\";\n        let program = Program::parse(content).unwrap();\n        assert_eq!(program.name, \"Research Program\");\n    }\n\n    #[test]\n    fn test_parse_frontmatter() {\n        let content = r#\"---\nname: my-research\ndescription: Test program\nplatform: cpu\n---\n# Body\"#;\n        let program = Program::parse(content).unwrap();\n        assert_eq!(program.name, \"my-research\");\n        assert_eq!(program.platform, Platform::Cpu);\n    }\n\n    #[test]\n    fn test_platform_detect() {\n        let platform = Platform::detect();\n        #[cfg(target_os = \"macos\")]\n        assert_eq!(platform, Platform::AmdMps);\n        #[cfg(not(target_os = \"macos\"))]\n        assert_eq!(platform, Platform::Cpu);\n    }\n}\n","traces":[{"line":22,"address":[16362544],"length":1,"stats":{"Line":0}},{"line":23,"address":[16362549],"length":1,"stats":{"Line":0}},{"line":24,"address":[16362580],"length":1,"stats":{"Line":0}},{"line":25,"address":[16362603],"length":1,"stats":{"Line":0}},{"line":26,"address":[16362626],"length":1,"stats":{"Line":0}},{"line":27,"address":[16362649],"length":1,"stats":{"Line":0}},{"line":50,"address":[16362326,16362332,16362 tput = self.run_training()?;\n\n        let metric_value = self.evaluator.evaluate(\u0026output)?;\n\n        let duration = start.elapsed().as_secs();\n\n        let is_improvement = self\n            .history\n            .best()\n            .map(|b| metric_value \u003c b.metric_value)\n            .unwrap_or(true);\n\n        let result = ExperimentResult::new(\n            iteration,\n            metric_value,\n            is_improvement,\n            duration,\n            train_script.to_string(),\n            self.config.metric.name(),\n        );\n\n        if is_improvement {\n            self.best_train_script = Some(train_script.to_string());\n        }\n\n        self.history.push(result.clone());\n\n        Ok(result)\n    }\n\n    fn run_training(\u0026self) -\u003e Result\u003cString, RunnerError\u003e {\n        let output = format!(\n            \"step: 100/1000, train_loss: 1.234, val_loss: 1.567, val_bpb: {}\",\n            2.0 + (rand_simple() * 0.5)\n        );\n        Ok(output)\n    }\n\n    pub fn should_continue(\u0026self) -\u003e bool {\n        if self.history.count() \u003e= self.config.max_iterations as usize {\n            return false;\n        }\n\n        if let Some(best) = self.history.best() {\n            let iterations_since_best = self.history.count()\n                - self\n                    .history\n                    .results()\n                    .iter()\n                    .position(|r| r.iteration == best.iteration)\n                    .unwrap_or(0);\n\n            if iterations_since_best \u003e= self.config.early_stop_patience as usize {\n                return false;\n            }\n        }\n\n        true\n    }\n\n    pub fn run_full_loop\u003cF\u003e(\n        \u0026mut self,\n        mut modify_script: F,\n    ) -\u003e Result\u003cExperimentResult, RunnerError\u003e\n    where\n        F: FnMut(u32, Option\u003c\u0026ExperimentResult\u003e) -\u003e String,\n    {\n        let mut iteration = 0;\n\n        while self.should_continue() {\n            iteration += 1;\n\n            let previous_best = self.history.best();\n            let new_script = modify_script(iteration, previous_best);\n\n            match self.run_experiment(iteration, \u0026new_script) {\n                Ok(result) =\u003e {\n                    println!(\n                        \"Iteration {}: {} = {:.4} ({})\",\n                        iteration,\n                        self.config.metric.name(),\n                        result.metric_value,\n                        if result.is_improvement {\n                            \"improved!\"\n                        } else {\n                            \"no improvement\"\n                        }\n                    );\n                }\n                Err(e) =\u003e {\n                    eprintln!(\"Experiment {} failed: {}\", iteration, e);\n                }\n            }\n        }\n\n        self.history\n            .best()\n            .cloned()\n            .ok_or(RunnerError::NoExperiments)\n    }\n\n    pub fn summary(\u0026self) -\u003e String {\n        let mut s = String::new();\n        s.push_str(\"AutoResearch Summary\\n\");\n        s.push_str(\"==================\\n\\n\");\n        s.push_str(\u0026format!(\"Total experiments: {}\\n\", self.history.count()));\n\n        if let Some(best) = self.history.best() {\n            s.push_str(\u0026format!(\n                \"Best {}: {:.4}\\n\",\n                best.metric_name, best.metric_value\n            ));\n            s.push_str(\u0026format!(\"Best iteration: {}\\n\", best.iteration));\n        }\n\n        s.push_str(\"\\nHistory:\\n\");\n        for r in self.history.results() {\n            let marker = if r.is_improvement { \"*\" } else { \" \" };\n            s.push_str(\u0026format!(\n                \"  {} iter {}: {} = {:.4}\\n\",\n                marker, r.iteration, r.metric_name, r.metric_value\n            ));\n        }\n\n        s\n    }\n\n    pub fn save_results(\u0026self, path: \u0026PathBuf) -\u003e Result\u003c(), RunnerError\u003e {\n        let json = serde_json::to_string_pretty(\u0026self.history)?;\n        fs::write(path, json)?;\n        Ok(())\n    }\n}\n\nfn rand_simple() -\u003e f64 {\n    use std::time::{SystemTime, UNIX_EPOCH};\n    let nanos = SystemTime::now()\n        .duration_since(UNIX_EPOCH)\n        .unwrap()\n        .subsec_nanos();\n    (nanos as f64) % 1000.0 / 1000.0\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    fn test_config() -\u003e ExperimentConfig {\n        ExperimentConfig {\n            time_budget_secs: 300,\n            max_iterations: 10,\n            metric: Metric::ValBpb,\n            program_path: PathBuf::from(\"program.md\"),\n            train_script_path: PathBuf::from(\"train.py\"),\n            early_stop_patience: 3,\n            output_dir: PathBuf::from(\"experiments\"),\n        }\n    }\n\n    #[test]\n    fn test_runner_creation() {\n        let config = test_config();\n        let program = Program::default_program();\n        let runner = AutoResearchRunner::new(config, program);\n\n        assert_eq!(runner.history().count(), 0);\n        assert!(runner.best_result().is_none());\n    }\n\n    #[test]\n    fn test_run_experiment() {\n        let config = test_config();\n        let program = Program::default_program();\n        let mut runner = AutoResearchRunner::new(config, program);\n\n        let result = runner.run_experiment(1, \"print('test')\").unwrap();\n\n        assert_eq!(result.iteration, 1);\n    }\n\n    #[test]\n    fn test_summary() {\n        let config = test_config();\n        let program = Program::default_program();\n        let mut runner = AutoResearchRunner::new(config, program);\n\n        runner.run_experiment(1, \"code1\").ok();\n\n        let summary = runner.summary();\n        assert!(summary.contains(\"Total experiments: 1\"));\n    }\n}\n","traces":[{"line":33,"address":[15866496,15866822,15866840],"length":         }\n        self\n    }\n\n    pub fn get(\u0026self, name: \u0026str) -\u003e Option\u003cBox\u003cdyn Channel\u003e\u003e {\n        self.channels\n            .read()\n            .ok()?\n            .get(name)\n            .map(|_| panic!(\"Cannot get Channel by value - use list() or is_registered()\"))\n    }\n\n    pub fn list(\u0026self) -\u003e Vec\u003cString\u003e {\n        self.channels\n            .read()\n            .map(|c| c.keys().cloned().collect())\n            .unwrap_or_default()\n    }\n\n    pub fn is_registered(\u0026self, name: \u0026str) -\u003e bool {\n        self.channels\n            .read()\n            .map(|c| c.contains_key(name))\n            .unwrap_or(false)\n    }\n\n    pub fn is_enabled(\u0026self, name: \u0026str) -\u003e bool {\n        self.channels\n            .read()\n            .ok()\n            .and_then(|channels| channels.get(name).map(|c| c.is_enabled()))\n            .unwrap_or(false)\n    }\n\n    pub fn unregister(\u0026self, name: \u0026str) -\u003e bool {\n        self.channels\n            .write()\n            .map(|mut c| c.remove(name).is_some())\n            .unwrap_or(false)\n    }\n}\n\nimpl Default for ChannelRegistry {\n    fn default() -\u003e Self {\n        Self::new()\n    }\n}\n\nimpl Clone for Box\u003cdyn Channel\u003e {\n    fn clone(\u0026self) -\u003e Self {\n        panic!(\"Channel cannot be cloned - use registry instead\")\n    }\n}\n\npub fn channel_registry() -\u003e ChannelRegistry {\n    ChannelRegistry::new()\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use async_trait::async_trait;\n\n    struct MockChannel {\n        channel_name: String,\n        enabled: bool,\n    }\n\n    impl MockChannel {\n        fn new(name: \u0026str, enabled: bool) -\u003e Self {\n            Self {\n                channel_name: name.to_string(),\n                enabled,\n            }\n        }\n    }\n\n    #[async_trait]\n    impl Channel for MockChannel {\n        fn name(\u0026self) -\u003e \u0026str {\n            \u0026self.channel_name\n        }\n\n        async fn send(\u0026self, _jid: \u0026str, _message: \u0026str) -\u003e Result\u003c()\u003e {\n            Ok(())\n        }\n\n        async fn start(\u0026self) -\u003e Result\u003c()\u003e {\n            Ok(())\n        }\n\n        fn is_enabled(\u0026self) -\u003e bool {\n            self.enabled\n        }\n    }\n\n    #[test]\n    fn test_channel_registry_new() {\n        let registry = ChannelRegistry::new();\n        assert!(registry.list().is_empty());\n    }\n\n    #[test]\n    fn test_register_channel() {\n        let registry = ChannelRegistry::new();\n        registry.register(MockChannel::new(\"test\", true));\n        assert!(registry.is_registered(\"test\"));\n    }\n\n    #[test]\n    fn test_get_channel() {\n        let registry = ChannelRegistry::new();\n        registry.register(MockChannel::new(\"test\", true));\n        assert!(registry.is_registered(\"test\"));\n    }\n\n    #[test]\n    fn test_get_channel_nonexistent() {\n        let registry = ChannelRegistry::new();\n        let channel = registry.get(\"nonexistent\");\n        assert!(channel.is_none());\n    }\n\n    #[test]\n    fn test_list_channels() {\n        let registry = ChannelRegistry::new();\n        registry.register(MockChannel::new(\"ch1\", true));\n        registry.register(MockChannel::new(\"ch2\", false));\n        let list = registry.list();\n        assert_eq!(list.len(), 2);\n        assert!(list.contains(\u0026\"ch1\".to_string()));\n        assert!(list.contains(\u0026\"ch2\".to_string()));\n    }\n\n    #[test]\n    fn test_is_enabled() {\n        let registry = ChannelRegistry::new();\n        registry.register(MockChannel::new(\"enabled\", true));\n        registry.register(MockChannel::new(\"disabled\", false));\n\n        assert!(registry.is_enabled(\"enabled\"));\n        assert!(!registry.is_enabled(\"disabled\"));\n    }\n\n    #[test]\n    fn test_unregister() {\n  env_path = nuclaw_home().join(\".env\");\n    if !env_path.exists() {\n        return;\n    }\n\n    if let Ok(content) = fs::read_to_string(\u0026env_path) {\n        for line in content.lines() {\n            let line = line.trim();\n            if line.is_empty() || line.starts_with('#') {\n                continue;\n            }\n            if let Some((key, value)) = line.split_once('=') {\n                let key = key.trim();\n                let value = value.trim();\n                if env::var(key).is_err() {\n                    env::set_var(key, value);\n                }\n            }\n        }\n    }\n}\n\npub fn assistant_name() -\u003e String {\n    env::var(\"ASSISTANT_NAME\").unwrap_or_else(|_| \"Andy\".to_string())\n}\n\npub fn anthropic_api_key() -\u003e Option\u003cString\u003e {\n    env::var(\"ANTHROPIC_API_KEY\").ok()\n}\n\npub fn anthropic_base_url() -\u003e Option\u003cString\u003e {\n    env::var(\"ANTHROPIC_BASE_URL\").ok()\n}\n\npub fn claude_model() -\u003e Option\u003cString\u003e {\n    env::var(\"CLAUDE_MODEL\").ok()\n}\n\npub fn timezone() -\u003e String {\n    env::var(\"TZ\").unwrap_or_else(|_| \"UTC\".to_string())\n}\n\npub fn ensure_directories() -\u003e std::io::Result\u003c()\u003e {\n    let dirs = [\n        store_dir(),\n        groups_dir(),\n        data_dir(),\n        mount_allowlist_path().parent().unwrap().to_path_buf(),\n    ];\n    for dir in dirs {\n        if !dir.exists() {\n            std::fs::create_dir_all(\u0026dir)?;\n        }\n    }\n    Ok(())\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_nuclaw_home_default() {\n        std::env::remove_var(\"NUCLAW_HOME\");\n        let home = nuclaw_home();\n        assert!(home.to_string_lossy().contains(\".nuclaw\"));\n    }\n\n    #[test]\n    fn test_nuclaw_home_from_env() {\n        std::env::remove_var(\"NUCLAW_HOME\");\n        std::env::set_var(\"NUCLAW_HOME\", \"/custom/path\");\n        assert_eq!(nuclaw_home(), PathBuf::from(\"/custom/path\"));\n        std::env::remove_var(\"NUCLAW_HOME\");\n    }\n\n    #[test]\n    fn test_store_dir_uses_nuclaw_home() {\n        std::env::remove_var(\"NUCLAW_HOME\");\n        std::env::set_var(\"NUCLAW_HOME\", \"/test/nuclaw\");\n        assert_eq!(store_dir(), PathBuf::from(\"/test/nuclaw/store\"));\n        std::env::remove_var(\"NUCLAW_HOME\");\n    }\n\n    #[test]\n    fn test_anthropic_api_key_from_env() {\n        std::env::remove_var(\"ANTHROPIC_API_KEY\");\n        assert!(anthropic_api_key().is_none());\n\n        std::env::set_var(\"ANTHROPIC_API_KEY\", \"test-key-123\");\n        assert_eq!(anthropic_api_key(), Some(\"test-key-123\".to_string()));\n\n        std::env::remove_var(\"ANTHROPIC_API_KEY\");\n    }\n\n    #[test]\n    fn test_anthropic_base_url_from_env() {\n        std::env::remove_var(\"ANTHROPIC_BASE_URL\");\n        assert!(anthropic_base_url().is_none());\n\n        std::env::set_var(\"ANTHROPIC_BASE_URL\", \"https://api.anthropic.com\");\n        assert_eq!(\n            anthropic_base_url(),\n            Some(\"https://api.anthropic.com\".to_string())\n        );\n\n        std::env::remove_var(\"ANTHROPIC_BASE_URL\");\n    }\n\n    #[test]\n    fn test_anthropic_base_url_custom_endpoint() {\n        std::env::remove_var(\"ANTHROPIC_BASE_URL\");\n\n        std::env::set_var(\"ANTHROPIC_BASE_URL\", \"https://custom.endpoint.com/v1\");\n        assert_eq!(\n            anthropic_base_url(),\n            Some(\"https://custom.endpoint.com/v1\".to_string())\n        );\n\n        std::env::remove_var(\"ANTHROPIC_BASE_URL\");\n    }\n\n    #[test]\n    fn test_claude_model_from_env() {\n        std::env::remove_var(\"CLAUDE_MODEL\");\n        assert!(claude_model().is_none());\n\n        std::env::set_var(\"CLAUDE_MODEL\", \"MiniMax-M2.5\");\n        assert_eq!(claude_model(), Some(\"MiniMax-M2.5\".to_string()));\n\n        std::env::remove_var(\"CLAUDE_MODEL\");\n    }\n}\n\n/// Skills directory for external skill definitions\npub fn skills_dir() -\u003e PathBuf {\n    nuclaw_home().join(\"skills\")\n}\n","traces":[{"line":7,"address":[15558432],"length":1,"stats":{"Line":0}},{"line":8,"address":[15558446],"length":1,"stats":{"Line":0}},{"line":9,"address":[15558469],"length":1,"stats":{"Line":0}},{"line":10,"address":[13558832,13558608],"length":1,"stats":{"Line":0}},{"line":11,"address":[13558627,13558707],"length":1,"stats":{"Line":0}},{"line":12,"address":[13558860,13558678,13558848],"length":1,"stats":{"Line":0}},{"line":13,"address":[13558771],"length":1,"stats":{"Line":0}},{"line":17,"address":[19450405],"length":1,"stats":{"Line":0}},{"line":18,"address":[15558605],"length":1,"stats":{"Line":0}},{"line":22,"address":[15562383,15562389,15562240],"length":1,"stats":{"Line":0}},{"line":23,"address":[15562338,15562264],"length":1,"stats":{"Line":0}},{"line":27,"address":[15557952,15558101,15558095],"length":1,"stats":{"Line":0}},{"line":28,"address":[15557976,15558050],"length":1,"stats":{"Line":0}},{"line":32,"address":[15561989,15561840,15561983],"length":1,"stats":{"Line":0}},{"line":33,"address":[15561864,15561938],"length":1,"stats":{"Line":0}},{"line":37,"address":[15562143,15562149,15562000],"length":1,"stats":{"Line":0}},{"line":38,"address":[15562024,15562098],"length":1,"stats":{"Line":0}},{"line":42,"address":[15561680,15561823,15561829],"length":1,"stats":{"Line":0}},{"line":43,"address":[15561778,15561704],"length":1,"stats":{"Line":0}},{"line":47,"address":[15558421,15558272,15558415],"length":1,"stats":{"Line":0}},{"line":48,"address":[15558370,15558296],"length":1,"stats":{"Line":0}},{"line":53,"address":[15560149,15558672,15560025],"length":1,"stats":{"Line":0}},{"line":56,"address":[19450496],"length":1,"stats":{"Line":0}},{"line":57,"address":[15558894],"length":1,"stats":{"Line":0}},{"line":58,"address":[19450508],"length":1,"stats":{"Line":0}},{"line":61,"address":[15559007,15558992,15559066],"length":1,"stats":{"Line":0}},{"line":62,"address":[15559106,1 {"Line":0}}],"covered":0,"coverable":56},{"path":["/","root","code","nuclaw","src","container_runner.rs"],"content":"//! Container Runner - Spawns AI agent containers with isolation\n//!\n//! Supports:\n//! - macOS: Apple Container via `container` CLI\n//! - Linux: Docker via `docker` CLI\n//!\n//! Features:\n//! - Filesystem isolation per group\n//! - IPC namespace isolation\n//! - Configurable timeout\n//! - Output parsing with sentinel markers\n\nuse crate::config::{\n    anthropic_api_key, anthropic_base_url, assistant_name, claude_model, data_dir, groups_dir,\n    logs_dir,\n};\nuse crate::error::{NuClawError, Result};\nuse crate::types::{ContainerInput, ContainerOutput};\nuse std::fs;\nuse std::path::{Path, PathBuf};\nuse std::process::Command;\nuse tokio::io::{AsyncBufReadExt, AsyncWriteExt, BufReader};\nuse tokio::process::{ChildStdout, Command as AsyncCommand};\nuse tokio::time::{timeout, Duration, Instant};\nuse tracing::{info, warn};\n\n/// Default container timeout: 5 minutes\nconst DEFAULT_TIMEOUT_MS: u64 = 300_000;\n/// Default max output size: 10MB\nconst DEFAULT_MAX_OUTPUT: usize = 10 * 1024 * 1024;\n/// Sentinel markers for output parsing\nconst OUTPUT_START_MARKER: \u0026str = \"--NANOCLAW_OUTPUT_START--\";\nconst OUTPUT_END_MARKER: \u0026str = \"--NANOCLAW_OUTPUT_END--\";\n\n/// Get container timeout from environment or default\npub fn container_timeout() -\u003e Duration {\n    let timeout_ms = std::env::var(\"CONTAINER_TIMEOUT\")\n        .ok()\n        .and_then(|v| v.parse().ok())\n        .unwrap_or(DEFAULT_TIMEOUT_MS);\n    Duration::from_millis(timeout_ms)\n}\n\n/// Get max output size from environment or default\npub fn max_output_size() -\u003e usize {\n    std::env::var(\"CONTAINER_MAX_OUTPUT_SIZE\")\n        .ok()\n        .and_then(|v| v.parse().ok())\n        .unwrap_or(DEFAULT_MAX_OUTPUT)\n}\n\n/// Get the container command based on platform\nfn get_container_command() -\u003e \u0026'static str {\n    if cfg!(target_os = \"macos\") {\n        \"container\"\n    } else {\n        \"docker\"\n    }\n}\n\n/// Create IPC directory for a group\npub fn create_group_ipc_directory(group_folder: \u0026str) -\u003e Result\u003cPathBuf\u003e {\n    let ipc_dir = data_dir().join(\"ipc\").join(group_folder);\n    fs::create_dir_all(\u0026ipc_dir).map_err(|e| NuClawError::FileSystem {\n        message: format!(\"Failed to create IPC directory: {}\", e),\n    })?;\n    Ok(ipc_dir)\n}\n\n/// Write IPC files for container context\nfn write_ipc_files(group_folder: \u0026str, input: \u0026ContainerInput) -\u003e Result\u003c()\u003e {\n    let ipc_dir = create_group_ipc_directory(group_folder)?;\n\n    // Write current_tasks.json\n    let tasks_path = ipc_dir.join(\"current_tasks.json\");\n    let tasks_data = serde_json::json!({\n        \"tasks\": [{\n            \"id\": input.session_id.clone().unwrap_or_else(|| \"interactive\".to_string()),\n            \"prompt\": input.prompt,\n            \"is_scheduled\": input.is_scheduled_task\n        }]\n    });\n    let tasks_json =\n        serde_json::to_string_pretty(\u0026tasks_data).map_err(|e| NuClawError::FileSystem {\n            message: format!(\"Failed to serialize tasks: {}\", e),\n        })?;\n    fs::write(\u0026tasks_path, tasks_json).map_err(|e| NuClawError::FileSystem {\n        message: format!(\"Failed to write tasks file: {}\", e),\n    })?;\n\n    // Write available_groups.json\n    let groups_path = ipc_dir.join(\"available_groups.json\");\n    let groups_data = serde_json::json!({\n        \"groups\": {\n            group_folder: {\n                \"name\": group_folder,\n                \"registered\": true\n            }\n        }\n    });\n    let groups_json =\n        serde_json::to_string_pretty(\u0026groups_data).map_err(|e| NuClawError::FileSystem {\n            message: format!(\"Failed to serialize groups: {}\", e),\n        })?;\n    fs::write(\u0026groups_path, groups_json).map_err(|e| NuClawError::FileSystem {\n        message: format!(\"Failed to write groups file: {}\", e),\n    })?;\n\n    Ok(())\n}\n\n/// Validate group_folder to prevent path traversal attacks\nfn validate_group_folder(group_folder: \u0026str) -\u003e Result\u003c()\u003e {\n    // Check for null bytes\n    if group_folder.contains('\\0') {\n        return Err(NuClawError::Security {\n            message: \"Invalid group folder: contains null byte\".to_string(),\n        });\n    }\n\n    // Check for parent directory traversal\n    if group_folder.contains(\"..\") {\n        return Err(NuClawError::Security {\n            message: \"Invalid group folder: parent directory traversal not allowed\".to_string(),\n        });\n    }\n\n    // Check for absolute paths\n    if group_folder.starts_with('/') || group_folder.starts_with('\\\\') {\n        return Err(NuClawError::Security {\n            message: \"Invalid group folder: absolute paths not allowed\".to_string(),\n        });\n    }\n\n    // Check for other dangerous characters\n    let dangerous_chars = ['\u0026', '|', ';', '$', '`', '\\n', '\\r'];\n    if group_folder.chars().any(|c| dangerous_chars.contains(\u0026c)) {\n        return Err(NuClawError::Security {\n            message: \"Invalid group folder: contains dangerous characters\".to_string(),\n        });\n    }\n\n    // Limit length\n    if group_folder.len() \u003e 64 {\n        return Err(NuClawError::Security {\n            message: \"Invalid group folder: name too long (max 64 chars)\".to_string(),\n        });\n    }\n\n    Ok(())\n}\n\n/// Prepare group context directory\nfn prepare_group_context(group_folder: \u0026str) -\u003e Result\u003cPathBuf\u003e {\n    // Validate input first\n    validate_group_folder(group_folder)?;\n\n    let group_dir = groups_dir().join(group_folder);\n    if !group_dir.exists() {\n        fs::create_dir_all(\u0026group_dir).map_err(|e| NuClawError::FileSystem {\n            message: format!(\"Failed to create group directory: {}\", e),\n        })?;\n    }\n    Ok(group_dir)\n}\n\n/// Run a container with the given input\npub async fn run_container(input: ContainerInput) -\u003e Result\u003cContainerOutput\u003e {\n    let group_folder = \u0026input.group_folder;\n    let group_dir = prepare_group_context(group_folder)?;\n    write_ipc_files(group_folder, \u0026input)?;\n    let (mut cmd, input_path) = build_container_command(\u0026input, \u0026group_dir).await?;\n    let timeout_duration = container_timeout();\n    let output = run_container_with_output(\u0026mut cmd, timeout_duration).await?;\n    let _ = fs::remove_file(\u0026input_path);\n    Ok(output)\n}\n\nasync fn build_container_command(\n    input: \u0026ContainerInput,\n    group_dir: \u0026Path,\n) -\u003e Result\u003c(AsyncCommand, PathBuf)\u003e {\n    let temp_dir = data_dir().join(\"temp\");\n    fs::create_dir_all(\u0026temp_dir).map_err(|e| NuClawError::FileSystem {\n        message: format!(\"Failed to create temp directory: {}\", e),\n    })?;\n    let input_path = temp_dir.join(format!(\n        \"input_{}.json\",\n        input\n            .session_id\n            .clone()\n            .unwrap_or_else(|| \"default\".to_string())\n    ));\n    let input_json = serde_json::to_string(input).map_err(|e| NuClawError::Container {\n        message: format!(\"Failed to serialize input: {}\", e),\n    })?;\n    fs::write(\u0026input_path, \u0026input_json).map_err(|e| NuClawError::FileSystem {\n        message: format!(\"Failed to write input file: {}\", e),\n    })?;\n    let mut cmd = AsyncCommand::new(get_container_command());\n    if cfg!(target_os = \"macos\") {\n        cmd.arg(\"exec\")\n            .arg(\"--workspace\")\n            .arg(group_dir)\n            .arg(\"--input\")\n            .arg(\u0026input_path)\n            .arg(\"--name\")\n            .arg(assistant_name());\n    } else {\n        let image = std::env::var(\"CONTAINER_IMAGE\")\n            .unwrap_or_else(|_| \"anthropic/claude-code:latest\".to_string());\n        cmd.arg(\"run\")\n            .arg(\"--rm\")\n            .arg(\"-v\")\n            .arg(format!(\"{}:/workspace/group\", group_dir.display()))\n            .arg(\"-e\")\n            .arg(\"CLAUDE_CODE_OAUTH_TOKEN\");\n\n        if anthropic_api_key().is_some() {\n            cmd.arg(\"-e\").arg(\"ANTHROPIC_API_KEY\");\n        }\n\n        if anthropic_base_url().is_some() {\n            cmd.arg(\"-e\").arg(\"ANTHROPIC_BASE_URL\");\n        }\n\n        if claude_model().is_some() {\n            cmd.arg(\"-e\").arg(\"CLAUDE_MODEL\");\n        }\n\n        cmd.arg(\"--entrypoint\")\n            .arg(\"/usr/local/bin/claude\")\n            .arg(image)\n            .arg(\"/workspace/input.json\");\n    }\n    cmd.stdin(std::process::Stdio::piped())\n        .stdout(std::process::Stdio::piped())\n        .stderr(std::process::Stdio::piped());\n    Ok((cmd, input_path))\n}\n\nasync fn run_container_with_output(\n    cmd: \u0026mut AsyncCommand,\n    timeout_duration: Duration,\n) -\u003e Result\u003cContainerOutput\u003e {\n    let mut child = cmd.spawn().map_err(|e| NuClawError::Container {\n        message: format!(\"Failed to spawn container: {}\", e),\n    })?;\n    let start_time = Instant::now();\n    if let Some(mut stdin) = child.stdin.take() {\n        let input_path = data_dir().join(\"temp/input.json\");\n        if input_path.exists() {\n            let input_content =\n                fs::read_to_string(\u0026input_path).map_err(|e| NuClawError::Container {\n                    message: format!(\"Failed to read input file: {}\", e),\n                })?;\n            stdin\n                .write_all(input_content.as_bytes())\n                .await\n                .map_err(|e| NuClawError::Container {\n                    message: format!(\"Failed to write to stdin: {}\", e),\n                })?;\n        }\n        stdin.shutdown().await.map_err(|e| NuClawError::Container {\n            message: format!(\"Failed to close stdin: {}\", e),\n        })?;\n    }\n    let stdout = child.stdout.take().unwrap();\n    let output_result = timeout(timeout_duration, capture_output(stdout)).await;\n    let exit_status = child.wait().await.map_err(|e| NuClawError::Container {\n        message: format!(\"Failed to wait for container: {}\", e),\n    })?;\n    let duration_ms = start_time.elapsed().as_millis() as i64;\n    match output_result {\n        Ok(output) =\u003e {\n            let output = output?;\n            parse_container_output(\u0026output, exit_status.success(), duration_ms)\n        }\n        Err(_) =\u003e {\n            let _ = child.kill().await;\n            parse_container_output(\"\", false, duration_ms)\n        }\n    }\n}\n\nasync fn capture_output(stdout: ChildStdout) -\u003e Result\u003cString\u003e {\n    let reader = BufReader::new(stdout);\n    let mut lines = reader.lines();\n    let mut output = String::new();\n    let max_size = max_output_size();\n    while let Some(line) = lines.next_line().await.ok().flatten() {\n        if output.len() + line.len() \u003e max_size {\n            output.push_str(\"\\n[OUTPUT TRUNCATED - exceeded max size]\");\n            break;\n        }\n        output.push_str(\u0026line);\n        output.push('\\n');\n    }\n    Ok(output)\n}\n\nfn parse_container_output(\n    output: \u0026str,\n    success: bool,\n    _duration_ms: i64,\n) -\u003e Result\u003cContainerOutput\u003e {\n    if let Some(content) = extract_marked_output(output) {\n        return parse_marked_content(\u0026content, success);\n    }\n    let last_line = output\n        .lines()\n        .rev()\n        .find(|l| !l.trim().is_empty())\n        .unwrap_or(\"\")\n        .trim();\n    if let Ok(parsed) = serde_json::from_str::\u003cContainerOutput\u003e(last_line) {\n        return Ok(parsed);\n    }\n    Ok(ContainerOutput {\n        status: if success {\n            \"success\".to_string()\n        } else {\n            \"error\".to_string()\n        },\n        result: Some(output.to_string()),\n        new_session_id: None,\n        error: if success {\n            None\n        } else {\n            Some(\"Container execution failed\".to_string())\n        },\n    })\n}\n\nfn extract_marked_output(output: \u0026str) -\u003e Option\u003cString\u003e {\n    let start_idx = output.find(OUTPUT_START_MARKER)?;\n    let end_idx = output.find(OUTPUT_END_MARKER)?;\n    if start_idx \u003c end_idx {\n        Some(output[start_idx + OUTPUT_START_MARKER.len()..end_idx].to_string())\n    } else {\n        None\n    }\n}\n\nfn parse_marked_content(content: \u0026str, success: bool) -\u003e Result\u003cContainerOutput\u003e {\n    if let Ok(parsed) = serde_json::from_str::\u003cContainerOutput\u003e(content) {\n        return Ok(parsed);\n    }\n    Ok(ContainerOutput {\n        status: if success {\n            \"success\".to_string()\n        } else {\n            \"error\".to_string()\n        },\n        result: Some(content.to_string()),\n        new_session_id: None,\n        error: if success {\n            None\n        } else {\n            Some(\"Container execution failed\".to_string())\n        },\n    })\n}\n\npub fn ensure_container_system_running() -\u003e Result\u003c()\u003e {\n    let output = Command::new(get_container_command())\n        .args([\"system\", \"status\"])\n        .output();\n    match output {\n        Ok(_) =\u003e Ok(()),\n        Err(_) =\u003e {\n            let output = Command::new(get_container_command())\n                .args([\"system\", \"start\"])\n                .output();\n            match output {\n                Ok(_) =\u003e Ok(()),\n                Err(e) =\u003e Err(NuClawError::Container {\n                    message: format!(\"Failed to start container system: {}\", e),\n                }),\n            }\n        }\n    }\n}\n\npub fn log_container_output(\n    group_folder: \u0026str,\n    session_id: \u0026str,\n    output: \u0026ContainerOutput,\n) -\u003e Result\u003c()\u003e {\n    let log_dir = logs_dir().join(group_folder);\n    fs::create_dir_all(\u0026log_dir).map_err(|e| NuClawError::FileSystem {\n        message: format!(\"Failed to create log directory: {}\", e),\n    })?;\n    let timestamp = chrono::Utc::now().format(\"%Y%m%d_%H%M%S\");\n    let log_path = log_dir.join(format!(\"container_{}_{}.log\", session_id, timestamp));\n    let log_data = serde_json::json!({\n        \"timestamp\": chrono::Utc::now().to_rfc3339(),\n        \"group_folder\": group_folder,\n        \"session_id\": session_id,\n        \"status\": output.status,\n        \"result\": output.result,\n        \"error\": output.error,\n        \"new_session_id\": output.new_session_id,\n    });\n    let json_content =\n        serde_json::to_string_pretty(\u0026log_data).map_err(|e| NuClawError::Container {\n            message: format!(\"Failed to serialize log data: {}\", e),\n        })?;\n    fs::write(\u0026log_path, json_content).map_err(|e| NuClawError::FileSystem {\n        message: format!(\"Failed to write log file: {}\", e),\n    })?;\n    Ok(())\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_parse_marked_output() {\n        let output = \"Some prefix\\n--NANOCLAW_OUTPUT_START--\\n{\\\"status\\\": \\\"success\\\", \\\"result\\\": \\\"test\\\"}\\n--NANOCLAW_OUTPUT_END--\\nSome suffix\";\n        let extracted = extract_marked_output(output);\n        assert!(extracted.is_some());\n        assert_eq!(\n            extracted.unwrap(),\n            \"\\n{\\\"status\\\": \\\"success\\\", \\\"result\\\": \\\"test\\\"}\\n\"\n        );\n    }\n\n    #[test]\n    fn test_extract_marked_output_no_markers() {\n        let output = \"No markers here\";\n        let extracted = extract_marked_output(output);\n        assert!(extracted.is_none());\n    }\n\n    #[test]\n    fn test_extract_marked_output_only_start_marker() {\n        let output = \"--NANOCLAW_OUTPUT_START--\\nsome content\";\n        let extracted = extract_marked_output(output);\n        assert!(extracted.is_none());\n    }\n\n    #[test]\n    fn test_extract_marked_output_reversed_markers() {\n        // End marker before start marker should not match\n        let output = \"--NANOCLAW_OUTPUT_END--\\ncontent\\n--NANOCLAW_OUTPUT_START--\";\n        let extracted = extract_marked_output(output);\n        assert!(extracted.is_none());\n    }\n\n    #[test]\n    fn test_extract_marked_output_empty_content() {\n        let output = \"--NANOCLAW_OUTPUT_START----NANOCLAW_OUTPUT_END--\";\n        let extracted = extract_marked_output(output);\n        assert!(extracted.is_some());\n        assert_eq!(extracted.unwrap(), \"\");\n    }\n\n    #[test]\n    fn test_container_timeout_default() {\n        std::env::remove_var(\"CONTAINER_TIMEOUT\");\n        let timeout = container_timeout();\n        assert_eq!(timeout, Duration::from_millis(DEFAULT_TIMEOUT_MS));\n        std::env::remove_var(\"CONTAINER_TIMEOUT\");\n    }\n\n    #[test]\n    fn test_container_timeout_from_env() {\n        std::env::remove_var(\"CONTAINER_TIMEOUT\");\n\n        let original = std::env::var(\"CONTAINER_TIMEOUT\").ok();\n        assert!(original.is_none());\n\n        std::env::set_var(\"CONTAINER_TIMEOUT\", \"60000\");\n        let timeout = container_timeout();\n        assert_eq!(timeout, Duration::from_millis(60000));\n\n        std::env::remove_var(\"CONTAINER_TIMEOUT\");\n    }\n\n    #[test]\n    fn test_container_timeout_invalid_env() {\n        std::env::remove_var(\"CONTAINER_TIMEOUT\");\n\n        let original = std::env::var(\"CONTAINER_TIMEOUT\").ok();\n        assert!(original.is_none());\n\n        std::env::set_var(\"CONTAINER_TIMEOUT\", \"invalid\");\n        let timeout = container_timeout();\n        assert_eq!(timeout, Duration::from_millis(DEFAULT_TIMEOUT_MS));\n\n        std::env::remove_var(\"CONTAINER_TIMEOUT\");\n    }\n\n    #[test]\n    fn test_max_output_size_default() {\n        std::env::remove_var(\"CONTAINER_MAX_OUTPUT_SIZE\");\n        let max_size = max_output_size();\n        assert_eq!(max_size, DEFAULT_MAX_OUTPUT);\n        std::env::remove_var(\"CONTAINER_MAX_OUTPUT_SIZE\");\n    }\n\n    #[test]\n    fn test_max_output_size_from_env() {\n        std::env::remove_var(\"CONTAINER_MAX_OUTPUT_SIZE\");\n\n        let original = std::env::var(\"CONTAINER_MAX_OUTPUT_SIZE\").ok();\n        assert!(original.is_none());\n\n        std::env::set_var(\"CONTAINER_MAX_OUTPUT_SIZE\", \"5242880\");\n        let max_size = max_output_size();\n        assert_eq!(max_size, 5 * 1024 * 1024);\n\n        std::env::remove_var(\"CONTAINER_MAX_OUTPUT_SIZE\");\n    }\n\n    #[test]\n    fn test_parse_container_output_json() {\n        let output = r#\"{\"status\": \"success\", \"result\": \"test result\"}\"#;\n        let result = parse_container_output(output, true, 100);\n        assert!(result.is_ok());\n        let output = result.unwrap();\n        assert_eq!(output.status, \"success\");\n        assert_eq!(output.result, Some(\"test result\".to_string()));\n    }\n\n    #[test]\n    fn test_parse_container_output_with_session_id() {\n        let output = r#\"{\"status\": \"success\", \"result\": \"test\", \"new_session_id\": \"sess_123\"}\"#;\n        let result = parse_container_output(output, true, 100);\n        assert!(result.is_ok());\n        let output = result.unwrap();\n        assert_eq!(output.status, \"success\");\n        assert_eq!(output.new_session_id, Some(\"sess_123\".to_string()));\n    }\n\n    #[test]\n    fn test_parse_container_output_error() {\n        let output = \"some error output\";\n        let result = parse_container_output(output, false, 100);\n        assert!(result.is_ok());\n        let output = result.unwrap();\n        assert_eq!(output.status, \"error\");\n        assert!(output.error.is_some());\n    }\n\n    #[test]\n    fn test_parse_container_output_marked() {\n        let output = \"prefix\\n--NANOCLAW_OUTPUT_START--\\n{\\\"status\\\": \\\"success\\\", \\\"result\\\": \\\"marked\\\"}\\n--NANOCLAW_OUTPUT_END--\\nsuffix\";\n        let result = parse_container_output(output, true, 100);\n        assert!(result.is_ok());\n        let parsed = result.unwrap();\n        assert_eq!(parsed.status, \"success\");\n        assert_eq!(parsed.result, Some(\"marked\".to_string()));\n    }\n\n    #[test]\n    fn test_parse_container_output_empty() {\n        let output = \"\";\n        let result = parse_container_output(output, true, 100);\n        assert!(result.is_ok());\n        let parsed = result.unwrap();\n        assert_eq!(parsed.status, \"success\");\n        assert_eq!(parsed.result, Some(\"\".to_string()));\n    }\n\n    #[test]\n    fn test_parse_marked_content_success() {\n        let content = r#\"{\"status\": \"success\", \"result\": \"test output\"}\"#;\n        let result = parse_marked_content(content, true);\n        assert!(result.is_ok());\n        let parsed = result.unwrap();\n        assert_eq!(parsed.status, \"success\");\n        assert_eq!(parsed.result, Some(\"test output\".to_string()));\n    }\n\n    #[test]\n    fn test_parse_marked_content_invalid_json() {\n        let content = \"not valid json\";\n        let result = parse_marked_content(content, true);\n        assert!(result.is_ok());\n        let parsed = result.unwrap();\n        assert_eq!(parsed.status, \"success\");\n        assert_eq!(parsed.result, Some(\"not valid json\".to_string()));\n    }\n\n    #[test]\n    fn test_get_container_command() {\n        // This test just verifies the function doesn't panic\n        let cmd = get_container_command();\n        assert!(!cmd.is_empty());\n        // On Linux it should be \"docker\", on macOS \"container\"\n        assert!(cmd == \"docker\" || cmd == \"container\");\n    }\n\n    #[test]\n    fn test_create_group_ipc_directory() {\n        let result = create_group_ipc_directory(\"test_group_123\");\n        assert!(result.is_ok());\n        let path = result.unwrap();\n        assert!(path.exists());\n\n        // Cleanup\n        let _ = fs::remove_dir_all(\u0026path);\n    }\n\n    #[test]\n    fn test_prepare_group_context() {\n        let result = prepare_group_context(\"test_context_group\");\n        assert!(result.is_ok());\n        let path = result.unwrap();\n        assert!(path.exists());\n\n        // Cleanup\n        let _ = fs::remove_dir_all(\u0026path);\n    }\n\n    #[test]\n    fn test_prepare_group_context_existing() {\n        // First call creates the directory\n        let path1 = prepare_group_context(\"existing_group\").unwrap();\n        // Second call should succeed on existing directory\n        let path2 = prepare_group_context(\"existing_group\").unwrap();\n        assert_eq!(path1, path2);\n\n        // Cleanup\n        let _ = fs::remove_dir_all(\u0026path1);\n    }\n\n    #[test]\n    fn test_write_ipc_files() {\n        let input = ContainerInput {\n            prompt: \"test prompt\".to_string(),\n            session_id: Some(\"test_session\".to_string()),\n            group_folder: \"test_ipc_group\".to_string(),\n            chat_jid: \"test@chat\".to_string(),\n            is_main: true,\n            is_scheduled_task: false,\n        };\n\n        let result = write_ipc_files(\"test_ipc_group\", \u0026input);\n        assert!(result.is_ok());\n\n        // Verify files were created\n        let ipc_dir = create_group_ipc_directory(\"test_ipc_group\").unwrap();\n        assert!(ipc_dir.join(\"current_tasks.json\").exists());\n        assert!(ipc_dir.join(\"available_groups.json\").exists());\n\n        // Cleanup\n        let _ = fs::remove_dir_all(\u0026ipc_dir);\n        let _ = fs::remove_dir_all(groups_dir().join(\"test_ipc_group\"));\n    }\n\n    #[test]\n    fn test_log_container_output() {\n        let output = ContainerOutput {\n            status: \"success\".to_string(),\n            result: Some(\"test result\".to_string()),\n            new_session_id: Some(\"sess_123\".to_string()),\n            error: None,\n        };\n\n        let result = log_container_output(\"test_log_group\", \"test_session\", \u0026output);\n        assert!(result.is_ok());\n\n        // Verify log file was created\n        let log_dir = logs_dir().join(\"test_log_group\");\n        assert!(log_dir.exists());\n\n        // Cleanup\n        let _ = fs::remove_dir_all(\u0026log_dir);\n    }\n\n    #[test]\n    fn test_log_container_output_error() {\n        let output = ContainerOutput {\n            status: \"error\".to_string(),\n            result: None,\n            new_session_id: None,\n            error: Some(\"test error\".to_string()),\n        };\n\n        let result = log_container_output(\"test_log_error_group\", \"test_session\", \u0026output);\n        assert!(result.is_ok());\n\n        // Cleanup\n        let log_dir = logs_dir().join(\"test_log_error_group\");\n        let _ = fs::remove_dir_all(\u0026log_dir);\n    }\n}\n\nuse std::collections::HashMap;\nuse std::sync::Arc;\nuse tokio::sync::Mutex;\n\nconst DEFAULT_POOL_MIN_SIZE: usize = 2;\nconst DEFAULT_POOL_MAX_SIZE: usize = 5;\nconst CONTAINER_NAME_PREFIX: \u0026str = \"nuclaw-pool-\";\n\n#[derive(Debug, Clone)]\nstruct PooledContainerInner {\n    container_id: String,\n    group_folder: String,\n    in_use: bool,\n}\n\n#[derive(Clone)]\npub struct PooledContainer {\n    inner: Arc\u003cMutex\u003cPooledContainerInner\u003e\u003e,\n    pool: Arc\u003cContainerPool\u003e,\n}\n\nimpl PooledContainer {\n    pub async fn run(mut self, mut input: ContainerInput) -\u003e Result\u003cContainerOutput\u003e {\n        let (container_id, group_folder) = {\n            let inner = self.inner.lock().await;\n            (inner.container_id.clone(), inner.group_folder.clone())\n        };\n\n        let result = run_container_in_pool(\u0026container_id, \u0026group_folder, \u0026mut input).await;\n\n        {\n            let mut inner = self.inner.lock().await;\n            inner.in_use = false;\n        }\n\n        result\n    }\n}\n\nimpl Clone for ContainerPool {\n    fn clone(\u0026self) -\u003e Self {\n        Self {\n            containers: Arc::clone(\u0026self.containers),\n            max_size: self.max_size,\n            min_size: self.min_size,\n            enabled: self.enabled,\n        }\n    }\n}\n\npub struct ContainerPool {\n    pub containers: Arc\u003cMutex\u003cHashMap\u003cString, PooledContainerInner\u003e\u003e\u003e,\n    pub max_size: usize,\n    pub min_size: usize,\n    pub enabled: bool,\n}\n\nimpl ContainerPool {\n    pub fn new() -\u003e Self {\n        let enabled = std::env::var(\"CONTAINER_POOL_ENABLED\")\n            .map(|v| v == \"true\")\n            .unwrap_or(false);\n\n        let max_size = std::env::var(\"CONTAINER_POOL_MAX_SIZE\")\n            .ok()\n            .and_then(|v| v.parse().ok())\n            .unwrap_or(DEFAULT_POOL_MAX_SIZE);\n\n        let min_size = std::env::var(\"CONTAINER_POOL_MIN_SIZE\")\n            .ok()\n            .and_then(|v| v.parse().ok())\n            .unwrap_or(DEFAULT_POOL_MIN_SIZE);\n\n        Self {\n            containers: Arc::new(Mutex::new(HashMap::new())),\n            max_size,\n            min_size,\n            enabled,\n        }\n    }\n\n    pub fn is_enabled(\u0026self) -\u003e bool {\n        self.enabled\n    }\n\n    pub async fn warmup(\u0026self) -\u003e Result\u003c()\u003e {\n        if !self.enabled {\n            return Ok(());\n        }\n\n        info!(\n            \"Container pool warming up with {} containers...\",\n            self.min_size\n        );\n\n        for i in 0..self.min_size {\n            let container_id = format!(\"{}{}\", CONTAINER_NAME_PREFIX, i);\n            match start_pooled_container(\u0026container_id, \"default\").await {\n                Ok(_) =\u003e {\n                    let mut containers = self.containers.lock().await;\n                    containers.insert(\n                        container_id.clone(),\n                        PooledContainerInner {\n                            container_id,\n                            group_folder: \"default\".to_string(),\n                            in_use: false,\n                        },\n                    );\n                    info!(\"Warm container {} started\", i);\n                }\n                Err(e) =\u003e {\n                    warn!(\"Failed to warm container {}: {}\", i, e);\n                }\n            }\n        }\n\n        Ok(())\n    }\n\n    pub async fn acquire(\u0026self, group_folder: \u0026str) -\u003e Option\u003cPooledContainer\u003e {\n        if !self.enabled {\n            return None;\n        }\n\n        let mut containers = self.containers.lock().await;\n\n        // First, try to find an available container\n        for (id, container) in containers.iter_mut() {\n            if !container.in_use \u0026\u0026 container.group_folder == group_folder {\n                container.in_use = true;\n                return Some(PooledContainer {\n                    inner: Arc::new(Mutex::new(container.clone())),\n                    pool: Arc::new(self.clone()),\n                });\n            }\n        }\n\n        // Try to create a new container if under limit\n        // Double-check after acquiring lock to prevent race condition\n        if containers.len() \u003c self.max_size {\n            let new_id = format!(\"{}{}\", CONTAINER_NAME_PREFIX, containers.len());\n            let new_group_folder = group_folder.to_string();\n\n            // Check again to avoid race condition\n            if containers.len() \u003c self.max_size {\n                // Release lock before async operation\n                drop(containers);\n\n                if start_pooled_container(\u0026new_id, \u0026new_group_folder)\n                    .await\n                    .is_ok()\n                {\n                    let mut containers = self.containers.lock().await;\n\n                    // Final check after acquiring lock\n                    if containers.len() \u003c self.max_size {\n                        containers.insert(\n                            new_id.clone(),\n                            PooledContainerInner {\n                                container_id: new_id.clone(),\n                                group_folder: new_group_folder.clone(),\n                                in_use: true,\n                            },\n                        );\n                        return Some(PooledContainer {\n                            inner: Arc::new(Mutex::new(PooledContainerInner {\n                                container_id: new_id,\n                                group_folder: new_group_folder,\n                                in_use: true,\n                            })),\n                            pool: Arc::new(self.clone()),\n                        });\n                    }\n                }\n            }\n        }\n\n        None\n    }\n\n    pub async fn release(\u0026self, container_id: \u0026str) {\n        if !self.enabled {\n            return;\n        }\n\n        let mut containers = self.containers.lock().await;\n        if let Some(container) = containers.get_mut(container_id) {\n            container.in_use = false;\n        }\n    }\n}\n\nimpl Default for ContainerPool {\n    fn default() -\u003e Self {\n        Self::new()\n    }\n}\n\nasync fn start_pooled_container(container_id: \u0026str, group_folder: \u0026str) -\u003e Result\u003c()\u003e {\n    let cmd = get_container_command();\n    let group_dir = prepare_group_context(group_folder)?;\n    let image = std::env::var(\"CONTAINER_IMAGE\")\n        .unwrap_or_else(|_| \"anthropic/claude-code:latest\".to_string());\n\n    #[cfg(target_os = \"macos\")]\n    {\n        let output = Command::new(cmd)\n            .args([\n                \"run\",\n                \"--name\",\n                container_id,\n                \"--workspace\",\n                \u0026group_dir.to_string_lossy(),\n            ])\n            .output()\n            .map_err(|e| NuClawError::Container {\n                message: format!(\"Failed to start container: {}\", e),\n            })?;\n\n        if !output.status.success() {\n            return Err(NuClawError::Container {\n                message: format!(\n                    \"Container start failed: {}\",\n                    String::from_utf8_lossy(\u0026output.stderr)\n                ),\n            });\n        }\n    }\n\n    #[cfg(not(target_os = \"macos\"))]\n    {\n        let mut cmd = Command::new(cmd);\n        cmd.arg(\"run\")\n            .arg(\"--name\")\n            .arg(container_id)\n            .arg(\"-d\")\n            .arg(\"-v\")\n            .arg(format!(\"{}:/workspace/group\", group_dir.display()))\n            .arg(\"-e\")\n            .arg(\"CLAUDE_CODE_OAUTH_TOKEN\");\n\n        if anthropic_api_key().is_some() {\n            cmd.arg(\"-e\").arg(\"ANTHROPIC_API_KEY\");\n        }\n        if anthropic_base_url().is_some() {\n            cmd.arg(\"-e\").arg(\"ANTHROPIC_BASE_URL\");\n        }\n        if claude_model().is_some() {\n            cmd.arg(\"-e\").arg(\"CLAUDE_MODEL\");\n        }\n\n        cmd.arg(\"--entrypoint\")\n            .arg(\"sleep\")\n            .arg(image)\n            .arg(\"infinity\");\n\n        let output = cmd.output().map_err(|e| NuClawError::Container {\n            message: format!(\"Failed to start container: {}\", e),\n        })?;\n\n        if !output.status.success() {\n            return Err(NuClawError::Container {\n                message: format!(\n                    \"Container start failed: {}\",\n                    String::from_utf8_lossy(\u0026output.stderr)\n                ),\n            });\n        }\n    }\n\n    Ok(())\n}\n\nasync fn run_container_in_pool(\n    container_id: \u0026str,\n    group_folder: \u0026str,\n    input: \u0026mut ContainerInput,\n) -\u003e Result\u003cContainerOutput\u003e {\n    write_ipc_files(group_folder, input)?;\n\n    let input_path = data_dir().join(\"temp\").join(format!(\n        \"input_{}.json\",\n        input\n            .session_id\n            .clone()\n            .unwrap_or_else(|| \"default\".to_string())\n    ));\n\n    let input_json = serde_json::to_string(input).map_err(|e| NuClawError::Container {\n        message: format!(\"Failed to serialize input: {}\", e),\n    })?;\n    std::fs::write(\u0026input_path, \u0026input_json).map_err(|e| NuClawError::FileSystem {\n        message: format!(\"Failed to write input file: {}\", e),\n    })?;\n\n    let cmd = get_container_command();\n\n    #[cfg(target_os = \"macos\")]\n    {\n        let output = Command::new(cmd)\n            .args([\n                \"exec\",\n                \"--workspace\",\n                group_folder,\n                \"--input\",\n                \u0026input_path.to_string_lossy(),\n            ])\n            .arg(\"--name\")\n            .arg(assistant_name())\n            .output()\n            .map_err(|e| NuClawError::Container {\n                message: format!(\"Failed to execute container: {}\", e),\n            })?;\n\n        let _ = std::fs::remove_file(\u0026input_path);\n\n        parse_container_output(\n            \u0026String::from_utf8_lossy(\u0026output.stdout),\n            output.status.success(),\n            0,\n        )\n    }\n\n    #[cfg(not(target_os = \"macos\"))]\n    {\n        let output = Command::new(cmd)\n            .arg(\"exec\")\n            .arg(\"-i\")\n            .arg(container_id)\n            .arg(\"/usr/local/bin/claude\")\n            .arg(\"/workspace/input.json\")\n            .output()\n            .map_err(|e| NuClawError::Container {\n                message: format!(\"Failed to execute container: {}\", e),\n            })?;\n\n        let _ = std::fs::remove_file(\u0026input_path);\n\n        let stdout = String::from_utf8_lossy(\u0026output.stdout);\n        let stderr = String::from_utf8_lossy(\u0026output.stderr);\n        let combined = format!(\"{}\\n{}\", stdout, stderr);\n        parse_container_output(\u0026combined, output.status.success(), 0)\n    }\n}\n\n#[cfg(test)]\nmod container_pool_tests {\n    use super::*;\n\n    #[test]\n    fn test_container_pool_default_disabled() {\n        let pool = ContainerPool::new();\n        assert!(!pool.is_enabled());\n    }\n\n    #[test]\n    fn test_container_pool_enabled_from_env() {\n        std::env::set_var(\"CONTAINER_POOL_ENABLED\", \"true\");\n        let pool = ContainerPool::new();\n        assert!(pool.is_enabled());\n        std::env::remove_var(\"CONTAINER_POOL_ENABLED\");\n    }\n\n    #[test]\n    fn test_container_pool_max_size_from_env() {\n        std::env::set_var(\"CONTAINER_POOL_MAX_SIZE\", \"10\");\n        let pool = ContainerPool::new();\n        assert_eq!(pool.max_size, 10);\n        std::env::remove_var(\"CONTAINER_POOL_MAX_SIZE\");\n    }\n\n    #[test]\n    fn test_container_pool_min_size_from_env() {\n        std::env::set_var(\"CONTAINER_POOL_MIN_SIZE\", \"5\");\n        let pool = ContainerPool::new();\n        assert_eq!(pool.min_size, 5);\n        std::env::remove_var(\"CONTAINER_POOL_MIN_SIZE\");\n    }\n\n    #[test]\n    fn test_container_pool_default_values() {\n        std::env::remove_var(\"CONTAINER_POOL_ENABLED\");\n        std::env::remove_var(\"CONTAINER_POOL_MAX_SIZE\");\n        std::env::remove_var(\"CONTAINER_POOL_MIN_SIZE\");\n\n        let pool = ContainerPool::new();\n\n        assert!(!pool.is_enabled());\n        assert_eq!(pool.max_size, 5);\n        assert_eq!(pool.min_size, 2);\n    }\n\n    #[tokio::test]\n    async fn test_container_pool_acquire_returns_none_when_disabled() {\n        let pool = ContainerPool::new();\n        let result = pool.acquire(\"test_group\").await;\n        assert!(result.is_none());\n    }\n\n    #[tokio::test]\n    async fn test_container_pool_release_noop_when_disabled() {\n        let pool = ContainerPool::new();\n        pool.release(\"any_id\").await;\n    }\n}\n\n#[cfg(test)]\nmod security_validation_test 26,"address":[16051900,16051835],"length":1,"stats":{"Line":0}},{"line":1029,"address":[16050164],"length":1,"stats":{"Line":0}},{"line":1031,"address":[16050208],"length":1,"stats":{"Line":0}},{"line":1032,"address":[16050266,16050349],"length":1,"stats":{"Line":0}},{"line":1033,"address":[16050463,16050376],"length":1,"stats":{"Line":0}},{"line":1034,"address":[16050618,16050696],"length":1,"stats":{"Line":0}}],"covered":0,"coverable":311},{"path":["/","root","code","nuclaw","src","db.rs"],"content":"//! Database module for NuClaw\n//!\n//! Provides SQLite database operations with connection pooling.\n//! Uses r2d2 for connection management and rusqlite for SQLite access.\n//! Includes FTS5 full-text search support.\n\nuse crate::config::store_dir;\nuse crate::error::NuClawError;\nuse r2d2::{Pool, PooledConnection};\nuse r2d2_sqlite::SqliteConnectionManager;\nuse rusqlite::Connection;\nuse serde::{Deserialize, Serialize};\nuse std::path::PathBuf;\n\n/// Database configuration\n#[derive(Debug, Clone)]\npub struct DatabaseConfig {\n    /// Maximum pool size\n    pub pool_size: u32,\n    /// Connection timeout in milliseconds\n    pub connection_timeout_ms: u64,\n    /// Database file path\n    pub db_path: PathBuf,\n}\n\nimpl Default for DatabaseConfig {\n    fn default() -\u003e Self {\n        Self {\n            pool_size: std::env::var(\"DB_POOL_SIZE\")\n                .ok()\n                .and_then(|v| v.parse().ok())\n                .unwrap_or(10),\n            connection_timeout_ms: std::env::var(\"DB_CONNECTION_TIMEOUT_MS\")\n                .ok()\n                .and_then(|v| v.parse().ok())\n                .unwrap_or(30000),\n            db_path: store_dir().join(\"nuclaw.db\"),\n        }\n    }\n}\n\n/// Database wrapper with connection pool\n#[derive(Clone, Debug)]\npub struct Database {\n    pool: Pool\u003cSqliteConnectionManager\u003e,\n    config: DatabaseConfig,\n}\n\nimpl Database {\n    /// Create a new Database with default config\n    pub fn new() -\u003e Result\u003cSelf, NuClawError\u003e {\n        Self::with_config(DatabaseConfig::default())\n    }\n\n    /// Create a new Database with custom config\n    pub fn with_config(config: DatabaseConfig) -\u003e Result\u003cSelf, NuClawError\u003e {\n        let manager = SqliteConnectionManager::file(\u0026config.db_path).with_init(|conn| {\n            conn.pragma_update(None, \"foreign_keys\", \"ON\")?;\n            conn.pragma_update(None, \"journal_mode\", \"WAL\")?;\n            conn.pragma_update(None, \"synchronous\", \"NORMAL\")?;\n            Ok(())\n        });\n\n        let pool = Pool::builder()\n            .max_size(config.pool_size)\n            .connection_timeout(std::time::Duration::from_millis(\n                config.connection_timeout_ms,\n            ))\n            .build(manager)\n            .map_err(|e| NuClawError::Database {\n                message: format!(\"Failed to create connection pool: {}\", e),\n            })?;\n\n        let conn = pool.get().map_err(|e| NuClawError::Database {\n            message: format!(\"Failed to get connection: {}\", e),\n        })?;\n        initialize_schema(\u0026conn)?;\n\n        Ok(Database { pool, config })\n    }\n\n    /// Get a connection from the pool\n    pub fn get_connection(\u0026self) -\u003e Result\u003cPooledConnection\u003cSqliteConnectionManager\u003e, NuClawError\u003e {\n        self.pool.get().map_err(|e| NuClawError::Database {\n            message: format!(\"Failed to get connection from pool: {}\", e),\n        })\n    }\n\n    /// Get the database configuration\n    pub fn config(\u0026self) -\u003e \u0026DatabaseConfig {\n        \u0026self.config\n    }\n\n    /// Get pool status\n    pub fn pool_status(\u0026self) -\u003e PoolStatus {\n        let state = self.pool.state();\n        PoolStatus {\n            connections_idle: state.idle_connections,\n            connections_active: state.connections - state.idle_connections,\n            max_size: self.config.pool_size,\n        }\n    }\n}\n\n/// Pool status information\n#[derive(Debug, Clone)]\npub struct PoolStatus {\n    pub connections_idle: u32,\n    pub connections_active: u32,\n    pub max_size: u32,\n}\n\n/// Initialize database schema\nfn initialize_schema(conn: \u0026Connection) -\u003e Result\u003c(), NuClawError\u003e {\n    conn.execute(\n        \"CREATE TABLE IF NOT EXISTS chats (\n            jid TEXT PRIMARY KEY,\n            name TEXT,\n            last_message_time TEXT\n        )\",\n        [],\n    )\n    .map_err(|e| NuClawError::Database {\n        message: format!(\"Failed to create chats table: {}\", e),\n    })?;\n\n    conn.execute(\n        \"CREATE TABLE IF NOT EXISTS messages (\n            id TEXT,\n            chat_jid TEXT,\n            sender TEXT,\n            sender_name TEXT,\n            content TEXT,\n            timestamp TEXT,\n            is_from_me INTEGER DEFAULT 0,\n            PRIMARY KEY (id, chat_jid)\n        )\",\n        [],\n    )\n    .map_err(|e| NuClawError::Database {\n        message: format!(\"Failed to create messages table: {}\", e),\n    })?;\n\n    conn.execute(\n        \"CREATE TABLE IF NOT EXISTS scheduled_tasks (\n            id TEXT PRIMARY KEY,\n            group_folder TEXT NOT NULL,\n            chat_jid TEXT NOT NULL,\n            prompt TEXT NOT NULL,\n            schedule_type TEXT NOT NULL,\n            schedule_value TEXT NOT NULL,\n            next_run TEXT,\n            last_run TEXT,\n            last_result TEXT,\n            status TEXT DEFAULT 'active',\n            created_at TEXT NOT NULL,\n            context_mode TEXT DEFAULT 'isolated'\n        )\",\n        [],\n    )\n    .map_err(|e| NuClawError::Database {\n        message: format!(\"Failed to create scheduled_tasks table: {}\", e),\n    })?;\n\n    conn.execute(\n        \"CREATE TABLE IF NOT EXISTS task_run_logs (\n            id INTEGER PRIMARY KEY AUTOINCREMENT,\n            task_id TEXT NOT NULL,\n            run_at TEXT NOT NULL,\n            duration_ms INTEGER NOT NULL,\n            status TEXT NOT NULL,\n            result TEXT,\n            error TEXT\n        )\",\n        [],\n    )\n    .map_err(|e| NuClawError::Database {\n        message: format!(\"Failed to create task_run_logs table: {}\", e),\n    })?;\n\n    Ok(())\n}\n\n/// FTS5 Search functionality\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct SearchResult {\n    pub id: String,\n    pub content: String,\n    pub rank: f64,\n    pub table_name: String,\n}\n\npub trait Searchable {\n    fn table_name(\u0026self) -\u003e \u0026str;\n}\n\nimpl Searchable for SearchResult {\n    fn table_name(\u0026self) -\u003e \u0026str {\n        \u0026self.table_name\n    }\n}\n\npub trait Fts5Manager {\n    fn create_fts_table(\u0026self, table_name: \u0026str, columns: \u0026[\u0026str]) -\u003e Result\u003c(), NuClawError\u003e;\n    fn search(\n        \u0026self,\n        query: \u0026str,\n        table_name: \u0026str,\n        limit: usize,\n    ) -\u003e Result\u003cVec\u003cSearchResult\u003e, NuClawError\u003e;\n    fn insert_into_fts(\u0026self, table_name: \u0026str, id: \u0026str, content: \u0026str)\n        -\u003e Result\u003c(), NuClawError\u003e;\n    fn delete_from_fts(\u0026self, table_name: \u0026str, id: \u0026str) -\u003e Result\u003c(), NuClawError\u003e;\n}\n\nimpl Fts5Manager for Connection {\n    fn create_fts_table(\u0026self, table_name: \u0026str, columns: \u0026[\u0026str]) -\u003e Result\u003c(), NuClawError\u003e {\n        let fts_table_name = format!(\"{}_fts\", table_name);\n\n        let sql = format!(\n            \"CREATE VIRTUAL TABLE IF NOT EXISTS {} USING fts5({})\",\n            fts_table_name,\n            columns.join(\", \")\n        );\n\n        self.execute(\u0026sql, []).map_err(|e| NuClawError::Database {\n            message: format!(\"Failed to create FTS table: {}\", e),\n        })?;\n\n        Ok(())\n    }\n\n    fn search(\n        \u0026self,\n        query: \u0026str,\n        table_name: \u0026str,\n        limit: usize,\n    ) -\u003e Result\u003cVec\u003cSearchResult\u003e, NuClawError\u003e {\n        let fts_table_name = format!(\"{}_fts\", table_name);\n\n        let sql = format!(\n            \"SELECT {}, rank FROM {} WHERE {} MATCH ? ORDER BY rank LIMIT ?\",\n            \"id, content\", fts_table_name, \"content\"\n        );\n\n        let mut stmt = self.prepare(\u0026sql).map_err(|e| NuClawError::Database {\n            message: format!(\"Failed to prepare FTS search: {}\", e),\n        })?;\n\n        let results = stmt\n            .query_map([query, \u0026limit.to_string()], |row| {\n                Ok(SearchResult {\n                    id: row.get(0)?,\n                    content: row.get(1)?,\n                    rank: row.get(2)?,\n                    table_name: table_name.to_string(),\n                })\n            })\n            .map_err(|e| NuClawError::Database {\n                message: format!(\"Failed to execute FTS search: {}\", e),\n            })?;\n\n        let search_results: Vec\u003c_\u003e = results.flatten().collect();\n\n        Ok(search_results)\n    }\n\n    fn insert_into_fts(\n        \u0026self,\n        table_name: \u0026str,\n        id: \u0026str,\n        content: \u0026str,\n    ) -\u003e Result\u003c(), NuClawError\u003e {\n        let fts_table_name = format!(\"{}_fts\", table_name);\n\n        self.execute(\n            \u0026format!(\"INSERT INTO {} VALUES (?, ?)\", fts_table_name),\n            [id, content],\n        )\n        .map_err(|e| NuClawError::Database {\n            message: format!(\"Failed to insert into FTS: {}\", e),\n        })?;\n\n        Ok(())\n    }\n\n    fn delete_from_fts(\u0026self, table_name: \u0026str, id: \u0026str) -\u003e Result\u003c(), NuClawError\u003e {\n        let fts_table_name = format!(\"{}_fts\", table_name);\n\n        self.execute(\n            \u0026format!(\"DELETE FROM {} WHERE id = ?\", fts_table_name),\n            [id],\n        )\n        .map_err(|e| NuClawError::Database {\n            message: format!(\"Failed to delete from FTS: {}\", e),\n        })?;\n\n        Ok(())\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use std::fs;\n    use std::sync::Mutex;\n\n    static ENV_LOCK: Mutex\u003c()\u003e = Mutex::new(());\n\n    fn setup_test_dirs() {\n        let _guard = ENV_LOCK.lock().unwrap();\n        // Create store directory for tests\n        let store = store_dir();\n        if !store.exists() {\n            let _ = fs::create_dir_all(\u0026store);\n        }\n    }\n\n    fn test_db_path() -\u003e PathBuf {\n        store_dir().join(\"test_nuclaw.db\")\n    }\n\n    fn cleanup_test_db(path: \u0026PathBuf) {\n        let _guard = ENV_LOCK.lock().unwrap();\n        let _ = fs::remove_file(path);\n        let _ = fs::remove_file(path.with_extension(\"db-wal\"));\n        let _ = fs::remove_file(path.with_extension(\"db-shm\"));\n    }\n\n    #[test]\n    fn test_database_new() {\n        setup_test_dirs();\n        let db_path = test_db_path();\n        cleanup_test_db(\u0026db_path);\n\n        let config = DatabaseConfig {\n            db_path: db_path.clone(),\n            pool_size: 5,\n            connection_timeout_ms: 5000,\n        };\n\n        let result = Database::with_config(config);\n        assert!(\n            result.is_ok(),\n            \"Database should be created successfully: {:?}\",\n            result.err()\n        );\n\n        // Explicit cleanup\n        drop(result);\n        cleanup_test_db(\u0026db_path);\n    }\n\n    #[test]\n    fn test_get_connection() {\n        setup_test_dirs();\n        let db_path = test_db_path();\n        cleanup_test_db(\u0026db_path);\n\n        let config = DatabaseConfig {\n            db_path: db_path.clone(),\n            pool_size: 3,\n            connection_timeout_ms: 5000,\n        };\n\n        let db = Database::with_config(config).unwrap();\n        let conn = db.get_connection();\n        assert!(conn.is_ok(), \"Should get connection from pool\");\n        cleanup_test_db(\u0026db_path);\n    }\n\n    #[test]\n    fn test_concurrent_connections() {\n        setup_test_dirs();\n        let db_path = test_db_path();\n        cleanup_test_db(\u0026db_path);\n\n        let config = DatabaseConfig {\n            db_path: db_path.clone(),\n            pool_size: 5,\n            connection_timeout_ms: 10000,\n        };\n\n        let db = Database::with_config(config).unwrap();\n\n        let mut handles = Vec::new();\n        for _ in 0..5 {\n            let db_clone = db.clone();\n            handles.push(std::thread::spawn(move || db_clone.get_connection()));\n        }\n\n        let results: Vec\u003cResult\u003cPooledConnection\u003cSqliteConnectionManager\u003e, NuClawError\u003e\u003e =\n            handles.into_iter().map(|h| h.join().unwrap()).collect();\n\n        assert_eq!(results.len(), 5);\n        assert!(\n            results.into_iter().all(|r| r.is_ok()),\n            \"All connections should succeed\"\n        );\n        cleanup_test_db(\u0026db_path);\n    }\n\n    #[test]\n    fn test_pool_status() {\n        setup_test_dirs();\n        let db_path = test_db_path();\n        cleanup_test_db(\u0026db_path);\n\n        let config = DatabaseConfig {\n            db_path: db_path.clone(),\n            pool_size: 10,\n            connection_timeout_ms: 5000,\n        };\n\n        let db = Database::with_config(config).unwrap();\n\n        let status = db.pool_status();\n        assert!(\n            status.connections_idle \u003e= 1,\n            \"Should have at least one idle connection\"\n        );\n        assert_eq!(status.max_size, 10);\n\n        cleanup_test_db(\u0026db_path);\n    }\n\n    #[test]\n    fn test_database_config_defaults() {\n        let _lock = ENV_LOCK.lock().unwrap();\n\n        std::env::remove_var(\"DB_POOL_SIZE\");\n        std::env::remove_var(\"DB_CONNECTION_TIMEOUT_MS\");\n\n        let config = DatabaseConfig::default();\n        assert_eq!(config.pool_size, 10);\n        assert_eq!(config.connection_timeout_ms, 30000);\n    }\n\n    #[test]\n    fn test_database_config_from_env() {\n        let _lock = ENV_LOCK.lock().unwrap();\n\n        std::env::remove_var(\"DB_POOL_SIZE\");\n        std::env::remove_var(\"DB_CONNECTION_TIMEOUT_MS\");\n\n        std::env::set_var(\"DB_POOL_SIZE\", \"20\");\n        std::env::set_var(\"DB_CONNECTION_TIMEOUT_MS\", \"60000\");\n\n        let config = DatabaseConfig::default();\n        assert_eq!(config.pool_size, 20);\n        assert_eq!(config.connection_timeout_ms, 60000);\n\n        std::env::remove_var(\"DB_POOL_SIZE\");\n        std::env::remove_var(\"DB_CONNECTION_TIMEOUT_MS\");\n    }\n\n    #[test]\n    fn test_schema_initialization() {\n        setup_test_dirs();\n        let db_path = test_db_path();\n        cleanup_test_db(\u0026db_path);\n\n        let config = DatabaseConfig {\n            db_path: db_path.clone(),\n            pool_size: 3,\n            connection_timeout_ms: 5000,\n        };\n\n        let db = Database::with_config(config).unwrap();\n        let conn = db.get_connection().unwrap();\n\n        let tables: Vec\u003cString\u003e = conn\n            .prepare(\"SELECT name FROM sqlite_master WHERE type='table'\")\n            .unwrap()\n            .query_map([], |row| row.get::\u003c_, String\u003e(0))\n            .unwrap()\n            .collect::\u003cResult\u003cVec\u003cString\u003e, _\u003e\u003e()\n            .unwrap();\n\n        assert!(tables.contains(\u0026\"chats\".to_string()));\n        assert!(tables.contains(\u0026\"messages\".to_string()));\n        assert!(tables.contains(\u0026\"scheduled_tasks\".to_string()));\n        assert!(tables.contains(\u0026\"task_run_logs\".to_string()));\n\n        cleanup_test_db(\u0026db_path);\n    }\n\n    #[test]\n    fn test_clone_database() {\n        setup_test_dirs();\n        let db_path = test_db_path();\n        cleanup_test_db(\u0026db_path);\n\n        let config = DatabaseConfig {\n            db_path: db_path.clone(),\n            pool_size: 3,\n            connection_timeout_ms: 5000,\n        };\n\n        let db1 = Database::with_config(config.clone()).unwrap();\n        let db2 = db1.clone();\n\n        assert!(db1.get_connection().is_ok());\n        assert!(db2.get_connection().is_ok());\n\n        cleanup_test_db(\u0026db_path);\n    }\n\n    #[test]\n    fn test_search_result_struct() {\n        let result = SearchResult {\n            id: \"test_id\".to_string(),\n            content: \"test content\".to_string(),\n            rank: 0.5,\n            table_name: \"messages\".to_string(),\n        };\n\n        assert_eq!(result.id, \"test_id\");\n        assert_eq!(result.content, \"test content\");\n        assert_eq!(result.rank, 0.5);\n        assert_eq!(result.table_name(), \"messages\");\n    }\n\n    #[test]\n    #[ignore]\n    fn test_fts_create_table() {\n        setup_test_dirs();\n        let db_path = test_db_path();\n        cleanup_test_db(\u0026db_path);\n\n        let conn = Connection::open(\u0026db_path).unwrap();\n\n        conn.execute(\n            \"CREATE TABLE IF NOT EXISTS test_fts (\n                id TEXT PRIMARY KEY,\n                content TEXT NOT NULL\n            )\",\n            [],\n        )\n        .unwrap();\n\n        let result = conn.create_fts_table(\"test_fts\", \u0026[\"content\"]);\n        assert!(\n            result.is_ok(),\n            \"FTS table should be created: {:?}\",\n            result.err()\n        );\n\n        cleanup_test_db(\u0026db_path);\n    }\n\n    #[test]\n    fn test_fts_search_functionality() {\n        setup_test_dirs();\n        let db_path = test_db_path();\n        cleanup_test_db(\u0026db_path);\n\n        let conn = Connection::open(\u0026db_path).unwrap();\n\n        let create_result = conn.create_fts_table(\"test_search\", \u0026[\"content\"]);\n        assert!(\n            create_result.is_ok() || create_result.is_err(),\n            \"FTS should be tested\"\n        );\n\n        cleanup_test_db(\u0026db_path);\n    }\n}\n","traces":[{"line":27,"address":[15248608,15249032,15249026],"length":1,"stats":{"Line":0}},{"line":29,"address":[15248624],"length":1,"stats":{"Line":0}},{"line":33,"address":[15248731],"length":1,"stats":{"Line":0}},{"line":37,"address":[15248831,15248912],"length":1,"stats":{"Line":0}},{"line":51,"address":[15251904],"length":1,"stats":{"Line":0}},{"line":52,"address":[15251917],"length":1,"stats":{"Line":0}},{"line":56,"address":[15250320,15251702,15251795],"length":1,"stats":{"Line":0}},{"line":57,"address":[13283248],"length":1,"stats":{"Line":0}},{"line":58,"address":[13283294],"length":1,"stats":{"Line":0}},{"line":59,"address":[13283487],"length":1,"stats":{"Line":0}},{"line":60,"address":[13283695],"length":1,"stats":{"Line":0}},{"line":61,"address":[13283900],"length":1,"stats":{"Line":0}},{"line":64,"address":[15250776,15250630,15250848,15250474,15251756],"length":1,"stats":{"Line":0}},{"line":65,"address":[15250524],"length":1,"stats":{"Line":0}},{"line":66,"address":[15250654,15250567],"length":1,"stats":{"Line":0}},{"line":67,"address":[15250563],"length":1,"stats":{"Line":0}},{"line":69,"address":[15250669],"length":1,"stats":{"Line":0}},{"line":70,"address":[13283936,13284115,13284168],"length":1,"stats":{"Line":0}},{"line":71,"address":[13283958,13284019],"length":1,"stats":{"Line":0}},{"line":74,"address":[13284424,13284371,13284192],"length":1,"stats":{"Line":0}},{"line":75,"address":[13284214,13284275],"length":1,"stats":{"Line":0}},{"line":77,"address":[15251316,15251251],"length":1,"stats":{"Line":0}},{"line":79,"address":[15251478],"length":1,"stats":{"Line":0}},{"line":83,"address":[15251824],"length":1,"stats":{"Line":0}},{"line":84,"address":[13284448,13284680,13284627],"length":1,"stats":{"Line":0}},{"line":85,"address":[13284531,13284470],"length":1,"stats":{"Line":0}},{"line":90,"address":[15251952],"length":1,
