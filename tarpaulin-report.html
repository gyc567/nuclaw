h":1,"stats":{"Line":0}},{"line":124,"address":[15491440,15493170],"length":1,"stats":{"Line":0}},{"line":125,"address":[15494709,15491471],"length":1,"stats":{"Line":0}},{"line":126,"address":[15491502,15496248],"length":1,"stats":{"Line":0}},{"line":127,"address":[15497787,15491533],"length":1,"stats":{"Line":0}},{"line":131,"address":[14168169],"length":1,"stats":{"Line":0}},{"line":132,"address":[15490798],"length":1,"stats":{"Line":0}},{"line":141,"address":[14167376],"length":1,"stats":{"Line":0}},{"line":143,"address":[14167389],"length":1,"stats":{"Line":0}},{"line":147,"address":[14167344],"length":1,"stats":{"Line":0}},{"line":148,"address":[14167362],"length":1,"stats":{"Line":0}},{"line":154,"address":[14168512],"length":1,"stats":{"Line":0}},{"line":158,"address":[13672438,13672406],"length":1,"stats":{"Line":0}},{"line":159,"address":[15503375,15503122,15503103,15502993],"length":1,"stats":{"Line":0}},{"line":160,"address":[13672352],"length":1,"stats":{"Line":0}},{"line":164,"address":[14168553],"length":1,"stats":{"Line":0}},{"line":165,"address":[15502579,15501982,15502120],"length":1,"stats":{"Line":0}},{"line":166,"address":[13671334],"length":1,"stats":{"Line":0}},{"line":168,"address":[15502661],"length":1,"stats":{"Line":0}},{"line":173,"address":[14168096],"length":1,"stats":{"Line":0}},{"line":174,"address":[14168104],"length":1,"stats":{"Line":0}}],"covered":0,"coverable":52},{"path":["/","root","code","nuclaw","src","onboard.rs"],"content":"//! NuClaw Onboard - Interactive configuration setup\n//!\n//! Provides an interactive CLI wizard to configure:\n//! - LLM Provider (API Key, Base URL)\n//! - Telegram Bot Token\n\nuse crate::config::nuclaw_home;\nuse crate::error::{NuClawError, Result};\nuse crate::providers::PROVIDERS;\nuse std::fs;\nuse std::io::{self, Write};\nuse std::path::PathBuf;\n\n/// Configuration file name\nconst ENV_FILE: \u0026str = \".env\";\n\n/// Get the environment file path\npub fn env_file_path() -\u003e PathBuf {\n    nuclaw_home().join(ENV_FILE)\n}\n\n/// Configuration items to set\n#[derive(Debug, Clone, Default)]\npub struct OnboardConfig {\n    pub provider: Option\u003cString\u003e,\n    pub api_key: Option\u003cString\u003e,\n    pub base_url: Option\u003cString\u003e,\n    pub telegram_token: Option\u003cString\u003e,\n}\n\nimpl OnboardConfig {\n    /// Create a new empty config\n    pub fn new() -\u003e Self {\n        Self::default()\n    }\n\n    /// Check if any configuration exists\n    pub fn has_any_config(\u0026self) -\u003e bool {\n        self.api_key.is_some() || self.telegram_token.is_some()\n    }\n}\n\n/// Prompt user for input with a default value\nfn prompt_with_default(prompt: \u0026str, default: \u0026str) -\u003e String {\n    print!(\"{} [{}]: \", prompt, default);\n    io::stdout().flush().ok();\n\n    let mut input = String::new();\n    if io::stdin().read_line(\u0026mut input).is_ok() {\n        let input = input.trim();\n        if input.is_empty() {\n            default.to_string()\n        } else {\n            input.to_string()\n        }\n    } else {\n        default.to_string()\n    }\n}\n\n/// Prompt user for sensitive input (no echo)\nfn prompt_password(prompt: \u0026str) -\u003e String {\n    print!(\"{}: \", prompt);\n    io::stdout().flush().ok();\n\n    // Simple password input - in production could use rpassword crate\n    let mut input = String::new();\n    if io::stdin().read_line(\u0026mut input).is_ok() {\n        input.trim().to_string()\n    } else {\n        String::new()\n    }\n}\n\n/// Prompt user for yes/no confirmation\nfn prompt_yes_no(prompt: \u0026str, default: bool) -\u003e bool {\n    let default_str = if default { \"Y/n\" } else { \"y/N\" };\n    print!(\"{} [{}]: \", prompt, default_str);\n    io::stdout().flush().ok();\n\n    let mut input = String::new();\n    if io::stdin().read_line(\u0026mut input).is_ok() {\n        let input = input.trim().to_lowercase();\n        match input.as_str() {\n            \"y\" | \"yes\" =\u003e true,\n            \"n\" | \"no\" =\u003e false,\n            _ =\u003e default,\n        }\n    } else {\n        default\n    }\n}\n\n/// Display available providers\nfn display_providers() {\n    println!(\"\\nAvailable LLM Providers:\");\n    println!(\"------------------------\");\n    for (i, spec) in PROVIDERS.iter().enumerate() {\n        println!(\"  {}. {} - {}\", i + 1, spec.name, spec.description);\n        println!(\n            \"     API Key: {}, Base URL: {}\",\n            spec.api_key_env, spec.base_url_env\n        );\n    }\n    println!();\n}\n\n/// Run interactive onboard wizard\npub fn run_onboard() -\u003e Result\u003cOnboardConfig\u003e {\n    println!(\"\\n=== NuClaw Onboard Wizard ===\\n\");\n    println!(\"This wizard will help you configure NuClaw.\");\n    println!(\n        \"Configuration will be saved to: {}\\n\",\n        env_file_path().display()\n    );\n\n    let mut config = OnboardConfig::new();\n\n    // Check if config already exists\n    let existing = load_config().ok();\n    if let Some(ref existing_config) = existing {\n        if existing_config.has_any_config() {\n            println!(\"Existing configuration found!\\n\");\n            if existing_config.api_key.is_some() {\n                println!(\"  - LLM API: configured\");\n            }\n            if existing_config.telegram_token.is_some() {\n                println!(\"  - Telegram: configured\");\n            }\n            println!();\n\n            if !prompt_yes_no(\"Overwrite existing configuration?\", false) {\n                println!(\"\\nOnboard cancelled. Existing configuration kept.\");\n                return Ok(existing_config.clone());\n            }\n        }\n    }\n\n    // Step 1: Select LLM Provider\n    display_providers();\n    let provider_idx = prompt_with_default(\"Select provider number\", \"1\");\n\n    let idx: usize = provider_idx.parse::\u003cusize\u003e().unwrap_or(1).saturating_sub(1);\n    if idx \u003c PROVIDERS.len() {\n        let spec = \u0026PROVIDERS[idx];\n        config.provider = Some(spec.name.to_string());\n        println!(\"\\nSelected: {} - {}\", spec.name, spec.description);\n\n        // Step 2: Get API Key\n        println!(\"\\n--- LLM Configuration ---\");\n        let api_key = prompt_password(\u0026format!(\n            \"Enter {} API Key ({}):\",\n            spec.name, spec.api_key_env\n        ));\n\n        if api_key.is_empty() {\n            println!(\"Warning: API Key is empty, skipping LLM configuration.\");\n        } else {\n            config.api_key = Some(api_key);\n\n            // Step 3: Get Base URL (optional)\n            let default_url = match spec.name {\n                \"anthropic\" =\u003e \"https://api.anthropic.com\",\n                \"openai\" =\u003e \"https://api.openai.com/v1\",\n                \"openrouter\" =\u003e \"https://openrouter.ai/api/v1\",\n                _ =\u003e \"\",\n            };\n\n            let base_url = prompt_with_default(\n                \u0026format!(\"Enter Base URL (optional, default: {})\", default_url),\n                default_url,\n            );\n\n            if !base_url.is_empty() \u0026\u0026 base_url != default_url {\n                config.base_url = Some(base_url);\n            }\n        }\n    } else {\n        println!(\"Invalid selection, using anthropic by default.\");\n        config.provider = Some(\"anthropic\".to_string());\n    }\n\n    // Step 4: Telegram Configuration\n    println!(\"\\n--- Telegram Configuration ---\");\n    if prompt_yes_no(\"Configure Telegram bot?\", true) {\n        let token = prompt_password(\"Enter Telegram Bot Token (from @BotFather):\");\n\n        if !token.is_empty() {\n            config.telegram_token = Some(token);\n            println!(\"Telegram bot token configured.\");\n        } else {\n            println!(\"Skipping Telegram configuration.\");\n        }\n    } else {\n        println!(\"Skipping Telegram configuration.\");\n    }\n\n    // Save configuration\n    if config.has_any_config() {\n        save_config(\u0026config)?;\n    } else {\n        println!(\"\\nNo configuration provided. Nothing to save.\");\n    }\n\n    println!(\"\\n=== Onboard Complete ===\\n\");\n    println!(\"✓ Configuration saved to {}\", env_file_path().display());\n    println!();\n    println!(\"Run 'nuclaw --start' to start the service\");\n    println!(\"Run 'nuclaw --status' to check status\");\n    println!(\"Run 'nuclaw --stop' to stop the service\");\n    println!(\"Run 'nuclaw --restart' to restart the service\");\n    println!();\n\n    Ok(config)\n}\n\n/// Save configuration to .env file\npub fn save_config(config: \u0026OnboardConfig) -\u003e Result\u003c()\u003e {\n    let path = env_file_path();\n\n    // Ensure directory exists\n    if let Some(parent) = path.parent() {\n        fs::create_dir_all(parent).map_err(|e| NuClawError::FileSystem {\n            message: format!(\"Failed to create config directory: {}\", e),\n        })?;\n    }\n\n    let mut content = String::new();\n\n    // Add header\n    content.push_str(\"# NuClaw Configuration\\n\");\n    content.push_str(\"# Generated by onboard wizard\\n\\n\");\n\n    // Add LLM config\n    if let (Some(provider), Some(api_key)) = (\u0026config.provider, \u0026config.api_key) {\n        let spec = PROVIDERS.iter().find(|s| s.name == provider);\n\n        if let Some(spec) = spec {\n            content.push_str(\u0026format!(\"# {}\\n\", spec.description));\n            content.push_str(\u0026format!(\"{}={}\\n\", spec.api_key_env, api_key));\n\n            if let Some(base_url) = \u0026config.base_url {\n                content.push_str(\u0026format!(\"{}={}\\n\", spec.base_url_env, base_url));\n            }\n\n            if let Some(default_model) = spec.default_model {\n                content.push_str(\u0026format!(\n                    \"{}_MODEL={}\\n\",\n                    provider.to_uppercase(),\n                    default_model\n                ));\n            }\n            content.push('\\n');\n        }\n    }\n\n    // Add Telegram config\n    if let Some(token) = \u0026config.telegram_token {\n        content.push_str(\"# Telegram Bot Configuration\\n\");\n        content.push_str(\u0026format!(\"TELEGRAM_BOT_TOKEN={}\\n\", token));\n    }\n\n    fs::write(\u0026path, content).map_err(|e| NuClawError::FileSystem {\n        message: format!(\"Failed to write config file: {}\", e),\n    })?;\n\n    Ok(())\n}\n\n/// Load configuration from .env file\npub fn load_config() -\u003e Result\u003cOnboardConfig\u003e {\n    let path = env_file_path();\n\n    if !path.exists() {\n        return Ok(OnboardConfig::new());\n    }\n\n    // Ensure parent directory exists\n    if let Some(parent) = path.parent() {\n        if !parent.exists() {\n            return Ok(OnboardConfig::new());\n        }\n    }\n\n    let content = fs::read_to_string(\u0026path).map_err(|e| NuClawError::FileSystem {\n        message: format!(\"Failed to read config file: {}\", e),\n    })?;\n\n    let mut config = OnboardConfig::new();\n\n    for line in content.lines() {\n        let line = line.trim();\n\n        // Skip comments and empty lines\n        if line.is_empty() || line.starts_with('#') {\n            continue;\n        }\n\n        if let Some((key, value)) = line.split_once('=') {\n            let key = key.trim();\n            let value = value.trim();\n\n            match key {\n                \"ANTHROPIC_API_KEY\" =\u003e {\n                    config.api_key = Some(value.to_string());\n                    config.provider = Some(\"anthropic\".to_string());\n                }\n                \"ANTHROPIC_BASE_URL\" =\u003e {\n                    config.base_url = Some(value.to_string());\n                }\n                \"OPENAI_API_KEY\" =\u003e {\n                    config.api_key = Some(value.to_string());\n                    config.provider = Some(\"openai\".to_string());\n                }\n                \"OPENAI_BASE_URL\" =\u003e {\n                    config.base_url = Some(value.to_string());\n                }\n                \"OPENROUTER_API_KEY\" =\u003e {\n                    config.api_key = Some(value.to_string());\n                    config.provider = Some(\"openrouter\".to_string());\n                }\n                \"OPENROUTER_BASE_URL\" =\u003e {\n                    config.base_url = Some(value.to_string());\n                }\n                \"CUSTOM_API_KEY\" =\u003e {\n                    config.api_key = Some(value.to_string());\n                    config.provider = Some(\"custom\".to_string());\n                }\n                \"CUSTOM_BASE_URL\" =\u003e {\n                    config.base_url = Some(value.to_string());\n                }\n                \"TELEGRAM_BOT_TOKEN\" =\u003e {\n                    config.telegram_token = Some(value.to_string());\n                }\n                _ =\u003e {}\n            }\n        }\n    }\n\n    Ok(config)\n}\n\n/// Print current configuration status (without showing secrets)\npub fn print_config_status() -\u003e Result\u003c()\u003e {\n    let config = load_config()?;\n\n    println!(\"\\n=== NuClaw Configuration Status ===\\n\");\n\n    // LLM Provider\n    if let Some(provider) = \u0026config.provider {\n        if config.api_key.is_some() {\n            println!(\"✓ LLM Provider: {}\", provider);\n            if config.base_url.is_some() {\n                println!(\"  Base URL: configured\");\n            }\n        } else {\n            println!(\"✗ LLM Provider: {} (not configured)\", provider);\n        }\n    } else {\n        println!(\"✗ LLM Provider: not configured\");\n    }\n\n    // Telegram\n    if config.telegram_token.is_some() {\n        println!(\"✓ Telegram Bot: configured\");\n    } else {\n        println!(\"✗ Telegram Bot: not configured\");\n    }\n\n    println!(\"\\nConfig file: {}\", env_file_path().display());\n    println!();\n\n    Ok(())\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use std::env;\n    use std::sync::atomic::{AtomicU64, Ordering};\n    use std::sync::Mutex;\n\n    static TEST_COUNTER: AtomicU64 = AtomicU64::new(0);\n    static TEST_MUTEX: Mutex\u003c()\u003e = Mutex::new(());\n\n    fn setup_test_env() -\u003e String {\n        let _guard = TEST_MUTEX.lock().unwrap();\n        let counter = TEST_COUNTER.fetch_add(1, Ordering::SeqCst);\n        let test_dir = format!(\"/tmp/nuclaw_test_{}_{}\", counter, std::process::id());\n        env::remove_var(\"NUCLAW_HOME\");\n        env::set_var(\"NUCLAW_HOME\", \u0026test_dir);\n        let _ = fs::create_dir_all(\u0026test_dir);\n        test_dir\n    }\n\n    fn cleanup_test_dir(test_dir: \u0026str) {\n        let _guard = TEST_MUTEX.lock().unwrap();\n        let _ = fs::remove_dir_all(test_dir);\n    }\n\n    #[test]\n    fn test_openai_provider_config() {\n        let test_dir = setup_test_env();\n\n        let content =\n            \"OPENAI_API_KEY=sk-openai-test\\nOPENAI_BASE_URL=https://custom.openai.com/v1\\n\";\n        fs::write(env_file_path(), content).unwrap();\n\n        let config = load_config().unwrap();\n\n        assert_eq!(config.provider, Some(\"openai\".to_string()));\n        assert_eq!(config.api_key, Some(\"sk-openai-test\".to_string()));\n        assert_eq!(\n            config.base_url,\n            Some(\"https://custom.openai.com/v1\".to_string())\n        );\n\n        cleanup_test_dir(\u0026test_dir);\n    }\n\n    #[test]\n    fn test_onboard_config_default() {\n        let config = OnboardConfig::new();\n        assert!(!config.has_any_config());\n        assert!(config.provider.is_none());\n        assert!(config.api_key.is_none());\n        assert!(config.base_url.is_none());\n        assert!(config.telegram_token.is_none());\n    }\n\n    #[test]\n    fn test_onboard_config_has_api_key() {\n        let mut config = OnboardConfig::new();\n        assert!(!config.has_any_config());\n\n        config.api_key = Some(\"test-key\".to_string());\n        assert!(config.has_any_config());\n    }\n\n    #[test]\n    fn test_onboard_config_has_telegram() {\n        let mut config = OnboardConfig::new();\n        assert!(!config.has_any_config());\n\n        config.telegram_token = Some(\"test-token\".to_string());\n        assert!(config.has_any_config());\n    }\n\n    #[test]\n    fn test_save_and_load_config() {\n        let test_dir = setup_test_env();\n        let _ = fs::create_dir_all(\u0026test_dir);\n\n        let config = OnboardConfig {\n            provider: Some(\"anthropic\".to_string()),\n            api_key: Some(\"sk-test-key\".to_string()),\n            base_url: Some(\"https://api.anthropic.com\".to_string()),\n            telegram_token: Some(\"123456:ABC-DEF1234ghIkl-zyx57W2v1u123ew11\".to_string()),\n        };\n\n        save_config(\u0026config).unwrap();\n        let loaded = load_config().unwrap();\n\n        assert_eq!(loaded.provider, config.provider);\n        assert_eq!(loaded.api_key, config.api_key);\n        assert_eq!(loaded.base_url, config.base_url);\n        assert_eq!(loaded.telegram_token, config.telegram_token);\n\n        cleanup_test_dir(\u0026test_dir);\n    }\n\n    #[test]\n    fn test_custom_provider_config() {\n        let test_dir = setup_test_env();\n        let _ = fs::create_dir_all(\u0026test_dir);\n\n        let content =\n            \"CUSTOM_API_KEY=sk-custom-test\\nCUSTOM_BASE_URL=https://custom.endpoint.com/v1\\n\";\n        fs::write(env_file_path(), content).unwrap();\n\n        let config = load_config().unwrap();\n\n        assert_eq!(config.provider, Some(\"custom\".to_string()));\n        assert_eq!(config.api_key, Some(\"sk-custom-test\".to_string()));\n        assert_eq!(\n            config.base_url,\n            Some(\"https://custom.endpoint.com/v1\".to_string())\n        );\n\n        cleanup_test_dir(\u0026test_dir);\n    }\n\n    #[test]\n    fn test_load_config_with_comments() {\n        let test_dir ;\n\nuse tokio::sync::mpsc;\nuse tokio::time::sleep;\n\nuse super::metrics::Metrics;\nuse super::queue::TaskQueue;\nuse super::task::{Task, TaskId, TaskResult};\n\n/// Function type for task execution\npub type TaskExecutorFn = Arc\u003cdyn Fn(Task) -\u003e BoxFuture\u003c'static, TaskResult\u003e + Send + Sync\u003e;\n\n/// Return type for async task execution\npub type BoxFuture\u003c'a, T\u003e = std::pin::Pin\u003cBox\u003cdyn std::future::Future\u003cOutput = T\u003e + Send + 'a\u003e\u003e;\n\n/// Configuration for the executor\n#[derive(Clone, Debug)]\npub struct ExecutorConfig {\n    pub max_concurrency: usize,\n    pub poll_interval_ms: u64,\n    pub max_retries: u32,\n}\n\nimpl Default for ExecutorConfig {\n    fn default() -\u003e Self {\n        Self {\n            max_concurrency: 3,\n            poll_interval_ms: 100,\n            max_retries: 3,\n        }\n    }\n}\n\n/// Event emitted by the executor\n#[derive(Debug, Clone)]\npub enum ExecutorEvent {\n    TaskStarted(TaskId),\n    TaskCompleted(TaskId, TaskResult),\n    TaskFailed(TaskId, String),\n    QueueEmpty,\n}\n\n/// The task executor\npub struct Executor {\n    queue: TaskQueue,\n    metrics: Arc\u003cMetrics\u003e,\n    config: ExecutorConfig,\n    shutdown_tx: Option\u003cmpsc::Sender\u003c()\u003e\u003e,\n}\n\nimpl Executor {\n    /// Create a new executor\n    pub fn new(config: ExecutorConfig) -\u003e Self {\n        Self {\n            queue: TaskQueue::new(config.max_concurrency),\n            metrics: Arc::new(Metrics::new()),\n            config,\n            shutdown_tx: None,\n        }\n    }\n\n    /// Get a reference to the task queue\n    pub fn queue(\u0026self) -\u003e \u0026TaskQueue {\n        \u0026self.queue\n    }\n\n    /// Get a reference to the metrics\n    pub fn metrics(\u0026self) -\u003e \u0026Arc\u003cMetrics\u003e {\n        \u0026self.metrics\n    }\n\n    /// Submit a task to the queue\n    pub fn submit(\u0026self, task: Task) {\n        self.metrics.record_task_submitted();\n        self.queue.enqueue(task);\n    }\n\n    /// Submit multiple tasks\n    pub fn submit_many(\u0026self, tasks: Vec\u003cTask\u003e) {\n        for task in tasks {\n            self.submit(task);\n        }\n    }\n\n    /// Run the executor loop\n    pub async fn run\u003cF\u003e(\u0026self, executor_fn: F) -\u003e Result\u003c(), String\u003e\n    where\n        F: Fn(Task) -\u003e BoxFuture\u003c'static, TaskResult\u003e + Send + Sync + Clone + 'static,\n    {\n        let poll_interval = Duration::from_millis(self.config.poll_interval_ms);\n        let executor_fn = Arc::new(executor_fn);\n\n        loop {\n            // Try to get a task from the queue\n            if let Some(mut task) = self.queue.dequeue() {\n                let _task_id = task.id.clone();\n                let metrics = Arc::clone(\u0026self.metrics);\n                let queue = self.queue.clone();\n                let fn_clone = Arc::clone(\u0026executor_fn);\n\n                task.start();\n                self.metrics.record_task_started();\n\n                // Execute task in background\n                tokio::spawn(async move {\n                    let start = Instant::now();\n\n                    // Run the task\n                    let result = fn_clone(task.clone()).await;\n\n                    let duration = start.elapsed().as_millis() as u64;\n\n                    // Record metrics\n                    if result.success {\n                        metrics.record_task_completed(duration);\n                    } else {\n                        metrics.record_task_failed();\n                    }\n\n                    // Complete the task and potentially requeue for retry\n                    if !result.success {\n                        let mut task = task;\n                        task.fail(result.error.clone().unwrap_or_default());\n\n                        if task.can_retry() {\n                            queue.requeue(task);\n                            metrics.record_retry();\n                        }\n                    }\n\n                    queue.complete();\n                });\n            } else {\n                // No task available, wait\n                sleep(poll_interval).await;\n            }\n        }\n    }\n\n    /// Get current queue statistics\n    pub fn stats(\u0026self) -\u003e ExecutorStats {\n        ExecutorStats {\n            pending: self.queue.pending_count(),\n            running: self.queue.running_count(),\n            total_submitted: self.metrics.total_submitted(),\n            total_completed: self.metrics.total_completed(),\n            total_failed: self.metrics.total_failed(),\n            total_retries: self.metrics.total_retries(),\n        }\n    }\n}\n\n/// Statistics from the executor\n#[derive(Debug, Clone, Default)]\npub struct ExecutorStats {\n    pub pending: usize,\n    pub running: usize,\n    pub total_submitted: u64,\n    pub total_completed: u64,\n    pub total_failed: u64,\n    pub total_retries: u64,\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use crate::orchestrator::task::{Priority, TaskSource};\n\n    fn create_test_task(payload: \u0026str) -\u003e Task {\n        Task::new(payload.to_string())\n    }\n\n    fn dummy_executor(task: Task) -\u003e BoxFuture\u003c'static, TaskResult\u003e {\n        Box::pin(\n            async move { TaskResult::success(task.id, format!(\"processed: {}\", task.payload), 10) },\n        )\n    }\n\n    #[test]\n    fn test_executor_new() {\n        let executor = Executor::new(ExecutorConfig::default());\n        assert_eq!(executor.queue().pending_count(), 0);\n    }\n\n    #[test]\n    fn test_executor_submit() {\n        let executor = Executor::new(ExecutorConfig::default());\n        executor.submit(create_test_task(\"test\"));\n\n        assert_eq!(executor.queue().pending_count(), 1);\n    }\n\n    #[test]\n    fn test_executor_submit_many() {\n        let executor = Executor::new(ExecutorConfig::default());\n        let tasks = vec![\n            create_test_task(\"task1\"),\n            create_test_task(\"task2\"),\n            create_test_task(\"task3\"),\n        ];\n\n        executor.submit_many(tasks);\n\n        assert_eq!(executor.queue().pending_count(), 3);\n    }\n\n    #[test]\n    fn test_executor_stats() {\n        let executor = Executor::new(ExecutorConfig::default());\n        executor.submit(create_test_task(\"test\"));\n\n        let stats = executor.stats();\n\n        assert_eq!(stats.pending, 1);\n        assert_eq!(stats.running, 0);\n    }\n\n    #[test]\n    fn test_executor_config_default() {\n        let config = ExecutorConfig::default();\n\n        assert_eq!(config.max_concurrency, 3);\n        assert_eq!(config.poll_interval_ms, 100);\n        assert_eq!(config.max_retries, 3);\n    }\n\n    #[test]\n    fn test_executor_config_custom() {\n        let config = ExecutorConfig {\n            max_concurrency: 5,\n            poll_interval_ms: 50,\n            max_retries: 10,\n        };\n\n        assert_eq!(config.max_concurrency, 5);\n        assert_eq!(config.poll_interval_ms, 50);\n        assert_eq!(config.max_retries, 10);\n    }\n\n    #[test]\n    fn test_task_with_all_options() {\n        let task = Task::new(\"test\".to_string())\n            .with_source(TaskSource::Scheduled)\n            .with_priority(Priority::Critical)\n            .with_max_retries(5);\n\n        assert_eq!(task.payload, \"test\");\n        assert_eq!(task.source, TaskSource::Scheduled);\n        assert_eq!(task.priority, Priority::Critical);\n        assert_eq!(task.max_retries, 5);\n    }\n\n    #[tokio::test]\n    async fn test_executor_run_processes_tasks() {\n        let executor = Executor::new(ExecutorConfig {\n            max_concurrency: 2,\n            poll_interval_ms: 10,\n            max_retries: 1,\n        });\n\n        executor.submit(create_test_task(\"task1\"));\n        executor.submit(create_test_task(\"task2\"));\n\n        // Run for a short time - spawn task but don't wait for it\n        let executor_clone = Executor::new(ExecutorConfig {\n            max_concurrency: 2,\n            poll_interval_ms: 10,\n            max_retries: 1,\n        });\n        executor_clone.submit(create_test_task(\"task1\"));\n        executor_clone.submit(create_test_task(\"task2\"));\n\n        let _handle = tokio::spawn(async move {\n            let _ = executor_clone.run(dummy_executor).await;\n        });\n\n        // Give some time for tasks to be processed\n        tokio::time::sleep(Duration::from_millis(100)).await;\n\n        // Check stats - original executor has submitted tasks\n        let stats = executor.stats();\n        assert!(stats.total_submitted \u003e= 2);\n    }\n}\n","traces":[{"line":28,"address":[16141184],"length":1,"stats":{"Line":0}},{"line":56,"address":[16137552,16137751],"length":1,"stats":{"Line":0}},{"line":58,"address":[16137574],"length":1,"stats":{"Line":0}},{"line":59,"address":[16137592,16137641],"length":1,"stats":{"Line":0}},{"line":66,"address":[16137776],"length":1,"stats":{"Line":0}},{"line":71,"address":[16138224],"length":1,"stats":{"Line":0}},{"line":72,"address":[16138232],"length":1,"stats":{"Line":0}},{"line":76,"address":[16138016,16138179,16138204],"length":1,"stats":{"Line":0}},{"line":77,"address":[16138041,16138112],"length":1,"stats":{"Line":0}},{"line":78,"address":[16138124],"length":1,"stats":{"Line":0}},{"line":82,"address":[16137529,16137216],"length":1,"stats":{"Line":0}},{"line":83,"address":[16137383,16137236],"length":1,"stats":{"Line":0}},{"line":84,"address":[16137487,16137524],"length":1,"stats":{"Line":0}},{"line":89,"address":[15038336,15038457],"length":1,"stats":{"Line":0}},{"line":93,"address":[15038635,15038517],"length":1,"stats":{"Line":0}},{"line":94,"address":[15038641],"length":1,"stats":{"Line":0}},{"line":96,"address":[],"length":0,"stats":{"Line":0}},{"line":98,"address":[15039757,15038972,15038689],"length":1,"stats":{" t","code","nuclaw","src","orchestrator","metrics.rs"],"content":"//! Metrics collection for task execution\n\nuse std::sync::atomic::{AtomicU64, Ordering};\nuse std::sync::Arc;\nuse std::time::{Duration, Instant};\n\n/// Metrics collector for task execution\n#[derive(Clone)]\npub struct Metrics {\n    submitted: Arc\u003cAtomicU64\u003e,\n    started: Arc\u003cAtomicU64\u003e,\n    completed: Arc\u003cAtomicU64\u003e,\n    failed: Arc\u003cAtomicU64\u003e,\n    retries: Arc\u003cAtomicU64\u003e,\n    total_duration_ms: Arc\u003cAtomicU64\u003e,\n    start_time: Instant,\n}\n\nimpl Metrics {\n    /// Create new metrics\n    pub fn new() -\u003e Self {\n        Self {\n            submitted: Arc::new(AtomicU64::new(0)),\n            started: Arc::new(AtomicU64::new(0)),\n            completed: Arc::new(AtomicU64::new(0)),\n            failed: Arc::new(AtomicU64::new(0)),\n            retries: Arc::new(AtomicU64::new(0)),\n            total_duration_ms: Arc::new(AtomicU64::new(0)),\n            start_time: Instant::now(),\n        }\n    }\n\n    /// Record a task was submitted\n    pub fn record_task_submitted(\u0026self) {\n        self.submitted.fetch_add(1, Ordering::Relaxed);\n    }\n\n    /// Record a task started\n    pub fn record_task_started(\u0026self) {\n        self.started.fetch_add(1, Ordering::Relaxed);\n    }\n\n    /// Record a task completed\n    pub fn record_task_completed(\u0026self, duration_ms: u64) {\n        self.completed.fetch_add(1, Ordering::Relaxed);\n        self.total_duration_ms\n            .fetch_add(duration_ms, Ordering::Relaxed);\n    }\n\n    /// Record a task failed\n    pub fn record_task_failed(\u0026self) {\n        self.failed.fetch_add(1, Ordering::Relaxed);\n    }\n\n    /// Record a retry\n    pub fn record_retry(\u0026self) {\n        self.retries.fetch_add(1, Ordering::Relaxed);\n    }\n\n    /// Get total submitted tasks\n    pub fn total_submitted(\u0026self) -\u003e u64 {\n        self.submitted.load(Ordering::Relaxed)\n    }\n\n    /// Get total started tasks\n    pub fn total_started(\u0026self) -\u003e u64 {\n        self.started.load(Ordering::Relaxed)\n    }\n\n    /// Get total completed tasks\n    pub fn total_completed(\u0026self) -\u003e u64 {\n        self.completed.load(Ordering::Relaxed)\n    }\n\n    /// Get total failed tasks\n    pub fn total_failed(\u0026self) -\u003e u64 {\n        self.failed.load(Ordering::Relaxed)\n    }\n\n    /// Get total retries\n    pub fn total_retries(\u0026self) -\u003e u64 {\n        self.retries.load(Ordering::Relaxed)\n    }\n\n    /// Get total execution time in milliseconds\n    pub fn total_duration_ms(\u0026self) -\u003e u64 {\n        self.total_duration_ms.load(Ordering::Relaxed)\n    }\n\n    /// Get average task duration in milliseconds\n    pub fn avg_duration_ms(\u0026self) -\u003e u64 {\n        let completed = self.total_completed();\n        if completed == 0 {\n            return 0;\n        }\n        self.total_duration_ms() / completed\n    }\n\n    /// Get uptime duration\n    pub fn uptime(\u0026self) -\u003e Duration {\n        self.start_time.elapsed()\n    }\n\n    /// Get success rate (0.0 to 1.0)\n    pub fn success_rate(\u0026self) -\u003e f64 {\n        let completed = self.total_completed();\n        let failed = self.total_failed();\n        let total = completed + failed;\n\n        if total == 0 {\n            return 1.0;\n        }\n\n        completed as f64 / total as f64\n    }\n\n    /// Get throughput (tasks per second)\n    pub fn throughput(\u0026self) -\u003e f64 {\n        let uptime_secs = self.uptime().as_secs_f64();\n        if uptime_secs == 0.0 {\n            return 0.0;\n        }\n\n        let total = self.total_completed() + self.total_failed();\n        total as f64 / uptime_secs\n    }\n\n    /// Get all metrics as a snapshot\n    pub fn snapshot(\u0026self) -\u003e MetricsSnapshot {\n        MetricsSnapshot {\n            submitted: self.total_submitted(),\n            started: self.total_started(),\n            completed: self.total_completed(),\n            failed: self.total_failed(),\n            retries: self.total_retries(),\n            total_duration_ms: self.total_duration_ms(),\n            avg_duration_ms: self.avg_duration_ms(),\n            uptime_ms: self.uptime().as_millis() as u64,\n            success_rate: self.success_rate(),\n            throughput: self.throughput(),\n        }\n    }\n}\n\nimpl Default for Metrics {\n    fn default() -\u003e Self {\n        Self::new()\n    }\n}\n\n/// Snapshot of metrics at a point in time\n#[derive(Debug, Clone)]\npub struct MetricsSnapshot {\n    pub submitted: u64,\n    pub started: u64,\n    pub completed: u64,\n    pub failed: u64,\n    pub retries: u64,\n    pub total_duration_ms: u64,\n    pub avg_duration_ms: u64,\n    pub uptime_ms: u64,\n    pub success_rate: f64,\n    pub throughput: f64,\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_metrics_new() {\n        let metrics = Metrics::new();\n\n        assert_eq!(metrics.total_submitted(), 0);\n        assert_eq!(metrics.total_started(), 0);\n        assert_eq!(metrics.total_completed(), 0);\n        assert_eq!(metrics.total_failed(), 0);\n        assert_eq!(metrics.total_retries(), 0);\n    }\n\n    #[test]\n    fn test_metrics_record_submitted() {\n        let metrics = Metrics::new();\n\n        metrics.record_task_submitted();\n        metrics.record_task_submitted();\n        metrics.record_task_submitted();\n\n        assert_eq!(metrics.total_submitted(), 3);\n    }\n\n    #[test]\n    fn test_metrics_record_started() {\n        let metrics = Metrics::new();\n\n        metrics.record_task_started();\n        metrics.record_task_started();\n\n        assert_eq!(metrics.total_started(), 2);\n    }\n\n    #[test]\n    fn test_metrics_record_completed() {\n        let metrics = Metrics::new();\n\n        metrics.record_task_started();\n        metrics.record_task_completed(100);\n        metrics.record_task_started();\n        metrics.record_task_completed(200);\n\n        assert_eq!(metrics.total_completed(), 2);\n        assert_eq!(metrics.total_duration_ms(), 300);\n        assert_eq!(metrics.avg_duration_ms(), 150);\n    }\n\n    #[test]\n    fn test_metrics_record_failed() {\n        let metrics = Metrics::new();\n\n        metrics.record_task_started();\n        metrics.record_task_failed();\n        metrics.record_task_started();\n        metrics.record_task_failed();\n\n        assert_eq!(metrics.total_failed(), 2);\n    }\n\n    #[test]\n    fn test_metrics_record_retry() {\n        let metrics = Metrics::new();\n\n        metrics.record_retry();\n        metrics.record_retry();\n        metrics.record_retry();\n\n        assert_eq!(metrics.total_retries(), 3);\n    }\n\n    #[test]\n    fn test_metrics_success_rate() {\n        let metrics = Metrics::new();\n\n        // No tasks yet - should be 1.0\n        assert_eq!(metrics.success_rate(), 1.0);\n\n        // Some completed, no failures\n        metrics.record_task_started();\n        metrics.record_task_completed(100);\n        assert_eq!(metrics.success_rate(), 1.0);\n\n        // Add a failure\n        metrics.record_task_started();\n        metrics.record_task_failed();\n\n        // 1 completed, 1 failed = 0.5\n        assert!((metrics.success_rate() - 0.5).abs() \u003c 0.001);\n    }\n\n    #[test]\n    fn test_metrics_avg_duration() {\n        let metrics = Metrics::new();\n\n        // No completed tasks\n        assert_eq!(metrics.avg_duration_ms(), 0);\n\n        // Add some completed tasks\n        metrics.record_task_started();\n        metrics.record_task_completed(100);\n        metrics.record_task_started();\n        metrics.record_task_completed(200);\n        metrics.record_task_started();\n        metrics.record_task_completed(300);\n\n        assert_eq!(metrics.avg_duration_ms(), 200);\n    }\n\n    #[test]\n    fn test_metrics_throughput() {\n        let metrics = Metrics::new();\n\n        // No tasks - throughput should be 0\n        let initial = metrics.throughput();\n        assert_eq!(initial, 0.0);\n\n        // Add some tasks\n        metrics.record_task_started();\n        metrics.record_task_completed(100);\n        metrics.record_task_started();\n        metrics.record_task_failed();\n\n        // After some time, throughput should be calculable\n        std::thread::sleep(Duration::from_millis(10));\n\n        let throughput = metrics.throughput();\n        assert!(throughput \u003e 0.0);\n    }\n\n    #[test]\n    fn test_metrics_snapshot() {\n        let metrics = Metrics::new();\n\n        metrics.record_task_submitted();\n        metrics.record_task_started();\n        metrics.record_task_completed(100);\n        metrics.record_task_started();\n        metrics.record_task_failed();\n        metrics.record_retry();\n\n        // Small delay to ensure uptime \u003e 0\n        std::thread::sleep(Duration::from_millis(1));\n\n        let snapshot = metrics.snapshot();\n\n        assert_eq!(snapshot.submitted, 1);\n        assert_eq!(snapshot.started, 2);\n        assert_eq!(snapshot.completed, 1);\n        assert_eq!(snapshot.failed, 1);\n        assert_eq!(snapshot.retries, 1);\n        assert_eq!(snapshot.total_duration_ms, 100);\n        assert_eq!(snapshot.avg_duration_ms, 100);\n        assert!(snapshot.uptime_ms \u003e 0);\n    }\n\n    #[test]\n    fn test_metrics_uptime() {\n        let metrics = Metrics::new();\n\n        std::thread::sleep(Duration::from_millis(10));\n\n        let uptime = metrics.uptime();\n        assert!(uptime.as_millis() \u003e= 10);\n    }\n\n    #[test]\n    fn test_metrics_clone() {\n        let metrics = Metrics::new();\n        metrics.record_task_submitted();\n\n        let cloned = metrics.clone();\n\n        assert_eq!(cloned.total_submitted(), 1);\n    }\n}\n","traces":[{"line":21,"address":[16366541,16366535,16365616],"length":1,"stats":{"Line":0}},{"line":23,"address":[16365642  TaskQueue {\n    queue: Arc\u003cMutex\u003cBinaryHeap\u003cTaskEntry\u003e\u003e\u003e,\n    running_count: Arc\u003cMutex\u003cusize\u003e\u003e,\n    max_concurrency: usize,\n    next_insertion_order: Arc\u003cMutex\u003cu64\u003e\u003e,\n}\n\nimpl TaskQueue {\n    /// Create a new task queue\n    pub fn new(max_concurrency: usize) -\u003e Self {\n        Self {\n            queue: Arc::new(Mutex::new(BinaryHeap::new())),\n            running_count: Arc::new(Mutex::new(0)),\n            max_concurrency,\n            next_insertion_order: Arc::new(Mutex::new(0)),\n        }\n    }\n\n    /// Enqueue a task\n    pub fn enqueue(\u0026self, task: Task) {\n        let order = {\n            let mut counter = self.next_insertion_order.lock().unwrap();\n            let order = *counter;\n            *counter += 1;\n            order\n        };\n\n        let entry = TaskEntry {\n            task,\n            insertion_order: order,\n        };\n\n        self.queue.lock().unwrap().push(entry);\n    }\n\n    /// Dequeue the next task if concurrency allows\n    pub fn dequeue(\u0026self) -\u003e Option\u003cTask\u003e {\n        let running = *self.running_count.lock().unwrap();\n\n        if running \u003e= self.max_concurrency {\n            return None;\n        }\n\n        let entry = self.queue.lock().unwrap().pop()?;\n\n        *self.running_count.lock().unwrap() += 1;\n\n        Some(entry.task)\n    }\n\n    /// Mark a task as completed (frees up a concurrency slot)\n    pub fn complete(\u0026self) {\n        let mut count = self.running_count.lock().unwrap();\n        if *count \u003e 0 {\n            *count -= 1;\n        }\n    }\n\n    /// Get the number of pending tasks\n    pub fn pending_count(\u0026self) -\u003e usize {\n        self.queue.lock().unwrap().len()\n    }\n\n    /// Get the number of running tasks\n    pub fn running_count(\u0026self) -\u003e usize {\n        *self.running_count.lock().unwrap()\n    }\n\n    /// Get the total number of tasks (pending + running)\n    pub fn total_count(\u0026self) -\u003e usize {\n        let pending = self.queue.lock().unwrap().len();\n        let running = *self.running_count.lock().unwrap();\n        pending + running\n    }\n\n    /// Check if at capacity (running \u003e= max_concurrency)\n    pub fn is_at_capacity(\u0026self) -\u003e bool {\n        *self.running_count.lock().unwrap() \u003e= self.max_concurrency\n    }\n\n    /// Peek at the next task without removing it\n    pub fn peek(\u0026self) -\u003e Option\u003cTask\u003e {\n        self.queue.lock().unwrap().peek().map(|e| e.task.clone())\n    }\n\n    /// Get all pending tasks (for debugging/inspection)\n    pub fn pending_tasks(\u0026self) -\u003e Vec\u003cTask\u003e {\n        self.queue\n            .lock()\n            .unwrap()\n            .iter()\n            .map(|e| e.task.clone())\n            .collect()\n    }\n\n    /// Re-queue a task (e.g., for retry)\n    pub fn requeue(\u0026self, task: Task) {\n        self.enqueue(task);\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use crate::orchestrator::task::{Priority, TaskSource};\n\n    fn create_test_task(payload: \u0026str) -\u003e Task {\n        Task::new(payload.to_string())\n    }\n\n    fn create_test_task_with_priority(payload: \u0026str, priority: Priority) -\u003e Task {\n        Task::new(payload.to_string()).with_priority(priority)\n    }\n\n    #[test]\n    fn test_queue_new() {\n        let queue = TaskQueue::new(2);\n        assert_eq!(queue.pending_count(), 0);\n        assert_eq!(queue.running_count(), 0);\n    }\n\n    #[test]\n    fn test_queue_enqueue_dequeue() {\n        let queue = TaskQueue::new(2);\n\n        queue.enqueue(create_test_task(\"task1\"));\n        assert_eq!(queue.pending_count(), 1);\n\n        let task = queue.dequeue();\n        assert!(task.is_some());\n        assert_eq!(task.unwrap().payload, \"task1\");\n        assert_eq!(queue.pending_count(), 0);\n        assert_eq!(queue.running_count(), 1);\n    }\n\n    #[test]\n    fn test_queue_empty_dequeue() {\n        let queue = TaskQueue::new(2);\n\n        let task = queue.dequeue();\n        assert!(task.is_none());\n    }\n\n    #[test]\n    fn test_queue_complete() {\n        let queue = TaskQueue::new(2);\n\n        queue.enqueue(create_test_task(\"task1\"));\n        let _task = queue.dequeue();\n        assert_eq!(queue.running_count(), 1);\n\n        queue.complete();\n        assert_eq!(queue.running_count(), 0);\n    }\n\n    #[test]\n    fn test_queue_priority_ordering() {\n        let queue = TaskQueue::new(10);\n\n        queue.enqueue(create_test_task_with_priority(\"low\", Priority::Low));\n        queue.enqueue(create_test_task_with_priority(\"high\", Priority::High));\n        queue.enqueue(create_test_task_with_priority(\"normal1\", Priority::Normal));\n        queue.enqueue(create_test_task_with_priority(\"normal2\", Priority::Normal));\n        queue.enqueue(create_test_task_with_priority(\n            \"critical\",\n            Priority::Critical,\n        ));\n\n        let task = queue.dequeue().unwrap();\n        assert_eq!(task.payload, \"critical\");\n\n        let task = queue.dequeue().unwrap();\n        assert_eq!(task.payload, \"high\");\n\n        let task = queue.dequeue().unwrap();\n        assert!(task.payload == \"normal1\" || task.payload == \"normal2\");\n\n        let task = queue.dequeue().unwrap();\n        assert!(task.payload == \"normal1\" || task.payload == \"normal2\");\n\n        let task = queue.dequeue().unwrap();\n        assert_eq!(task.payload, \"low\");\n    }\n\n    #[test]\n    fn test_queue_fifo_same_priority() {\n        let queue = TaskQueue::new(10);\n\n        queue.enqueue(create_test_task(\"task1\"));\n        queue.enqueue(create_test_task(\"task2\"));\n        queue.enqueue(create_test_task(\"task3\"));\n\n        assert_eq!(queue.dequeue().unwrap().payload, \"task1\");\n        assert_eq!(queue.dequeue().unwrap().payload, \"task2\");\n        assert_eq!(queue.dequeue().unwrap().payload, \"task3\");\n    }\n\n    #[test]\n    fn test_queue_concurrency_limit() {\n        let queue = TaskQueue::new(2);\n\n        queue.enqueue(create_test_task(\"task1\"));\n        queue.enqueue(create_test_task(\"task2\"));\n        queue.enqueue(create_test_task(\"task3\"));\n\n        let _t1 = queue.dequeue();\n        let _t2 = queue.dequeue();\n        assert_eq!(queue.running_count(), 2);\n\n        // Third task should not be available yet\n        let t3 = queue.dequeue();\n        assert!(t3.is_none());\n\n        assert!(queue.is_at_capacity());\n\n        queue.complete();\n        assert!(!queue.is_at_capacity());\n\n        let t3 = queue.dequeue();\n        assert!(t3.is_some());\n        assert_eq!(t3.unwrap().payload, \"task3\");\n    }\n\n    #[test]\n    fn test_queue_total_count() {\n        let queue = TaskQueue::new(2);\n\n        queue.enqueue(create_test_task(\"task1\"));\n        queue.enqueue(create_test_task(\"task2\"));\n\n        let _ = queue.dequeue();\n\n        assert_eq!(queue.total_count(), 2); // 1 pending + 1 running\n    }\n\n    #[test]\n    fn test_queue_peek() {\n        let queue = TaskQueue::new(2);\n\n        queue.enqueue(create_test_task(\"task1\"));\n        queue.enqueue(create_test_task(\"task2\"));\n\n        let peeked = queue.peek();\n        assert!(peeked.is_some());\n        assert_eq!(peeked.unwrap().payload, \"task1\");\n\n        // Peek doesn't remove\n        assert_eq!(queue.pending_count(), 2);\n    }\n\n    #[test]\n    fn test_queue_pending_tasks() {\n        let queue = TaskQueue::new(2);\n\n        queue.enqueue(create_test_task(\"task1\"));\n        queue.enqueue(create_test_task(\"task2\"));\n\n        let tasks = queue.pending_tasks();\n        assert_eq!(tasks.len(), 2);\n    }\n\n    #[test]\n    fn test_queue_requeue() {\n        let queue = TaskQueue::new(2);\n\n        queue.enqueue(create_test_task(\"task1\"));\n        let mut task2 = create_test_task(\"task2\");\n        task2.start();\n\n        queue.requeue(task2);\n\n        assert_eq!(queue.pending_count(), 2);\n    }\n}\n","traces":[{"line":17,"address":[13568048],"length":1,"stats":{"Line":0}},{"line":18,"address":[13568071],"length":1,"stats":{"Line":0}},{"line":25,"address":[13568144],"length":1,"stats":{"Line":0}},{"line":26,"address":[13568158],"length":1,"stats":{"Line":0}},{"line":31,"address":[13567568],"length":1,"stats":{"Line":0}},{"line":33,"address":[13567591],"length":1,"stats":{"Line":0}},{"line":34,"address":[13567614],"length":1,"stats":{"Line":0}},{"line":35,"address":[13567670],"length":1,"stats":{"Line":0}},{"line":38,"address":[13567645],"length":1,"stats":{"Line":0}},{"line":53,"address":[13564502,13564508,13564208],"length":1,"stats":{"Line":0}},{"line":55,"address":[13564248],"length":1,"stats":{"Line":0}},{"line":56,"address":[13564288,13564356],"length":1,"stats":{"Line":0}},{"line":58,"address":[13564439,13564390],"length":1,"stats":{"Line":0}},{"line":63,"address":[13566423,13566447,13565680],"length":1,"stats":{"Line":0}},{"line":64,"address":[13565705],"length":1,"stats":{"Line":0}},{"line":65,"address":[13565729,13565805],"length":1,"stats":{"Line":0}},{"line":66,"address":[13565934,13565877],"length":1,"stats":{"Line":0}},{"line":67,"address":[13566023,13565958],"length":1,"stats":{"Line":0}},{"line":76,"address":[13566144,13566210],"length":1,"stats":{"Line":0}},{"line":80,"address":[13564736,13565652,13565646],"length":1,"stats":{"Line":0}},{"line":81,"address":[13564774],"length":1,"stats":{"Line":0}},{"line":83,"address":[13564960],"length":1,"stats":{"Line":0}},{"line":84,"address":[13565057],"length":1,"stats":{"Line":0}},{"line":87,"address":[13564971,13565083,13565665],"length":1,"stats":{"Line":0}},{"line":89,"address":[13565340],"length":1,"stats":{"Line":0}},{"line":91,"address":[13565584],"length":1,"stats":{"Line":0}},{"line":95,"address":[13566782,13566544,13566788],"length":1,"stats":{"Line":0}},{"l \n\nimpl fmt::Display for TaskId {\n    fn fmt(\u0026self, f: \u0026mut fmt::Formatter\u003c'_\u003e) -\u003e fmt::Result {\n        write!(f, \"TaskId({})\", self.0)\n    }\n}\n\n/// Source of the task\n#[derive(Debug, Clone, PartialEq, Eq, Serialize, Deserialize)]\npub enum TaskSource {\n    /// Task from scheduled job\n    Scheduled,\n    /// Task from user message\n    UserMessage,\n    /// Task from API\n    Api,\n    /// Task from webhook\n    Webhook,\n    /// Task from other source\n    Other(String),\n}\n\nimpl Default for TaskSource {\n    fn default() -\u003e Self {\n        Self::Other(\"unknown\".to_string())\n    }\n}\n\n/// Status of a task\n#[derive(Debug, Clone, PartialEq, Eq, Serialize, Deserialize)]\npub enum TaskStatus {\n    /// Task is pending in queue\n    Pending,\n    /// Task is currently running\n    Running,\n    /// Task completed successfully\n    Completed,\n    /// Task failed\n    Failed { error: String },\n    /// Task is queued for retry\n    Retrying { attempt: u32 },\n}\n\nimpl Default for TaskStatus {\n    fn default() -\u003e Self {\n        Self::Pending\n    }\n}\n\n/// Priority level for tasks\n#[derive(Debug, Clone, Copy, PartialEq, Eq, PartialOrd, Ord, Serialize, Deserialize)]\npub enum Priority {\n    /// Lowest priority\n    Low = 0,\n    /// Normal priority\n    Normal = 1,\n    /// High priority\n    High = 2,\n    /// Critical priority\n    Critical = 3,\n}\n\nimpl Default for Priority {\n    fn default() -\u003e Self {\n        Self::Normal\n    }\n}\n\n/// A task to be executed by the orchestrator\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct Task {\n    /// Unique identifier\n    pub id: TaskId,\n    /// Task payload/data\n    pub payload: String,\n    /// Source of the task\n    pub source: TaskSource,\n    /// Priority level\n    pub priority: Priority,\n    /// Current status\n    pub status: TaskStatus,\n    /// Number of retry attempts\n    pub retry_count: u32,\n    /// Maximum retry attempts\n    pub max_retries: u32,\n    /// Created timestamp (ISO 8601)\n    pub created_at: String,\n    /// Started timestamp (ISO 8601)\n    pub started_at: Option\u003cString\u003e,\n    /// Completed timestamp (ISO 8601)\n    pub completed_at: Option\u003cString\u003e,\n}\n\nimpl Task {\n    /// Create a new task with default values\n    pub fn new(payload: String) -\u003e Self {\n        Self {\n            id: TaskId::new(),\n            payload,\n            source: TaskSource::default(),\n            priority: Priority::default(),\n            status: TaskStatus::default(),\n            retry_count: 0,\n            max_retries: 3,\n            created_at: chrono::Utc::now().to_rfc3339(),\n            started_at: None,\n            completed_at: None,\n        }\n    }\n\n    /// Create a task with custom source\n    pub fn with_source(mut self, source: TaskSource) -\u003e Self {\n        self.source = source;\n        self\n    }\n\n    /// Create a task with custom priority\n    pub fn with_priority(mut self, priority: Priority) -\u003e Self {\n        self.priority = priority;\n        self\n    }\n\n    /// Create a task with custom max retries\n    pub fn with_max_retries(mut self, max_retries: u32) -\u003e Self {\n        self.max_retries = max_retries;\n        self\n    }\n\n    /// Check if task can be retried\n    pub fn can_retry(\u0026self) -\u003e bool {\n        self.retry_count \u003c self.max_retries\n    }\n\n    /// Mark task as running\n    pub fn start(\u0026mut self) {\n        self.status = TaskStatus::Running;\n        self.started_at = Some(chrono::Utc::now().to_rfc3339());\n    }\n\n    /// Mark task as completed\n    pub fn complete(\u0026mut self) {\n        self.status = TaskStatus::Completed;\n        self.completed_at = Some(chrono::Utc::now().to_rfc3339());\n    }\n\n    /// Mark task as failed\n    pub fn fail(\u0026mut self, error: String) {\n        if self.can_retry() {\n            self.retry_count += 1;\n            self.status = TaskStatus::Retrying {\n                attempt: self.retry_count,\n            };\n        } else {\n            self.status = TaskStatus::Failed { error };\n            self.completed_at = Some(chrono::Utc::now().to_rfc3339());\n        }\n    }\n}\n\n/// Result of task execution\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct TaskResult {\n    /// Task ID\n    pub task_id: TaskId,\n    /// Whether execution was successful\n    pub success: bool,\n    /// Output/result of the task\n    pub output: Option\u003cString\u003e,\n    /// Error message if failed\n    pub error: Option\u003cString\u003e,\n    /// Execution duration in milliseconds\n    pub duration_ms: u64,\n}\n\nimpl TaskResult {\n    /// Create a successful result\n    pub fn success(task_id: TaskId, output: String, duration_ms: u64) -\u003e Self {\n        Self {\n            task_id,\n            success: true,\n            output: Some(output),\n            error: None,\n            duration_ms,\n        }\n    }\n\n    /// Create a failed result\n    pub fn failure(task_id: TaskId, error: String, duration_ms: u64) -\u003e Self {\n        Self {\n            task_id,\n            success: false,\n            output: None,\n            error: Some(error),\n            duration_ms,\n        }\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_task_id_new() {\n        let id1 = TaskId::new();\n        let id2 = TaskId::new();\n        assert_ne!(id1, id2);\n    }\n\n    #[test]\n    fn test_task_id_display() {\n        let id = TaskId(\"test-123\".to_string());\n        assert_eq!(format!(\"{}\", id), \"TaskId(test-123)\");\n    }\n\n    #[test]\n    fn test_task_id_default() {\n        let id1 = TaskId::default();\n        let id2 = TaskId::default();\n        // Should be different (random UUID)\n        assert_ne!(id1, id2);\n    }\n\n    #[test]\n    fn test_task_source_variants() {\n        let _ = TaskSource::Scheduled;\n        let _ = TaskSource::UserMessage;\n        let _ = TaskSource::Api;\n        let _ = TaskSource::Webhook;\n        let _ = TaskSource::Other(\"custom\".to_string());\n    }\n\n    #[test]\n    fn test_task_status_variants() {\n        let _ = TaskStatus::Pending;\n        let _ = TaskStatus::Running;\n        let _ = TaskStatus::Completed;\n        let _ = TaskStatus::Failed {\n            error: \"error\".to_string(),\n        };\n        let _ = TaskStatus::Retrying { attempt: 1 };\n    }\n\n    #[test]\n    fn test_priority_ordering() {\n        assert!(Priority::Critical \u003e Priority::High);\n        assert!(Priority::High \u003e Priority::Normal);\n        assert!(Priority::Normal \u003e Priority::Low);\n    }\n\n    #[test]\n    fn test_task_new() {\n        let task = Task::new(\"test payload\".to_string());\n        assert_eq!(task.payload, \"test payload\");\n        assert_eq!(task.status, TaskStatus::Pending);\n        assert_eq!(task.priority, Priority::Normal);\n        assert_eq!(task.retry_count, 0);\n        assert_eq!(task.max_retries, 3);\n    }\n\n    #[test]\n    fn test_task_with_source() {\n        let task = Task::new(\"test\".to_string()).with_source(TaskSource::Scheduled);\n        assert_eq!(task.source, TaskSource::Scheduled);\n    }\n\n    #[test]\n    fn test_task_with_priority() {\n        let task = Task::new(\"test\".to_string()).with_priority(Priority::High);\n        assert_eq!(task.priority, Priority::High);\n    }\n\n    #[test]\n    fn test_task_with_max_retries() {\n        let task = Task::new(\"test\".to_string()).with_max_retries(5);\n        assert_eq!(task.max_retries, 5);\n    }\n\n    #[test]\n    fn test_task_can_retry() {\n        let mut task = Task::new(\"test\".to_string());\n        assert!(task.can_retry());\n\n        task.retry_count = 2;\n        assert!(task.can_retry());\n\n        task.retry_count = 3;\n        assert!(!task.can_retry());\n    }\n\n    #[test]\n    fn test_task_start() {\n        let mut task = Task::new(\"test\".to_string());\n        task.start();\n\n        assert_eq!(task.status, TaskStatus::Running);\n        assert!(task.started_at.is_some());\n    }\n\n    #[test]\n    fn test_task_complete() {\n        let mut task = Task::new(\"test\".to_string());\n        task.start();\n        task.complete();\n\n        assert_eq!(task.status, TaskStatus::Completed);\n        assert!(task.completed_at.is_some());\n    }\n\n    #[test]\n    fn test_task_fail_triggers_retry() {\n        let mut task = Task::new(\"test\".to_string()).with_max_retries(3);\n\n        task.fail(\"error 1\".to_string());\n\n        match \u0026task.status {\n            TaskStatus::Retrying { attempt } =\u003e {\n                assert_eq!(*attempt, 1);\n                assert!(task.can_retry());\n            }\n            _ =\u003e panic!(\"Expected Retrying status\"),\n        }\n    }\n\n    #[test]\n    fn test_task_fail_exhausts_retries() {\n        let mut task = Task::new(\"test\".to_string()).with_max_retries(2);\n\n        task.retry_count = 2; // Already at max\n        task.fail(\"error\".to_string());\n\n        match \u0026task.status {\n            TaskStatus::Failed { error } =\u003e {\n                assert_eq!(error, \"error\");\n                assert!(!task.can_retry());\n            }\n            _ =\u003e panic!(\"Expected Failed status\"),\n        }\n    }\n\n    #[test]\n    fn test_task_result_success() {\n        let id = TaskId::new();\n        let result = TaskResult::success(id.clone(), \"output\".to_string(), 100);\n\n        assert!(result.success);\n        assert_eq!(result.output, Some(\"output\".to_string()));\n        assert_eq!(result.error, None);\n        assert_eq!(result.duration_ms, 100);\n    }\n\n    #[test]\n    fn test_task_result_failure() {\n        let id = TaskId::new();\n        let result = TaskResult::failure(id.clone(), \"error\".to_string(), 50);\n\n        assert!(!result.success);\n        assert_eq!(result.output, None);\n        assert_eq!(result.error, Some(\"error\".to_string()));\n        assert_eq!(result.duration_ms, 50);\n    }\n}\n","traces":[{"line":11,"address":[16188064],"length":1,"stats":{"Line":0}},{"line":12,"address":[16188077],"length":1,"stats":{"Line":0}},{"line":17,"address":[16190576],"length":1,"stats":{"Line":0}},{"line":18,"address":[16190584],"length":1,"stats":{"Line":0}},{"line":23,"address":[16189360],"length":1,"stats":{"Line":0}},{"line":24,"address":[16189385],"length":1,"stats":{"Line":0}},{"line":44,"address":[16192208],"length":1,"stats":{"Line":0}},{"line":45,"address":[16192221],"length":1,"stats":{"Line":0}},{"line":65,"address":[16192288],"length":1,"stats":{"Line":0}},{"line":66,"address":[16192291],"length":1,"stats":{"Line":0}},{"line":116,"address":[16186560,16186581,16185936],"length":1,"stats":{"Line":0}},{"line":118,"address":[16185958],"length":1,"stats":{"Line":0}},{"line":120,"address":[16186062],"length":1,"stats":{"Line":0}},{"line":121,"address":[16186110],"length":1,"stats":{"Line":0}},{"line":122,"address":[16186160],"length":1,"stats":{"Line":0}},{"line":125,"address":[16186236,16186167],"length":1,"stats":{"Line":0}},{"line":132,"address":[16185822,16185664],"length":1,"stats":{"Line":0}},{"line":133,"address":[16185696,16185773],"length":1,"stats":{"Line":0}},{"line":134,"address":[16185802],"length":1,"stats":{"Line":0}},{"line":138,"address":[16185840],"length":1,"stats":{"Line":0}},{"line":139,"address":[16185858],"length":1,"stats":{"Line":0}},{"line":140,"address":[16185864],"length":1,"stats":{"Line":0}},{"line":144,"address":[16185888],"length":1,"stats":{"Line":0}},{"line":145,"address":[16185904],"length":1,"stats":{"Line":0}},{"line":146,"address":[16185910],"length":1,"stats":{"Line":0}},{"line":150,"address":[16188032],"length":1,"stats":{"Line":0}},{"line":151,"address":[16188037],"length":1,"stats":{"Line":0}},{"line":155,"address":[16187392,16187699],"length":1,"stats":{"Line":0}},{"line":156,"address":[16187443,16187419],"length           role: \"assistant\".into(),\n            content: content.into(),\n        }\n    }\n}\n\n#[derive(Debug, Clone)]\npub struct ChatResponse {\n    pub text: Option\u003cString\u003e,\n}\n\nimpl ChatResponse {\n    pub fn has_text(\u0026self) -\u003e bool {\n        self.text.as_ref().map(|s| !s.is_empty()).unwrap_or(false)\n    }\n\n    pub fn text_or_empty(\u0026self) -\u003e \u0026str {\n        self.text.as_deref().unwrap_or(\"\")\n    }\n}\n\n#[async_trait]\npub trait Provider: Send + Sync {\n    fn name(\u0026self) -\u003e \u0026str;\n\n    async fn chat(\u0026self, message: \u0026str, model: \u0026str, temperature: f64) -\u003e Result\u003cString\u003e;\n\n    async fn chat_with_system(\n        \u0026self,\n        _system: Option\u003c\u0026str\u003e,\n        message: \u0026str,\n        model: \u0026str,\n        temperature: f64,\n    ) -\u003e Result\u003cString\u003e {\n        self.chat(message, model, temperature).await\n    }\n\n    fn context_window(\u0026self) -\u003e usize {\n        100000\n    }\n\n    fn max_output_tokens(\u0026self) -\u003e usize {\n        4096\n    }\n}\n\n#[derive(Debug, Clone)]\npub struct ProviderSpec {\n    pub name: \u0026'static str,\n    pub api_key_env: \u0026'static str,\n    pub base_url_env: \u0026'static str,\n    pub default_model: Option\u003c\u0026'static str\u003e,\n    pub description: \u0026'static str,\n}\n\nimpl ProviderSpec {\n    pub const fn new(\n        name: \u0026'static str,\n        api_key_env: \u0026'static str,\n        base_url_env: \u0026'static str,\n        default_model: Option\u003c\u0026'static str\u003e,\n        description: \u0026'static str,\n    ) -\u003e Self {\n        Self {\n            name,\n            api_key_env,\n            base_url_env,\n            default_model,\n            description,\n        }\n    }\n}\n\npub const PROVIDERS: \u0026[ProviderSpec] = \u0026[\n    ProviderSpec::new(\n        \"anthropic\",\n        \"ANTHROPIC_API_KEY\",\n        \"ANTHROPIC_BASE_URL\",\n        Some(\"claude-sonnet-4-20250514\"),\n        \"Anthropic Claude API\",\n    ),\n    ProviderSpec::new(\n        \"openai\",\n        \"OPENAI_API_KEY\",\n        \"OPENAI_BASE_URL\",\n        Some(\"gpt-4o\"),\n        \"OpenAI GPT API\",\n    ),\n    ProviderSpec::new(\n        \"openrouter\",\n        \"OPENROUTER_API_KEY\",\n        \"OPENROUTER_BASE_URL\",\n        Some(\"anthropic/claude-sonnet-4-20250514\"),\n        \"OpenRouter - Unified LLM Gateway\",\n    ),\n    ProviderSpec::new(\n        \"custom\",\n        \"CUSTOM_API_KEY\",\n        \"CUSTOM_BASE_URL\",\n        None,\n        \"Custom OpenAI-compatible endpoint\",\n    ),\n];\n\n#[derive(Debug, Clone)]\npub struct ProviderConfig {\n    pub name: String,\n    pub api_key: Option\u003cString\u003e,\n    pub base_url: Option\u003cString\u003e,\n    pub model: Option\u003cString\u003e,\n}\n\nimpl ProviderConfig {\n    pub fn from_spec(spec: \u0026ProviderSpec) -\u003e Self {\n        let api_key = std::env::var(spec.api_key_env).ok();\n        let base_url = std::env::var(spec.base_url_env).ok();\n\n        let model = if spec.default_model.is_some() {\n            std::env::var(format!(\"{}_MODEL\", spec.name.to_uppercase()))\n                .ok()\n                .or_else(|| std::env::var(\"CLAUDE_MODEL\").ok())\n                .or_else(|| spec.default_model.map(|s| s.to_string()))\n        } else {\n            None\n        };\n\n        Self {\n            name: spec.name.to_string(),\n            api_key,\n            base_url,\n            model,\n        }\n    }\n\n    pub fn is_configured(\u0026self) -\u003e bool {\n        self.api_key.is_some()\n    }\n}\n\npub struct ProviderRegistry {\n    specs: RwLock\u003cHashMap\u003cString, \u0026'static ProviderSpec\u003e\u003e,\n    configs: RwLock\u003cHashMap\u003cString, ProviderConfig\u003e\u003e,\n}\n\nimpl ProviderRegistry {\n    pub fn new() -\u003e Self {\n        let specs_map: HashMap\u003cString, \u0026'static ProviderSpec\u003e = PROVIDERS\n            .iter()\n            .map(|spec| (spec.name.to_string(), spec))\n            .collect();\n        Self {\n            specs: RwLock::new(specs_map),\n            configs: RwLock::new(HashMap::new()),\n        }\n    }\n\n    pub fn register(\u0026self, spec: \u0026'static ProviderSpec) {\n        if let Ok(mut specs) = self.specs.write() {\n            specs.insert(spec.name.to_string(), spec);\n        }\n    }\n\n    pub fn get_spec(\u0026self, name: \u0026str) -\u003e Option\u003c\u0026'static ProviderSpec\u003e {\n        self.specs.read().ok()?.get(name).copied()\n    }\n\n    pub fn list_specs(\u0026self) -\u003e Vec\u003c\u0026'static ProviderSpec\u003e {\n        self.specs\n            .read()\n            .ok()\n            .map(|s| s.values().copied().collect())\n            .unwrap_or_default()\n    }\n\n    pub fn load_config(\u0026self, name: \u0026str) -\u003e Option\u003cProviderConfig\u003e {\n        self.specs\n            .read()\n            .ok()?\n            .get(name)\n            .copied()\n            .map(ProviderConfig::from_spec)\n    }\n\n    pub fn get_config(\u0026self, name: \u0026str) -\u003e Option\u003cProviderConfig\u003e {\n        let configs = self.configs.read().ok()?;\n        configs.get(name).cloned()\n    }\n\n    pub fn set_config(\u0026self, config: ProviderConfig) {\n        if let Ok(mut configs) = self.configs.write() {\n            configs.insert(config.name.clone(), config);\n        }\n    }\n\n    pub fn detect_provider(\u0026self) -\u003e Option\u003cString\u003e {\n        for spec in PROVIDERS {\n            let config = ProviderConfig::from_spec(spec);\n            if config.is_configured() {\n                return Some(spec.name.to_string());\n            }\n        }\n        None\n    }\n\n    pub fn is_configured(\u0026self, name: \u0026str) -\u003e bool {\n        self.load_config(name)\n            .map(|c| c.is_configured())\n            .unwrap_or(false)\n    }\n}\n\nimpl Default for ProviderRegistry {\n    fn default() -\u003e Self {\n        Self::new()\n    }\n}\n\npub fn provider_registry() -\u003e ProviderRegistry {\n    ProviderRegistry::new()\n}\n\npub struct AnthropicProvider {\n    client: Client,\n    api_key: String,\n    base_url: String,\n    default_model: String,\n}\n\nimpl AnthropicProvider {\n    pub fn new(api_key: String, base_url: Option\u003cString\u003e, model: Option\u003cString\u003e) -\u003e Self {\n        Self {\n            client: Client::new(),\n            api_key,\n            base_url: base_url.unwrap_or_else(|| \"https://api.anthropic.com\".to_string()),\n            default_model: model.unwrap_or_else(|| \"claude-sonnet-4-20250514\".to_string()),\n        }\n    }\n}\n\n#[async_trait]\nimpl Provider for AnthropicProvider {\n    fn name(\u0026self) -\u003e \u0026str {\n        \"anthropic\"\n    }\n\n    async fn chat(\u0026self, message: \u0026str, model: \u0026str, temperature: f64) -\u003e Result\u003cString\u003e {\n        self.chat_with_system(None, message, model, temperature)\n            .await\n    }\n\n    async fn chat_with_system(\n        \u0026self,\n        system: Option\u003c\u0026str\u003e,\n        message: \u0026str,\n        model: \u0026str,\n        temperature: f64,\n    ) -\u003e Result\u003cString\u003e {\n        let model = if model.is_empty() {\n            \u0026self.default_model\n        } else {\n            model\n        };\n\n        #[derive(serde::Serialize)]\n        struct Request {\n            model: String,\n            max_tokens: usize,\n            temperature: f64,\n            system: Option\u003cString\u003e,\n            messages: Vec\u003cMessage\u003e,\n        }\n\n        #[derive(serde::Serialize)]\n        struct Message {\n            role: String,\n            content: String,\n        }\n\n        let request = Request {\n            model: model.to_string(),\n            max_tokens: 4096,\n            temperature,\n            system: system.map(|s| s.to_string()),\n            messages: vec![Message {\n                role: \"user\".to_string(),\n                content: message.to_string(),\n            }],\n        };\n\n        let response = self\n            .client\n            .post(format!(\"{}/v1/messages\", self.base_url))\n            .header(\"x-api-key\", \u0026self.api_key)\n            .header(\"anthropic-version\", \"2023-06-01\")\n            .json(\u0026request)\n            .send()\n            .await\n            .map_err(|e| NuClawError::Api {\n                message: format!(\"Request failed: {}\", e),\n            })?;\n\n        if !response.status().is_success() {\n            let status = response.status();\n            let body = response.text().await.unwrap_or_default();\n            return Err(NuClawError::Api {\n                message: format!(\"API error {}: {}\", status, body),\n            });\n        }\n\n        #[derive(serde::Deserialize)]\n        struct Response {\n            content: Vec\u003cContentBlock\u003e,\n        }\n\n        #[derive(serde::Deserialize)]\n        struct ContentBlock {\n            text: Option\u003cString\u003e,\n        }\n\n        let resp: Response = response.json().await.map_err(|e| NuClawError::Api {\n            message: format!(\"Failed to parse response: {}\", e),\n        })?;\n\n        resp.content\n            .into_iter()\n            .find_map(|c| c.text)\n            .ok_or_else(|| NuClawError::Api {\n                message: \"No text in response\".to_string(),\n            })\n    }\n\n    fn context_window(\u0026self) -\u003e usize {\n        200000\n    }\n\n    fn max_output_tokens(\u0026self) -\u003e usize {\n        8192\n    }\n}\n\npub struct OpenAIProvider {\n    client: Client,\n    api_key: String,\n    base_url: String,\n    default_model: String,\n}\n\nimpl OpenAIProvider {\n    pub fn new(api_key: String, base_url: Option\u003cString\u003e, model: Option\u003cString\u003e) -\u003e Self {\n        Self {\n            client: Client::new(),\n            api_key,\n            base_url: base_url.unwrap_or_else(|| \"https://api.openai.com/v1\".to_string()),\n            default_model: model.unwrap_or_else(|| \"gpt-4o\".to_string()),\n        }\n    }\n}\n\n#[async_trait]\nimpl Provider for OpenAIProvider {\n    fn name(\u0026self) -\u003e \u0026str {\n        \"openai\"\n    }\n\n    async fn chat(\u0026self, message: \u0026str, model: \u0026str, temperature: f64) -\u003e Result\u003cString\u003e {\n        self.chat_with_system(None, message, model, temperature)\n            .await\n    }\n\n    async fn chat_with_system(\n        \u0026self,\n        system: Option\u003c\u0026str\u003e,\n        message: \u0026str,\n        model: \u0026str,\n        temperature: f64,\n    ) -\u003e Result\u003cString\u003e {\n        let model = if model.is_empty() {\n            \u0026self.default_model\n        } else {\n            model\n        };\n\n        #[derive(serde::Serialize)]\n        struct Request {\n            model: String,\n            temperature: f64,\n            messages: Vec\u003cMessage\u003e,\n        }\n\n        #[derive(serde::Serialize)]\n        struct Message {\n            role: String,\n            content: String,\n        }\n\n        let mut messages = Vec::new();\n        if let Some(sys) = system {\n            messages.push(Message {\n                role: \"system\".to_string(),\n                content: sys.to_string(),\n            });\n        }\n        messages.push(Message {\n            role: \"user\".to_string(),\n            content: message.to_string(),\n        });\n\n        let request = Request {\n            model: model.to_string(),\n            temperature,\n            messages,\n        };\n\n        let response = self\n            .client\n            .post(format!(\"{}/chat/completions\", self.base_url))\n            .header(\"Authorization\", format!(\"Bearer {}\", self.api_key))\n            .json(\u0026request)\n            .send()\n            .await\n            .map_err(|e| NuClawError::Api {\n                message: format!(\"Request failed: {}\", e),\n            })?;\n\n        if !response.status().is_success() {\n            let status = response.status();\n            let body = response.text().await.unwrap_or_default();\n            return Err(NuClawError::Api {\n                message: format!(\"API error {}: {}\", status, body),\n            });\n        }\n\n        #[derive(serde::Deserialize)]\n        struct Response {\n            choices: Vec\u003cChoice\u003e,\n        }\n\n        #[derive(serde::Deserialize)]\n        struct Choice {\n            message: ResponseMessage,\n        }\n\n        #[derive(serde::Deserialize)]\n        struct ResponseMessage {\n            content: String,\n        }\n\n        let resp: Response = response.json().await.map_err(|e| NuClawError::Api {\n            message: format!(\"Failed to parse response: {}\", e),\n        })?;\n\n        resp.choices\n            .into_iter()\n            .next()\n            .map(|c| c.message.content)\n            .ok_or_else(|| NuClawError::Api {\n                message: \"No choices in response\".to_string(),\n            })\n    }\n\n    fn context_window(\u0026self) -\u003e usize {\n        128000\n    }\n\n    fn max_output_tokens(\u0026self) -\u003e usize {\n        16384\n    }\n}\n\npub fn create_provider(name: \u0026str, config: \u0026ProviderConfig) -\u003e Option\u003cBox\u003cdyn Provider\u003e\u003e {\n    match name {\n        \"anthropic\" =\u003e {\n            if let Some(api_key) = \u0026config.api_key {\n                Some(Box::new(AnthropicProvider::new(\n                    api_key.clone(),\n                    config.base_url.clone(),\n                    config.model.clone(),\n                )))\n            } else {\n                None\n            }\n        }\n        \"openai\" =\u003e {\n            if let Some(api_key) = \u0026config.api_key {\n                Some(Box::new(OpenAIProvider::new(\n                    api_key.clone(),\n                    config.base_url.clone(),\n                    config.model.clone(),\n                )))\n            } else {\n                None\n            }\n        }\n        _ =\u003e None,\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_providers_list() {\n        let names: Vec\u003c\u0026str\u003e = PROVIDERS.iter().map(|p| p.name).collect();\n        assert!(names.contains(\u0026\"anthropic\"));\n        assert!(names.contains(\u0026\"openai\"));\n        assert!(names.contains(\u0026\"openrouter\"));\n    }\n\n    #[test]\n    fn test_provider_spec_fields() {\n        let spec = \u0026PROVIDERS[0];\n        assert_eq!(spec.name, \"anthropic\");\n        assert_eq!(spec.api_key_env, \"ANTHROPIC_API_KEY\");\n        assert!(spec.default_model.is_some());\n    }\n\n    #[test]\n    fn test_provider_registry_new() {\n        let registry = ProviderRegistry::new();\n        assert!(!registry.list_specs().is_empty());\n    }\n\n    #[test]\n    fn test_get_spec() {\n        let registry = ProviderRegistry::new();\n        let spec = registry.get_spec(\"anthropic\");\n        assert!(spec.is_some());\n        assert_eq!(spec.unwrap().name, \"anthropic\");\n    }\n\n    #[test]\n    fn test_get_spec_nonexistent() {\n        let registry = ProviderRegistry::new();\n        let spec = registry.get_spec(\"nonexistent\");\n        assert!(spec.is_none());\n    }\n\n    #[test]\n    fn test_load_config() {\n        std::env::remove_var(\"ANTHROPIC_API_KEY\");\n        let registry = ProviderRegistry::new();\n        let config = registry.load_config(\"anthropic\");\n        assert!(config.is_some());\n    }\n\n    #[test]\n    fn test_is_configured_no_key() {\n        std::env::remove_var(\"ANTHROPIC_API_KEY\");\n        let registry = ProviderRegistry::new();\n        assert!(!registry.is_configured(\"anthropic\"));\n    }\n\n    #[test]\n    fn test_is_configured_with_key() {\n        std::env::remove_var(\"ANTHROPIC_API_KEY\");\n        std::env::set_var(\"ANTHROPIC_API_KEY\", \"test-key\");\n        let registry = ProviderRegistry::new();\n        assert!(registry.is_configured(\"anthropic\"));\n        std::env::remove_var(\"ANTHROPIC_API_KEY\");\n    }\n\n    #[test]\n    fn test_set_config() {\n        let registry = ProviderRegistry::new();\n        let config = ProviderConfig {\n            name: \"test\".to_string(),\n            api_key: Some(\"key\".to_string()),\n            base_url: None,\n            model: None,\n        };\n        registry.set_config(config.clone());\n        let loaded = registry.get_config(\"test\");\n        assert!(loaded.is_some());\n        assert_eq!(loaded.unwrap().api_key, Some(\"key\".to_string()));\n    }\n\n    #[test]\n    fn test_detect_provider() {\n        std::env::remove_var(\"ANTHROPIC_API_KEY\");\n        std::env::remove_var(\"OPENAI_API_KEY\");\n\n        let registry = ProviderRegistry::new();\n        let detected = registry.detect_provider();\n        assert!(detected.is_none());\n\n        std::env::set_var(\"ANTHROPIC_API_KEY\", \"test-key\");\n        let detected = registry.detect_provider();\n        assert_eq!(detected, Some(\"anthropic\".to_string()));\n\n        std::env::remove_var(\"ANTHROPIC_API_KEY\");\n    }\n\n    #[test]\n    fn test_provider_config_model() {\n        std::env::remove_var(\"ANTHROPIC_API_KEY\");\n        std::env::remove_var(\"ANTHROPIC_MODEL\");\n        std::env::remove_var(\"CLAUDE_MODEL\");\n\n        let spec = ProviderSpec::new(\n            \"test\",\n            \"TEST_KEY\",\n            \"TEST_URL\",\n            Some(\"default-model\"),\n            \"desc\",\n        );\n        let config = ProviderConfig::from_spec(\u0026spec);\n        assert_eq!(config.model, Some(\"default-model\".to_string()));\n    }\n\n    #[test]\n    fn test_provider_config_env_model_override() {\n
