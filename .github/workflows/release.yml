name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            name: x86_64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Build release
        run: |
          cargo build --release --target ${{ matrix.target }}
          strip target/${{ matrix.target }}/release/nuclaw

      - name: Create tarball
        run: |
          tar -czf nuclaw-${{ matrix.target }}.tar.gz \
            -C target/${{ matrix.target }}/release nuclaw

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: nuclaw-${{ matrix.target }}.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    name: Build macOS ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            name: arm64
            runner: macos-14
          - target: x86_64-apple-darwin
            name: x86_64
            runner: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Build release
        run: |
          cargo build --release --target ${{ matrix.target }}
          strip target/${{ matrix.target }}/release/nuclaw

      - name: Create tarball
        run: |
          tar -czf nuclaw-${{ matrix.target }}.tar.gz \
            -C target/${{ matrix.target }}/release nuclaw

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: nuclaw-${{ matrix.target }}.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
