name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            name: x86_64
            cross: false
          - target: aarch64-unknown-linux-gnu
            name: arm64
            cross: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install cross compile tools
        if: matrix.cross == true
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Configure cross compilation
        if: matrix.cross == true
        run: |
          mkdir -p ~/.cargo
          printf '%s\n' '[target.aarch64-unknown-linux-gnu]' > ~/.cargo/config.toml
          printf '%s\n' 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Build release
        if: matrix.cross == false
        run: |
          cargo build --release --target ${{ matrix.target }}
          strip target/${{ matrix.target }}/release/nuclaw

      - name: Build release (cross)
        if: matrix.cross == true
        run: |
          export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
          export CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc
          cargo build --release --target ${{ matrix.target }}
          strip target/${{ matrix.target }}/release/nuclaw

      - name: Create tarball
        run: |
          tar -czf nuclaw-${{ matrix.target }}.tar.gz \
            -C target/${{ matrix.target }}/release nuclaw

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: nuclaw-${{ matrix.target }}.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    name: Build macOS ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            name: arm64
            runner: macos-14
          - target: x86_64-apple-darwin
            name: x86_64
            runner: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Build release
        run: |
          cargo build --release --target ${{ matrix.target }}
          strip target/${{ matrix.target }}/release/nuclaw

      - name: Create tarball
        run: |
          tar -czf nuclaw-${{ matrix.target }}.tar.gz \
            -C target/${{ matrix.target }}/release nuclaw

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: nuclaw-${{ matrix.target }}.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
